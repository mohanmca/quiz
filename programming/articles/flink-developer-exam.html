<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apache Flink Certification Practice Exam - Full 150 Questions</title>
<style>
:root{
  --bg:#eef2ff;
  --card:#ffffff;
  --text:#172033;
  --muted:#64748b;
  --line:#dbe4f0;
  --blue:#2563eb;
  --violet:#7c3aed;
  --green:#16a34a;
  --red:#dc2626;
  --amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
  color:var(--text);
  line-height:1.6;
}
code,pre{font-family:"JetBrains Mono","Fira Code","Cascadia Code",monospace}
#progressBar{
  position:fixed;
  top:0;
  left:0;
  width:0;
  height:4px;
  z-index:500;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  transition:width .2s ease;
}
.shell{
  max-width:980px;
  margin:0 auto;
  padding:20px 16px 120px;
}
.topbar{
  position:sticky;
  top:10px;
  z-index:50;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(219,228,240,.9);
  box-shadow:0 10px 30px rgba(15,23,42,.08);
  border-radius:16px;
  padding:14px 18px;
  display:grid;
  grid-template-columns:1.6fr 1fr auto;
  gap:14px;
  align-items:center;
  backdrop-filter:blur(10px);
}
.brand h1{
  font-size:1.05rem;
  line-height:1.3;
}
.brand .sub{
  color:var(--muted);
  font-size:.84rem;
}
.meta{
  display:flex;
  gap:14px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:.88rem;
}
.meta strong{color:var(--text)}
.actions{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:flex-end;
  flex-wrap:wrap;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:82px;
  padding:8px 12px;
  border-radius:999px;
  font-weight:700;
  font-size:.9rem;
  background:#eff6ff;
  color:var(--blue);
}
.pill.warn{background:#fff7ed;color:var(--amber)}
.pill.danger{background:#fef2f2;color:var(--red)}
button{
  border:none;
  cursor:pointer;
  border-radius:10px;
  padding:10px 14px;
  font-size:.9rem;
  font-weight:600;
  transition:all .15s ease;
}
button.secondary{
  background:#f8fafc;
  color:#334155;
  border:1px solid var(--line);
}
button.secondary:hover{background:#eef2ff}
button.primary{
  background:var(--blue);
  color:#fff;
}
button.primary:hover{background:#1d4ed8}
button.violet{
  background:var(--violet);
  color:#fff;
}
button.violet:hover{background:#6d28d9}

.examCard,.resultsCard{
  margin-top:18px;
  background:var(--card);
  border:1px solid rgba(219,228,240,.95);
  border-radius:18px;
  box-shadow:0 18px 48px rgba(15,23,42,.08);
  padding:30px 32px;
}
.resultsCard{display:none}
.resultsCard.show{display:block}
.sectionBadge{
  display:inline-block;
  background:#eff6ff;
  color:var(--blue);
  border-radius:999px;
  padding:4px 10px;
  font-size:.76rem;
  font-weight:700;
  margin-bottom:8px;
}
.qMeta{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:.88rem;
  margin-bottom:10px;
}
.objective{
  margin-bottom:14px;
  padding:8px 12px;
  border-left:4px solid var(--violet);
  background:#faf5ff;
  color:#5b21b6;
  border-radius:0 10px 10px 0;
  font-size:.9rem;
}
.qText{
  font-size:1.08rem;
  font-weight:600;
  line-height:1.55;
}
pre{
  margin-top:14px;
  background:#0f172a;
  color:#e2e8f0;
  border-radius:14px;
  padding:16px 18px;
  overflow:auto;
  font-size:.86rem;
}
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:18px;
}
.option{
  display:flex;
  align-items:flex-start;
  gap:14px;
  border:2px solid var(--line);
  border-radius:14px;
  padding:14px 16px;
  background:#fff;
  user-select:none;
}
.option:hover:not(.locked){
  border-color:#a5b4fc;
  background:#f8faff;
}
.optionLetter{
  width:28px;
  height:28px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
  background:#f1f5f9;
  color:#475569;
  font-weight:800;
  font-size:.82rem;
}
.optionText{
  flex:1;
  font-size:.96rem;
}
.optionText code{
  background:#eef2ff;
  padding:1px 5px;
  border-radius:6px;
}
.option.correct{
  border-color:#86efac;
  background:#f0fdf4;
}
.option.correct .optionLetter{
  background:var(--green);
  color:#fff;
}
.option.wrong{
  border-color:#fca5a5;
  background:#fef2f2;
}
.option.wrong .optionLetter{
  background:var(--red);
  color:#fff;
}
.option.locked{
  opacity:.92;
  cursor:default;
}
.feedback{
  display:none;
  margin-top:18px;
  padding:16px 18px;
  border-radius:14px;
  font-size:.93rem;
}
.feedback.show{display:block}
.feedback.pass{
  background:#f0fdf4;
  border:1px solid #bbf7d0;
  color:#166534;
}
.feedback.fail{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#991b1b;
}
.footerNav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:80;
  background:rgba(255,255,255,.97);
  border-top:1px solid rgba(219,228,240,.95);
  backdrop-filter:blur(8px);
  padding:12px 18px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.footerNav .flaggedBtn{
  background:#fff7ed;
  color:#9a3412;
  border:1px solid #fdba74;
}
.footerNav .flaggedBtn.on{
  background:#f59e0b;
  color:#fff;
  border-color:#f59e0b;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.36);
  display:none;
  z-index:199;
}
#overlay.show{display:block}
#navigator{
  position:fixed;
  top:0;
  left:-390px;
  width:370px;
  height:100%;
  z-index:200;
  background:#fff;
  border-right:1px solid var(--line);
  box-shadow:20px 0 50px rgba(15,23,42,.18);
  padding:22px 18px 40px;
  overflow:auto;
  transition:left .2s ease;
}
#navigator.open{left:0}
#navigator h2{
  font-size:1.1rem;
  margin-bottom:6px;
}
#navigator .small{
  color:var(--muted);
  font-size:.85rem;
  margin-bottom:16px;
}
.navSection{
  margin-bottom:18px;
}
.navSection h3{
  color:var(--blue);
  font-size:.88rem;
  margin-bottom:8px;
}
.navGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.navCell{
  position:relative;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  border:1px solid var(--line);
  background:#fff;
  font-weight:700;
  font-size:.85rem;
  cursor:pointer;
}
.navCell.current{background:var(--blue);border-color:var(--blue);color:#fff}
.navCell.ok{background:#dcfce7;border-color:#86efac;color:#166534}
.navCell.bad{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.navCell.flagged::after{
  content:"";
  position:absolute;
  top:4px;
  right:4px;
  width:7px;
  height:7px;
  border-radius:999px;
  background:#eab308;
}

.scoreHero{
  display:flex;
  flex-wrap:wrap;
  gap:16px;
  align-items:center;
  margin-bottom:18px;
}
.bigScore{
  padding:16px 22px;
  border-radius:18px;
  font-size:2rem;
  font-weight:800;
}
.bigScore.pass{background:#dcfce7;color:#166534}
.bigScore.fail{background:#fee2e2;color:#991b1b}
.resultsMeta{
  color:var(--muted);
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
}
th,td{
  text-align:left;
  padding:12px 10px;
  border-bottom:1px solid var(--line);
  font-size:.92rem;
}
th{
  color:#475569;
  background:#f8fafc;
  font-weight:700;
}
.bar{
  width:140px;
  height:8px;
  border-radius:999px;
  background:#e2e8f0;
  overflow:hidden;
}
.bar > span{
  display:block;
  height:100%;
  border-radius:999px;
}
.reviewList{
  margin-top:22px;
}
.reviewItem{
  background:#fef2f2;
  border:1px solid #fecaca;
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:12px;
}
.reviewItem .q{
  font-weight:700;
  margin-bottom:6px;
}
.reviewItem .line{
  font-size:.9rem;
  color:#475569;
  margin-top:2px;
}
.kbd{
  display:inline-block;
  padding:1px 6px;
  border-radius:6px;
  background:#f1f5f9;
  border:1px solid var(--line);
  font-size:.78rem;
  font-family:monospace;
}
@media (max-width: 800px){
  .topbar{grid-template-columns:1fr}
  .actions{justify-content:flex-start}
  .examCard,.resultsCard{padding:22px 18px}
  #navigator{width:100%;left:-100%}
}
</style>
</head>
<body>
<div id="progressBar"></div>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <h1>Apache Flink Certification Practice Exam</h1>
      <div class="sub">Dry run batches 1-15: full 150-question bank.</div>
    </div>
    <div class="meta">
      <span id="counter"><strong>1 / 150</strong></span>
      <span id="sectionLabel">Runtime &amp; Execution</span>
      <span id="completion">0% answered</span>
    </div>
    <div class="actions">
      <div id="timerPill" class="pill">300:00</div>
      <button class="secondary" id="navToggle">Navigator</button>
      <button class="secondary" id="resultsToggle">Results</button>
    </div>
  </div>

  <div id="examCard" class="examCard"></div>
  <div id="resultsCard" class="resultsCard"></div>
</div>

<div class="footerNav">
  <button class="secondary" id="prevBtn">Prev</button>
  <button class="secondary" id="flagBtn">Flag</button>
  <button class="primary" id="nextBtn">Next</button>
  <button class="violet" id="submitBtn">Submit Exam</button>
</div>

<div id="overlay"></div>
<div id="navigator">
  <h2>Question Navigator</h2>
  <div class="small">Keyboard: <span class="kbd">1-4</span> answer, <span class="kbd">N</span> next, <span class="kbd">P</span> prev, <span class="kbd">F</span> flag, <span class="kbd">T</span> navigator.</div>
  <div id="navBody"></div>
</div>

<script>
(() => {
  const EXAM = {
    title: "Apache Flink Certification Practice Exam - Full 150 Questions",
    version: "0.6",
    timeLimitMinutes: 300,
    passThreshold: 0.70,
    source: "Generated from flink-knowledge-llms.txt and certification/Flink_Certification.md, grounded in Apache Flink runtime, checkpoint, failover, and table planner source files.",
    sections: [
      {
        id: 1,
        name: "Runtime & Execution",
        questions: [
          {
            id: "rt_1",
            objective: "Separate Dispatcher, JobMaster, and task-side execution roles",
            question: "A platform engineer says, 'The component that receives job submissions, persists them, spawns JobManagers, and recovers jobs after a master failure is the JobMaster.' Which correction is most accurate?",
            options: [
              "That description matches the Dispatcher; the JobMaster is responsible for execution of a single job.",
              "That description matches SchedulerBase; the Dispatcher only serves the web UI.",
              "That description matches StreamExecutionEnvironment; the JobMaster only manages checkpoints.",
              "That description is already correct because JobMaster and Dispatcher are synonyms in modern Flink."
            ],
            answer: 0,
            explanation: "Dispatcher is the cluster-side component responsible for receiving submissions, persisting them, spawning JobManagers/JobMasters, and recovering them. JobMaster is responsible for execution of a single job."
          },
          {
            id: "rt_2",
            objective: "Understand what operator chaining means at runtime",
            question: "Assume several operators are fully chainable. Which statement best matches Flink runtime behavior?",
            options: [
              "Chained operators execute synchronously in the same StreamTask thread and on the same stream partition.",
              "Chained operators always run in separate executor threads, but share checkpoint metadata.",
              "Chained operators run in the same JVM process but must be in different task slots.",
              "Chained operators are combined only in batch mode; streaming mode forbids chaining."
            ],
            answer: 0,
            explanation: "The StreamTask class comment states that operators chained together execute synchronously in the same thread and on the same stream partition. Chaining is a runtime optimization, not a separate-thread mechanism."
          },
          {
            id: "rt_3",
            objective: "Understand what the program assembly context accumulates",
            question: "Before execution is triggered, what does StreamExecutionEnvironment primarily accumulate as a user builds a Flink DataStream job?",
            options: [
              "A set of transformations that will later be materialized into the execution graph or plan.",
              "A list of fully running StreamTasks that are only waiting for checkpoint IDs.",
              "A completed checkpoint store for every operator chain, even if checkpointing is disabled.",
              "A permanent savepoint for each intermediate DataStream to support lazy evaluation."
            ],
            answer: 0,
            explanation: "StreamExecutionEnvironment collects transformations and configuration. It is the context in which the logical program is assembled before being turned into a graph or plan for execution."
          },
          {
            id: "rt_4",
            objective: "Identify the TaskManager-side local execution unit",
            question: "Which statement is most accurate about the unit of local execution on a TaskManager?",
            options: [
              "A StreamTask is the local processing unit, and it may run one or more chained StreamOperators.",
              "A StreamExecutionEnvironment is the local processing unit, and each TaskManager owns exactly one.",
              "A Dispatcher is the local processing unit, and each slot contains one Dispatcher.",
              "A DynamicTableSource is the local processing unit whenever the job uses SQL."
            ],
            answer: 0,
            explanation: "StreamTask is the local unit of processing deployed on TaskManagers. It can contain a head operator and additional chained operators."
          },
          {
            id: "rt_5",
            objective: "Reason about task lifecycle ordering",
            question: "Which lifecycle ordering best matches the StreamTask comments and setup flow?",
            options: [
              "Initialize operator state before opening operators, then run, then finish and close operators.",
              "Open operators first, then initialize state, then run, then create checkpoint storage.",
              "Run first, then initialize state from the first successful checkpoint, then open operators.",
              "Finish operators before run because finishing installs the mailbox execution loop."
            ],
            answer: 0,
            explanation: "The documented StreamTask lifecycle places state initialization before open-operators, then run, then finish-operators and close-operators."
          },
          {
            id: "rt_6",
            objective: "Identify the per-job execution-side control-plane component",
            question: "If the question is phrased precisely in terms of current runtime code, which component is responsible for execution of a single ExecutionPlan?",
            options: [
              "JobMaster",
              "Dispatcher",
              "StreamExecutionEnvironment",
              "StatusWatermarkValve"
            ],
            answer: 0,
            explanation: "JobMaster is responsible for execution of a single ExecutionPlan. Dispatcher is cluster/session-side submission and recovery control."
          },
          {
            id: "rt_7",
            objective: "Understand what SchedulerBase assembles when checkpointing is enabled",
            question: "Which statement best matches what SchedulerBase sets up when checkpointing is enabled for a job?",
            options: [
              "It wires in pieces such as the completed checkpoint store, checkpoint ID counter, and checkpoint stats tracking as part of execution graph creation and restore.",
              "It bypasses checkpoint-related setup because CheckpointCoordinator is created only inside StreamTask.",
              "It creates checkpoint storage only for batch jobs, not streaming jobs.",
              "It only records checkpoint metrics after the job finishes so scheduling remains isolated from recovery."
            ],
            answer: 0,
            explanation: "SchedulerBase is not just a resource-placement abstraction. It participates in execution graph creation and restoration, including completed checkpoint store, checkpoint ID counter, and checkpoint stats tracker setup."
          },
          {
            id: "rt_9",
            objective: "Understand that operator chains can have multiple outputs",
            question: "What is true about a StreamTask's operator chain according to the runtime comments?",
            options: [
              "The chain may fork and therefore may have multiple ends, even though it has one head operator.",
              "The chain is always a single linear list with exactly one head and one tail.",
              "The chain may contain multiple heads, but only if checkpointing is disabled.",
              "Forking is forbidden because all chained operators must share one output channel."
            ],
            answer: 0,
            explanation: "The StreamTask comments note that the chain has one head operator but may fork and thus have multiple ends."
          },
          {
            id: "rt_10",
            objective: "Understand how off-thread actions are serialized back onto the task thread",
            question: "Why does StreamTask route actions from outside the mailbox through task-thread coordination instead of letting arbitrary threads call operators directly?",
            options: [
              "To avoid concurrent operator method calls that could break consistency, especially around checkpoints and task execution semantics.",
              "Because Java prevents StreamOperator methods from being invoked from multiple threads at compile time.",
              "Because only the Dispatcher process is allowed to call StreamOperator methods.",
              "Because off-thread actions are converted into SQL operations before execution."
            ],
            answer: 0,
            explanation: "The runtime uses mailbox-based coordination so external actions are executed in the task thread, avoiding unsafe concurrent operator calls and protecting consistency."
          },
          {
            id: "rt_11",
            objective: "Differentiate cluster-level submission from local task execution",
            question: "Which pairing is correct?",
            options: [
              "Dispatcher handles submission and recovery at the cluster/session side; StreamTask is the TaskManager-side local execution unit.",
              "Dispatcher is the local execution unit; StreamTask is the submission-time planning context.",
              "JobMaster is the only component involved in submission, planning, and every local task method call.",
              "SchedulerBase runs inside each operator chain as the source-side coordinator."
            ],
            answer: 0,
            explanation: "Dispatcher is cluster-side control for submitted jobs and recovery. StreamTask is the local execution unit on the TaskManager side."
          },
          {
            id: "rt_12",
            objective: "Understand JobMaster ownership of per-job runtime services",
            question: "Which set of responsibilities aligns best with the JobMaster fields visible in the runtime source?",
            options: [
              "Per-job execution control such as scheduler integration, slot pool interaction, TaskManager heartbeats, shuffle coordination, and operator coordination.",
              "Global website rendering, browser-side progress bars, and local source idleness detection.",
              "Compile-time Java code generation only, with no runtime interaction once the job starts.",
              "Only savepoint disposal and nothing related to scheduling or resources."
            ],
            answer: 0,
            explanation: "JobMaster owns per-job services including scheduler, slot pool, heartbeat-related components, shuffle, and operator coordination. It is not just a savepoint helper."
          },
          {
            id: "rt_13",
            objective: "Recognize that scheduling is coupled with restore and recovery",
            question: "Why is it misleading to describe modern Flink scheduling as only 'placing tasks on machines'?",
            options: [
              "Because scheduling code is intertwined with execution-graph creation, restoration, checkpoint stores, exception history, and recovery behavior.",
              "Because Flink does not schedule tasks at all; tasks choose their own TaskManagers at runtime.",
              "Because task placement is handled entirely inside DynamicTableSink implementations.",
              "Because placement matters only for batch jobs; streaming jobs always execute in place."
            ],
            answer: 0,
            explanation: "SchedulerBase and related runtime code show that scheduling is tied to execution graph lifecycle, restoration, checkpoint-related services, and failure handling, not just raw placement."
          },
          {
            id: "rt_14",
            objective: "Understand how the environment controls execution behavior",
            question: "Which statement best matches the role of StreamExecutionEnvironment?",
            options: [
              "It is the context for building a streaming program, controlling execution aspects like parallelism and checkpointing, and interacting with data access.",
              "It is a local state backend that stores per-key values on the heap.",
              "It is the high-availability service that persists submitted jobs across master failure.",
              "It is the planner-only abstraction used exclusively by SQL, with no DataStream role."
            ],
            answer: 0,
            explanation: "The class comment describes StreamExecutionEnvironment as the context in which a streaming program is executed, controlling execution behavior and data access."
          },
          {
            id: "rt_15",
            objective: "Separate logical job description from deployed execution attempts",
            question: "Which statement most precisely distinguishes `JobGraph` from the runtime execution graph that the scheduler works with?",
            options: [
              "`JobGraph` is the logical submitted topology, while the runtime execution graph expands that plan into execution vertices and attempts used for deployment and recovery.",
              "`JobGraph` exists only inside TaskManagers, while the runtime execution graph exists only in client code.",
              "`JobGraph` is the mutable state snapshot, while the runtime execution graph stores only SQL metadata.",
              "They are the same object under different names, split only for legacy package reasons."
            ],
            answer: 0,
            explanation: "The submitted JobGraph describes the job logically. The scheduler builds and manages runtime execution structures with concrete execution vertices, attempts, and deployment state."
          },
          {
            id: "rt_16",
            objective: "Understand why StreamTask uses the mailbox model",
            question: "What problem does the mailbox model solve inside `StreamTask` most directly?",
            options: [
              "It lets control actions and operator work run in a serialized task-thread loop instead of relying on broad concurrent mutation of task internals.",
              "It permanently moves timer callbacks to a dedicated network thread so operators never run on the task thread.",
              "It replaces checkpoints with mailbox messages so state snapshots become lock-free.",
              "It allows JobMaster RPC handlers to execute user functions directly inside the client process."
            ],
            answer: 0,
            explanation: "The mailbox model is about serialized execution on the task thread. Control actions can be enqueued and processed without turning the operator runtime into a freely concurrent design."
          },
          {
            id: "rt_17",
            objective: "Recognize the practical effect of operator chaining",
            question: "What is the most accurate runtime reading of an operator chain in Flink?",
            options: [
              "Chainable operators can run within the same task and exchange records without inserting a network boundary between them.",
              "Every chained operator still becomes a separate TaskManager process, but they share a checkpoint ID.",
              "Operator chaining is only a SQL planner optimization and does not affect the DataStream runtime.",
              "Chaining means all operators in the job share one key-group range."
            ],
            answer: 0,
            explanation: "Operator chaining is a runtime optimization that keeps compatible operators in the same task, avoiding unnecessary network handoff between them."
          },
          {
            id: "rt_18",
            objective: "Separate restart strategy from failover scope",
            question: "Which pairing best matches Flink runtime terminology when a task fails?",
            options: [
              "The restart strategy decides whether and when execution should be retried, while the failover strategy decides which tasks or regions must restart together.",
              "The failover strategy decides checkpoint intervals, while the restart strategy chooses watermark alignment groups.",
              "The restart strategy chooses slot sharing groups, while the failover strategy serializes mailbox actions.",
              "Both terms mean exactly the same thing and are interchangeable in the runtime."
            ],
            answer: 0,
            explanation: "Restart strategy answers retry timing and admissibility. Failover strategy determines the execution scope that must be restarted for consistency."
          },
          {
            id: "rt_19",
            objective: "Understand why one subtask can have multiple executions over time",
            question: "Why can a single logical subtask correspond to multiple execution attempts across the life of one submitted job?",
            options: [
              "Because retries and recoveries create new executions for the same logical vertex or subtask position after failure or redeployment.",
              "Because every checkpoint creates a brand-new execution attempt even if nothing failed.",
              "Because every watermark emission rotates the active execution attempt for load balancing.",
              "Because SQL jobs duplicate each subtask once for planner fallback."
            ],
            answer: 0,
            explanation: "Execution attempts are runtime incarnations of the same logical subtask. New attempts appear when tasks are redeployed after failures or recovery transitions."
          },
          {
            id: "rt_20",
            objective: "Understand slot sharing at a high level",

              "Because upsert mode requires `UPDATE_BEFORE` rows by definition.",

          {

            options: [
              "Because sink compatibility still depends on the sink's accepted changelog mode and runtime abilities, not just on the existence of a primary key.",
              "Because primary keys force every sink into retract mode automatically.",
              "Because keyed updates can never be written by dynamic table sinks.",

  const letters = ["A", "B", "C", "D"];
  const STORE_KEY = "flinkDeveloperExam.v7";
  const allQuestions = EXAM.sections.flatMap(section =>
    section.questions.map(question => ({
      ...question,
      sectionId: section.id,
      sectionName: section.name
    }))
  );

  let currentIndex = 0;
  let answers = {};
  let flags = {};
  let timerLeft = EXAM.timeLimitMinutes * 60;
  let timerHandle = null;
  let examFinished = false;
  let shuffleSeed = Math.floor(Math.random() * 0xFFFFFFFF);

  const els = {
    progressBar: document.getElementById("progressBar"),
    examCard: document.getElementById("examCard"),
    resultsCard: document.getElementById("resultsCard"),
    counter: document.getElementById("counter"),
    sectionLabel: document.getElementById("sectionLabel"),
    completion: document.getElementById("completion"),
    timerPill: document.getElementById("timerPill"),
    navBody: document.getElementById("navBody"),
    navigator: document.getElementById("navigator"),
    overlay: document.getElementById("overlay"),
    flagBtn: document.getElementById("flagBtn")
  };

  function saveState() {
    const payload = {
      currentIndex,
      answers,
      flags,
      shuffleSeed,
      timerLeft,
      examFinished
    };
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(payload));
    } catch (err) {
      // Ignore storage failures.
    }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) {
        return;
      }
      const data = JSON.parse(raw);
      currentIndex = Math.min(data.currentIndex || 0, allQuestions.length - 1);
      answers = data.answers || {};
      flags = data.flags || {};
      shuffleSeed = typeof data.shuffleSeed === "number" ? data.shuffleSeed : Math.floor(Math.random() * 0xFFFFFFFF);
      timerLeft = typeof data.timerLeft === "number" ? data.timerLeft : EXAM.timeLimitMinutes * 60;
      examFinished = Boolean(data.examFinished);
    } catch (err) {
      // Ignore storage failures.
    }
  }

  function hashString(text) {
    let hash = 0;
    for (let i = 0; i < text.length; i++) {
      hash = ((hash << 5) - hash) + text.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function getShuffled(question, index) {
    const indices = question.options.map((_, optionIndex) => optionIndex);
    const seedBase = `${question.id || String(index)}::${shuffleSeed}::flink::v3`;
    const rand = mulberry32(hashString(seedBase));
    for (let m = indices.length - 1; m > 0; m--) {
      const j = Math.floor(rand() * (m + 1));
      [indices[m], indices[j]] = [indices[j], indices[m]];
    }

    // Avoid leaving the option order unchanged for a given question id.
    if (indices.length > 1 && indices.every((originalIndex, optionIndex) => originalIndex === optionIndex)) {
      const rotation = (hashString(`${seedBase}::rotate`) % (indices.length - 1)) + 1;
      const rotated = indices.slice(rotation).concat(indices.slice(0, rotation));
      indices.splice(0, indices.length, ...rotated);
    }

    const options = indices.map(originalIndex => question.options[originalIndex]);
    return { options, indices };
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function formatOption(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\n/g, "<br>");
  }

  function renderQuestion() {
    const question = allQuestions[currentIndex];
    const shuffled = getShuffled(question, currentIndex);
    const stored = answers[currentIndex];

    let html = "";
    html += `<div class="sectionBadge">Section ${question.sectionId}: ${escapeHtml(question.sectionName)}</div>`;
    html += `<div class="qMeta"><span>Question ${currentIndex + 1} of ${allQuestions.length}</span><span>Question ID: ${escapeHtml(question.id)}</span></div>`;
    if (question.objective) {
      html += `<div class="objective">Objective: ${escapeHtml(question.objective)}</div>`;
    }
    html += `<div class="qText">${question.question.replace(/\n/g, "<br>")}</div>`;
    if (question.code) {
      html += `<pre>${escapeHtml(question.code)}</pre>`;
    }
    html += `<div class="options">`;
    shuffled.options.forEach((optionText, optionIndex) => {
      const originalIndex = shuffled.indices[optionIndex];
      let classes = "option";
      if (stored) {
        classes += " locked";
        if (originalIndex === question.answer) {
          classes += " correct";
        } else if (stored.chosenOriginal === originalIndex) {
          classes += " wrong";
        }
      }
      html += `<div class="${classes}" data-choice="${optionIndex}" data-choice-original="${originalIndex}">`;
      html += `<div class="optionLetter">${letters[optionIndex]}</div>`;
      html += `<div class="optionText">${formatOption(optionText)}</div>`;
      html += `</div>`;
    });
    html += `</div>`;

    if (stored) {
      const correct = stored.chosenOriginal === question.answer;
      html += `<div class="feedback show ${correct ? "pass" : "fail"}">`;
      html += `<strong>${correct ? "Correct." : "Incorrect."}</strong> ${escapeHtml(question.explanation)}`;
      html += `</div>`;
    }

    els.examCard.innerHTML = html;
    els.resultsCard.classList.remove("show");
    els.examCard.style.display = "block";

    els.examCard.querySelectorAll(".option").forEach(optionEl => {
      optionEl.addEventListener("click", () => {
        if (answers[currentIndex]) {
          return;
        }
        const chosenOriginal = Number(optionEl.getAttribute("data-choice-original"));
        selectOption(currentIndex, chosenOriginal);
      });
    });

    const answeredCount = Object.keys(answers).length;
    const percent = Math.round((answeredCount / allQuestions.length) * 100);
    els.counter.innerHTML = `<strong>${currentIndex + 1} / ${allQuestions.length}</strong>`;
    els.sectionLabel.textContent = `S${question.sectionId}: ${question.sectionName}`;
    els.completion.textContent = `${percent}% answered`;
    els.progressBar.style.width = `${percent}%`;
    els.flagBtn.textContent = flags[currentIndex] ? "Flagged" : "Flag";
    els.flagBtn.className = flags[currentIndex] ? "flaggedBtn on" : "secondary";
    renderNavigator();
    saveState();
  }

  function selectOption(index, chosenOriginal) {
    answers[index] = { chosenOriginal };
    saveState();
    renderQuestion();
    const delay = chosenOriginal === allQuestions[index].answer ? 1200 : 2200;
    setTimeout(() => {
      if (currentIndex === index && currentIndex < allQuestions.length - 1) {
        currentIndex += 1;
        renderQuestion();
      }
    }, delay);
  }

  function go(delta) {
    const next = currentIndex + delta;
    if (next < 0 || next >= allQuestions.length) {
      return;
    }
    currentIndex = next;
    renderQuestion();
  }

  function toggleFlag() {
    if (flags[currentIndex]) {
      delete flags[currentIndex];
    } else {
      flags[currentIndex] = true;
    }
    renderQuestion();
  }

  function formatTime(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
  }

  function updateTimer() {
    els.timerPill.textContent = formatTime(timerLeft);
    els.timerPill.className = "pill";
    if (timerLeft <= 60) {
      els.timerPill.classList.add("danger");
    } else if (timerLeft <= 300) {
      els.timerPill.classList.add("warn");
    }
  }

  function startTimer() {
    if (timerHandle) {
      clearInterval(timerHandle);
    }
    if (examFinished) {
      return;
    }
    timerHandle = setInterval(() => {
      if (timerLeft <= 0) {
        clearInterval(timerHandle);
        examFinished = true;
        showResults();
        return;
      }
      timerLeft -= 1;
      updateTimer();
      if (timerLeft % 30 === 0) {
        saveState();
      }
    }, 1000);
  }

  function toggleNavigator(forceOpen) {
    const open = typeof forceOpen === "boolean"
      ? forceOpen
      : !els.navigator.classList.contains("open");
    els.navigator.classList.toggle("open", open);
    els.overlay.classList.toggle("show", open);
  }

  function renderNavigator() {
    let html = "";
    let globalIndex = 0;
    EXAM.sections.forEach(section => {
      html += `<div class="navSection">`;
      html += `<h3>S${section.id}: ${escapeHtml(section.name)} (${section.questions.length})</h3>`;
      html += `<div class="navGrid">`;
      section.questions.forEach((question, localIndex) => {
        let classes = "navCell";
        if (globalIndex === currentIndex) {
          classes += " current";
        }
        if (answers[globalIndex]) {
          classes += answers[globalIndex].chosenOriginal === allQuestions[globalIndex].answer ? " ok" : " bad";
        }
        if (flags[globalIndex]) {
          classes += " flagged";
        }
        html += `<div class="${classes}" data-jump="${globalIndex}" title="Question ${globalIndex + 1}">${localIndex + 1}</div>`;
        globalIndex += 1;
      });
      html += `</div></div>`;
    });
    els.navBody.innerHTML = html;
    els.navBody.querySelectorAll(".navCell").forEach(cell => {
      cell.addEventListener("click", () => {
        currentIndex = Number(cell.getAttribute("data-jump"));
        toggleNavigator(false);
        renderQuestion();
      });
    });
  }

  function showResults() {
    examFinished = true;
    if (timerHandle) {
      clearInterval(timerHandle);
    }
    saveState();

    let totalCorrect = 0;
    const sectionScores = {};
    const wrongItems = [];

    EXAM.sections.forEach(section => {
      sectionScores[section.id] = {
        name: section.name,
        total: section.questions.length,
        correct: 0
      };
    });

    allQuestions.forEach((question, index) => {
      if (!answers[index]) {
        return;
      }
      const correct = answers[index].chosenOriginal === question.answer;
      if (correct) {
        totalCorrect += 1;
        sectionScores[question.sectionId].correct += 1;
      } else {
        wrongItems.push({
          number: index + 1,
          question: question.question,
          yourAnswer: question.options[answers[index].chosenOriginal],
          correctAnswer: question.options[question.answer],
          explanation: question.explanation
        });
      }
    });

    const percent = Math.round((totalCorrect / allQuestions.length) * 100);
    const passed = (totalCorrect / allQuestions.length) >= EXAM.passThreshold;
    const answeredCount = Object.keys(answers).length;

    let html = "";
    html += `<h2>${escapeHtml(EXAM.title)}</h2>`;
    html += `<div class="scoreHero">`;
    html += `<div class="bigScore ${passed ? "pass" : "fail"}">${totalCorrect}/${allQuestions.length} (${percent}%)</div>`;
    html += `<div class="resultsMeta">`;
    html += `<div><strong>${passed ? "PASS" : "NOT YET PASSING"}</strong> - threshold ${(EXAM.passThreshold * 100).toFixed(0)}%</div>`;
    html += `<div>Answered ${answeredCount}/${allQuestions.length} | Correct ${totalCorrect} | Wrong ${answeredCount - totalCorrect} | Unanswered ${allQuestions.length - answeredCount}</div>`;
    html += `<div style="margin-top:4px">${escapeHtml(EXAM.source)}</div>`;
    html += `</div></div>`;

    html += `<table><thead><tr><th>Section</th><th>Score</th><th>Percent</th><th>Progress</th></tr></thead><tbody>`;
    Object.values(sectionScores).forEach(score => {
      const pct = Math.round((score.correct / score.total) * 100);
      const color = pct >= 70 ? "#16a34a" : pct >= 50 ? "#d97706" : "#dc2626";
      html += `<tr>`;
      html += `<td>${escapeHtml(score.name)}</td>`;
      html += `<td>${score.correct}/${score.total}</td>`;
      html += `<td>${pct}%</td>`;
      html += `<td><div class="bar"><span style="width:${pct}%;background:${color}"></span></div></td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;

    if (wrongItems.length) {
      html += `<div class="reviewList"><h3>Review Incorrect Answers (${wrongItems.length})</h3>`;
      wrongItems.forEach(item => {
        html += `<div class="reviewItem">`;
        html += `<div class="q">Q${item.number}. ${escapeHtml(item.question)}</div>`;
        html += `<div class="line"><strong>Your answer:</strong> ${escapeHtml(item.yourAnswer)}</div>`;
        html += `<div class="line"><strong>Correct answer:</strong> ${escapeHtml(item.correctAnswer)}</div>`;
        html += `<div class="line"><strong>Why:</strong> ${escapeHtml(item.explanation)}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">`;
    html += `<button class="primary" id="retryWrongBtn">Retry Incorrect</button>`;
    html += `<button class="secondary" id="resetExamBtn">Reset Exam</button>`;
    html += `</div>`;

    els.resultsCard.innerHTML = html;
    els.resultsCard.classList.add("show");
    els.examCard.style.display = "none";

    document.getElementById("retryWrongBtn").addEventListener("click", retryWrong);
    document.getElementById("resetExamBtn").addEventListener("click", resetExam);
  }

  function retryWrong() {
    let firstWrong = -1;
    allQuestions.forEach((question, index) => {
      if (answers[index] && answers[index].chosenOriginal !== question.answer) {
        delete answers[index];
        if (firstWrong < 0) {
          firstWrong = index;
        }
      }
    });
    if (firstWrong < 0) {
      alert("There are no incorrect answers to retry.");
      return;
    }
    currentIndex = firstWrong;
    examFinished = false;
    timerLeft = 10 * 60;
    updateTimer();
    startTimer();
    renderQuestion();
  }

  function resetExam() {
    if (!confirm("Reset all answers and restart this dry-run exam?")) {
      return;
    }
    answers = {};
    flags = {};
    currentIndex = 0;
    shuffleSeed = Math.floor(Math.random() * 0xFFFFFFFF);
    timerLeft = EXAM.timeLimitMinutes * 60;
    examFinished = false;
    updateTimer();
    startTimer();
    renderQuestion();
  }

  document.getElementById("prevBtn").addEventListener("click", () => go(-1));
  document.getElementById("nextBtn").addEventListener("click", () => go(1));
  document.getElementById("submitBtn").addEventListener("click", showResults);
  document.getElementById("resultsToggle").addEventListener("click", showResults);
  document.getElementById("navToggle").addEventListener("click", () => toggleNavigator());
  els.flagBtn.addEventListener("click", toggleFlag);
  els.overlay.addEventListener("click", () => toggleNavigator(false));

  document.addEventListener("keydown", event => {
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA") {
      return;
    }
    const key = event.key.toLowerCase();
    if (key === "n" || key === "arrowright") {
      event.preventDefault();
      go(1);
    } else if (key === "p" || key === "arrowleft") {
      event.preventDefault();
      go(-1);
    } else if (key === "f") {
      event.preventDefault();
      toggleFlag();
    } else if (key === "t") {
      event.preventDefault();
      toggleNavigator();
    } else if (key === "escape") {
      toggleNavigator(false);
    } else if (!answers[currentIndex] && ["1", "2", "3", "4"].includes(key)) {
      const choice = Number(key) - 1;
      const shuffled = getShuffled(allQuestions[currentIndex], currentIndex);
      selectOption(currentIndex, shuffled.indices[choice]);
    }
  });

  loadState();
  updateTimer();
  startTimer();
  renderQuestion();
})();
</script>
