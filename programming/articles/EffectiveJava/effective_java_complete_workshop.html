cation failure?", "options": ["Errors are reserved for unrecoverable VM-level conditions and should not be part of normal API design", "Errors cannot carry detail messages", "Errors are always checked", "Errors cannot be thrown from Java code"], "answer": 0, "explanation": "Application code should not invent new errors; it should use runtime exceptions or checked exceptions as appropriate.", "id": "chapter10_m1_q4"}, {"question": "What should a checked exception provide if recovery is expected?", "options": ["Typed accessors that expose the data needed to recover", "Only a stack trace", "A localized user message", "A private constructor"], "answer": 0, "explanation": "Callers should not need to parse exception text to recover from a known failure mode.", "id": "chapter10_m1_q5"}]}, {"id": 34, "name": "10 Exceptions - Checked exceptions, standard exceptions, and abstraction", "questions": [{"question": "Why can a checked exception make an API unpleasant to use?", "options": ["Because every caller must catch it or declare it, even when recovery is awkward", "Because checked exceptions are always slower at runtime", "Because checked exceptions cannot be documented", "Because they cannot be translated"], "answer": 0, "explanation": "A checked exception is a deliberate API burden, so it should be reserved for useful recovery scenarios.", "id": "chapter10_m2_q1"}, {"question": "When should `Optional` be preferred over a checked exception?", "options": ["When the failure can be represented as absence and no extra failure data is needed", "When the caller needs a stack trace", "When the method is private", "When the exception is recoverable"], "answer": 0, "explanation": "Optional is a cleaner replacement when the failure mode is simply “no result.”", "id": "chapter10_m2_q2"}, {"question": "Which exception best matches an illegal argument value?", "options": ["`IllegalArgumentException`", "`IllegalStateException`", "`ConcurrentModificationException`", "`UnsupportedOperationException`"], "answer": 0, "explanation": "Bad parameter values should map to `IllegalArgumentException` unless a more specific standard exception applies.", "id": "chapter10_m2_q3"}, {"question": "What is the purpose of exception translation?", "options": ["To convert a low-level failure into an exception that matches the higher-level abstraction", "To hide all failures from callers", "To avoid using stack traces", "To force all exceptions to become checked"], "answer": 0, "explanation": "Translation keeps implementation details out of the public contract while preserving useful diagnostics.", "id": "chapter10_m2_q4"}, {"question": "Why is chaining useful in translated exceptions?", "options": ["It preserves the original cause and its stack trace for debugging", "It eliminates the need for documentation", "It makes the exception unchecked", "It guarantees recovery"], "answer": 0, "explanation": "Chaining gives you the higher-level exception the API needs plus the lower-level cause you may need later.", "id": "chapter10_m2_q5"}]}, {"id": 35, "name": "10 Exceptions - Documentation, diagnostics, and failure atomicity", "questions": [{"question": "What is the best way to document a checked exception?", "options": ["With a precise `throws` declaration and a Javadoc `@throws` description of when it occurs", "Only in the class-level comment", "Only by naming the exception type well", "By omitting it so callers discover it from stack traces"], "answer": 0, "explanation": "The declaration and the Javadoc should tell clients exactly when the exception is expected.", "id": "chapter10_m3_q1"}, {"question": "What belongs in an exception detail message?", "options": ["The values that explain the failure, such as offending indexes or bounds", "A long prose narrative for end users", "Sensitive secrets so support can diagnose faster", "Only the exception class name"], "answer": 0, "explanation": "The detail message should capture the failure facts, not tell a story.", "id": "chapter10_m3_q2"}, {"question": "What is failure atomicity?", "options": ["A failed operation leaves the object in the same usable state it had before the call", "A method never throws exceptions", "A method always rolls back the heap", "A catch block always repairs every invariant automatically"], "answer": 0, "explanation": "Failure atomicity is about preserving object state when an operation aborts.", "id": "chapter10_m3_q3"}, {"question": "When is it acceptable to ignore an exception?", "options": ["Only when the code comments explicitly explain why ignoring it is safe or expected", "Whenever the exception is checked", "Whenever the catch block is empty but short", "Whenever the program is not in debug mode"], "answer": 0, "explanation": "Ignoring an exception without explanation is a silent failure mode.", "id": "chapter10_m3_q4"}, {"question": "Why can swallowing an exception make debugging harder?", "options": ["It can defer the visible failure to a later location that no longer obviously relates to the root cause", "It forces the VM to crash immediately", "It always improves throughput", "It prevents stack traces from being generated"], "answer": 0, "explanation": "An ignored exception removes the evidence that would otherwise point at the original fault.", "id": "chapter10_m3_q5"}]}, {"id": 36, "name": "11 Concurrency - Synchronize shared mutable state", "questions": [{"question": "Why is `count++` unsafe when multiple threads share the same counter?", "options": ["It is a read-modify-write sequence, so updates can be lost without synchronization.", "Because `int` values cannot be shared between threads.", "Because `++` is always compiled as a loop.", "Because `count` becomes immutable after the first increment."], "answer": 0, "explanation": "Compound operations need mutual exclusion or an atomic class; otherwise two threads can overwrite each other's work.", "id": "chapter_11_m1_q1"}, {"question": "What does `volatile` guarantee, and what does it not guarantee?", "options": ["It guarantees visibility of writes, but not mutual exclusion or atomicity of compound actions.", "It guarantees both mutual exclusion and atomicity.", "It makes every method in the class thread-safe automatically.", "It prevents all reordering everywhere in the JVM."], "answer": 0, "explanation": "A volatile field can still be involved in a race if you perform compound updates.", "id": "chapter_11_m1_q2"}, {"question": "What is the real target of synchronization in a mutable class?", "options": ["The object invariant and the visibility of state transitions, not just individual fields.", "Only the public methods.", "Only the constructor.", "Only the fields marked private."], "answer": 0, "explanation": "Synchronizing the invariant boundary is what keeps readers from seeing a half-updated object.", "id": "chapter_11_m1_q3"}, {"question": "When is a shared object usually safe without external synchronization?", "options": ["When it is immutable and safely published, or when it is internally thread-safe by design.", "Whenever it has only one mutable field.", "Whenever its methods are `final`.", "Whenever the code passes all unit tests on one machine."], "answer": 0, "explanation": "Thread safety comes from a documented policy and the memory-ordering guarantees behind it.", "id": "chapter_11_m1_q4"}]}, {"id": 37, "name": "11 Concurrency - Avoid excessive synchronization", "questions": [{"question": "Why are open calls dangerous inside synchronized methods?", "options": ["Because foreign or overridable code can run while your lock is held, causing deadlock or invariant violations.", "Because they prevent the JVM from compiling the method.", "Because they automatically make the method recursive.", "Because synchronized blocks cannot contain method calls."], "answer": 0, "explanation": "Calling out while holding a lock gives control to code you do not own, which is exactly where lock-order bugs appear.", "id": "chapter_11_m2_q1"}, {"question": "What is the best default when a synchronized region is larger than it needs to be?", "options": ["Shrink it to the minimal section required to preserve the invariant.", "Add more synchronized methods to compensate.", "Replace the lock with `volatile`.", "Move the lock to the caller automatically."], "answer": 0, "explanation": "Excessive synchronization hurts correctness and performance, so minimize the locked scope rather than masking the design flaw.", "id": "chapter_11_m2_q2"}, {"question": "Why can inheritance make synchronization fragile?", "options": ["Because overridden methods may run under a lock that the subclass does not control.", "Because inheritance disables thread safety completely.", "Because subclasses cannot access synchronized methods.", "Because locks are inherited but monitors are not."], "answer": 0, "explanation": "A superclass cannot safely assume what subclass code will do if it invokes overridable methods while locked.", "id": "chapter_11_m2_q3"}, {"question": "What is the practical benefit of copying state before calling foreign code?", "options": ["It lets you release the lock before the callback executes.", "It turns the method into a nonblocking algorithm automatically.", "It makes the object immutable.", "It removes the need for thread-safety documentation."], "answer": 0, "explanation": "A local copy narrows the critical section and avoids holding a lock across unpredictable code.", "id": "chapter_11_m2_q4"}]}, {"id": 38, "name": "11 Concurrency - Executors, utilities, and documentation", "questions": [{"question": "Why does Effective Java prefer executors over manually managed threads?", "options": ["Executors separate task submission from execution policy and make pooling and scheduling explicit.", "Because threads are illegal in modern Java.", "Because executors always outperform threads in every workload.", "Because executor tasks cannot block."], "answer": 0, "explanation": "An executor gives you a higher-level abstraction with fewer error-prone details to manage yourself.", "id": "chapter_11_m3_q1"}, {"question": "Why are `wait` and `notify` discouraged for most application code?", "options": ["Because higher-level concurrency utilities already encode the coordination protocol more safely.", "Because they do not work on synchronized objects.", "Because they are slower than every other API by definition.", "Because they can only be used in daemon threads."], "answer": 0, "explanation": "Monitor protocols are easy to get wrong; utilities such as latches and queues reduce that risk.", "id": "chapter_11_m3_q2"}, {"question": "What should thread-safety documentation tell clients?", "options": ["Whether the class is thread-safe, conditionally thread-safe, immutable, or externally synchronized, and what lock or rule governs use.", "Only whether the class uses `synchronized` internally.", "Only whether the class has a `main` method.", "Nothing, because thread safety should be obvious from the code."], "answer": 0, "explanation": "The thread-safety contract belongs in the API docs, not in guesswork.", "id": "chapter_11_m3_q3"}, {"question": "When is lazy initialization usually justified?", "options": ["When construction is expensive or may never be needed, and the lazy path can be implemented safely.", "Whenever a field is private.", "Whenever you want to avoid writing a constructor.", "Whenever the class is public."], "answer": 0, "explanation": "Lazy init is a tradeoff, not a default. Simpler eager initialization is often the better design.", "id": "chapter_11_m3_q4"}]}, {"id": 39, "name": "12 Serialization - Avoid Java serialization unless you are forced into it", "questions": [{"question": "What is the safest default stance toward Java serialization in a new system?", "options": ["Avoid it and use a cross-platform structured-data format instead", "Use it for every boundary because it is built into the JDK", "Use it only with public fields", "Use it only if the class has a serialVersionUID"], "answer": 0, "explanation": "Item 85 says to prefer alternatives such as JSON or protobuf.", "id": "chapter12_m1_q1"}, {"question": "Why is Java deserialization dangerous even when the code does not look obviously broken?", "options": ["It can invoke code in many reachable classes during object reconstruction", "It automatically encrypts the payload", "It only works for final classes", "It refuses to run if the stream is short"], "answer": 0, "explanation": "The class path itself becomes part of the attack surface.", "id": "chapter12_m1_q2"}, {"question": "What is a deserialization bomb?", "options": ["A small stream that expands into very expensive work or deep recursion during deserialization", "A stream that always throws `ClassNotFoundException`", "A stream that only works on arrays", "A stream that can only be produced by `ObjectOutputStream` in debug mode"], "answer": 0, "explanation": "The danger is denial of service, not necessarily gadget-based code execution.", "id": "chapter12_m1_q3"}, {"question": "Why is whitelisting preferred over blacklisting when filtering input streams?", "options": ["Because blacklists only block known bad cases, while whitelists start from an explicit safe set", "Because blacklists are slower in every JVM", "Because whitelists always prevent bombs", "Because blacklists only work with enums"], "answer": 0, "explanation": "Item 85 treats whitelist-first filtering as the more defensible policy.", "id": "chapter12_m1_q4"}]}, {"id": 40, "name": "12 Serialization - Serializable is an exported API, not a private implementation detail", "questions": [{"question": "Why does implementing `Serializable` affect future class evolution?", "options": ["Because the serialized form becomes part of the class's exported API", "Because it prevents adding methods", "Because it disables generics", "Because it forces all fields to be public"], "answer": 0, "explanation": "The serialized form must remain compatible with deployed data.", "id": "chapter12_m2_q1"}, {"question": "What is the main practical reason to declare an explicit `serialVersionUID`?", "options": ["To control compatibility instead of relying on a runtime-generated hash", "To make serialization encrypt the stream", "To force all subclasses to share the same stream", "To make `readResolve` unnecessary"], "answer": 0, "explanation": "An explicit value avoids accidental incompatibility from unrelated source changes.", "id": "chapter12_m2_q2"}, {"question": "Why does the book call deserialization a hidden constructor?", "options": ["Because object creation happens without an ordinary constructor call and still must establish invariants", "Because it always invokes the no-arg constructor first", "Because it only works for records", "Because it can never fail"], "answer": 0, "explanation": "The point is that the class must defend itself even though construction is extralinguistic.", "id": "chapter12_m2_q3"}, {"question": "Which kinds of classes should rarely implement `Serializable`?", "options": ["Extendable classes and active entities such as thread pools", "Only final value objects", "Only nested classes", "Only enums"], "answer": 0, "explanation": "Item 86 says inheritance makes serialization much harder to support safely.", "id": "chapter12_m2_q4"}]}, {"id": 41, "name": "12 Serialization - Design the serialized form, then defend readObject", "questions": [{"question": "When is the default serialized form usually acceptable?", "options": ["When the physical representation is already a good description of the logical state", "Whenever the class has many methods", "Only when the class is final", "Only when the class has no constructors"], "answer": 0, "explanation": "Item 87 says the default form is fine only if it matches the logical data closely.", "id": "chapter12_m3_q1"}, {"question": "Why should derived or JVM-specific fields usually be declared `transient`?", "options": ["They are not part of the logical serialized state and should not be persisted", "They make `Serializable` compile faster", "They are automatically encrypted otherwise", "They are required for `readResolve`"], "answer": 0, "explanation": "Transient fields should not leak implementation details into the stream.", "id": "chapter12_m3_q2"}, {"question": "Why must `defaultWriteObject` and `defaultReadObject` still be called in a custom form?", "options": ["To preserve compatibility if nontransient fields are added later", "Because the JVM rejects custom forms without them", "Because they serialize transient fields too", "Because they make the stream human-readable"], "answer": 0, "explanation": "Skipping them breaks backward and forward compatibility expectations.", "id": "chapter12_m3_q3"}, {"question": "What is the most important rule for synchronization inside `writeObject`?", "options": ["It must follow the same lock-ordering and whole-object consistency rules as other methods", "It should never use a lock", "It must always be static", "It should only synchronize on `this` if the class is immutable"], "answer": 0, "explanation": "Serialization must respect the class's concurrency discipline.", "id": "chapter12_m3_q4"}]}, {"id": 42, "name": "12 Serialization - Defensive deserialization, readResolve, and serialization proxies", "questions": [{"question": "Why must `readObject` behave like a constructor?", "options": ["Because it creates an instance from attacker-controlled bytes and must establish all invariants", "Because it is always invoked before fields are allocated", "Because it can skip validation if `Serializable` is present", "Because it only runs for enums"], "answer": 0, "explanation": "Item 88 says to validate and copy just as a real constructor would.", "id": "chapter12_m4_q1"}, {"question": "What is the point of defensively copying mutable components during `readObject`?", "options": ["To prevent outsiders from retaining references to private mutable state", "To reduce the number of serialized fields", "To make the stream shorter", "To avoid `defaultReadObject`"], "answer": 0, "explanation": "Without the copy, an attacker can keep aliases to the object's internals.", "id": "chapter12_m4_q2"}, {"question": "Why is an enum the preferred tool for a serializable singleton?", "options": ["It gives the JVM a built-in instance-control guarantee that `readResolve` cannot match as safely", "It automatically makes all fields transient", "It removes the need for constructors in every class", "It allows any number of runtime instances"], "answer": 0, "explanation": "Item 89 recommends enums over fragile `readResolve` tricks whenever possible.", "id": "chapter12_m4_q3"}, {"question": "What is the key benefit of the serialization proxy pattern?", "options": ["It reconstructs the object through the public API instead of exposing raw internal state", "It makes the object serializable without `Serializable`", "It eliminates the need for a nested class", "It works best only for extendable classes"], "answer": 0, "explanation": "The proxy shifts deserialization back into ordinary, validated object construction.", "id": "chapter12_m4_q4"}]}]};
    const SLIDES = [{"m": 0, "t": "Why this book exists", "c": "<p>Effective Java is a rules book for Java developers who already know the language and want to write better code with less ambiguity.</p>\n<p>Its core scope is the standard platform libraries the author expects you to use in practice: `java.lang`, `java.util`, `java.io`, plus subpackages such as `java.util.concurrent` and `java.util.function`.</p>\n<p>The book is intentionally practical, not theoretical: it focuses on reusable rules that improve design and implementation quality.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0022.png\" alt=\"Chapter 1, page 22: the book states its purpose and library scope explicitly.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 22: the book states its purpose and library scope explicitly.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 22.</div>"}, {"m": 0, "t": "Who it is for", "c": "<p>This is not an introductory Java text.</p>\n<p>The target reader is already comfortable with Java syntax, libraries, and everyday programming, and wants guidance that is still useful for advanced work.</p>\n<p>The book is designed to remain readable for experienced developers, but it assumes you can follow code examples without hand-holding.</p>\n<div class=\"note\"><strong>Source span:</strong> Source page 22.</div>\n<div class=\"note\"><strong>Pedantic reading:</strong> treat the book as a design manual for practicing Java developers, not as a language primer.</div>"}, {"m": 0, "t": "Rule-based structure", "c": "<p>The book contains ninety items, and each item expresses one rule.</p>\n<p>The items are grouped into eleven chapters by broad design concern, but the intended reading path is non-linear.</p>\n<p>Each item stands on its own, and the cross references are there so you can navigate by topic instead of reading cover to cover.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0023.png\" alt=\"Chapter 1, page 23: the book is organized around independent items, not a linear narrative.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 23: the book is organized around independent items, not a linear narrative.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 23.</div>"}, {"m": 0, "t": "Quiz: 1 Introduction - Purpose and audience", "q": true}, {"m": 1, "t": "New platform features in the third edition", "c": "<p>The edition reflects platform features added after the previous edition, especially Java 7, Java 8, and Java 9 features.</p>\n<p>The introduction names several features by item and release so readers can find the primary coverage quickly.</p>\n<p>Lambdas, streams, optionals, default methods, try-with-resources, `@SafeVarargs`, and modules are all explicitly mapped.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0023.png\" alt=\"Chapter 1, page 23: the book maps major language and platform features to the relevant items.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 23: the book maps major language and platform features to the relevant items.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 23.</div>"}, {"m": 1, "t": "Release names are normalized", "c": "<p>When referring to platform versions, the book prefers nicknames over official release names for readability.</p>\n<p>That choice is editorial, not technical: the goal is to reduce friction when the same release is referenced repeatedly across items.</p>\n<p>The book includes a mapping from official JDK and Java SE names to the nicknames used throughout the text.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0024.png\" alt=\"Chapter 1, page 24: release names are normalized to short nicknames for the rest of the book.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 24: release names are normalized to short nicknames for the rest of the book.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 24.</div>"}, {"m": 1, "t": "Technical vocabulary", "c": "<p>The book aligns mostly with the Java Language Specification, but it also defines some terms in a more practical way.</p>\n<p>It distinguishes reference types, primitive values, objects, class members, and method signatures with precise meanings.</p>\n<p>It uses `package-private` rather than the formal but less common `package access`, and it treats inheritance as subclassing when talking about classes.</p>\n<div class=\"note\"><strong>Source span:</strong> Source page 24.</div>\n<div class=\"note\"><strong>Implementation detail:</strong> the terminology is intentionally consistent with how Java developers discuss APIs in practice, not just with the JLS phrasing.</div>"}, {"m": 1, "t": "Quiz: 1 Introduction - Edition updates and release map", "q": true}, {"m": 2, "t": "Examples and antipatterns", "c": "<p>Most items include program examples, and the examples are intentionally realistic enough to show design tradeoffs rather than toy syntax.</p>\n<p>When a bad pattern is shown, it is clearly labeled as something to avoid and is followed by an alternative approach.</p>\n<p>The book also references established design literature when an example benefits from prior art.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0024.png\" alt=\"Chapter 1, page 24: bad examples are labeled so the item can explain the failure mode and the replacement.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 24: bad examples are labeled so the item can explain the failure mode and the replacement.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 24.</div>"}, {"m": 2, "t": "Principles behind the rules", "c": "<p>The rules are grounded in a small set of design principles: clarity, simplicity, minimal surprise, small components, code reuse, low coupling, and early error detection.</p>\n<p>Those principles are descriptive of the book's method, not optional motivational language.</p>\n<p>A component here can be anything reusable from a single method to a large framework spanning multiple packages.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0025.png\" alt=\"Chapter 1, page 25: the introduction states the design principles that justify the rules that follow.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 1, page 25: the introduction states the design principles that justify the rules that follow.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 25.</div>"}, {"m": 2, "t": "Performance in context", "c": "<p>Performance is not the primary subject of the book.</p>\n<p>The priority is clear, correct, usable, robust, flexible, and maintainable code; performance should usually be addressed after those qualities are in place.</p>\n<p>Where performance numbers appear, they are explicitly framed as approximate and machine-specific, not as universal constants.</p>\n<div class=\"note\"><strong>Source span:</strong> Source page 25.</div>\n<div class=\"note\"><strong>Reading rule:</strong> treat every optimization claim as conditional unless the item explicitly proves otherwise.</div>"}, {"m": 2, "t": "Quiz: 1 Introduction - How to read the rules", "q": true}, {"m": 3, "t": "Item 1: Static factories", "c": "<p>Static factory methods give the creator a name, which is often the first clue about intent when constructor parameters are not self-describing.</p>\n<p>They can return cached instances, hide implementation classes, and even return a subtype of the declared return type.</p>\n<p>They are not the GoF Factory Method pattern; this item is about public static creation entry points.</p>\n<ul><li>Use names such as `of`, `from`, `valueOf`, `getInstance`, or `newInstance` when they clarify construction semantics.</li><li>Prefer interface return types when the implementation class should stay hidden.</li><li>Do not assume a static factory must allocate a new object; instance control is often the point.</li></ul>\n<pre><code>Boolean yes = Boolean.valueOf(true);\nBigInteger prime = BigInteger.valueOf(17);</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0026.png\" alt=\"Item 1: static factories as a named alternative to constructors\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 1: static factories as a named alternative to constructors</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 26-30.</div>\n<div class=\"note\">Pedantic point: static factories trade discoverability for flexibility, so document them aggressively in API docs.</div>"}, {"m": 3, "t": "Item 2: Builders for many parameters", "c": "<p>Telescoping constructors scale poorly because callers must supply long positional argument lists and cannot see which values are optional.</p>\n<p>JavaBeans improve readability but allow inconsistent intermediate state and make immutability awkward.</p>\n<p>A builder restores readability and safety by collecting optional values first and constructing the target object only at `build()` time.</p>\n<ul><li>Use builders when a constructor or static factory would need many parameters, especially when several are optional or same-typed.</li><li>Validate cheap invariants in the builder and cross-field invariants in the target constructor or `build()` path.</li><li>For hierarchies, use recursive generic builders plus a `self()` method to preserve fluent chaining.</li></ul>\n<pre><code>NutritionFacts cocaCola = new NutritionFacts.Builder(240, 8)\n    .calories(100)\n    .sodium(35)\n    .carbohydrate(27)\n    .build();</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0031.png\" alt=\"Item 2: builder pattern for required and optional parameters\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 2: builder pattern for required and optional parameters</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 31-37.</div>\n<div class=\"tip\">Once a class is likely to accrete more optional parameters, starting with a builder is often less painful than migrating later.</div>"}, {"m": 3, "t": "Quiz: 2 Creating and Destroying Objects - Construction APIs", "q": true}, {"m": 4, "t": "Item 3: Singleton control", "c": "<p>A singleton is a class that has exactly one instance, and the implementation must prevent any other instance from being created.</p>\n<p>The traditional forms are a public static final instance field or a private static instance accessor; an enum singleton gives the strongest guarantee in modern Java.</p>\n<p>If you need to defend against reflection or serialization attacks, the constructor must actively reject second-instance creation.</p>\n<ul><li>Use a private constructor plus a single exported instance path.</li><li>Prefer an enum singleton when you want the strongest built-in instance guarantee.</li><li>Singletons make testing harder when clients cannot substitute a mock implementation.</li></ul>\n<pre><code>public enum Elvis {\n    INSTANCE;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0038.png\" alt=\"Item 3: singleton control with a private constructor\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 3: singleton control with a private constructor</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 38-39.</div>\n<div class=\"warning\">A singleton is instance control, not convenience. If the object has real state or resource dependencies, treat it as a design smell until proven otherwise.</div>"}, {"m": 4, "t": "Item 4: Noninstantiable utility classes", "c": "<p>A utility class groups stateless helpers or static factories, but it should not be instantiable because an instance would be meaningless.</p>\n<p>Marking such a class abstract is wrong because the class can still be subclassed and instantiated through the subclass.</p>\n<p>The standard idiom is a private constructor that throws `AssertionError`; this prevents accidental construction and also blocks subclassing.</p>\n<ul><li>Use this pattern for collections of static methods and fields, not as a substitute for object design.</li><li>The explicit constructor exists only to make construction impossible outside the class.</li><li>A comment is appropriate here because the pattern is intentionally counterintuitive.</li></ul>\n<pre><code>public final class UtilityClass {\n    private UtilityClass() {\n        throw new AssertionError();\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0040.png\" alt=\"Item 4: private constructor for a utility class\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 4: private constructor for a utility class</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 40.</div>"}, {"m": 4, "t": "Item 5: Dependency injection", "c": "<p>If a class depends on an external resource whose behavior matters, do not hardwire that resource inside the class.</p>\n<p>Inject the dependency through the constructor, a static factory, or a builder so the class can be tested and reused with different implementations.</p>\n<p>If the dependency is itself a factory, `Supplier<? extends T>` is a natural input type because it allows subtype creation without losing flexibility.</p>\n<ul><li>Dependency injection preserves flexibility, reusability, and testability.</li><li>It works for one dependency or many, and it composes well with immutable classes.</li><li>Large systems often hide the wiring behind a DI framework, but the manual API should still be clean.</li></ul>\n<pre><code>public class SpellChecker {\n    private final Lexicon dictionary;\n\n    public SpellChecker(Lexicon dictionary) {\n        this.dictionary = Objects.requireNonNull(dictionary);\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0041.png\" alt=\"Item 5: inject resources instead of baking them in\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 5: inject resources instead of baking them in</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 41-42.</div>\n<div class=\"note\">Do not use a singleton or static utility class for behavior that varies by resource, such as a spell checker bound to different dictionaries.</div>"}, {"m": 4, "t": "Quiz: 2 Creating and Destroying Objects - Controlled Instantiation", "q": true}, {"m": 5, "t": "Item 6: Avoid unnecessary objects", "c": "<p>Do not create a new object when an existing immutable object, cached instance, or reusable mutable object will do the same job.</p>\n<p>String literals, cached factory results, precompiled regular expressions, and view objects are the standard reuse opportunities in this chapter.</p>\n<p>Autoboxing can silently allocate massive numbers of wrapper objects when a primitive would have been faster and clearer.</p>\n<ul><li>Prefer literals or cached factory results to `new` when the object has no stateful identity requirement.</li><li>Cache expensive objects such as `Pattern` instances when a method is invoked repeatedly.</li><li>Do not build your own object pool for cheap objects; modern JVM garbage collectors already optimize that path well.</li></ul>\n<pre><code>private static final Pattern ROMAN = Pattern.compile(\n    &quot;^(?=.)M*(C[MD]|D?C{0,3})(X[CL]|L?X{0,3})(I[XV]|V?I{0,3})$&quot;\n);\n\nstatic boolean isRomanNumeral(String s) {\n    return ROMAN.matcher(s).matches();\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0043.png\" alt=\"Item 6: reuse immutable and expensive objects\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 6: reuse immutable and expensive objects</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 43-46.</div>"}, {"m": 5, "t": "Item 7: Eliminate obsolete references", "c": "<p>Garbage collection only helps when objects are no longer reachable; a container that retains stale references is leaking memory even in a managed language.</p>\n<p>When a custom data structure owns its own storage, it must null out references as soon as those slots become inactive.</p>\n<p>Caches and listener registries are the two classic places where forgotten references quietly keep large object graphs alive.</p>\n<ul><li>Null out references when an element leaves the active portion of a custom storage structure.</li><li>Use `WeakHashMap` only when cache lifetime should track external references to the key.</li><li>A heap profiler is often how this bug is found after the code has shipped.</li></ul>\n<pre><code>Object result = elements[--size];\nelements[size] = null;\nreturn result;</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0047.png\" alt=\"Item 7: clear stale references in custom containers\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 7: clear stale references in custom containers</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 47-49.</div>\n<div class=\"note\">Do not null every reference eagerly. The rule applies to references that are genuinely obsolete, not to variables that can simply fall out of scope.</div>"}, {"m": 5, "t": "Quiz: 2 Creating and Destroying Objects - Allocation Discipline", "q": true}, {"m": 6, "t": "Item 8: Finalizers and cleaners", "c": "<p>Finalizers and cleaners are not normal cleanup mechanisms. They are unpredictable, slow, and unsuitable for time-critical or correctness-critical work.</p>\n<p>A finalizer may never run, may run very late, may run on the wrong thread, and may silently hide exceptions.</p>\n<p>Cleaners are less dangerous than finalizers, but they are still only background safety nets, not reliable resource management.</p>\n<ul><li>Do not depend on finalizers or cleaners for closing files, releasing locks, or updating persistent state.</li><li>The main legitimate uses are safety nets and noncritical native peer cleanup.</li><li>Finalizers also create attack surface because they can run on partially constructed objects.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0050.png\" alt=\"Item 8: finalizers and cleaners are a last resort\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 8: finalizers and cleaners are a last resort</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 50-51.</div>\n<div class=\"warning\">If the object owns a resource that must be released promptly, the class should expose `close()` and make clients call it explicitly.</div>"}, {"m": 6, "t": "Item 8: Cleaner as a safety net only", "c": "<p>If you use a cleaner, keep the cleaning state separate from the owner object and make the state a static nested class so it cannot accidentally retain the owner.</p>\n<p>The owner should still implement `AutoCloseable`; the cleaner exists only to cover client mistakes.</p>\n<p>For native peers, a cleaner may be acceptable when the resource is not critical and performance costs are tolerable.</p>\n<ul><li>The cleaner action must not capture the owning object.</li><li>A `close()` method should trigger cleanup explicitly and mark the object invalid.</li><li>Treat the cleaner as insurance, not as part of the normal control path.</li></ul>\n<pre><code>public class Room implements AutoCloseable {\n    private static final Cleaner cleaner = Cleaner.create();\n    private static class State implements Runnable {\n        @Override public void run() { /* cleanup */ }\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0053.png\" alt=\"Item 8: cleaner safety-net pattern\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 8: cleaner safety-net pattern</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 52-54.</div>"}, {"m": 6, "t": "Item 9: Try-with-resources", "c": "<p>Try-with-resources is the correct way to close closeable resources in Java 7 and later.</p>\n<p>It preserves the primary exception and suppresses later close failures, which makes debugging far better than the old try-finally pattern.</p>\n<p>The resource type must implement `AutoCloseable`, and multiple resources can be declared in one resource specification.</p>\n<ul><li>Use try-with-resources for anything with a `close()` method that must be called.</li><li>You can still attach `catch` clauses to handle failures without nested try blocks.</li><li>The compiler-generated suppression behavior keeps the most useful exception visible.</li></ul>\n<pre><code>static String firstLineOfFile(String path) throws IOException {\n    try (BufferedReader br = new BufferedReader(new FileReader(path))) {\n        return br.readLine();\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0055.png\" alt=\"Item 9: try-with-resources instead of try-finally\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 9: try-with-resources instead of try-finally</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 55-57.</div>"}, {"m": 6, "t": "Quiz: 2 Creating and Destroying Objects - Cleanup and Resource Safety", "q": true}, {"m": 7, "t": "Why Object methods matter", "c": "<p>Object supplies five overridable methods with explicit contracts: equals, hashCode, toString, clone, and finalize.</p>\n<p>This chapter focuses on the four that still matter for everyday library code, plus Comparable because it behaves like a companion contract for ordering.</p>\n<p>If a class participates in collections, logging, or sorting, these methods are not cosmetic. They define observable behavior.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0058.png\" alt=\"Chapter 3 opens by tying object methods to collection behavior and method contracts.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 3 opens by tying object methods to collection behavior and method contracts.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 58.</div>\n<div class=\"note\">The practical failure mode is simple: once a contract is wrong, HashMap, HashSet, TreeMap, and TreeSet can misbehave in ways that are hard to diagnose.</div>"}, {"m": 7, "t": "Equals contract and inheritance traps", "c": "<p>Override equals only when the class has logical equality that differs from object identity.</p>\n<p>The contract requires reflexive, symmetric, transitive, consistent behavior, and null must never compare equal.</p>\n<p>Use instanceof for most value types; a getClass test breaks substitutability and usually makes subclasses stop behaving as their supertype.</p>\n<ul><li>Do not try one-way interoperability with a foreign type.</li><li>Do not extend an instantiable value class and add a new equality component unless you can accept the contract tradeoffs.</li><li>Favor composition when you need to add state and still preserve equality semantics.</li></ul>\n<pre><code>public final class CaseInsensitiveString {\n    private final String s;\n    @Override public boolean equals(Object o) {\n        return o instanceof CaseInsensitiveString\n                &amp;&amp; ((CaseInsensitiveString) o).s.equalsIgnoreCase(s);\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0043.png\" alt=\"The chapter shows why getClass-based equality and mixed-type equality both fail in real code.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The chapter shows why getClass-based equality and mixed-type equality both fail in real code.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 38-44.</div>"}, {"m": 7, "t": "Hash codes that actually match equals", "c": "<p>Every class that overrides equals must override hashCode as well.</p>\n<p>Equal objects must produce the same hash code. Unequal objects may collide, but a good hash function should spread them out well enough to keep hash tables fast.</p>\n<p>A constant hash code is legal but disastrous because it collapses every entry into one bucket and turns expected linear-time behavior into quadratic-time behavior.</p>\n<ul><li>Use only significant fields, meaning the fields that participate in equals.</li><li>Ignore derived fields that can be computed from those significant fields.</li><li>Cache the hash code only when the object is immutable and computing it is genuinely expensive.</li></ul>\n<pre><code>@Override public int hashCode() {\n    int result = Short.hashCode(areaCode);\n    result = 31 * result + Short.hashCode(prefix);\n    result = 31 * result + Short.hashCode(lineNum);\n    return result;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0051.png\" alt=\"Item 11 gives a field-based recipe and explains why 31 is the traditional multiplier.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 11 gives a field-based recipe and explains why 31 is the traditional multiplier.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 50-54.</div>\n<div class=\"warning\">Do not hard-code the exact hash code in the API contract. That locks you into an implementation detail and makes future improvements painful.</div>"}, {"m": 7, "t": "Quiz: 3 Methods Common to All Objects - Equality and hash codes", "q": true}, {"m": 8, "t": "Why toString matters", "c": "<p>Object.toString is usually not what clients want. A useful string should be concise, informative, and readable by a person.</p>\n<p>toString is invoked implicitly by println, printf, concatenation, assert, and debuggers, so bad output leaks into logs whether you call it directly or not.</p>\n<p>For value classes, document the exact format if you expect the string to be used as a stable human-readable representation or for round-tripping.</p>\n<ul><li>Return all interesting state when that is practical.</li><li>Use a summary when the object is large or the state is not suitable for a literal dump.</li><li>If you specify a format, document it precisely and provide a matching parser, constructor, or factory when appropriate.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0055.png\" alt=\"Item 12 argues for a readable diagnostic form and explains when to document the exact format.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 12 argues for a readable diagnostic form and explains when to document the exact format.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 55-56.</div>\n<div class=\"note\">If you do not override toString, every log message and debugger display that reaches your object will usually be far less useful than it should be.</div>"}, {"m": 8, "t": "Clone is a protocol, not a constructor", "c": "<p>Cloneable is unusual: it changes the behavior of Object.clone even though the interface declares no methods.</p>\n<p>A well-behaved public clone should call super.clone first, return the concrete type, and then repair any mutable internal structure that the shallow copy leaves shared.</p>\n<p>clone is fragile around mutable state, final fields, and overridable methods, so it behaves more like a special runtime protocol than a normal API.</p>\n<ul><li>Arrays are the one place where clone is usually the right copy mechanism.</li><li>If a clone method calls an overridable method during construction, the subclass can observe or corrupt a half-fixed object.</li><li>Public clone methods should not expose CloneNotSupportedException.</li></ul>\n<pre><code>@Override public Stack clone() {\n    try {\n        Stack result = (Stack) super.clone();\n        result.elements = elements.clone();\n        return result;\n    } catch (CloneNotSupportedException e) {\n        throw new AssertionError();\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0060.png\" alt=\"The chapter shows the required super.clone pattern and why shallow copies become dangerous with mutable internals.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The chapter shows the required super.clone pattern and why shallow copies become dangerous with mutable internals.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 59-64.</div>"}, {"m": 8, "t": "Prefer copy constructors and factories", "c": "<p>For almost every class, copy constructors or copy factories are safer than clone.</p>\n<p>They avoid unchecked conventions, avoid checked exceptions, preserve final fields, and let the caller choose the implementation type in conversion constructors and factories.</p>\n<p>A new interface should not extend Cloneable, and a new extendable class should usually not implement it.</p>\n<ul><li>Use clone mainly when you inherit it from an existing Cloneable superclass or when copying arrays.</li><li>If the class is immutable, clone is usually pointless and should not be advertised as a normal copying path.</li><li>A class that needs deep copies of internal mutable structure must rebuild that structure explicitly.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0065.png\" alt=\"Item 13 ends by recommending constructors or factories over Cloneable for most copy operations.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 13 ends by recommending constructors or factories over Cloneable for most copy operations.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 65.</div>\n<div class=\"warning\">Cloneable is not a general-purpose object-copying abstraction. Treat it as a legacy escape hatch, not a design default.</div>"}, {"m": 8, "t": "Quiz: 3 Methods Common to All Objects - String form and copying", "q": true}, {"m": 9, "t": "Natural ordering and the compareTo contract", "c": "<p>Comparable advertises a natural ordering for instances of the class.</p>\n<p>compareTo is generic and is the single method that drives sorting, searching, and ordered collections such as TreeSet and TreeMap.</p>\n<p>The contract is close to equals: antisymmetry, transitivity, and consistency across comparisons all matter, and consistency with equals is strongly recommended.</p>\n<ul><li>If compareTo is inconsistent with equals, sorted collections may behave differently from hash-based collections.</li><li>The class should clearly document that inconsistency when it is intentional.</li><li>Cross-type comparisons usually fail with ClassCastException, and that is acceptable.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0066.png\" alt=\"Item 14 frames Comparable as the ordered companion to equals.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 14 frames Comparable as the ordered companion to equals.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 66-68.</div>"}, {"m": 9, "t": "Implement compareTo lexicographically", "c": "<p>For multiple fields, compare from the most significant field to the least significant field and stop as soon as you find a nonzero result.</p>\n<p>For primitive types, use the static compare methods. Do not subtract values and hope for the best.</p>\n<p>For object fields, use their compareTo method or a Comparator when you need a nonstandard ordering.</p>\n<ul><li>Use Integer.compare, Long.compare, Double.compare, or their boxed equivalents instead of arithmetic subtraction.</li><li>Comparator.comparingInt and thenComparingInt make fluent lexicographic comparators easy to read.</li><li>Java 8 and later give you the comparator construction methods for all primitive and reference key types.</li></ul>\n<pre><code>public int compareTo(PhoneNumber pn) {\n    int result = Short.compare(areaCode, pn.areaCode);\n    if (result == 0) {\n        result = Short.compare(prefix, pn.prefix);\n        if (result == 0)\n            result = Short.compare(lineNum, pn.lineNum);\n    }\n    return result;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0069.png\" alt=\"The chapter recommends field-by-field lexicographic comparison and warns against subtraction-based order tests.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The chapter recommends field-by-field lexicographic comparison and warns against subtraction-based order tests.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 69-71.</div>"}, {"m": 9, "t": "Consistency with equals and BigDecimal", "c": "<p>The chapter strongly recommends that compareTo return zero exactly when equals returns true, but that is a recommendation rather than a strict requirement.</p>\n<p>BigDecimal is the standard example of a class whose natural ordering is inconsistent with equals, which means a HashSet and a TreeSet can report different sizes for the same inputs.</p>\n<p>If you use a difference-based comparator, integer overflow and floating point artifacts can break transitivity and make the ordering wrong.</p>\n<ul><li>Use static compare helpers or comparator construction methods instead of subtraction.</li><li>Document inconsistent natural orderings explicitly.</li><li>Remember that ordered collections consult compareTo, not equals, when deciding whether two elements are duplicates.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0072.png\" alt=\"The closing advice is to use compare helpers and document any ordering that is intentionally inconsistent with equals.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The closing advice is to use compare helpers and document any ordering that is intentionally inconsistent with equals.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 71-72.</div>\n<div class=\"warning\">If two values compare as equal but are not equal according to equals, TreeSet and TreeMap will still treat them as duplicates.</div>"}, {"m": 9, "t": "Quiz: 3 Methods Common to All Objects - Comparable and ordering", "q": true}, {"m": 10, "t": "Item 15: Hide implementation details", "c": "<p>Information hiding is the main difference between a clean API and a brittle one.</p>\n<p>Make each class or member as inaccessible as possible, then raise the level only when the design actually requires it.</p>\n<ul><li>Top-level types are only package-private or public.</li><li>Members can be private, package-private, protected, or public.</li><li>Package-private is usually better than public for helper types.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0094.png\" alt=\"Chapter opening and Item 15: encapsulation is the first design gate.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter opening and Item 15: encapsulation is the first design gate.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 94-95.</div>"}, {"m": 10, "t": "Member access levels are not symmetric", "c": "<p>Private is for implementation only.</p>\n<p>Package-private is for package-local cooperation.</p>\n<p>Protected is a public commitment for subclasses and package peers, so treat it as API surface, not an internal convenience.</p>\n<pre><code>private -&gt; top-level class only\npackage-private -&gt; any class in package\nprotected -&gt; package + subclasses\npublic -&gt; everywhere</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0095.png\" alt=\"Item 15: access control exists to minimize what the outside world can depend on.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 15: access control exists to minimize what the outside world can depend on.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 95-96.</div>\n<div class=\"note\">If a public class needs many package-private helpers, revisit the package split instead of leaking more access.</div>"}, {"m": 10, "t": "Item 16: Prefer accessors to public fields", "c": "<p>A public field freezes the representation into the API.</p>\n<p>For public classes, use private fields plus accessors and mutators when mutation is actually needed.</p>\n<p>Public fields are mostly tolerable only for package-private or private nested classes, or for public constants with immutable values.</p>\n<ul><li>You lose invariant checking.</li><li>You lose the ability to change representation later.</li><li>You lose the chance to run logic on field access or update.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0099.png\" alt=\"Item 16: public fields destroy encapsulation for exported classes.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 16: public fields destroy encapsulation for exported classes.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 99-100.</div>"}, {"m": 10, "t": "Public fields, arrays, and constants", "c": "<p>A public static final array is still mutable through its elements, so it is a security hole.</p>\n<p>Expose an unmodifiable list or return a clone of a private array instead.</p>\n<p>Public immutable fields are less harmful than mutable ones, but they are still an API commitment.</p>\n<pre><code>private static final Thing[] VALUES = { ... };\npublic static final List&lt;Thing&gt; VIEW =\n    Collections.unmodifiableList(Arrays.asList(VALUES));\n\npublic static Thing[] values() {\n    return VALUES.clone();\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0100.png\" alt=\"Item 16: the Time example shows that immutable fields are still a compromise, not a default.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 16: the Time example shows that immutable fields are still a compromise, not a default.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 100.</div>\n<div class=\"warn\">Never return a direct reference to a mutable array field from a public API.</div>"}, {"m": 10, "t": "Quiz: 4 Classes and Interfaces - Encapsulation and public API shape", "q": true}, {"m": 11, "t": "Item 17: Make classes immutable when possible", "c": "<p>An immutable object cannot be observed in more than one state.</p>\n<p>The five rules are strict: no mutators, no subclassing, all fields final, all fields private, and no external access to mutable components.</p>\n<p>Defensive copies belong in constructors, accessors, and deserialization hooks when mutable inputs or outputs are involved.</p>\n<ul><li>Immutable objects are easier to reason about.</li><li>They are inherently thread-safe.</li><li>They make failure atomicity easier because state never changes after construction.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0101.png\" alt=\"Item 17: the immutable Complex example uses pure operations instead of in-place mutation.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 17: the immutable Complex example uses pure operations instead of in-place mutation.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 101-103.</div>"}, {"m": 11, "t": "Immutability trades speed for simplicity", "c": "<p>Immutability can be expensive for large values or multistep updates because each step may allocate a fresh object.</p>\n<p>Use static factories and cached instances when it helps, and consider a mutable companion class only if you actually need the performance win.</p>\n<p>Small value objects should usually be immutable; larger values should be immutable unless profiling shows a real problem.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0103.png\" alt=\"Item 17: sharing immutable objects is safe, and caching becomes practical.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 17: sharing immutable objects is safe, and caching becomes practical.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 103-104.</div>\n<div class=\"note\">If a class cannot be fully immutable, keep its state space small and its fields private final unless there is a concrete reason not to.</div>"}, {"m": 11, "t": "Item 18: Favor composition over inheritance", "c": "<p>Implementation inheritance is fragile because subclasses depend on superclass internals.</p>\n<p>Composition keeps the existing class as a private component, and forwarding methods expose only the behavior you choose.</p>\n<p>Use inheritance only when the subclass is truly an is-a subtype and the superclass is designed for extension.</p>\n<pre><code>public class InstrumentedSet&lt;E&gt; extends ForwardingSet&lt;E&gt; {\n    private int addCount;\n    public InstrumentedSet(Set&lt;E&gt; s) { super(s); }\n    @Override public boolean add(E e) {\n        addCount++;\n        return super.add(e);\n    }\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0108.png\" alt=\"Item 18: the wrapper pattern replaces fragile extension with forwarding.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 18: the wrapper pattern replaces fragile extension with forwarding.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 108-110.</div>"}, {"m": 11, "t": "Inheritance is a subtype test, not a convenience", "c": "<p>Ask one blunt question: is every B really an A?</p>\n<p>If the answer is no, inheritance is the wrong model even if it looks shorter.</p>\n<p>Wrappers are usually more robust because they avoid superclass API surprises and preserve your own abstraction boundaries.</p>\n<ul><li>Stack is not a Vector.</li><li>Properties is not a Hashtable.</li><li>Wrapper classes can add behavior without depending on superclass internals.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0110.png\" alt=\"Item 18: tagged classes and fragile subclasses both leak implementation choices.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 18: tagged classes and fragile subclasses both leak implementation choices.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 110-112.</div>"}, {"m": 11, "t": "Quiz: 4 Classes and Interfaces - Immutability and composition", "q": true}, {"m": 12, "t": "Item 19: Document or prohibit inheritance", "c": "<p>If a class is meant to be subclassed, its documentation must describe self-use of overridable methods precisely.</p>\n<p>Constructors, clone, and readObject must never invoke overridable methods directly or indirectly.</p>\n<p>If the class is not designed for extension, make that explicit by preventing subclassing.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0114.png\" alt=\"Item 19: overridable self-use is a contract, not an accident.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 19: overridable self-use is a contract, not an accident.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 114-117.</div>\n<div class=\"warn\">A constructor calling an override can observe a partially initialized subclass and break before the subclass finishes constructing.</div>"}, {"m": 12, "t": "Prohibit inheritance when you do not intend it", "c": "<p>Declare the class final, or make constructors private or package-private and expose static factories instead.</p>\n<p>If a concrete class is not meant for extension, do not leave it half-open just for convenience.</p>\n<p>If you must allow inheritance, remove self-use of overridable methods and document the safe hooks very carefully.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0115.png\" alt=\"Item 19: final is often the cleanest way to keep fragile subclasses out.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 19: final is often the cleanest way to keep fragile subclasses out.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 117-119.</div>"}, {"m": 12, "t": "Item 20: Prefer interfaces to abstract classes", "c": "<p>Interfaces let unrelated classes share a type without forcing a hierarchy.</p>\n<p>Abstract classes constrain you to single inheritance, which is expensive when the type should be mixin-like or retrofitted onto existing code.</p>\n<p>If you need reusable implementation, pair the interface with a skeletal implementation class or default methods where appropriate.</p>\n<ul><li>Interfaces define type without ownership of state.</li><li>Skeletal implementations shift repeated logic out of client code.</li><li>Default methods help, but they are not a blank check.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0120.png\" alt=\"Item 20: interfaces scale better for multiple implementations and mixins.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 20: interfaces scale better for multiple implementations and mixins.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 120-123.</div>"}, {"m": 12, "t": "Items 21 and 22: design interfaces carefully", "c": "<p>Default methods can break existing implementations if they assume behavior the old code never promised.</p>\n<p>Test new interfaces with multiple independent implementations before release.</p>\n<p>Use interfaces to define types, not to dump constants into the namespace; constants belong in classes or enums, not constant interfaces.</p>\n<pre><code>public class PhysicalConstants {\n    private PhysicalConstants() { }\n    public static final double AVOGADROS_NUMBER = 6.022_140_857e23;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0125.png\" alt=\"Item 21 and Item 22: interface design should survive future releases, not just compile today.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 21 and Item 22: interface design should survive future releases, not just compile today.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 125-129.</div>"}, {"m": 12, "t": "Quiz: 4 Classes and Interfaces - Inheritance contracts and interface design", "q": true}, {"m": 13, "t": "Item 23: Replace tagged classes with hierarchies", "c": "<p>A tagged class hides multiple flavors behind a tag field and switch statements, which makes the code verbose and fragile.</p>\n<p>Use a class hierarchy instead: one abstract root and one concrete subclass per flavor.</p>\n<p>The compiler then checks that each flavor initializes only its own state and implements the required behavior.</p>\n<ul><li>No irrelevant fields per instance.</li><li>No giant switch statement over tag values.</li><li>No runtime surprise when a new flavor is added.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0130.png\" alt=\"Item 23: the Figure example is the warning sign; the hierarchy is the fix.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 23: the Figure example is the warning sign; the hierarchy is the fix.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 130-132.</div>"}, {"m": 13, "t": "Item 24: Prefer static member classes", "c": "<p>Use a static member class when the nested type does not need an enclosing instance.</p>\n<p>A nonstatic member class carries an implicit reference to the outer instance, which costs space and can accidentally retain objects longer than intended.</p>\n<p>Choose nonstatic only when the nested object truly needs the enclosing object.</p>\n<pre><code>private static class Entry {\n    private final K key;\n    private V value;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0133.png\" alt=\"Item 24: hidden outer-instance references are easy to miss and hard to debug.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 24: hidden outer-instance references are easy to miss and hard to debug.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 133-134.</div>"}, {"m": 13, "t": "Nested class forms and when to use them", "c": "<p>Anonymous classes are for short, one-off uses; local classes are for named helpers that stay inside a method; member classes are for reusable nested types.</p>\n<p>Lambdas usually replace anonymous classes when you only need a function object.</p>\n<p>If the nested type is public or protected and belongs to an exported API, the static-versus-nonstatic choice becomes a compatibility commitment.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0134.png\" alt=\"Item 24: anonymous and local classes have tight limits and should stay short.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 24: anonymous and local classes have tight limits and should stay short.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 134-135.</div>"}, {"m": 13, "t": "Item 25: One top-level class per source file", "c": "<p>Multiple top-level classes in one source file create brittle compiler-order behavior and allow accidental duplicate definitions.</p>\n<p>If helper types belong to one owner, prefer private static member classes instead of packing unrelated top-level types together.</p>\n<p>One source file, one top-level class or interface, is the stable rule.</p>\n<pre><code>// Good\npublic class Main { }\n\n// Better for helpers\nprivate static class Helper { }</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0136.png\" alt=\"Item 25: separate source files avoid order-dependent surprises.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 25: separate source files avoid order-dependent surprises.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 136-137.</div>"}, {"m": 13, "t": "Quiz: 4 Classes and Interfaces - Tagged classes, member classes, and source files", "q": true}, {"m": 14, "t": "Raw types are legacy compatibility, not an API design choice", "c": "<p>A raw type is the erased name of a generic type, such as `List` instead of `List<String>`.</p>\n<p>Raw types exist for pre-generics compatibility, so they behave as if all type parameters were removed.</p>\n<p>Using a raw type throws away compile-time checking and pushes failures to runtime.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0138.png\" alt=\"Chapter 5 opener and the definition of raw types, page 138.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter 5 opener and the definition of raw types, page 138.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 138.</div>"}, {"m": 14, "t": "Unchecked warnings are evidence, not noise", "c": "<p>Unchecked cast, method-invocation, and conversion warnings mean the compiler cannot prove type safety.</p>\n<p>Do not suppress them globally. First fix the declaration, then suppress only the smallest provably safe scope.</p>\n<p>If you cannot prove safety, the warning is telling you something real about possible heap pollution or `ClassCastException`.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0144.png\" alt=\"Unchecked warnings and narrow `@SuppressWarnings` scope, page 144.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Unchecked warnings and narrow `@SuppressWarnings` scope, page 144.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 144-146.</div>"}, {"m": 14, "t": "Use unbounded wildcards when the element type is unknown", "c": "<p>If you only need to read from a generic type and do not care about the element type, use `?` instead of a raw type.</p>\n<p>For example, `Set<?>` is typesafe and flexible, while `Set` is neither.</p>\n<p>This is the correct way to express an unknown type argument in an API.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0144.png\" alt=\"Replace raw types with `&lt;?&gt;` when the element type is irrelevant, page 144.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Replace raw types with `&lt;?&gt;` when the element type is irrelevant, page 144.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 144-146.</div>"}, {"m": 14, "t": "Quiz: 5 Generics - Raw Types and Unchecked Warnings", "q": true}, {"m": 15, "t": "Generify the type, then push casts to the boundary", "c": "<p>A generic class should expose its type parameter in the API instead of forcing clients to cast on every read.</p>\n<p>When an array-backed generic class needs an `E[]`, create an `Object[]`, cast once, and suppress the warning only after proving the cast is safe.</p>\n<p>The runtime array will still be `Object[]`; the generic type information exists only at compile time.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0148.png\" alt=\"Generic arrays are illegal; collections are often the safer backing store, page 148.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Generic arrays are illegal; collections are often the safer backing store, page 148.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 148-150.</div>"}, {"m": 15, "t": "Generic methods remove client-side casts", "c": "<p>A generic method declares its own type parameter list before the return type, such as `<E> Set<E> union(...)`.</p>\n<p>Use the same type variable consistently across parameters and the return type when they must match.</p>\n<p>A generic method should compile without warnings and should not force callers to cast its result.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0151.png\" alt=\"Generic method pattern and the typesafe heterogeneous container idea begin here, page 151.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Generic method pattern and the typesafe heterogeneous container idea begin here, page 151.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 151-155.</div>"}, {"m": 15, "t": "Recursive type bounds express mutual comparability", "c": "<p>The bound `<E extends Comparable<E>>` says that elements must be comparable to values of their own type.</p>\n<p>Use this when the algorithm depends on a natural ordering that is defined by the elements themselves.</p>\n<p>This is a precise constraint, not a guess: it tells the compiler which operations are legal on `E`.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0151.png\" alt=\"Recursive type bounds and
