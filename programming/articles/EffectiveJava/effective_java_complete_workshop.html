re the caller to manage condition predicates, missed signals, and spurious wakeups correctly.</p>\n<p>Prefer `BlockingQueue`, `CountDownLatch`, `Semaphore`, `CyclicBarrier`, `Exchanger`, and other utilities that package the protocol into a tested abstraction.</p>\n<p>If you are writing your own monitor protocol, that is usually a signal that the JDK already has a better fit.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0346.png\" alt=\"Item 81 moves most coordination problems out of handwritten monitor code.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 81 moves most coordination problems out of handwritten monitor code.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 346-350.</div>"}, {"m": 38, "t": "Document thread safety explicitly", "c": "<p>Clients cannot safely guess whether a class is thread-safe, conditionally thread-safe, or not thread-safe. The API must say so.</p>\n<p>Document which lock, if any, guards the object state, whether the class is immutable, whether instances are externally synchronized, and which methods may be called concurrently.</p>\n<p>Without that contract, even correct code becomes hard to compose because callers have no idea what concurrency assumptions are valid.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0351.png\" alt=\"Item 82 treats thread-safety documentation as part of the API contract.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 82 treats thread-safety documentation as part of the API contract.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 351-353.</div>"}, {"m": 38, "t": "Lazy initialization and scheduler dependence are edge cases", "c": "<p>Lazy initialization is only worth the complexity when initialization is genuinely expensive or may never be needed. Otherwise, eager initialization is simpler and usually safer.</p>\n<p>If you do use lazy initialization, prefer the static holder pattern or a correctly synchronized/volatile-based approach. Do not invent a racy double-checked solution unless you can prove it.</p>\n<p>For scheduler dependence, the lesson is the same: do not write concurrency that only works when the thread scheduler happens to be kind.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0354.png\" alt=\"Items 83 and 84 push you toward simple initialization and scheduler-independent design.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Items 83 and 84 push you toward simple initialization and scheduler-independent design.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 354-359.</div>"}, {"m": 38, "t": "Quiz: 11 Concurrency - Executors, utilities, and documentation", "q": true}, {"m": 39, "t": "Item 85: the default advice is to use something else", "c": "<p>Java serialization is not a neutral persistence format. It is an object-construction protocol with a large attack surface.</p>\n<p>The safe default is to avoid it in new systems and use cross-platform structured-data formats such as JSON or protobuf instead.</p>\n<p>If you inherit a legacy boundary that still uses serialization, treat every byte stream as hostile until proven otherwise.</p>\n<ul><li>Never deserialize untrusted data.</li><li>Prefer JSON or protobuf for new protocols and persistence boundaries.</li><li>Treat deserialization as code execution against the class path, not as passive parsing.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0360.png\" alt=\"Item 85 opens with the core warning: Java serialization is risky, broad, and easy to misuse, pages 360-361.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 85 opens with the core warning: Java serialization is risky, broad, and easy to misuse, pages 360-361.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 360-361.</div>"}, {"m": 39, "t": "Gadgets, gadget chains, and deserialization bombs", "c": "<p>The attack surface includes every serializable type that can be reached during deserialization, including platform classes and third-party libraries.</p>\n<p>A gadget is a method that is triggered during deserialization and does something dangerous; a gadget chain combines several such methods into an exploit.</p>\n<p>Even without gadgets, a short stream can cause extreme work or memory pressure. A deserialization bomb is still a denial-of-service attack.</p>\n<ul><li>RMI, JMX, and JMS can expose serialization indirectly.</li><li>A class does not need to be badly written to become part of an exploit chain.</li><li>A tiny input stream can expand into an enormous amount of work.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0361.png\" alt=\"Item 85 emphasizes gadget chains and deserialization bombs as practical exploit mechanisms, page 361.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 85 emphasizes gadget chains and deserialization bombs as practical exploit mechanisms, page 361.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 361-363.</div>"}, {"m": 39, "t": "If you cannot avoid it, filter and whitelist", "c": "<p>If you are forced to deserialize, use `ObjectInputFilter` so the stream is checked before objects are materialized.</p>\n<p>Prefer whitelisting over blacklisting. A blacklist only knows the threats you already recognize.</p>\n<p>Filtering helps with class selection, deep graphs, and excessive size, but it is not a proof of safety.</p>\n<pre><code>ObjectInputFilter filter = ObjectInputFilter.Config.createFilter(&quot;com.example.**;java.base/*;!com.bad.**&quot;);\nObjectInputStream in = new ObjectInputStream(input);\nin.setObjectInputFilter(filter);</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0363.png\" alt=\"Item 85 closes by recommending migration away from serialization and, if needed, filtering as a damage-control measure, pages 362-363.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 85 closes by recommending migration away from serialization and, if needed, filtering as a damage-control measure, pages 362-363.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 362-363.</div>"}, {"m": 39, "t": "Quiz: 12 Serialization - Avoid Java serialization unless you are forced into it", "q": true}, {"m": 40, "t": "Item 86: implementing Serializable is a long-term commitment", "c": "<p>Adding `implements Serializable` is easy, but the serialized form becomes part of the exported API of the class.</p>\n<p>If you accept the default form, private and package-private fields are no longer just implementation details.</p>\n<p>The price of serializability is reduced freedom to change the class later.</p>\n<ul><li>A generated serialized form is tied to the current internal representation.</li><li>The serialized form must be supported across releases if instances already exist in the wild.</li><li>Changing a class structure can break compatibility at runtime.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0364.png\" alt=\"Item 86 explains that the serialized form becomes part of the public contract, pages 364-365.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 86 explains that the serialized form becomes part of the public contract, pages 364-365.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 364-365.</div>"}, {"m": 40, "t": "serialVersionUID, hidden constructors, and inheritance cost", "c": "<p>Declare an explicit `serialVersionUID` in every serializable class. Do not let the runtime invent one for you.</p>\n<p>Deserialization is a hidden constructor, so it must preserve invariants just like any other constructor.</p>\n<p>Classes designed for inheritance and interfaces should rarely implement `Serializable`, because subclasses inherit the burden.</p>\n<pre><code>private static final long serialVersionUID = 1L;</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0365.png\" alt=\"Item 86 also warns about hidden constructors, version compatibility, and inheritance costs, pages 365-366.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 86 also warns about hidden constructors, version compatibility, and inheritance costs, pages 365-366.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 365-366.</div>"}, {"m": 40, "t": "Quiz: 12 Serialization - Serializable is an exported API, not a private implementation detail", "q": true}, {"m": 41, "t": "Item 87: choose logical state over physical representation", "c": "<p>The default serialized form mirrors the object's physical representation. That is only acceptable when physical structure and logical content are nearly identical.</p>\n<p>A class like `Name` is a good fit for the default form. A linked structure like `StringList` is not.</p>\n<p>If you choose a custom serialized form, design it deliberately and document it with `@serial` and `@serialData`.</p>\n<ul><li>Do not accept the default form by habit.</li><li>Use `transient` for fields that are derived or VM-specific.</li><li>Preserve the logical sequence, not the in-memory structure.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0364.png\" alt=\"Item 87 contrasts a good default form with a bad one and pushes designers toward logical state.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 87 contrasts a good default form with a bad one and pushes designers toward logical state.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 367-373.</div>"}, {"m": 41, "t": "Custom forms still need the serialization protocol methods", "c": "<p>Even if every field is transient, call `defaultWriteObject` and `defaultReadObject` to preserve compatibility for future fields.</p>\n<p>Serialize logical content explicitly in `writeObject` and rebuild it explicitly in `readObject`.</p>\n<p>If the class is synchronized, `writeObject` must honor the same locking discipline as other whole-object operations.</p>\n<pre><code>private void writeObject(ObjectOutputStream s) throws IOException {\n    s.defaultWriteObject();\n    s.writeInt(size);\n    for (Entry e = head; e != null; e = e.next)\n        s.writeObject(e.data);\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0365.png\" alt=\"Item 87 shows the `StringList` custom form with explicit writeObject/readObject logic.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 87 shows the `StringList` custom form with explicit writeObject/readObject logic.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 367-373.</div>"}, {"m": 41, "t": "Always declare an explicit serialVersionUID", "c": "<p>An explicit `serialVersionUID` removes one more source of accidental incompatibility and avoids runtime computation.</p>\n<p>If you want compatibility with an old serialized form, you must preserve the old value.</p>\n<p>If you want to break compatibility intentionally, changing the value is the clean way to do it.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0366.png\" alt=\"Item 87 closes by requiring an explicit `serialVersionUID` for every serializable class.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 87 closes by requiring an explicit `serialVersionUID` for every serializable class.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 367-373.</div>"}, {"m": 41, "t": "Quiz: 12 Serialization - Design the serialized form, then defend readObject", "q": true}, {"m": 42, "t": "Item 88: readObject must act like a constructor with adversarial input", "c": "<p>A `readObject` method must validate invariants and make defensive copies before exposing any mutable component.</p>\n<p>Treat the byte stream as untrusted input, even if the class was originally serialized by your own code.</p>\n<p>Do not call overridable methods from `readObject`, directly or indirectly, because the object is not fully formed yet.</p>\n<ul><li>Copy mutable fields before checking invariants.</li><li>Throw `InvalidObjectException` when validation fails.</li><li>Never assume the stream came from a real instance of the class.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0360.png\" alt=\"Item 88 treats readObject as a public constructor that must defend invariants.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 88 treats readObject as a public constructor that must defend invariants.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 374-379.</div>"}, {"m": 42, "t": "Defensive copying closes the MutablePeriod-style attack", "c": "<p>If a serializable immutable class contains private mutable components, the deserialized object can be attacked unless those components are copied defensively.</p>\n<p>Validation must happen after the copy, not before it.</p>\n<p>Final fields are inconvenient here: the defense may require removing `final` so the copied values can be reassigned safely during deserialization.</p>\n<pre><code>private void readObject(ObjectInputStream s)\n        throws IOException, ClassNotFoundException {\n    s.defaultReadObject();\n    start = new Date(start.getTime());\n    end = new Date(end.getTime());\n    if (start.compareTo(end) &gt; 0)\n        throw new InvalidObjectException(start + &quot; after &quot; + end);\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0361.png\" alt=\"Item 88 shows how rogue object references can steal mutable components unless readObject defends them.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 88 shows how rogue object references can steal mutable components unless readObject defends them.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 374-379.</div>"}, {"m": 42, "t": "Item 89 and Item 90: enum first, proxy second", "c": "<p>If you need instance control, prefer an enum. `readResolve` works, but it is fragile and can be bypassed if you are careless with fields or subclassing.</p>\n<p>A serialization proxy is safer still: `writeReplace` emits a nested proxy, `readObject` rejects direct deserialization, and the proxy's `readResolve` rebuilds the object through the public API.</p>\n<p>Use the proxy pattern for non-extendable classes with real invariants. It is the cleanest way to make serialization behave like ordinary construction.</p>\n<ul><li>Enums guarantee one instance per constant in ordinary use.</li><li>`readResolve` must be carefully scoped on nonfinal classes.</li><li>Serialization proxies are not for extendable classes or circular object graphs.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0363.png\" alt=\"Items 89 and 90 contrast fragile `readResolve` tricks with the serialization proxy pattern.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Items 89 and 90 contrast fragile `readResolve` tricks with the serialization proxy pattern.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 380-413.</div>"}, {"m": 42, "t": "Quiz: 12 Serialization - Defensive deserialization, readResolve, and serialization proxies", "q": true}];

 - Checked exceptions, standard exceptions, and abstraction", "10 Exceptions - Documentation, diagnostics, and failure atomicity", "11 Concurrency - Synchronize shared mutable state", "11 Concurrency - Avoid excessive synchronization", "11 Concurrency - Executors, utilities, and documentation", "12 Serialization - Avoid Java serialization unless you are forced into it", "12 Serialization - Serializable is an exported API, not a private implementation detail", "12 Serialization - Design the serialized form, then defend readObject", "12 Serialization - Defensive deserialization, readResolve, and serialization proxies"];

    function save() {
      const data = { cur, quizState, failedQs, ts: Date.now() };
      try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) {}
      try { document.cookie = STORE_KEY + '=' + cur + ';max-age=31536000;path=/'; } catch (e) {}
    }

    function load() {
      try {
        const data = JSON.parse(localStorage.getItem(STORE_KEY));
        if (data) {
          cur = data.cur || 0;
          quizState = data.quizState || {};
          failedQs = data.failedQs || [];
        }
      } catch (e) {}
    }

    function esc(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    function hashSeed(seed) {
      let h = 2166136261;
      for (let i = 0; i < seed.length; i += 1) {
        h ^= seed.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function shuffleOpts(opts, seed) {
      const items = opts.map((text, index) => ({ text, correct: index === 0 }));
      let state = hashSeed(seed) || 1;
      for (let i = items.length - 1; i > 0; i -= 1) {
        state = (Math.imul(state, 1664525) + 1013904223) >>> 0;
        const j = state % (i + 1);
        const tmp = items[i];
        items[i] = items[j];
        items[j] = tmp;
      }
      return items;
    }

    function getModule(moduleId) {
      return QUIZ_DATA.modules.find((module) => module.id === moduleId);
    }

    function ensureQuizState(moduleId) {
      const module = getModule(moduleId);
      if (!quizState[moduleId]) {
        quizState[moduleId] = { answers: {}, score: 0, total: module.questions.length, done: false };
      }
      return quizState[moduleId];
    }

    function renderQuiz(moduleId) {
      const module = getModule(moduleId);
      const state = ensureQuizState(moduleId);
      state.total = module.questions.length;
      state.score = Object.values(state.answers).filter((answer) => answer.correct).length;

      const nextQuestion = module.questions.find((question) => !state.answers[question.id]);
      if (!nextQuestion) {
        state.done = true;
        const pct = Math.round((state.score / state.total) * 100);
        return `
          <div class="quiz-container">
            <h1>${esc(module.name)} Quiz</h1>
            <p class="quiz-meta">You completed ${state.total} questions for this module.</p>
            <div class="${pct >= 70 ? 'quiz-feedback pass show' : 'quiz-feedback fail show'}">
              Score: ${state.score} / ${state.total} (${pct}%).
              Use Retry to revisit questions answered incorrectly.
            </div>
          </div>
        `;
      }

      const questionIndex = module.questions.findIndex((question) => question.id === nextQuestion.id);
      const options = shuffleOpts(nextQuestion.options, nextQuestion.id);

      return `
        <div class="quiz-container">
          <h1>${esc(module.name)} Quiz</h1>
          <p class="quiz-meta">Question ${questionIndex + 1} of ${module.questions.length}</p>
          <h2>${esc(nextQuestion.question)}</h2>
          ${options.map((option, index) => `
            <button class="quiz-opt" id="opt-${index}" onclick="answerQuiz(${moduleId}, '${nextQuestion.id}', ${index})">${esc(option.text)}</button>
          `).join('')}
          <div class="quiz-feedback" id="quiz-feedback"></div>
        </div>
      `;
    }

    function answerQuiz(moduleId, questionId, chosenIndex) {
      const module = getModule(moduleId);
      const state = ensureQuizState(moduleId);
      if (state.answers[questionId]) {
        return;
      }

      const question = module.questions.find((item) => item.id === questionId);
      const options = shuffleOpts(question.options, question.id);
      const chosen = options[chosenIndex];
      const isCorrect = !!chosen.correct;

      state.answers[questionId] = { chosen: chosen.text, correct: isCorrect };
      state.score = Object.values(state.answers).filter((answer) => answer.correct).length;

      if (!isCorrect && !failedQs.some((item) => item.moduleId === moduleId && item.qId === questionId)) {
        failedQs.push({ moduleId, qId: questionId });
      }
      if (Object.keys(state.answers).length === module.questions.length) {
        state.done = true;
      }

      options.forEach((option, index) => {
        const button = document.getElementById(`opt-${index}`);
        if (!button) return;
        button.classList.add('disabled');
        if (option.correct) {
          button.classList.add('correct');
        } else if (index === chosenIndex) {
          button.classList.add('wrong');
        }
      });

      const feedback = document.getElementById('quiz-feedback');
      if (feedback) {
        feedback.className = `quiz-feedback show ${isCorrect ? 'pass' : 'fail'}`;
        feedback.innerHTML = `<strong>${isCorrect ? 'Correct.' : 'Not quite.'}</strong> ${esc(question.explanation)}`;
      }

      save();
      setTimeout(render, isCorrect ? 1200 : 3000);
    }

    function retryFailed() {
      if (!failedQs.length) {
        alert('No failed quiz questions are currently tracked.');
        return;
      }

      const retryItems = failedQs.slice();
      retryItems.forEach((item) => {
        const state = ensureQuizState(item.moduleId);
        delete state.answers[item.qId];
        state.score = Object.values(state.answers).filter((answer) => answer.correct).length;
        state.done = false;
      });

      const first = retryItems[0];
      failedQs = [];
      cur = SLIDES.findIndex((slide) => slide.q && slide.m === first.moduleId);
      render();
    }

    function go(dir) {
      cur = Math.max(0, Math.min(SLIDES.length - 1, cur + dir));
      render();
    }

    function jump(index) {
      cur = index;
      render();
      toggleTOC(false);
    }

    function toggleTOC(force) {
      const toc = document.getElementById('toc');
      const overlay = document.getElementById('toc-overlay');
      const shouldOpen = typeof force === 'boolean' ? force : !toc.classList.contains('open');
      toc.classList.toggle('open', shouldOpen);
      overlay.classList.toggle('open', shouldOpen);
    }

    function buildTOC() {
      const tocBody = document.getElementById('toc-body');
      const html = MODULE_NAMES.map((moduleName, moduleIndex) => {
        const links = SLIDES.map((slide, slideIndex) => ({ slide, slideIndex }))
          .filter((entry) => entry.slide.m === moduleIndex)
          .map((entry) => `
            <button class="toc-link ${entry.slideIndex === cur ? 'current' : ''}" onclick="jump(${entry.slideIndex})">
              ${entry.slide.q ? 'Quiz' : esc(entry.slide.t)}
            </button>
          `)
          .join('');
        return `<div class="toc-module"><h3>${esc(moduleName)}</h3>${links}</div>`;
      }).join('');
      tocBody.innerHTML = html;
    }

    function renderChapterJumpBar() {
      const bar = document.getElementById('chapter-jump-bar');
      if (!bar) {
        return;
      }
      let currentChapter = 0;
      for (let i = 0; i < CHAPTER_JUMPS.length; i += 1) {
        if (cur >= CHAPTER_JUMPS[i].slideIndex) {
          currentChapter = i;
        } else {
          break;
        }
      }
      bar.innerHTML = CHAPTER_JUMPS.map((entry, index) => `
        <button class="chapter-jump ${index === currentChapter ? 'current' : ''}" onclick="jump(${entry.slideIndex})" title="${esc(entry.title)}">
          ${esc(entry.label)}
        </button>
      `).join('');
    }

    function shortModuleLabel(name) {
      const parts = name.split(' - ');
      return parts.length > 1 ? parts.slice(1).join(' - ') : name;
    }

    function render() {
      const slide = SLIDES[cur];
      const progress = Math.round(((cur + 1) / SLIDES.length) * 100);
      document.getElementById('progress-bar').style.width = progress + '%';
      document.getElementById('pct').textContent = progress + '%';
      document.getElementById('slide-counter').textContent = `${cur + 1} / ${SLIDES.length}`;
      document.getElementById('module-label').textContent = shortModuleLabel(MODULE_NAMES[slide.m]);
      document.getElementById('slide').innerHTML = slide.q ? renderQuiz(slide.m) : `<h1>${esc(slide.t)}</h1>${slide.c}`;
      save();
      renderChapterJumpBar();
      buildTOC();
    }

    document.addEventListener('keydown', (event) => {
      const tag = (event.target && event.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') {
        return;
      }
      if (event.key === ' ' && !event.shiftKey) {
        event.preventDefault();
        go(1);
      } else if ((event.key === ' ' && event.shiftKey) || event.key === 'ArrowLeft') {
        event.preventDefault();
        go(-1);
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        go(1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        cur = 0;
        render();
      } else if (event.key === 'End') {
        event.preventDefault();
        cur = SLIDES.length - 1;
        render();
      } else if (event.key === 't' || event.key === 'T') {
        event.preventDefault();
        toggleTOC();
      } else if (event.key === 'r' || event.key === 'R') {
        event.preventDefault();
        retryFailed();
      }
    });

    load();
    render();
  </script>
</body>
</html>
