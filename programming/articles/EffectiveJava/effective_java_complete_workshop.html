 the `max` method, pages 151-177 summary region.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Recursive type bounds and the `max` method, pages 151-177 summary region.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 151-177.</div>"}, {"m": 15, "t": "Quiz: 5 Generics - Generic Types and Generic Methods", "q": true}, {"m": 16, "t": "Arrays and generics enforce type safety differently", "c": "<p>Arrays are covariant and reified, so their element type is checked at runtime.</p>\n<p>Generics are invariant and erased, so their type arguments are enforced at compile time only.</p>\n<p>That is why arrays can fail later with `ArrayStoreException`, while lists usually fail earlier with a compile-time error.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0147.png\" alt=\"Arrays versus generics and the generic-array restriction, page 147.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Arrays versus generics and the generic-array restriction, page 147.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 147-150.</div>"}, {"m": 16, "t": "Prefer `List<E>` to `E[]` when the API needs type safety", "c": "<p>If a generic array creation error or an unchecked array cast appears, a list is often the better abstraction.</p>\n<p>You may lose some compactness, but you gain type safety and smoother interaction with generic APIs.</p>\n<p>The book treats the list substitution as the normal escape hatch for generic-array problems.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0148.png\" alt=\"Use lists instead of generic arrays when the type system starts fighting you, page 148.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Use lists instead of generic arrays when the type system starts fighting you, page 148.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 147-150.</div>"}, {"m": 16, "t": "PECS is the rule for wildcard input parameters", "c": "<p>Use `? extends T` for producers and `? super T` for consumers.</p>\n<p>A producer gives you values of type `T` or a subtype; a consumer accepts values of type `T` or a supertype.</p>\n<p>If a parameter both produces and consumes the same type, wildcards usually do not help.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0160.png\" alt=\"Bounded wildcards and the PECS rule, page 160.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Bounded wildcards and the PECS rule, page 160.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 160-166.</div>"}, {"m": 16, "t": "Capture wildcards with a private helper when necessary", "c": "<p>A public `List<?>` API can be simple and flexible, even when the implementation needs a precise element type.</p>\n<p>Use a private generic helper to capture the wildcard and let the compiler reason about the exact `E` internally.</p>\n<p>This is how you keep the public API general without resorting to raw types or unsafe casts.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0165.png\" alt=\"Wildcard capture and helper methods, page 165.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Wildcard capture and helper methods, page 165.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 164-166.</div>"}, {"m": 16, "t": "Quiz: 5 Generics - Lists, Arrays, and Wildcards", "q": true}, {"m": 17, "t": "Generic varargs are legal, but they are a sharp edge", "c": "<p>A varargs parameter is implemented as an array, so generic varargs can expose heap pollution if misused.</p>\n<p>If a method stores into the varargs array or leaks that array to untrusted code, it is not safe.</p>\n<p>A safe generic varargs method must treat the array as a read-only transport mechanism.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0167.png\" alt=\"Generic varargs, heap pollution, and why the array matters, page 167.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Generic varargs, heap pollution, and why the array matters, page 167.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 167-171.</div>"}, {"m": 17, "t": "@SafeVarargs is a promise, not decoration", "c": "<p>Annotate only methods that cannot be overridden and that you have proven safe.</p>\n<p>The annotation exists to silence client warnings for methods that are genuinely typesafe.</p>\n<p>If a better API shape exists, a `List` parameter often avoids the problem entirely.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0169.png\" alt=\"Safe generic varargs and `@SafeVarargs`, page 169.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Safe generic varargs and `@SafeVarargs`, page 169.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 167-171.</div>"}, {"m": 17, "t": "Typesafe heterogeneous containers move the type parameter to the key", "c": "<p>Normal containers parameterize the container itself; a heterogeneous container parameterizes the key instead.</p>\n<p>Using `Class<T>` as a key lets one map hold values of many unrelated types without losing type safety.</p>\n<p>This is the `Favorites` pattern: `putFavorite(Class<T>, T)` and `getFavorite(Class<T>)`.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0172.png\" alt=\"Typesafe heterogeneous containers and `Class&lt;T&gt;` type tokens, page 172.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Typesafe heterogeneous containers and `Class&lt;T&gt;` type tokens, page 172.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 172-177.</div>"}, {"m": 17, "t": "Bounded type tokens and `asSubclass` preserve runtime safety", "c": "<p>A bounded type token restricts which `Class` objects can be used as keys or reflective selectors.</p>\n<p>`Class.asSubclass` performs the checked narrowing from `Class<?>` to `Class<? extends Annotation>` or a similar bound.</p>\n<p>That lets reflection-heavy APIs keep compile-time and runtime type information aligned.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0176.png\" alt=\"Bounded type tokens and `Class.asSubclass`, page 176.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Bounded type tokens and `Class.asSubclass`, page 176.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 175-177.</div>"}, {"m": 17, "t": "Quiz: 5 Generics - Varargs and Heterogeneous Containers", "q": true}, {"m": 18, "t": "Why int constants fail", "c": "<p>Before enum types, the int-enum pattern encoded a closed set of constants as public static final ints. That buys syntax, not type safety.</p>\n<p>The failure modes are predictable: namespace collisions, accidental arithmetic on values, brittle client binaries, and debugger output that is just a number.</p>\n<ul><li>A constant group has no namespace, so names must be prefixed manually.</li><li>The compiler cannot stop you from mixing unrelated constant groups.</li><li>Changing an int constant can require recompiling clients.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0178.png\" alt=\"Item 34 begins by contrasting int constants with real enum types.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 34 begins by contrasting int constants with real enum types.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 178-179.</div>"}, {"m": 18, "t": "Enum types are classes", "c": "<p>An enum constant is a singleton instance exported by the enum class. The type is effectively final, instance-controlled, and much more than a glorified integer.</p>\n<p>Enums can declare fields, constructors, methods, and interfaces. Use private final state and expose behavior through accessors, not ordinals.</p>\n<ul><li>values() returns constants in declaration order.</li><li>toString() defaults to the constant name but can be overridden.</li><li>Enum constructors cannot access mutable static state during initialization.</li></ul>\n<pre><code>public enum Planet {\n    EARTH(5.975e+24, 6.378e6);\n    private final double mass;\n    private final double radius;\n    private final double surfaceGravity;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0180.png\" alt=\"A rich enum can carry data and behavior, not just names.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">A rich enum can carry data and behavior, not just names.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 180-183.</div>"}, {"m": 18, "t": "Constant-specific behavior", "c": "<p>If each enum constant has different behavior, prefer constant-specific class bodies over a switch that dispatches on this.</p>\n<p>The switch style is fragile: adding a constant compiles cleanly and then fails at runtime if you forget to update the switch.</p>\n<ul><li>Abstract methods in an enum force every constant to provide an implementation.</li><li>A strategy enum is useful when multiple constants share a behavior family.</li><li>Use a switch on an enum only when augmenting an enum you do not control.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0182.png\" alt=\"Constant-specific method implementations push behavior next to the constant.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Constant-specific method implementations push behavior next to the constant.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 182-187.</div>"}, {"m": 18, "t": "Quiz: 6 Enums and Annotations - Enums are real types", "q": true}, {"m": 19, "t": "EnumSet replaces bit fields", "c": "<p>If a set of enum constants is being represented as a bit field, stop. EnumSet gives you the compactness of bit vectors with the API and safety of Set.</p>\n<p>The client sees a normal Set<Style>; the implementation can still be bit-vector fast for small enums.</p>\n<ul><li>Use Set<Style> in signatures, not EnumSet<Style>.</li><li>Bulk operations remain efficient because EnumSet is internally bit based.</li><li>You do not need to precompute bit masks or choose int versus long up front.</li></ul>\n<pre><code>public void applyStyles(Set&lt;Style&gt; styles) {\n    ...\n}\ntext.applyStyles(EnumSet.of(Style.BOLD, Style.ITALIC));</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0190.png\" alt=\"Item 36 replaces manual bit twiddling with EnumSet.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 36 replaces manual bit twiddling with EnumSet.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 190-191.</div>"}, {"m": 19, "t": "EnumMap replaces ordinal indexing", "c": "<p>If an array is really a map from enum key to value, use EnumMap. It is type-safe, self-documenting, and comparable in speed to ordinal-indexed arrays.</p>\n<p>EnumMap hides the array implementation detail and makes the key type explicit via the Class token.</p>\n<ul><li>Use Map<EnumType, V> in APIs, not ordinal-based arrays.</li><li>The constructor takes the enum Class object as a bounded type token.</li><li>For multidimensional relationships, use nested EnumMap instances.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0192.png\" alt=\"Item 37 shows how EnumMap eliminates unchecked casts and index math.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 37 shows how EnumMap eliminates unchecked casts and index math.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 192-196.</div>"}, {"m": 19, "t": "Nested EnumMap for enum pairs", "c": "<p>A two-dimensional enum relationship should usually be represented as Map<A, Map<B, V>> backed by EnumMap at each level.</p>\n<p>This is safer than an array-of-arrays indexed by ordinals, and it is far easier to extend when the enum grows.</p>\n<ul><li>Adding a new enum constant should not require reshaping a 2D array manually.</li><li>Let the map-of-maps be initialized from the enum values.</li><li>Use groupingBy(..., mapFactory, ...) if stream collectors should produce EnumMap.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0194.png\" alt=\"The phase-transition example shows how nested EnumMap scales to enum pairs.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The phase-transition example shows how nested EnumMap scales to enum pairs.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 194-196.</div>"}, {"m": 19, "t": "Quiz: 6 Enums and Annotations - EnumSet and EnumMap", "q": true}, {"m": 20, "t": "Extensible enums use interfaces", "c": "<p>Java enums are not extensible, and that is usually correct. If you need an extensible opcode-like family, define an interface and let enums implement it.</p>\n<p>Clients should depend on the interface type, not on a concrete base enum.</p>\n<ul><li>The interface is the stable API surface.</li><li>A base enum can implement the interface, and extension enums can implement the same interface.</li><li>Use bounded type tokens when you want to iterate over a specific enum class.</li></ul>\n<pre><code>public interface Operation {\n    double apply(double x, double y);\n}\npublic enum BasicOperation implements Operation { ... }</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0197.png\" alt=\"Item 38 replaces enum inheritance with an interface plus implementations.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 38 replaces enum inheritance with an interface plus implementations.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 197-199.</div>"}, {"m": 20, "t": "Annotations encode intent", "c": "<p>Naming patterns are fragile. An annotation makes the intent machine-readable, type-checked, and less likely to fail silently.</p>\n<p>For runtime tools, combine RetentionPolicy.RUNTIME with an appropriate Target meta-annotation.</p>\n<ul><li>Marker annotations carry no parameters; they simply mark an element.</li><li>A parameterized annotation can carry a Class<? extends Throwable> token.</li><li>Repeatable annotations are syntactic sugar over a synthetic container annotation.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0201.png\" alt=\"Item 39 moves special handling from naming conventions to annotations.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 39 moves special handling from naming conventions to annotations.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 201-208.</div>"}, {"m": 20, "t": "Repeatable annotations are not free", "c": "<p>Repeatable annotations improve source readability when you need multiple logical instances on one element, but the processing rules are easy to get wrong.</p>\n<p>isAnnotationPresent sees the annotation or the container, not both. getAnnotationsByType is the API that normalizes the repeated form.</p>\n<ul><li>Repeated annotations generate a synthetic container annotation.</li><li>Processors must not assume isAnnotationPresent covers both forms.</li><li>Use repeatable annotations only when the source form really reads better.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0206.png\" alt=\"The repeatable annotation form requires explicit handling in the processor.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The repeatable annotation form requires explicit handling in the processor.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 186-187.</div>"}, {"m": 20, "t": "Quiz: 6 Enums and Annotations - Extensible enums and annotations", "q": true}, {"m": 21, "t": "Override catches overloads", "c": "<p>Use @Override everywhere you believe a method overrides a supertype declaration. It turns accidental overloads into compiler errors.</p>\n<p>The classic failure mode is equals(Bigram) instead of equals(Object): the code compiles, but the method does not override anything.</p>\n<ul><li>It applies to superclass and interface methods.</li><li>In concrete classes, overriding an abstract superclass method is already compiler-enforced, but the annotation is still useful for clarity.</li><li>IDE warnings can complement compiler checks when the annotation is used consistently.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0209.png\" alt=\"Item 40 shows how @Override turns a subtle bug into a compiler error.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 40 shows how @Override turns a subtle bug into a compiler error.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 209-211.</div>"}, {"m": 21, "t": "Marker interfaces define a type", "c": "<p>A marker interface does more than mark. It creates a real type that compile-time checks can use, which is impossible with a marker annotation alone.</p>\n<p>Serializable is the canonical example: it denotes a capability that can be enforced by type checking if APIs choose to use it that way.</p>\n<ul><li>Use a marker interface when clients may want methods that accept only marked instances.</li><li>Use a marker interface to restrict a marker to a specific family of subtypes.</li><li>Use a marker annotation when the marker must apply to non-type program elements or fit an annotation framework.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0210.png\" alt=\"Item 41 argues that a marker interface is still the right tool when the marker is a type.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 41 argues that a marker interface is still the right tool when the marker is a type.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 191-193.</div>"}, {"m": 21, "t": "Choosing between annotation and interface", "c": "<p>If the marker is part of a type relationship, prefer an interface. If it is just metadata on a class, method, field, or parameter, prefer an annotation.</p>\n<p>The question is not whether annotations are newer. The question is whether the marker should participate in the type system.</p>\n<ul><li>Use interfaces for compile-time filtering on accepted argument types.</li><li>Use annotations for frameworks that scan program elements.</li><li>If a TYPE-targeted annotation feels like a type, re-check the design.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0212.png\" alt=\"The decision rule is simple: type system first, metadata second.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">The decision rule is simple: type system first, metadata second.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 212-213.</div>"}, {"m": 21, "t": "Quiz: 6 Enums and Annotations - Override and marker interfaces", "q": true}, {"m": 22, "t": "Item 42: lambdas replace most anonymous function objects", "c": "<p>Anonymous classes were the historical way to create function objects, but they are verbose and visually noisy.</p>\n<p>A lambda is the right tool when you need a function object and you do not need a named class, a distinct identity, or extra state beyond the captured variables.</p>\n<p>Prefer lambdas for single-abstract-method interfaces such as `Comparator`, `Runnable`, and the standard `java.util.function` types.</p>\n<ul><li>Use lambdas for behavior, not for representing a rich object with state and methods.</li><li>A lambda captures effectively final variables from the enclosing scope.</li><li>If you need `this` to name the enclosing instance, prefer an anonymous class or refactor the code.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0214.png\" alt=\"Chapter opener and Item 42: lambdas formalize function objects for functional interfaces, pages 214-215.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Chapter opener and Item 42: lambdas formalize function objects for functional interfaces, pages 214-215.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 214-215.</div>"}, {"m": 22, "t": "Lambda bodies should stay short and local", "c": "<p>A lambda should usually fit on one screen and do one thing.</p>\n<p>If the body grows complex, extract it to a properly named method and use a method reference or a simpler lambda at the call site.</p>\n<p>Do not use lambdas to smuggle imperative control flow into APIs that are designed around functional callbacks.</p>\n<pre><code>Collections.sort(words, (s1, s2) -&gt; Integer.compare(s1.length(), s2.length()));</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0215.png\" alt=\"Item 42: keep lambda bodies small enough to read as behavior, not mini-methods, page 215.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 42: keep lambda bodies small enough to read as behavior, not mini-methods, page 215.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 215-217.</div>"}, {"m": 22, "t": "Item 43: method references are a clearer shorthand when they fit", "c": "<p>Method references are just another way to express a function object, but they remove boilerplate when the lambda would only forward arguments.</p>\n<p>Use them when they are shorter and clearer than the equivalent lambda, not as an aesthetic default.</p>\n<p>If the parameter names in the lambda convey useful meaning, keep the lambda; the names can be documentation.</p>\n<pre><code>map.merge(key, 1, Integer::sum);\nservice.execute(GoshThisClassNameIsHumongous::action);</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0218.png\" alt=\"Item 43: method references trim ceremony when the lambda is only forwarding arguments, pages 218-219.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 43: method references trim ceremony when the lambda is only forwarding arguments, pages 218-219.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 218-219.</div>"}, {"m": 22, "t": "Quiz: 7 Lambdas and Streams - Lambdas, anonymous classes, and method references", "q": true}, {"m": 23, "t": "Item 44: prefer standard functional interfaces when they fit", "c": "<p>Use the standard interfaces in `java.util.function` whenever their signatures and contracts match your need.</p>\n<p>A purpose-built functional interface is justified only when the name adds real documentation, the contract is strong, or custom default methods are valuable.</p>\n<p>A `@FunctionalInterface` annotation is not optional decoration; it documents intent and protects the single-abstract-method contract.</p>\n<ul><li>Prefer `Function`, `Predicate`, `Supplier`, `Consumer`, `UnaryOperator`, `BinaryOperator`, and their primitive specializations.</li><li>Do not define a new interface just to avoid importing one.</li><li>Annotate true functional interfaces with `@FunctionalInterface`.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0220.png\" alt=\"Item 44: standard functional interfaces should be the default API choice, pages 220-223.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 44: standard functional interfaces should be the default API choice, pages 220-223.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 220-223.</div>"}, {"m": 23, "t": "Do not overload on incompatible functional interfaces at the same call site", "c": "<p>Overloading methods on different functional interfaces in the same argument position invites ambiguity.</p>\n<p>Executor-style APIs are the cautionary example: a lambda may fit more than one overload, forcing the client to cast.</p>\n<p>If the overload set is likely to confuse the compiler or the reader, prefer distinct method names or a single well-chosen functional type.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0222.png\" alt=\"Item 44: functional-interface overloads can create real ambiguity for lambda clients, page 222.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 44: functional-interface overloads can create real ambiguity for lambda clients, page 222.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 222-223.</div>"}, {"m": 23, "t": "Item 45: streams are a pipeline abstraction, not a blanket replacement for iteration", "c": "<p>A stream is a finite or infinite sequence of elements; a pipeline is a source, zero or more intermediate operations, and one terminal operation.</p>\n<p>Intermediate operations are lazy and do not run until the terminal operation starts evaluation.</p>\n<p>Streams are fluent and expressive, but they are not automatically better than loops or collections.</p>\n<pre><code>words.stream()\n    .map(String::toLowerCase)\n    .collect(groupingBy(Function.identity(), counting()));</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0224.png\" alt=\"Item 45: stream pipelines are lazy and compositional, pages 224-230.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 45: stream pipelines are lazy and compositional, pages 224-230.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 224-230.</div>"}, {"m": 23, "t": "Quiz: 7 Lambdas and Streams - Functional interfaces and stream fundamentals", "q": true}, {"m": 24, "t": "Item 46: stream functions should be side-effect-free", "c": "<p>Stream pipelines work best when each stage is a pure transformation of the previous stage.</p>\n<p>Function objects passed to stream operations should not mutate external state unless you are deliberately using a collector or other API designed for mutation.</p>\n<p>A `forEach` that performs the computation, rather than reporting a completed computation, is a strong smell.</p>\n<ul><li>Use collectors such as `groupingBy`, `counting`, `toList`, `toSet`, and `toMap` for aggregation.</li><li>Side effects make stream code harder to reason about and harder to parallelize correctly.</li><li>Pure functions preserve the algebraic structure that streams rely on.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0231.png\" alt=\"Item 46: frequency-table examples show why mutating external state is the wrong stream style, pages 231-236.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 46: frequency-table examples show why mutating external state is the wrong stream style, pages 231-236.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 231-236.</div>"}, {"m": 24, "t": "Item 47: return a collection when clients may want both iteration and streaming", "c": "<p>If a method naturally returns a finite sequence and you can realize it as a collection, prefer a standard collection return type.</p>\n<p>A `Collection` gives clients both iteration and stream access, and it is usually the least surprising choice.</p>\n<p>Return `Stream` only when a collection is impractical or when the result is naturally a pipeline rather than a reusable materialized sequence.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0237.png\" alt=\"Item 47: collection return types are the default when a materialized sequence is feasible, pages 237-242.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 47: collection return types are the default when a materialized sequence is feasible, pages 237-242.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 237-242.</div>"}, {"m": 24, "t": "Item 48: parallel streams need evidence, not optimism", "c": "<p>Parallelism can help, but only when the source splits cheaply, the workload is substantial, and the terminal operation scales well.</p>\n<p>Do not assume that `parallel()` is a free speedup; it can cause incorrect results, liveness failures, or slower execution.</p>\n<p>Measure under realistic conditions before shipping parallel stream code, and prefer simple, splittable sources such as arrays and `ArrayList` when parallelism is justified.</p>\n<pre><code>return LongStream.rangeClosed(2, n)\n    .parallel()\n    .mapToObj(BigInteger::valueOf)\n    .filter(i -&gt; i.isProbablePrime(50))\n    .count();</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0243.png\" alt=\"Item 48: parallel streams are conditional, expensive to get wrong, and highly workload-dependent, pages 243-247.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 48: parallel streams are conditional, expensive to get wrong, and highly workload-dependent, pages 243-247.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 243-247.</div>"}, {"m": 24, "t": "Quiz: 7 Lambdas and Streams - Side effects, return types, and parallelism", "q": true}, {"m": 25, "t": "Validate at the boundary", "c": "<p>Check public and protected parameters at method entry, before any state change or expensive work. Invalid inputs should fail fast, with the exception the API documents, not with some later accident.</p>\n<p>Use the narrowest check that proves the contract: `Objects.requireNonNull`, range checks, and explicit type/shape tests. If the computation itself naturally validates the inputs, a separate pre-check is optional, but only if you understand the failure mode.</p>\n<ul><li>Document restrictions, then enforce them immediately.</li><li>Prefer the documented exception to an arbitrary downstream failure.</li><li>Do not add checks that are pure overhead when the algorithm already validates naturally.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0248.png\" alt=\"Item 49: parameter validity, failure atomicity, and explicit preconditions.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 49: parameter validity, failure atomicity, and explicit preconditions.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 248-251.</div>"}, {"m": 25, "t": "Copy before you trust", "c": "<p>If a method or constructor accepts a mutable object, copy it before storing or validating it. Otherwise a caller can mutate your internal state through an alias.</p>\n<p>For mutable internals, return defensive copies, not direct references. That applies to arrays too: nonempty arrays are always mutable, so accessors must not expose them raw.</p>\n<ul><li>Copy mutable inputs before validation to close the TOCTOU window.</li><li>Do not use `clone` on a parameter whose runtime type may be a malicious subclass.</li><li>Prefer immutable value types so copies disappear from the design.</li></ul>\n<pre><code>public Period(Date start, Date end) {\n    this.start = new Date(start.getTime());\n    this.end = new Date(end.getTime());\n    if (this.start.compareTo(this.end) &gt; 0) {\n        throw new IllegalArgumentException();\n    }\n}\n\npublic Date start() {\n    return new Date(start.getTime());\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0252.png\" alt=\"Item 50: the Period example, TOCTOU risk, and defensive accessors.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 50: the Period example, TOCTOU risk, and defensive accessors.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 252-255.</div>"}, {"m": 25, "t": "Quiz: 8 Methods - Parameter validity and object boundaries", "q": true}, {"m": 26, "t": "Keep signatures small and typed to interfaces", "c": "<p>Method names should be short, consistent, and unsurprising. Parameter lists should usually stay at four or fewer arguments; beyond that, users cannot reliably remember the order.</p>\n<p>When a repeated parameter cluster means a real concept, factor it into a helper type. When several parameters are optional, consider a builder-like parameter object. Accept interfaces such as `Map`, not concrete classes such as `HashMap`.</p>\n<ul><li>Use helper types when a parameter bundle represents one domain concept.</li><li>Use a builder-style object when optional parameters start to dominate the signature.</li><li>Prefer enums to boolean flags unless the meaning is already self-evident.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0257.png\" alt=\"Item 51: name choice, parameter count, helper types, and interface parameters.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 51: name choice, parameter count, helper types, and interface parameters.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 257-258.</div>"}, {"m": 26, "t": "Overload only when the call is obvious", "c": "<p>Overload resolution is compile-time only. The runtime type of an argument does not select an overload the way it selects an override.</p>\n<p>That is why overload sets with the same arity, autoboxing, varargs, or functional interfaces are easy to misuse. If two overloads can both accept the same actual arguments, the API is already fragile.</p>\n<ul><li>Overloading and overriding are not interchangeable.</li><li>Avoid same-arity overloads unless the type sets are radically different.</li><li>If overloads must coexist, make them behave identically on the same inputs.</li></ul>\n<pre><code>public static String classify(Collection&lt;?&gt; c) {\n    return c instanceof Set ? &quot;Set&quot;\n         : c instanceof List ? &quot;List&quot;\n         : &quot;Unknown Collection&quot;;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0259.png\" alt=\"Item 52: compile-time overload selection and the `CollectionClassifier` trap.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 52: compile-time overload selection and the `CollectionClassifier` trap.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 259-265.</div>"}, {"m": 26, "t": "Quiz: 8 Methods - Signature shape and overloads", "q": true}, {"m": 27, "t": "Varargs are not free", "c": "<p>A varargs call allocates and initializes an array on every invocation. That overhead is acceptable when you truly need a flexible arity, but it is still real work.</p>\n<p>If the method requires at least one argument, put the required argument first and use a trailing varargs parameter. For hot paths, use fixed-arity overloads for the common cases and reserve varargs for the tail.</p>\n<ul><li>Use varargs when the flexibility is genuinely part of the contract.</li><li>Expect array allocation on each call.</li><li>Do not force callers to pass zero arguments when the method is ill-defined without one.</li></ul>\n<pre><code>static int min(int firstArg, int... remainingArgs) {\n    int min = firstArg;\n    for (int arg : remainingArgs)\n        if (arg &lt; min)\n            min = arg;\n    return min;\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0266.png\" alt=\"Item 53: varargs syntax, required leading arguments, and the fixed-arity fast path.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 53: varargs syntax, required leading arguments, and the fixed-arity fast path.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 266-267.</div>"}, {"m": 27, "t": "Return empty containers, not null", "c": "<p>If a method has no elements to return, return an empty collection or a zero-length array. Returning null shifts special-case handling onto every caller.</p>\n<p>The usual implementation is simple: `new ArrayList<>(...)` for collections, `toArray(new T[0])` for arrays, and `Collections.emptyList()` only when profiling proves it matters.</p>\n<ul><li>Empty containers are clearer than null and are usually cheap enough.</li><li>Do not preallocate the `toArray` target array in hopes of a speedup.</li><li>Use cached empty arrays only when measurement says the allocation matters.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0268.png\" alt=\"Item 54: empty collection and array returns, plus the zero-length-array pattern.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 54: empty collection and array returns, plus the zero-length-array pattern.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 268-269.</div>"}, {"m": 27, "t": "Optional is for absent results", "c": "<p>Use `Optional<T>` when the method conceptually returns a `T` but may not be able to produce one, and the caller should have to confront that possibility.</p>\n<p>Do not return null from an `Optional`-returning method. Do not use `Optional` as a collection element, map value, or field unless you have a very specific reason. For primitives, prefer `OptionalInt`, `OptionalLong`, or `OptionalDouble` over boxed optionals.</p>\n<ul><li>Choose `orElse`, `orElseGet`, or `orElseThrow` based on the cost of the fallback.</li><li>Use `map`, `flatMap`, and `filter` before falling back to `isPresent` and `get`.</li><li>Prefer an empty container when the logical result is a container.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0270.png\" alt=\"Item 55: Optional as a return type, and nowhere else by default.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 55: Optional as a return type, and nowhere else by default.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 270-273.</div>"}, {"m": 27, "t": "Quiz: 8 Methods - Varargs and absence", "q": true}, {"m": 28, "t": "Doc comments are the contract", "c": "<p>Every exported class, interface, constructor, method, and field needs a doc comment. The comment should describe the contract, not the implementation, and it should enumerate preconditions, postconditions, and side effects.</p>\n<p>For methods, use third-person declarative wording and keep the summary sentence self-contained. For public/protected members, `@param`, `@return`, and `@throws` are part of the API surface, not decorative noise.</p>\n<ul><li>Document unchecked exceptions when they represent precondition violations.</li><li>Use `@throws` for the contract, not just checked exceptions.</li><li>Treat missing docs as a usability defect, not a style nit.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0275.png\" alt=\"Item 56: method contracts, preconditions, postconditions, and side effects.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 56: method contracts, preconditions, postconditions, and side effects.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 275-276.</div>"}, {"m": 28, "t": "Use Javadoc tags precisely", "c": "<p>Use `{@code}` for code fragments, `{@literal}` when you need HTML metacharacters without code font, and `{@implSpec}` when documenting self-use and subclass contracts.</p>\n<p>The summary description must stand on its own, which is why overloads should not reuse the same first sentence. Generics, enums, and annotations need their own documentation conventions: type parameters, constants, and annotation members all need comments.</p>\n<ul><li>Document generic type parameters with `@param <T>` style tags.</li><li>Document enum constants and annotation members, not just the type itself.</li><li>Use `{@inheritDoc}` only when reusing inherited contract text is actually correct.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0277.png\" alt=\"Item 56: summary text, tags, type parameters, enums, annotations, and inherited docs.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 56: summary text, tags, type parameters, enums, annotations, and inherited docs.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 277-280.</div>"}, {"m": 28, "t": "Document the whole API surface", "c": "<p>Package-level comments live in `package-info.java`; module-level comments live in `module-info.java`. If a class is serializable or a type has a thread-safety guarantee, say so explicitly.</p>\n<p>Javadoc is only useful when you read the generated output. That is the final check for readability, HTML correctness, and whether the summary sentence actually communicates the API.</p>\n<ul><li>Document thread-safety and serialized form when they matter.</li><li>Use external architecture docs when the API surface alone is not enough.</li><li>Generated docs should be read, not merely produced.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0281.png\" alt=\"Item 56 closes with package/module docs, serializability, and thread safety.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 56 closes with package/module docs, serializability, and thread safety.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 281.</div>"}, {"m": 28, "t": "Quiz: 8 Methods - Documentation", "q": true}, {"m": 29, "t": "Declare local variables at the point of first use", "c": "<p>The default rule is narrow scope: declare a local variable only when you have enough information to initialize it sensibly.</p>\n<p>Premature declarations create visual clutter and keep names visible longer than necessary, which increases the chance of accidental reuse.</p>\n<p>A try block is the main exception: if initialization can throw a checked exception, declare the variable before the try only when later use requires it.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0282.png\" alt=\"Item 57 starts with scope minimization and the try-block exception, pages 282-283.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 57 starts with scope minimization and the try-block exception, pages 282-283.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 282-283.</div>"}, {"m": 29, "t": "Prefer for-each unless you need explicit iteration control", "c": "<p>The enhanced for statement removes iterator and index clutter for collections and arrays.</p>\n<p>It has no performance penalty over the hand-written loop, and it makes nested iteration much less error-prone.</p>\n<p>Use the traditional for loop only when you need destructive filtering, element replacement, or parallel traversal.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0285.png\" alt=\"Item 58 explains why for-each is the normal choice, pages 285-287.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 58 explains why for-each is the normal choice, pages 285-287.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 285-287.</div>"}, {"m": 29, "t": "Keep loops and methods small so scope stays obvious", "c": "<p>A for loop limits the lifetime of the loop variable to the loop body, which blocks copy-and-paste mistakes that are easy in while loops.</p>\n<p>If a loop test depends on an invariant result, cache it in a second loop variable with the correct scope instead of recomputing it every iteration.</p>\n<p>If a method has multiple unrelated phases, split it; local variables should not remain in scope just because the method is long.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0284.png\" alt=\"Item 57&#x27;s bug example and loop-scope techniques, pages 283-284.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 57&#x27;s bug example and loop-scope techniques, pages 283-284.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 283-284.</div>"}, {"m": 29, "t": "Quiz: 9 General Programming - Local Scope and for-each", "q": true}, {"m": 30, "t": "Use the standard libraries before writing ad hoc code", "c": "<p>The library version is usually correct, battle-tested, and cheaper to maintain than a home-grown copy.</p>\n<p>For random numbers, use the current library facility rather than `Math.abs(rnd.nextInt()) % n`, which is biased and can fail catastrophically.</p>\n<p>Know the core packages well: `java.lang`, `java.util`, `java.io`, the collections framework, streams, and the concurrency utilities.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0288.png\" alt=\"Item 59 argues for the standard libraries and current random-number APIs, pages 288-289.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 59 argues for the standard libraries and current random-number APIs, pages 288-289.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 288-289.</div>"}, {"m": 30, "t": "Library code improves over time; so does your leverage", "c": "<p>Standard libraries tend to gain functionality and performance across releases with no code change on your side.</p>\n<p>If the platform library does not fit, try a high-quality third-party library before writing your own implementation.</p>\n<p>The point is not dependency avoidance; it is not duplicating infrastructure that the ecosystem already maintains better than you will.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0290.png\" alt=\"Item 59&#x27;s practical advice: use common library types and naming carefully, pages 289-290.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 59&#x27;s practical advice: use common library types and naming carefully, pages 289-290.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 289-290.</div>"}, {"m": 30, "t": "Use exact arithmetic when the answer must be exact", "c": "<p>`float` and `double` are binary floating-point types; they are for approximation, not exact decimal accounting.</p>\n<p>For money and other exact decimal quantities, use `BigDecimal` when you need decimal-point tracking and controlled rounding.</p>\n<p>If the scale is bounded and performance matters, use `int` or `long` and track the unit explicitly, such as cents instead of dollars.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0291.png\" alt=\"Item 60 shows why floating-point is wrong for exact decimal answers, pages 291-293.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 60 shows why floating-point is wrong for exact decimal answers, pages 291-293.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 291-293.</div>"}, {"m": 30, "t": "Quiz: 9 General Programming - Libraries and Exact Arithmetic", "q": true}, {"m": 31, "t": "Prefer primitives unless you need reference semantics", "c": "<p>Boxed primitives add identity, null, and allocation overhead; primitives have only values and are simpler and faster.</p>\n<p>Mixed primitive/boxed operations auto-unbox, so `null` can trigger a `NullPointerException` in places that look harmless.</p>\n<p>Use boxed primitives only where the language requires a reference type, such as collections, type parameters, or reflective APIs.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0294.png\" alt=\"Item 61&#x27;s boxed-primitive pitfalls: identity, null, and performance, pages 294-296.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 61&#x27;s boxed-primitive pitfalls: identity, null, and performance, pages 294-296.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 294-296.</div>"}, {"m": 31, "t": "Use strings for text, not for structure or capability", "c": "<p>If the data is numeric, boolean, enum-like, or composite, represent it as that type instead of forcing it through a string.</p>\n<p>Strings are a poor capability mechanism because they are forgeable and often share a global namespace.</p>\n<p>A typesafe redesign usually moves the type parameter into the API itself, as with `ThreadLocal<T>`.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0297.png\" alt=\"Item 62 replaces stringly typed APIs with proper types and capabilities, pages 297-299.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 62 replaces stringly typed APIs with proper types and capabilities, pages 297-299.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 297-299.</div>"}, {"m": 31, "t": "Repeated string concatenation is quadratic", "c": "<p>The `+` operator is fine for a few strings, but repeated concatenation copies intermediate results and scales poorly.</p>\n<p>Use `StringBuilder` for loops or any nontrivial accumulation; pre-size it when you can estimate the final length.</p>\n<p>The rule is about asymptotic behavior, not stylistic preference.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0300.png\" alt=\"Item 63 shows why `StringBuilder` beats repeated `+`, page 300.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 63 shows why `StringBuilder` beats repeated `+`, page 300.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 300.</div>"}, {"m": 31, "t": "Refer to objects by interfaces, not concrete classes", "c": "<p>Use the least specific type that still exposes the operations you need, usually an interface.</p>\n<p>This keeps implementations swappable and prevents client code from depending on incidental methods or iteration order.</p>\n<p>Refer to a class directly only when no appropriate interface exists or when the class-specific behavior is required.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0301.png\" alt=\"Item 64 keeps variables, fields, parameters, and returns interface-based when possible, pages 301-302.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 64 keeps variables, fields, parameters, and returns interface-based when possible, pages 301-302.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 301-302.</div>"}, {"m": 31, "t": "Quiz: 9 General Programming - Primitives, Strings, and Interfaces", "q": true}, {"m": 32, "t": "Treat reflection as a controlled escape hatch", "c": "<p>Reflection discards compile-time type checking, produces verbose code, and is slower than ordinary invocation.</p>\n<p>If you need to load a class unknown at compile time, reflect only to instantiate it and then use a known interface or superclass normally.</p>\n<p>The technique is powerful, but the cost belongs in the smallest possible boundary layer.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0303.png\" alt=\"Item 65 recommends reflection only at the boundary and normally through an interface, pages 303-305.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 65 recommends reflection only at the boundary and normally through an interface, pages 303-305.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 303-305.</div>"}, {"m": 32, "t": "Use native methods only when the tradeoff is real", "c": "<p>JNI can access platform-specific facilities or legacy native libraries, but it increases portability, debugging difficulty, and memory-management risk.</p>\n<p>Use native code sparingly, and assume Java is fast enough until you have evidence otherwise.</p>\n<p>If you must cross the boundary, keep the native surface area small and test it aggressively.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0306.png\" alt=\"Item 66 explains the legitimate uses and risks of JNI, page 306.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 66 explains the legitimate uses and risks of JNI, page 306.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 306.</div>"}, {"m": 32, "t": "Optimize only after measurement, and start at the algorithm level", "c": "<p>Do not warp an API for speculative performance gains; design well first, then measure.</p>\n<p>Use a profiler or `jmh` to find where time is really going, and fix algorithmic mistakes before micro-optimizing code paths.</p>\n<p>Optimization must be iterative and evidence-driven because Java performance varies across VMs, releases, and hardware.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0307.png\" alt=\"Item 67 ties optimization to profiling, measurement, and algorithm choice, pages 307-309.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 67 ties optimization to profiling, measurement, and algorithm choice, pages 307-309.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 307-309.</div>"}, {"m": 32, "t": "Follow the platform's naming conventions", "c": "<p>Package names are lowercase and hierarchical; class and interface names are PascalCase; methods and fields use lowerCamelCase.</p>\n<p>Constant fields are the exception: use uppercase words separated by underscores, and reserve underscores for that purpose.</p>\n<p>Type variables are short and conventional: `T`, `E`, `K`, `V`, `X`, `R`, and friends. The conventions are conventions, but they matter.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0310.png\" alt=\"Item 68 summarizes typographical and grammatical naming rules, pages 310-313.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 68 summarizes typographical and grammatical naming rules, pages 310-313.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 310-313.</div>"}, {"m": 32, "t": "Quiz: 9 General Programming - Reflection, Native Code, Optimization, and Naming", "q": true}, {"m": 33, "t": "Item 69: exceptions are for exceptional conditions", "c": "<p>Do not use exceptions as an alternative loop construct or as a substitute for ordinary control flow.</p>\n<p>The canonical test is semantic, not syntactic: if the caller is expected to hit the condition routinely, the condition is not exceptional.</p>\n<p>For iteration and other state-sensitive APIs, prefer an explicit state-test method, an optional result, or a distinguished return value.</p>\n<ul><li>Exception-driven iteration is misleading and usually slower.</li><li>A state-testing method is only safe when the object cannot change between the test and the action.</li><li>Optional results and distinguished values are better when concurrency or duplicate work makes testing unsafe.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0314.png\" alt=\"Item 69 rejects exception-based loops and prefers explicit state testing, pages 314-316.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 69 rejects exception-based loops and prefers explicit state testing, pages 314-316.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 314-316.</div>"}, {"m": 33, "t": "Item 70: checked versus unchecked is a recovery question", "c": "<p>Use checked exceptions only when the caller can reasonably recover and the API should force recovery handling.</p>\n<p>Use runtime exceptions for programming errors and precondition violations; use errors for VM-level conditions, not for application design.</p>\n<p>If recovery is plausible, the exception should expose information that helps the caller recover rather than force string parsing.</p>\n<ul><li>Do not define new `Error` subclasses.</li><li>Do not define throwables outside `Exception`, `RuntimeException`, or `Error`.</li><li>Checked exceptions should provide accessors for recovery-relevant data when possible.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0317.png\" alt=\"Item 70 separates recoverable conditions from programming errors, pages 317-318.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 70 separates recoverable conditions from programming errors, pages 317-318.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 317-318.</div>"}, {"m": 33, "t": "Throwable design must preserve API clarity", "c": "<p>When the right classification is unclear, default to unchecked unless a caller can clearly take corrective action.</p>\n<p>Never hide recoverability behind a vague string; expose structured data with typed accessors.</p>\n<p>Exception objects are full-fledged objects, so they should carry machine-readable information, not just prose.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0318.png\" alt=\"Item 70 emphasizes typed recovery information and disciplined throwable design, page 318.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 70 emphasizes typed recovery information and disciplined throwable design, page 318.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 318.</div>"}, {"m": 33, "t": "Quiz: 10 Exceptions - Exceptional conditions and throwable choice", "q": true}, {"m": 34, "t": "Item 71: avoid unnecessary checked exceptions", "c": "<p>Checked exceptions are valuable when they improve reliability, but they make APIs harder to use because every caller must handle or declare them.</p>\n<p>The burden is especially high when a method throws only one checked exception and therefore cannot be used directly in stream pipelines.</p>\n<p>If callers cannot do anything useful at the call site, the checked exception is probably a design mistake.</p>\n<ul><li>Prefer `Optional` when the failure is representable as absence.</li><li>Prefer an unchecked exception if callers cannot improve the outcome.</li><li>A separate state-test method is sometimes a cleaner API than a checked exception.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0319.png\" alt=\"Item 71 warns that checked exceptions create real caller burden, pages 319-320.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 71 warns that checked exceptions create real caller burden, pages 319-320.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 319-320.</div>"}, {"m": 34, "t": "Item 72: reuse standard exceptions first", "c": "<p>Prefer the standard exceptions that already encode the right semantics: they are familiar, compact, and easier to read than custom types.</p>\n<p>The choice should be based on documented meaning, not on class names alone.</p>\n<p>Treat `Exception`, `RuntimeException`, `Throwable`, and `Error` as if they were abstract; do not throw them directly as catch-all placeholders.</p>\n<ul><li>`IllegalArgumentException` for bad argument values.</li><li>`IllegalStateException` for illegal object state.</li><li>`NullPointerException` and `IndexOutOfBoundsException` for the conventional null and index cases.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0321.png\" alt=\"Item 72 maps common failure modes to standard exception classes, pages 321-322.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 72 maps common failure modes to standard exception classes, pages 321-322.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 321-322.</div>"}, {"m": 34, "t": "Item 73: translate exceptions to match the abstraction", "c": "<p>If a lower-level exception leaks through a higher-level API, the abstraction boundary is broken and the implementation detail becomes part of the contract.</p>\n<p>Catch low-level exceptions and translate them into exceptions that make sense in terms of the higher-level abstraction.</p>\n<p>When the original cause is useful for debugging, chain it rather than discard it.</p>\n<pre><code>try {\n    return i.next();\n} catch (NoSuchElementException cause) {\n    throw new IndexOutOfBoundsException(&quot;Index: &quot; + index);\n}</code></pre>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0323.png\" alt=\"Item 73 uses exception translation and chaining to preserve abstraction and cause, pages 323-324.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 73 uses exception translation and chaining to preserve abstraction and cause, pages 323-324.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 323-324.</div>"}, {"m": 34, "t": "Quiz: 10 Exceptions - Checked exceptions, standard exceptions, and abstraction", "q": true}, {"m": 35, "t": "Item 74: document all thrown exceptions", "c": "<p>Public APIs must document both checked and unchecked exceptions; the former with `throws` and `@throws`, the latter with `@throws` only.</p>\n<p>Documenting unchecked exceptions is not optional trivia: it is how you communicate preconditions and expected failure modes.</p>\n<p>Interface documentation matters especially because it becomes part of the contract shared by all implementations.</p>\n<ul><li>Do not hide behind `Exception` or `Throwable` in declarations.</li><li>Document preconditions through the exceptions they imply.</li><li>Use `@throws` even when the exception is unchecked.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0325.png\" alt=\"Item 74 treats exception documentation as part of the API contract, pages 325-326.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 74 treats exception documentation as part of the API contract, pages 325-326.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 325-326.</div>"}, {"m": 35, "t": "Item 75: detail messages should capture failure data", "c": "<p>The detail message is for debugging, not for end users, so it should maximize diagnostic value and minimize fluff.</p>\n<p>Include the parameter and field values that explain the failure, especially when the message will be the only evidence in a production stack trace.</p>\n<p>Do not leak secrets or other sensitive data into exception messages that may be widely visible.</p>\n<ul><li>For bounds failures, record the lower bound, upper bound, and failing index.</li><li>Prefer structured data in the exception object when the caller may need it.</li><li>Keep prose short; the stack trace and source code already provide context.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0327.png\" alt=\"Item 75 says the message should capture the failure, not narrate it, pages 327-328.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 75 says the message should capture the failure, not narrate it, pages 327-328.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 327-328.</div>"}, {"m": 35, "t": "Item 76: strive for failure atomicity", "c": "<p>A failed method should leave the object in the same state it had before the call whenever practical.</p>\n<p>Immutable objects get failure atomicity for free; mutable objects usually need prevalidation or careful ordering of state changes.</p>\n<p>If an operation can fail in the middle, consider performing it on a temporary copy and committing only after success.</p>\n<ul><li>Validate before mutating when you can.</li><li>Order work so that likely failures happen before state changes.</li><li>Document any residual inconsistent state if atomicity cannot be provided.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0329.png\" alt=\"Item 76 explains how to preserve object state when operations fail, pages 329-330.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 76 explains how to preserve object state when operations fail, pages 329-330.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 329-330.</div>"}, {"m": 35, "t": "Item 77: never silently ignore exceptions", "c": "<p>An empty catch block is usually a defect, not a simplification.</p>\n<p>If ignoring an exception is truly correct, the catch block should explain why and the variable should be named `ignored`.</p>\n<p>Logging is often better than silence because it preserves evidence without forcing recovery when recovery is unnecessary.</p>\n<ul><li>The rule applies to checked and unchecked exceptions alike.</li><li>Swallowing an exception can defer failure to a unrelated location and time.</li><li>If the exception is ignorable, write that reason down in code.</li></ul>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0331.png\" alt=\"Item 77 rejects empty catch blocks and requires an explicit justification when ignoring is acceptable, page 331.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 77 rejects empty catch blocks and requires an explicit justification when ignoring is acceptable, page 331.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source page 331.</div>"}, {"m": 35, "t": "Quiz: 10 Exceptions - Documentation, diagnostics, and failure atomicity", "q": true}, {"m": 36, "t": "Shared mutable data needs a happens-before edge", "c": "<p>If multiple threads can read and write the same state, you need a synchronization strategy. Otherwise updates can be lost, reads can be stale, and invariants can be observed half-updated.</p>\n<p>The book's rule is blunt: synchronize every access to shared mutable data unless the object is safely published and immutable, or you use a higher-level concurrent utility that provides the same ordering guarantees.</p>\n<p>Thread safety is not about being fast enough on your laptop. It is about establishing the visibility and atomicity that the Java Memory Model requires.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0332.png\" alt=\"Item 78 begins with the basic rule for shared mutable state: every access must be coordinated.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 78 begins with the basic rule for shared mutable state: every access must be coordinated.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 332-334.</div>"}, {"m": 36, "t": "Unsynchronized increment is not a minor bug", "c": "<p>A read-modify-write sequence such as `count++` is not atomic. Two threads can both read the same value and then overwrite each other's updates.</p>\n<p>Using `volatile` alone does not fix this. `volatile` gives visibility, not mutual exclusion or compound atomicity.</p>\n<p>If you need a count, use `AtomicLong`, `LongAdder`, or a lock around the entire critical section. Pick the abstraction that matches the invariant, not the one that merely compiles.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0334.png\" alt=\"Visibility and atomicity are different concerns; compound actions need a real synchronization boundary.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Visibility and atomicity are different concerns; compound actions need a real synchronization boundary.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 334-337.</div>"}, {"m": 36, "t": "Synchronization protects invariants, not just fields", "c": "<p>The point of synchronization is usually to preserve an invariant over several fields, not to protect one field in isolation.</p>\n<p>If a method updates one field and then another, the entire update should usually be inside one synchronized region so observers never see the object in an impossible intermediate state.</p>\n<p>When a class has a documented thread-safety policy, callers can reason about whether they need external locking or can use it concurrently as-is.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0336.png\" alt=\"Item 78 ties synchronization to object invariants and published thread-safety policy.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 78 ties synchronization to object invariants and published thread-safety policy.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 334-337.</div>"}, {"m": 36, "t": "Quiz: 11 Concurrency - Synchronize shared mutable state", "q": true}, {"m": 37, "t": "Do not hold a lock while calling alien code", "c": "<p>Excessive synchronization is not just a performance problem. It can cause deadlock, contention, and surprise reentrancy when a callback runs while your lock is held.</p>\n<p>The dangerous pattern is an open call: invoke an overridable method, client callback, or foreign object method while still inside a synchronized region.</p>\n<p>Copy the data you need, drop the lock, and then call out if the callback does not require the lock. The rule is simpler than the edge cases it prevents.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0338.png\" alt=\"Item 79 warns against open calls and holding locks across foreign code.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 79 warns against open calls and holding locks across foreign code.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 338-340.</div>"}, {"m": 37, "t": "Synchronizing every method is often too blunt", "c": "<p>A blanket `synchronized` modifier on every method can turn one object's lock into a throughput bottleneck.</p>\n<p>It also increases the chance of deadlock if methods call each other across object boundaries or if client code tries to compose several locked objects.</p>\n<p>Lock only the critical section needed to preserve the invariant, and keep the synchronized region as small and simple as correctness allows.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0340.png\" alt=\"Item 79 prefers tight critical sections over class-wide locking by habit.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 79 prefers tight critical sections over class-wide locking by habit.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 339-343.</div>"}, {"m": 37, "t": "Inheritance and synchronization interact badly", "c": "<p>A synchronized base class can be fragile if subclasses override methods and the base class calls them while holding its lock.</p>\n<p>The safer design is often composition or a private helper method that is never overridden. That keeps the lock protocol under one author's control.</p>\n<p>If a class needs to be extensible, document the synchronization policy explicitly or prohibit overriding altogether.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0342.png\" alt=\"Excessive synchronization becomes much riskier when overridable methods enter the picture.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Excessive synchronization becomes much riskier when overridable methods enter the picture.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 340-343.</div>"}, {"m": 37, "t": "Quiz: 11 Concurrency - Avoid excessive synchronization", "q": true}, {"m": 38, "t": "Prefer executors, tasks, and streams to raw threads", "c": "<p>Raw thread management is low-level and brittle. An executor decouples task submission from task execution, which gives you pooling, scheduling, and policy control in one abstraction.</p>\n<p>Tasks are the unit of work; threads are an implementation detail. Streams can also express bulk work more clearly than hand-managed thread farms when the problem is data-oriented.</p>\n<p>If the work is structured as independent units, start with an executor before inventing ad hoc thread control.</p>\n<div style=\"margin:18px 0 10px;\"><img src=\"page_previews/page_0344.png\" alt=\"Item 80 recommends executors and task abstractions over direct thread management.\" style=\"width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;\"><p style=\"font-size:0.95rem;color:#475569;margin-top:8px;\">Item 80 recommends executors and task abstractions over direct thread management.</p></div>\n<div class=\"note\"><strong>Source span:</strong> Source pages 344-345.</div>"}, {"m": 38, "t": "Use concurrent utilities instead of wait and notify", "c": "<p>Low-level `wait` and `notify` are easy to misuse because they requi
