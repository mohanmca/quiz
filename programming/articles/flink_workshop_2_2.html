Step 3: Barrier overtakes data in output channelsOutput: &mdash;r5&mdash;&#x2551;B42&#x2551;&mdash;r6&mdash;&rarr; (barrier jumps ahead)</div><h2>Channel State Handles</h2><p>In-flight data is persisted as <code>InputChannelStateHandle</code> and <code>ResultSubpartitionStateHandle</code> (in <code>o.a.f.runtime.state</code>).</p><h2>Trade-offs: Aligned vs Unaligned</h2><table><tr><th>Aspect</th><th>Aligned</th><th>Unaligned</th></tr><tr><td>Backpressure</td><td>Causes additional backpressure</td><td>No additional backpressure</td></tr><tr><td>Checkpoint duration</td><td>Slow under backpressure</td><td>Much faster under backpressure</td></tr><tr><td>State size</td><td>Smaller (operator state only)</td><td>Larger (includes in-flight data)</td></tr><tr><td>Recovery</td><td>Simpler</td><td>Slower (must replay in-flight data)</td></tr><tr><td>Rescaling</td><td>Fully supported</td><td>Limited (must fall back to aligned)</td></tr></table>`},
{m:6,t:"Auto-Switching & Checkpoint Coordinator Lifecycle",c:`<h1>Auto-Switching &amp; Coordinator Lifecycle</h1><h2>Aligned &rarr; Unaligned After Timeout</h2><p>Flink 2.2 supports a hybrid mode: start with aligned checkpoints, but automatically switch to unaligned if barrier alignment takes too long.</p><pre># Enable unaligned checkpointsexecution.checkpointing.unaligned.enabled: true
# Auto-switch timeoutexecution.checkpointing.aligned-checkpoint-timeout: 30s</pre><h2>Checkpoint Lifecycle (5 Phases)</h2><div class="diagram">1. TRIGGERCheckpointCoordinator.triggerCheckpoint()+- Validate: no too-many-pending, min-pause elapsed+- Create PendingCheckpoint+- Send trigger RPC to source tasks
2. EXECUTION (on TaskManagers)Sources snapshot state, inject CheckpointBarrierDownstream operators: barrier alignment &rarr; snapshot &rarr; forward
3. ACKNOWLEDGEEach task sends AcknowledgeCheckpoint to coordinator
4. COMPLETE (all tasks acknowledged)PendingCheckpoint &rarr; CompletedCheckpointPersist metadata, notify tasks, subsume older checkpoints
5. FAILURE (alternative to 4)Timeout or task decline &rarr; abort, clean up partial stateCheckpointFailureManager tracks failure count</div><div class="tip"><strong>Tip:</strong> Set <code>execution.checkpointing.aligned-checkpoint-timeout: 30s</code> with unaligned checkpoints enabled to get the best of both worlds &mdash; small snapshots when things are healthy, fast checkpoints under backpressure.</div>`},
{m:6,t:"Checkpoint Configuration API",c:`<h1>Checkpoint Configuration</h1><h2>Programmatic Configuration</h2><pre>StreamExecutionEnvironment env = StreamExecutionEnvironment.getExecutionEnvironment();env.enableCheckpointing(60_000);
CheckpointConfig config = env.getCheckpointConfig();config.setCheckpointingMode(CheckpointingMode.EXACTLY_ONCE);config.setCheckpointTimeout(600_000); // 10 minutesconfig.setMinPauseBetweenCheckpoints(30_000);config.setMaxConcurrentCheckpoints(1);config.enableUnalignedCheckpoints();config.setAlignedCheckpointTimeout(Duration.ofSeconds(30));config.setTolerableCheckpointFailureNumber(3);config.setExternalizedCheckpointRetention(ExternalizedCheckpointRetention.RETAIN_ON_CANCELLATION);</pre><h2>Configuration via flink-conf.yaml</h2><pre>execution.checkpointing.interval: 60sexecution.checkpointing.timeout: 10minexecution.checkpointing.min-pause: 30sexecution.checkpointing.max-concurrent-checkpoints: 1execution.checkpointing.mode: EXACTLY_ONCEexecution.checkpointing.unaligned.enabled: trueexecution.checkpointing.aligned-checkpoint-timeout: 30sexecution.checkpointing.tolerable-failed-checkpoints: 3execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATIONstate.checkpoint-storage: filesystemstate.checkpoints.dir: hdfs:///flink/checkpoints</pre><div class="warn"><strong>Caution:</strong> Setting <code>max-concurrent-checkpoints &gt; 1</code> is rarely beneficial and complicates debugging. Keep it at 1 unless you have a specific reason.</div>`},
{m:6,t:"Checkpoint Storage: JobManager vs FileSystem",c:`<h1>Checkpoint Storage</h1><h2>Orthogonal to the State Backend</h2><p>The state backend determines how state is organized during execution. Checkpoint storage determines where snapshots are persisted for fault tolerance. They are independent choices.</p><h2>JobManagerCheckpointStorage (Testing Only)</h2><ul><li>Stores state in JobManager&rsquo;s memory</li><li>Maximum state size: ~5 MB per state</li><li>State <strong>LOST</strong> if JobManager crashes</li><li>Use only for testing and development</li></ul><h2>FileSystemCheckpointStorage (Production)</h2><ul><li>Stores state on a distributed filesystem (HDFS, S3, GCS, Azure Blob)</li><li>Scalable to terabytes of state</li><li>Survives JobManager and TaskManager failures</li></ul><div class="diagram">Layout on storage:hdfs:///flink/checkpoints/+-- &lt;job-id&gt;/+-- chk-1/| +-- _metadata (checkpoint metadata)| +-- &lt;operator-id&gt;-1 (state handle)| +-- &lt;operator-id&gt;-2 (state handle)+-- chk-2/+-- shared/ (shared state for incremental CPs)</div><pre>env.getCheckpointConfig().setCheckpointStorage(new FileSystemCheckpointStorage("hdfs:///flink/checkpoints"));</pre><div class="real"><strong>Real-world:</strong> Always use <code>FileSystemCheckpointStorage</code> in production. The <code>JobManagerCheckpointStorage</code> provides no fault tolerance and will cause data loss.</div>`},
{m:6,t:"Exactly-Once End-to-End",c:`<h1>End-to-End Exactly-Once</h1><p>Checkpointing alone gives <strong>exactly-once within Flink</strong>. For end-to-end exactly-once, you also need replayable sources and transactional sinks.</p><h2>Two-Phase Commit (2PC) Pattern</h2><div class="diagram">PHASE 1: PRE-COMMIT (during checkpoint)Sink writes to external system in a TRANSACTIONTransaction ID stored in checkpoint state
PHASE 2: COMMIT (on checkpoint completion)Sink receives notifyCheckpointComplete(checkpointId)Sink COMMITS the transaction
ON FAILURE:Uncommitted transactions are ABORTEDRecovery restarts from last successful checkpoint</div><h2>Kafka Sink Example</h2><div class="diagram">Normal operation:Checkpoint N triggers &rarr; Sink opens Kafka transaction T_NRecords written within T_N (not visible to consumers)Checkpoint N completes &rarr; Sink commits T_N (records become visible)
Failure scenario:Checkpoint N triggers &rarr; Sink opens T_N, writes recordsTask fails before checkpoint completesT_N times out and is abortedRecovery from checkpoint N-1 &rarr; no duplicates in output</div><h2>End-to-End Requirements</h2><table><tr><th>Component</th><th>Requirement</th><th>Example</th></tr><tr><td>Source</td><td>Replayable from stored offsets</td><td>Kafka, Kinesis</td></tr><tr><td>Pipeline</td><td>Exactly-once via checkpoint barriers</td><td>Flink checkpointing</td></tr><tr><td>Sink</td><td>2PC or idempotent writes</td><td>Kafka (2PC), HBase (idempotent)</td></tr></table><div class="note"><strong>Key insight:</strong> Idempotent sinks (upsert semantics with primary keys) are a simpler alternative to 2PC. If your sink supports upserts, you get effective exactly-once without the complexity of transaction management.</div>`},
{m:7,t:"Checkpoints vs Savepoints",c:`<h1>Savepoints, Snapshot Lifecycle &amp; Fault Recovery</h1><h2>Checkpoints vs Savepoints: Key Differences</h2><p>Both are consistent snapshots but serve fundamentally different purposes.</p><table><tr><th>Aspect</th><th>Checkpoint</th><th>Savepoint</th></tr><tr><td>Purpose</td><td>Automatic fault tolerance</td><td>Manual operational snapshot</td></tr><tr><td>Triggered by</td><td>CheckpointCoordinator timer</td><td>User (CLI, REST API)</td></tr><tr><td>Format</td><td>Backend-specific (may be incremental)</td><td>Canonical or native format</td></tr><tr><td>Lifecycle</td><td>Auto-managed, subsumed by newer CPs</td><td>User-managed, never auto-deleted</td></tr><tr><td>Portability</td><td>Tied to specific backend version</td><td>Designed for portability</td></tr><tr><td>Performance</td><td>Optimized for speed (incremental)</td><td>May be slower (full state dump)</td></tr><tr><td>Use case</td><td>Crash recovery</td><td>Upgrades, migration, A/B testing</td></tr></table><h2>Type Hierarchy in the Codebase</h2><pre>SnapshotType (interface)+-- CheckpointType (final class)| +-- CHECKPOINT (incremental, FORWARD_BACKWARD sharing)| +-- FULL_CHECKPOINT (FORWARD sharing only)+-- SavepointType (class)+-- savepoint() (PostCheckpointAction.NONE)+-- suspend() (PostCheckpointAction.SUSPEND)+-- terminate() (PostCheckpointAction.TERMINATE)</pre><div class="note"><strong>Key insight:</strong> Checkpoints optimize for <em>speed</em> (incremental snapshots, backend-specific encoding). Savepoints optimize for <em>portability</em> (canonical format that survives code changes and version upgrades).</div>`},
{m:7,t:"Savepoint Operations: Trigger, Stop, Resume",c:`<h1>Savepoint Operations</h1><h2>Operation 1: Trigger Savepoint (Job Continues)</h2><pre># CLI$ flink savepoint &lt;jobId&gt; [targetDirectory]
# REST APIPOST /jobs/:jobId/savepoints{ "target-directory": "hdfs:///savepoints", "cancel-job": false }</pre><h2>Operation 2: Stop with Savepoint</h2><pre># Drain sources, process all in-flight, then stop cleanly$ flink stop --savepointPath hdfs:///savepoints &lt;jobId&gt;
# Cancel with savepoint (legacy, no drain)$ flink cancel -s hdfs:///savepoints &lt;jobId&gt;</pre><div class="diagram">stop --savepointPath (TERMINATE action):&mdash;running&mdash;+&mdash;drain&mdash;+&mdash;savepoint&mdash;+&mdash;FINISHED| | |sources get all records job terminatesend-of-input processed cleanly
cancel -s (SUSPEND action):&mdash;running&mdash;+&mdash;savepoint&mdash;+&mdash;CANCELED| |savepoint taken job cancelled(no drain) immediately</div><h2>Operation 3: Resume from Savepoint</h2><pre># Resume from savepoint$ flink run -s hdfs:///savepoints/savepoint-abc123 myJob.jar
# Resume with allowing non-restored state$ flink run -s hdfs:///savepoints/savepoint-abc123 \\--allowNonRestoredState myJob.jar</pre><div class="tip"><strong>Tip:</strong> Always use <code>flink stop --savepointPath</code> for planned maintenance. It drains all in-flight data, advances watermarks to MAX_WATERMARK, fires final windows, and ensures no data loss.</div>`},
{m:7,t:"Savepoint Compatibility: Operator UIDs",c:`<h1>Savepoint Compatibility</h1><h2>Operator UIDs: The Key to State Mapping</h2><p>When restoring from a savepoint, Flink maps saved operator state to running operators using <strong>Operator UIDs</strong> (handled by <code>StateAssignmentOperation</code>).</p><pre>// ALWAYS set UIDs explicitly for stateful operators!DataStream&lt;Event&gt; result = source.uid("event-source").keyBy(Event::getKey).process(new StatefulProcessor()).uid("stateful-processor") // Critical for savepoint compatibility.addSink(new MySink()).uid("output-sink");</pre><h2>What Happens Without UIDs</h2><div class="diagram">Original Job: Modified Job:
Source &rarr; Map &rarr; Sink Source &rarr; Filter &rarr; Map &rarr; Sink(auto-1) (auto-2) (auto-3) (auto-1) (auto-2) (auto-3) (auto-4)
auto-2 was "Map" but now "Filter" has auto-2&rarr; State from Map is assigned to Filter &rarr; FAILURE or CORRUPTION</div><h2>State Mapping During Restore</h2><ul><li>Matching UIDs &rarr; state is restored</li><li>Savepoint has UID not in the new job &rarr; fails unless <code>--allowNonRestoredState</code></li><li>New job has UID not in savepoint &rarr; operator starts with empty state</li></ul><h2>Schema Evolution</h2><ul><li><strong>Compatible:</strong> Adding fields (with defaults), removing fields, widening types</li><li><strong>Incompatible:</strong> Changing field types incompatibly, renaming classes</li><li>Each state stores a <code>TypeSerializerSnapshot</code> to detect compatibility at restore time</li></ul><div class="warn"><strong>Caution:</strong> Forgetting to set operator UIDs is the #1 cause of savepoint restore failures. Make it a code review requirement for every stateful operator.</div>`},
{m:7,t:"Failure Detection & Failover Strategies",c:`<h1>Failure Detection &amp; Failover Strategies</h1><h2>How Failures Are Detected</h2><ol><li><strong>Task exception</strong> &rarr; TaskExecutor catches it &rarr; task transitions to FAILED &rarr; notifies JobMaster via RPC</li><li><strong>Heartbeat timeout</strong> &rarr; ResourceManager detects lost TaskExecutor &rarr; all tasks on that TM considered FAILED</li><li><strong>Network partition</strong> &rarr; downstream task detects broken connection &rarr; reports failure to JobMaster</li></ol><h2>Failover Strategies</h2><table><tr><th>Strategy</th><th>Restarts</th><th>Use Case</th></tr><tr><td><code>RestartAllFailoverStrategy</code></td><td>ALL tasks in the job</td><td>Simplest, most conservative</td></tr><tr><td><code>RestartPipelinedRegionFailoverStrategy</code> (default)</td><td>Only the pipelined region containing the failed task</td><td>Much faster for localized failures</td></tr></table><h2>Region-Level Failover</h2><div class="diagram">Source-1 -+ +&rarr; Sink-1+-pipelined&rarr; Agg --+Source-2 -+ +&rarr; Sink-2
If Agg&rarr;Sink uses blocking shuffle &rarr; two regions:Region A: [Source-1, Source-2, Agg]Region B: [Sink-1, Sink-2]
Failure in Sink-1 &rarr; restart Region B onlyFailure in Agg &rarr; restart Region A + Region B (downstream)</div><pre># flink-conf.yamljobmanager.execution.failover-strategy: region # default</pre><div class="note"><strong>Key insight:</strong> A pipelined region is a set of tasks connected by pipelined data exchanges with no blocking shuffle boundary. Region-level failover can restart just a fraction of the job, dramatically reducing recovery time.</div>`},
{m:7,t:"Recovery Process: Step by Step",c:`<h1>Recovery Process</h1><h2>Step-by-Step Recovery</h2><div class="diagram">Step 1: SELECT CHECKPOINTCompletedCheckpointStore.getLatestCheckpoint()
Step 2: LOAD METADATARead _metadata file from checkpoint storage
Step 3: STATE ASSIGNMENT (StateAssignmentOperation)For each operator:- Match OperatorID to checkpointed OperatorState- Repartition keyed state across new parallelism(KeyGroupRange splitting/merging)- Distribute operator state (round-robin or broadcast)- Assign channel state handles
Step 4: DEPLOY TASKSEach task receives TaskStateSnapshot
Step 5: RESTORE STATE ON TASKMANAGERState backend restores keyed state from handlesChannel state restored for unaligned checkpoints
Step 6: RESUME PROCESSINGSources seek to checkpointed offsetsProcessing resumes from consistent snapshot</div><h2>State Redistribution During Rescaling</h2><div class="diagram">Original: 3 subtasks, 10 key groups
Subtask-0: KG[0,1,2,3]Subtask-1: KG[4,5,6] &rarr; Saved in checkpointSubtask-2: KG[7,8,9]
Rescaled to 2 subtasks:
Subtask-0: KG[0,1,2,3,4] &larr; Merged from old 0 + part of 1Subtask-1: KG[5,6,7,8,9] &larr; Merged from part of 1 + old 2</div><div class="real"><strong>Real-world:</strong> Key group redistribution is why <code>maxParallelism</code> matters. Set it thoughtfully at job creation &mdash; it cannot be changed after the first checkpoint and determines how finely state can be split.</div>`},
{m:7,t:"Restart Strategies",c:`<h1>Restart Strategies</h1><p>Restart strategies control <strong>how many times</strong> and <strong>when</strong> to retry after failures.</p><table><tr><th>Strategy</th><th>Behavior</th><th>Config Key</th></tr><tr><td><code>fixed-delay</code></td><td>Fixed N retries with constant delay</td><td><code>restart-strategy.fixed-delay.attempts/delay</code></td></tr><tr><td><code>failure-rate</code></td><td>Max failures within a time window</td><td><code>restart-strategy.failure-rate.max-failures-per-interval</code></td></tr><tr><td><code>exponential-delay</code></td><td>Exponentially increasing delay, resets after stable period</td><td><code>restart-strategy.exponential-delay.*</code></td></tr><tr><td><code>disable</code></td><td>No restarts &mdash; job fails immediately</td><td><code>restart-strategy.type: disable</code></td></tr></table><div class="diagram">fixed-delay (attempts=3, delay=10s):&mdash;run&mdash;X&mdash;[10s]&mdash;run&mdash;X&mdash;[10s]&mdash;run&mdash;X&mdash;[10s]&mdash;run&rarr;fail-1 fail-2 fail-3 (4th failure = job fails)
exponential-delay (initial=1s, max=60s, multiplier=2):&mdash;run&mdash;X&mdash;[1s]&mdash;run&mdash;X&mdash;[2s]&mdash;run&mdash;X&mdash;[4s]&mdash;run&mdash;X&mdash;[8s]&mdash;run&rarr;fail-1 fail-2 fail-3 fail-4(resets after reset-backoff-threshold of stable running)</div><h2>Recommended Production Config</h2><pre>restart-strategy.type: exponential-delayrestart-strategy.exponential-delay.initial-backoff: 1srestart-strategy.exponential-delay.max-backoff: 5minrestart-strategy.exponential-delay.backoff-multiplier: 2.0restart-strategy.exponential-delay.reset-backoff-threshold: 10minrestart-strategy.exponential-delay.jitter-factor: 0.1</pre><div class="tip"><strong>Tip:</strong> Use <code>exponential-delay</code> in production. It handles transient errors gracefully while backing off for persistent issues. The jitter factor prevents thundering herds when multiple tasks restart simultaneously.</div>`},
{m:7,t:"Externalized Checkpoints & Retained Checkpoints",c:`<h1>Externalized &amp; Retained Checkpoints</h1><h2>Externalized Checkpoints</h2><p>By default, checkpoints are deleted when a job is cancelled. Externalized checkpoints survive cancellation, enabling manual recovery.</p><pre>// CheckpointRetentionPolicy enumRETAIN_ON_CANCELLATION // Keep on cancel AND failureRETAIN_ON_FAILURE // Keep on failure onlyNEVER_RETAIN_AFTER_TERMINATION // Always clean up (default)</pre><pre>// Programmaticconfig.setExternalizedCheckpointRetention(ExternalizedCheckpointRetention.RETAIN_ON_CANCELLATION);
// flink-conf.yamlexecution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION</pre><h2>How Many Checkpoints to Keep</h2><pre># Number of completed checkpoints to retain (default: 1)state.checkpoints.num-retained: 3</pre><div class="diagram">With num-retained=3:
chk-1 chk-2 chk-3 chk-4 chk-5^ current| |+-- subsumed --+ |(cleaned up) retained: chk-3, chk-4, chk-5</div><h2>Recovery from Externalized Checkpoint</h2><pre># Resume from externalized checkpoint$ flink run -s hdfs:///flink/checkpoints/&lt;job-id&gt;/chk-102 myJob.jar</pre><div class="real"><strong>Real-world:</strong> Always set <code>RETAIN_ON_CANCELLATION</code> and <code>num-retained: 3</code> in production. This gives you a safety net for manual recovery and the ability to roll back to an older checkpoint if the latest one has issues.</div>`},
{m:7,t:"Operational Best Practices",c:`<h1>Operational Best Practices</h1><h2>1. Always Set Operator UIDs</h2><pre>stream.keyBy(e -&gt; e.key).process(new MyFunction()).uid("my-processor").name("My Processor");</pre><h2>2. Use Native Format for Speed, Canonical for Portability</h2><pre>$ flink savepoint --type native &lt;jobId&gt; hdfs:///savepoints # faster$ flink savepoint --type canonical &lt;jobId&gt; hdfs:///savepoints # portable</pre><h2>3. Test Savepoint Compatibility Before Upgrades</h2><ol><li>Take savepoint from production job</li><li>Deploy new code to staging</li><li>Restore from savepoint on staging</li><li>Verify correct behavior</li><li>Deploy to production with confidence</li></ol><h2>4. Monitor Checkpoint Health</h2><ul><li><code>lastCheckpointDuration</code> &mdash; trending up indicates growing state or backpressure</li><li><code>lastCheckpointSize</code> &mdash; monitors state growth</li><li><code>numberOfFailedCheckpoints</code> &mdash; alert on persistent failures</li><li><code>numberOfInProgressCheckpoints</code> &mdash; should rarely exceed max concurrent setting</li></ul><h2>5. Configure Failure Tolerance</h2><pre># Allow up to 10 consecutive failures before failing the jobexecution.checkpointing.tolerable-failed-checkpoints: 10</pre><h2>6. Manage Savepoint Storage</h2><p>Savepoints are <strong>never</strong> automatically deleted. Establish a retention policy and automate cleanup with a cron job or lifecycle policy.</p><div class="warn"><strong>Caution:</strong> Flink 2.2 supports a separate checkpoint interval during backlog processing (<code>baseIntervalDuringBacklog</code>). Consider more frequent checkpoints during catch-up to limit re-processing on failure.</div>`},
{m:8,t:"What is a State Backend?",c:`<h1>State Backends &amp; Checkpoint Storage</h1><h2>What is a State Backend?</h2><p>A State Backend defines <strong>how</strong> working state is stored and organized on TaskManagers during execution. It is a factory that creates the keyed state backend and operator state backend for each operator subtask.</p><pre>@PublicEvolvingpublic interface StateBackend extends java.io.Serializable {&lt;K&gt; CheckpointableKeyedStateBackend&lt;K&gt; createKeyedStateBackend(...);
@Experimental // NEW in Flink 2.xdefault &lt;K&gt; AsyncKeyedStateBackend&lt;K&gt; createAsyncKeyedStateBackend(...);
default boolean supportsAsyncKeyedStateBackend() { return false; }
OperatorStateBackend createOperatorStateBackend(...);default boolean useManagedMemory() { return false; }}</pre><h2>State Backend vs Checkpoint Storage (Orthogonal!)</h2><div class="diagram">State Backend (WHERE state lives DURING execution):HashMapStateBackend &rarr; JVM heapEmbeddedRocksDBStateBackend &rarr; Local disk (RocksDB)ForStStateBackend &rarr; Local disk + remote storage
Checkpoint Storage (WHERE snapshots are PERSISTED):JobManagerCheckpointStorage &rarr; JM memory (testing)FileSystemCheckpointStorage &rarr; HDFS, S3, GCS (production)
Any state backend can use any checkpoint storage!</div><div class="note"><strong>Key insight:</strong> State backend and checkpoint storage are orthogonal. The state backend optimizes for access speed during execution; checkpoint storage optimizes for durability. Choose each independently.</div>`},
{m:8,t:"HashMapStateBackend: In-Memory, JVM Heap",c:`<h1>HashMapStateBackend</h1><h2>Architecture</h2><div class="diagram">TaskManager JVM Heap+----------------------------------------------+| HeapKeyedStateBackend || || CopyOnWriteStateTable (one per state) || CopyOnWriteStateMap (one per key-group) || HashMap&lt;K, V&gt; with COW snapshot support || || HeapPriorityQueueSet (timers) |+----------------------------------------------+</div><h2>Snapshot Mechanism: Copy-on-Write</h2><p>During checkpoints, modifications use copy-on-write to avoid corrupting the snapshot being read by the async snapshot thread.</p><h2>Characteristics</h2><table><tr><th>Property</th><th>Value</th></tr><tr><td>State location</td><td>JVM heap (on-heap)</td></tr><tr><td>Access speed</td><td>Nanoseconds (direct object access)</td></tr><tr><td>Serialization</td><td>Only during checkpointing</td></tr><tr><td>Max state size</td><td>Limited by JVM heap (~1-5 GB)</td></tr><tr><td>Checkpoint type</td><td>Always full (no incremental)</td></tr><tr><td>GC pressure</td><td>High for large state</td></tr><tr><td>Async state access</td><td>Not supported</td></tr></table><pre>state.backend.type: hashmap</pre><div class="warn"><strong>Caution:</strong> No incremental checkpoints &mdash; every checkpoint serializes <em>all</em> state. Large heaps cause long GC pauses. Use only when state fits comfortably in memory (&lt; 1-5 GB per TaskManager).</div>`},
{m:8,t:"EmbeddedRocksDBStateBackend: Local Disk, LSM-Tree",c:`<h1>EmbeddedRocksDBStateBackend</h1><h2>Architecture</h2><div class="diagram">TaskManager+----------------------------------------------------------+| RocksDBKeyedStateBackend || || RocksDB Instance (native C++) || ColumnFamily per state descriptor || || LSM-Tree structure: || +----------------------+ &larr; MemTable (RAM) || | Level 0: SST files | &larr; Flush from mem || | Level 1: SST files | || | Level 2: SST files | &larr; Compaction || +----------------------+ || Write: MemTable &rarr; L0 &rarr; L1 &rarr; ... &rarr; Ln || Read: MemTable &rarr; L0 &rarr; L1 (bloom filters skip) |+----------------------------------------------------------+</div><h2>Characteristics</h2><table><tr><th>Property</th><th>Value</th></tr><tr><td>State location</td><td>Local SSD/disk (RocksDB)</td></tr><tr><td>Access speed</td><td>Microseconds (serialization + disk I/O)</td></tr><tr><td>Serialization</td><td>On every read/write (not just checkpoints)</td></tr><tr><td>Max state size</td><td>Limited by local disk + remote storage</td></tr><tr><td>Checkpoint type</td><td>Full or <strong>incremental</strong></td></tr><tr><td>GC pressure</td><td>Low (state is off-heap in native memory)</td></tr><tr><td>Managed memory</td><td>Used for block cache + write buffers</td></tr></table><pre>state.backend.type: rocksdbstate.backend.incremental: true # highly recommendedtaskmanager.memory.managed.fraction: 0.4</pre><div class="tip"><strong>Tip:</strong> Always enable incremental checkpoints with RocksDB. This is the single most impactful configuration for large-state jobs &mdash; it can reduce checkpoint I/O by 10x or more.</div>`},
{m:8,t:"RocksDB Incremental Checkpoints",c:`<h1>Incremental Checkpoints</h1><h2>Full vs Incremental</h2><div class="diagram">Full Checkpoint: Incremental Checkpoint:
Checkpoint 1: [########] 1 GB Checkpoint 1: [########] 1 GB (base)Checkpoint 2: [########] 1 GB Checkpoint 2: [##] 200 MB (delta)Checkpoint 3: [########] 1 GB Checkpoint 3: [#] 100 MB (delta)
Total I/O: 3 GB Total I/O: 1.3 GB</div><h2>How It Works</h2><p>RocksDB SST files are <strong>immutable</strong> once flushed to disk. Incremental checkpoints exploit this:</p><ul><li>New SST files since checkpoint N-1 &rarr; upload to checkpoint storage</li><li>Previously uploaded SST files &rarr; reference via <code>SharedStateRegistry</code></li><li>Metadata: list of all SST files comprising the full state</li></ul><div class="diagram">Checkpoint Storage (HDFS/S3):
shared/+-- sst-001.sst (uploaded at chk-1)+-- sst-002.sst (uploaded at chk-1)+-- sst-003.sst (uploaded at chk-2, new)+-- sst-004.sst (uploaded at chk-3, new)
chk-3/_metadatareferences: sst-001, sst-002, sst-003, sst-004
SharedStateRegistry tracks reference counts:sst-001 &rarr; refcount=3 (chk-1, chk-2, chk-3)sst-004 &rarr; refcount=1 (chk-3 only)
When chk-1 is subsumed:sst-001 refcount &rarr; 2 (still alive)</div><div class="note"><strong>Key insight:</strong> The <code>SharedStateRegistry</code> tracks reference counts for shared SST files. Files are only deleted when no remaining checkpoint references them. This is why <code>state.checkpoints.num-retained</code> affects disk usage.</div>`},
{m:8,t:"ForSt State Backend (Flink 2.2)",c:`<h1>NEW: ForSt State Backend</h1><h2>What is ForSt?</h2><p><strong>ForSt</strong> (Fork of RocksDB for Streaming) is Flink&rsquo;s custom fork of RocksDB, designed specifically for streaming workloads. Introduced in Flink 2.2 as <code>@Experimental</code>.</p><h2>Key Differences from RocksDB</h2><table><tr><th>Aspect</th><th>EmbeddedRocksDB</th><th>ForSt</th></tr><tr><td>Remote storage</td><td>No (local disk only)</td><td>Yes (HDFS/S3 as primary)</td></tr><tr><td>Async state access</td><td>No</td><td>Yes (<code>ForStStateExecutor</code>)</td></tr><tr><td>Operation batching</td><td>None</td><td>WriteBatch, MultiGet</td></tr><tr><td>Library</td><td><code>org.rocksdb</code></td><td><code>org.forstdb</code></td></tr><tr><td>Stability</td><td><code>@PublicEvolving</code></td><td><code>@Experimental</code></td></tr></table><h2>Async State Access Model</h2><div class="diagram">Traditional (RocksDB): ForSt Async Model:processElement(e) { processElement(e) {val = state.get(); &larr; SYNC future = state.get(); &larr; ASYNC// blocked until // returns immediately// JNI returns future.thenAccept(v &rarr;state.put(newVal); state.put(newVal));} }
ForSt batches requests:get(k1), get(k2), put(k3,v3) &rarr; classified into:ForStGeneralMultiGetOperation: [get(k1), get(k2)]ForStWriteBatchOperation: [put(k3,v3)]Executed as batched JNI calls &rarr; fewer JNI crossings</div><pre>state.backend.type: forststate.backend.forst.remote-dir: hdfs:///flink/forst-statestate.backend.incremental: true</pre><div class="warn"><strong>Caution:</strong> ForSt is <code>@Experimental</code> in Flink 2.2. Evaluate thoroughly in staging before production use. Its async model requires adapting operator code to handle futures.</div>`},
{m:8,t:"Choosing the Right State Backend",c:`<h1>Decision Matrix</h1><h2>Choosing the Right State Backend</h2><div class="diagram">START|vIs state &lt; 1-2 GB per TM?|+-- YES &rarr; HashMapStateBackend| Fastest access, simplest to operate| Full checkpoints only|+-- NO &rarr; Is state &lt; local disk capacity?|+-- YES &rarr; Need async state access?| +-- YES &rarr; ForStStateBackend (@Experimental)| +-- NO &rarr; EmbeddedRocksDBStateBackend| Battle-tested, incremental CPs|+-- NO &rarr; ForStStateBackendRemote storage as primary</div><h2>Quick Comparison</h2><table><tr><th></th><th>HashMapStateBackend</th><th>EmbeddedRocksDB</th><th>ForStStateBackend</th></tr><tr><td>State in</td><td>JVM Heap</td><td>Local Disk</td><td>Local + Remote</td></tr><tr><td>Access latency</td><td>~ns</td><td>~us</td><td>~us (async)</td></tr><tr><td>Max state</td><td>~GB</td><td>~TB</td><td>~TB+</td></tr><tr><td>Incremental CP</td><td>No</td><td>Yes</td><td>Yes</td></tr><tr><td>Async access</td><td>No</td><td>No</td><td>Yes</td></tr><tr><td>GC pressure</td><td>High</td><td>Low</td><td>Low</td></tr><tr><td>Ser/Deser</td><td>Checkpoint only</td><td>Every access</td><td>Every access</td></tr><tr><td>Stability</td><td>Stable</td><td>Stable</td><td>Experimental</td></tr></table><div class="real"><strong>Real-world:</strong> For most production workloads, <code>EmbeddedRocksDBStateBackend</code> with incremental checkpoints is the right choice. It handles state sizes from megabytes to terabytes with predictable performance.</div>`},
{m:8,t:"RocksDB Tuning & Configuration",c:`<h1>RocksDB Tuning</h1><h2>Key Configuration Options</h2><pre># Enable incremental checkpoints (highly recommended)state.backend.incremental: true
# Managed memory for RocksDB (block cache + write buffers)taskmanager.memory.managed.fraction: 0.4
# Write buffers (MemTables)state.backend.rocksdb.writebuffer.count: 2state.backend.rocksdb.writebuffer.size: 64mb
# Block cache (if not using managed memory)state.backend.rocksdb.block.cache-size: 256mb
# Bloom filters for point lookupsstate.backend.rocksdb.bloom-filter.bits-per-key: 10
# Compaction and background threadsstate.backend.rocksdb.compaction.style: LEVELstate.backend.rocksdb.thread.num: 4</pre><h2>Custom RocksDBOptionsFactory</h2><pre>public class MyRocksDBOptionsFactory implements ConfigurableRocksDBOptionsFactory {public DBOptions createDBOptions(DBOptions opts, ...) {return opts.setMaxBackgroundJobs(4).setMaxOpenFiles(-1);}public ColumnFamilyOptions createColumnOptions(ColumnFamilyOptions opts, ...) {return opts.setCompactionStyle(CompactionStyle.LEVEL).setLevelCompactionDynamicLevelBytes(true);}}</pre><div class="tip"><strong>Tip:</strong> The most impactful tuning knobs are: (1) enable incremental checkpoints, (2) set managed memory fraction appropriately, (3) enable bloom filters for ValueState-heavy workloads, (4) increase write buffer count if you see frequent stalls.</div>`},
{m:8,t:"Local Recovery & Best Practices",c:`<h1>Local Recovery</h1><h2>The Problem</h2><p>Without local recovery, every restart must download the full state from checkpoint storage (HDFS/S3). For terabytes of state, this can take minutes.</p><h2>How Local Recovery Works</h2><div class="diagram">During Checkpointing:State Backend+--&rarr; Primary: Upload to HDFS/S3 (durable)+--&rarr; Secondary: Write to local disk (fast recovery)
During Recovery (PrioritizedOperatorSubtaskState):Priority 1: Local state (same TM, same slot) &rarr; FASTPriority 2: Remote state (HDFS/S3) &rarr; SLOW
Recovery comparison (10 GB state, S3):Without local recovery: ~60 seconds (download from S3)With local recovery: ~2 seconds (read local)30x faster recovery!</div><pre># Enable local recoverystate.backend.local-recovery: true
# Local state directory (use fast local SSD)taskmanager.state.local.root-dirs: /ssd/flink-local-recovery</pre><h2>Best Practices Summary</h2><ul><li>Use fast local SSDs for the local recovery directory</li><li>Ensure sufficient disk space &mdash; local copies double disk usage</li><li>Combine with sticky scheduling for tasks to restart on the same TM</li><li>Most beneficial with large state + incremental checkpoints</li></ul><h2>Key Takeaways for State Backends</h2><ol><li><strong>HashMapStateBackend</strong> &mdash; fastest, limited by JVM heap, for small state</li><li><strong>EmbeddedRocksDBStateBackend</strong> &mdash; production workhorse, always enable incremental CPs</li><li><strong>ForStStateBackend</strong> &mdash; new in Flink 2.2, async + remote, still experimental</li><li><strong>Local recovery</strong> &mdash; 30x faster restarts, enable for large-state production jobs</li></ol><div class="real"><strong>Real-world:</strong> Enable local recovery (<code>state.backend.local-recovery: true</code>) for any job with more than a few GB of state. The difference between a 60-second and a 2-second recovery can be the difference between an invisible blip and a customer-facing incident.</div>`},{m:9,t:"Dynamic Tables &mdash; The Core Abstraction",c:`<h1>M9: Table API &amp; SQL</h1><h2>Dynamic Tables &mdash; The Core Abstraction</h2><p>In Flink 2.2, every table is a <strong>Dynamic Table</strong> &mdash; a logical representation of a continuously changing data set. Unlike static tables in traditional databases, dynamic tables evolve over time.</p><h3>The Changelog Mental Model</h3><table><tr><th>RowKind</th><th>Symbol</th><th>Meaning</th></tr><tr><td>INSERT</td><td>+I</td><td>A new row is inserted</td></tr><tr><td>UPDATE_BEFORE</td><td>-U</td><td>The previous value before update</td></tr><tr><td>UPDATE_AFTER</td><td>+U</td><td>The new value after update</td></tr><tr><td>DELETE</td><td>-D</td><td>A row is deleted/retracted</td></tr></table><div class="diagram">Source Stream: +I(Alice,100), +I(Bob,200), +I(Alice,50)|Dynamic Table|After GROUP BY: +I(Alice,100), +I(Bob,200), -U(Alice,100), +U(Alice,150)</div><ul><li><strong>Append-only tables</strong> &mdash; Only INSERT operations (e.g., raw Kafka event streams)</li><li><strong>Updating tables</strong> &mdash; Contain UPDATE and DELETE operations (e.g., aggregation results). Require a primary key.</li></ul><div class="note"><strong>Key insight:</strong> Every SQL query on a dynamic table produces another dynamic table. The result is not static &mdash; it evolves as input changes.</div>`},
{m:9,t:"TableEnvironment &mdash; The Entry Point",c:`<h1>TableEnvironment &mdash; The Entry Point</h1><p>The <code>TableEnvironment</code> is the central context for all Table API and SQL programs in Flink 2.2.</p><h3>Creating a TableEnvironment</h3><pre>// Pure Table API (no DataStream interop)TableEnvironment tEnv = TableEnvironment.create(EnvironmentSettings.newInstance().inStreamingMode().build());
// Bridge to DataStream APIStreamExecutionEnvironment env =StreamExecutionEnvironment.getExecutionEnvironment();StreamTableEnvironment tEnv = StreamTableEnvironment.create(env);</pre><h3>Key Configuration Options</h3><table><tr><th>Configuration Key</th><th>Default</th><th>Description</th></tr><tr><td>table.exec.state.ttl</td><td>0 ms</td><td>State time-to-live for streaming queries</td></tr><tr><td>table.exec.mini-batch.enabled</td><td>false</td><td>Enable mini-batch optimization</td></tr><tr><td>table.exec.mini-batch.allow-latency</td><td>0 ms</td><td>Maximum latency for mini-batch</td></tr><tr><td>table.exec.mini-batch.size</td><td>-1</td><td>Maximum records in mini-batch</td></tr><tr><td>table.optimizer.agg-phase-strategy</td><td>AUTO</td><td>AUTO, ONE_PHASE, TWO_PHASE</td></tr></table><pre>tEnv.getConfig().set("table.exec.state.ttl", "24 h");tEnv.getConfig().set("table.exec.mini-batch.enabled", "true");tEnv.getConfig().set("table.exec.mini-batch.allow-latency", "5 s");tEnv.getConfig().set("table.exec.mini-batch.size", "1000");</pre><div class="tip"><strong>Tip:</strong> Use <code>StreamTableEnvironment</code> when you need to mix DataStream and Table API in the same job. Use plain <code>TableEnvironment</code> for pure SQL workloads.</div>`},
{m:9,t:"SQL DDL &mdash; CREATE TABLE, Computed &amp; Metadata Columns",c:`<h1>SQL DDL &mdash; CREATE TABLE</h1><h3>Full CREATE TABLE with All Column Types</h3><pre>CREATE TABLE orders (-- Physical columns (stored in external system)order_id BIGINT,product_id BIGINT,amount DECIMAL(10, 2),order_time TIMESTAMP(3),
-- Computed columns (derived at query time)total_cents AS amount * 100,order_date AS CAST(order_time AS DATE),
-- Metadata columns (from connector metadata)kafka_topic STRING METADATA FROM 'topic' VIRTUAL,kafka_offset BIGINT METADATA FROM 'offset' VIRTUAL,
-- Watermark definitionWATERMARK FOR order_time AS order_time - INTERVAL '5' SECOND,
-- Primary key (NOT ENFORCED &mdash; Flink does not enforce it)PRIMARY KEY (order_id) NOT ENFORCED) WITH ('connector' = 'kafka','topic' = 'orders','properties.bootstrap.servers' = 'kafka:9092','format' = 'json','json.ignore-parse-errors' = 'true');</pre><h3>Column Types</h3><table><tr><th>Column Type</th><th>Description</th></tr><tr><td><strong>Physical</strong></td><td>Standard columns mapped to fields in the external format</td></tr><tr><td><strong>Computed</strong></td><td>Virtual columns via SQL expressions (AS keyword), evaluated at query time</td></tr><tr><td><strong>Metadata</strong></td><td>Access connector metadata (e.g., Kafka topic, offset, timestamp). VIRTUAL = read-only</td></tr></table><div class="note"><strong>Key insight:</strong> PRIMARY KEY (... ) NOT ENFORCED is a hint to the optimizer for upsert behavior. Flink never enforces uniqueness &mdash; that is the responsibility of the external system.</div>`},
{m:9,t:"SQL DML &mdash; INSERT INTO &amp; Statement Sets",c:`<h1>SQL DML &mdash; Multi-Sink Pipelines</h1><h3>Simple INSERT INTO</h3><pre>INSERT INTO output_tableSELECT order_id, product_id, amountFROM ordersWHERE amount &gt; 100.00;</pre><h3>Statement Sets (Multi-Sink)</h3><p>A <code>StatementSet</code> allows multiple INSERT statements to be optimized and executed as a <strong>single Flink job</strong>.</p><pre>StatementSet stmtSet = tEnv.createStatementSet();
stmtSet.addInsertSql("INSERT INTO big_orders SELECT * FROM orders WHERE amount &gt; 1000");stmtSet.addInsertSql("INSERT INTO small_orders SELECT * FROM orders WHERE amount &lt;= 1000");
// Execute all as one optimized jobstmtSet.execute();</pre><pre>-- SQL Client syntaxBEGIN STATEMENT SET;INSERT INTO big_orders SELECT * FROM orders WHERE amount &gt; 1000;INSERT INTO small_orders SELECT * FROM orders WHERE amount &lt;= 1000;END;</pre><h3>Benefits of Statement Sets</h3><ol><li><strong>Source sharing</strong> &mdash; The source is read only once, not twice</li><li><strong>Optimized plan</strong> &mdash; The planner merges subgraphs where possible</li><li><strong>Single job</strong> &mdash; All sinks are submitted as one Flink job</li></ol><div class="real"><strong>Real-world:</strong> Statement sets are essential for fan-out ETL patterns where you split one source into multiple sinks (e.g., routing orders by size, region, or priority).</div>`},
{m:9,t:"SQL Windowing &mdash; Table-Valued Functions",c:`<h1>SQL Windowing &mdash; TVFs</h1><p>Flink 2.2 uses <strong>Table-Valued Functions (TVFs)</strong> for windowing &mdash; more powerful than the legacy GROUP BY WINDOW syntax.</p><h3>TUMBLE (Fixed, Non-overlapping)</h3><pre>SELECT window_start, window_end, user_id,COUNT(*) AS event_count, SUM(amount) AS totalFROM TABLE(TUMBLE(TABLE orders, DESCRIPTOR(order_time), INTERVAL '10' MINUTES))GROUP BY window_start, window_end, user_id;</pre><h3>HOP (Sliding)</h3><pre>SELECT window_start, window_end, user_id, AVG(amount) AS avg_amountFROM TABLE(HOP(TABLE orders, DESCRIPTOR(order_time),INTERVAL '5' MINUTES, INTERVAL '10' MINUTES))GROUP BY window_start, window_end, user_id;</pre><h3>CUMULATE (Expanding within a period)</h3><pre>-- Step=1 hour, max=1 day &rarr; windows: [00:00,01:00), [00:00,02:00), ... [00:00,24:00)SELECT window_start, window_end, product_id,SUM(amount) AS cumulative_salesFROM TABLE(CUMULATE(TABLE orders, DESCRIPTOR(order_time),INTERVAL '1' HOUR, INTERVAL '1' DAY))GROUP BY window_start, window_end, product_id;</pre><h3>TVF Parameter Reference</h3><table><tr><th>TVF</th><th>Parameters</th><th>Description</th></tr><tr><td>TUMBLE</td><td>(TABLE t, DESCRIPTOR(col), size)</td><td>Fixed non-overlapping</td></tr><tr><td>HOP</td><td>(TABLE t, DESCRIPTOR(col), slide, size)</td><td>Fixed overlapping</td></tr><tr><td>CUMULATE</td><td>(TABLE t, DESCRIPTOR(col), step, max)</td><td>Expanding within max</td></tr><tr><td>SESSION</td><td>(TABLE t PARTITION BY k, DESCRIPTOR(col), gap)</td><td>Gap-based sessions</td></tr></table>`},
{m:9,t:"Temporal Joins &mdash; Versioned &amp; Lookup",c:`<h1>Temporal Joins</h1><h3>Versioned Table Join (Event-Time)</h3><p>Correlates each probe row with the version of the build side that was current at the probe row's event time.</p><pre>-- Currency rates as a versioned table (CDC)CREATE TABLE currency_rates (currency STRING,rate DECIMAL(10, 6),update_time TIMESTAMP(3),WATERMARK FOR update_time AS update_time - INTERVAL '5' SECOND,PRIMARY KEY (currency) NOT ENFORCED) WITH ('connector'='kafka', 'format'='debezium-json', ...);
-- Temporal join: get rate valid at order_timeSELECT o.order_id, o.amount, r.rate,o.amount * r.rate AS converted_amountFROM orders AS oJOIN currency_rates FOR SYSTEM_TIME AS OF o.order_time AS rON o.currency = r.currency;</pre><h3>Lookup Join (Processing-Time)</h3><p>Queries an external system (JDBC, HBase) at processing time for each incoming record.</p><pre>SELECT o.order_id, o.amount, p.name AS product_name, p.categoryFROM orders AS oJOIN product_dim FOR SYSTEM_TIME AS OF o.proc_time AS pON o.product_id = p.product_id;</pre><h3>Async Lookup with Table Hints</h3><pre>SELECT /*+ LOOKUP('table'='p', 'async'='true','timeout'='300s', 'capacity'='1000') */o.order_id, p.nameFROM orders AS oJOIN product_dim FOR SYSTEM_TIME AS OF o.proc_time AS pON o.product_id = p.product_id;</pre><div class="warn"><strong>Caution:</strong> Versioned joins require both a PRIMARY KEY and a WATERMARK on the build side. Without these, the join cannot determine the correct version.</div>`},
{m:9,t:"Over Windows &amp; Window Top-N",c:`<h1>Over Windows &amp; Window Top-N</h1><h3>Row-Count Based Over Window</h3><pre>SELECT user_id, amount,AVG(amount) OVER (PARTITION BY user_id ORDER BY order_timeROWS BETWEEN 10 PRECEDING AND CURRENT ROW) AS avg_last_10FROM orders;</pre><h3>Time-Range Based Over Window</h3><pre>SELECT user_id, order_time, amount,SUM(amount) OVER (PARTITION BY user_id ORDER BY order_timeRANGE BETWEEN INTERVAL '1' HOUR PRECEDING AND CURRENT ROW) AS hourly_sumFROM orders;</pre><h3>Window Top-N Pattern</h3><pre>-- Top 3 products by revenue per 1-hour windowSELECT *FROM (SELECT window_start, window_end, product_id,SUM(amount) AS revenue,ROW_NUMBER() OVER (PARTITION BY window_start, window_endORDER BY SUM(amount) DESC) AS rnFROM TABLE(TUMBLE(TABLE orders, DESCRIPTOR(order_time), INTERVAL '1' HOUR))GROUP BY window_start, window_end, product_id)WHERE rn &lt;= 3;</pre><div class="tip"><strong>Tip:</strong> Window Top-N combines windowed aggregation with ranking. The optimizer produces an efficient single-pass plan rather than materializing the full aggregation first.</div>`},
{m:9,t:"Table API Java DSL",c:`<h1>Table API &mdash; Java DSL</h1><p>The Table API provides a fluent, type-safe Java DSL as an alternative to SQL strings.</p><h3>Basic Operations</h3><pre>import static org.apache.flink.table.api.Expressions.*;
Table orders = tEnv.from("orders");
// Select and renameTable projected = orders.select($("order_id"), $("amount"),$("order_time").as("ts"));
// FilterTable filtered = orders.filter($("amount").isGreater(100));
// GroupBy AggregationTable aggResult = orders.groupBy($("product_id")).select($("product_id"),$("amount").sum().as("total_amount"),$("order_id").count().as("order_count"));</pre><h3>Joins</h3><pre>// Inner joinTable joined = orders.join(products).where($("product_id").isEqual(products.$("id"))).select($("order_id"), $("name"), $("amount"));</pre><h3>Window Aggregation (Table API)</h3><pre>Table tumbleResult = orders.window(Tumble.over(lit(10).minutes()).on($("order_time")).as("w")).groupBy($("w"), $("user_id")).select($("user_id"),$("w").start().as("window_start"),$("amount").sum().as("total"));</pre><h3>Executing Results</h3><pre>orders.execute().print(); // Dev onlyorders.executeInsert("output_table"); // Write to sink</pre><div class="note"><strong>Key insight:</strong> The Table API and SQL share the same optimizer and runtime. You can freely mix them &mdash; convert a SQL result to a Table object and chain Table API operations, or vice versa.</div>`},
{m:9,t:"User-Defined Functions &mdash; UDFs",c:`<h1>User-Defined Functions</h1><h3>ScalarFunction (1 row &rarr; 1 value)</h3><pre>public class HashFunction extends ScalarFunction {public int eval(String s) {return s == null ? 0 : s.hashCode();}}
// Register and usetEnv.createTemporaryFunction("hash_fn", HashFunction.class);tEnv.sqlQuery("SELECT hash_fn(name) FROM users");</pre><h3>TableFunction (1 row &rarr; N rows)</h3><pre>public class SplitFunction extends TableFunction&lt;Row&gt; {public void eval(String str) {for (String s : str.split(",")) {collect(Row.of(s.trim()));}}}
// SQL usage with LATERAL TABLEtEnv.sqlQuery("SELECT o.id, t.word FROM orders AS o, " +"LATERAL TABLE(split_fn(o.tags)) AS t(word)");</pre><h3>AggregateFunction (N rows &rarr; 1 value)</h3><pre>public class WeightedAvg extends AggregateFunction&lt;Long, WeightedAvgAccum&gt; {public void accumulate(WeightedAvgAccum acc, long value, int weight) {acc.sum += value * weight;acc.count += weight;}public Long getValue(WeightedAvgAccum acc) {return acc.count == 0 ? null : acc.sum / acc.count;}// retract(), merge() for streaming retractions}</pre><div class="warn"><strong>Caution:</strong> AggregateFunction for streaming must implement <code>retract()</code> to support UPDATE_BEFORE messages. Without it, queries that produce retractions will fail at runtime.</div>`},
{m:9,t:"DataStream &harr; Table Conversion",c:`<h1>DataStream &harr; Table Conversion</h1><h3>DataStream &rarr; Table</h3><pre>StreamTableEnvironment tEnv = StreamTableEnvironment.create(env);
// From DataStream to Table with schema mappingDataStream&lt;Order&gt; orderStream = ...;Table orderTable = tEnv.fromDataStream(orderStream,Schema.newBuilder().column("orderId", DataTypes.BIGINT()).column("amount", DataTypes.DECIMAL(10, 2)).column("eventTime", DataTypes.TIMESTAMP_LTZ(3)).watermark("eventTime", "eventTime - INTERVAL '5' SECOND").build());</pre><h3>Table &rarr; DataStream</h3><pre>// Append-only table &rarr; DataStreamDataStream&lt;Row&gt; appendStream = tEnv.toDataStream(resultTable);
// Changelog table &rarr; DataStream (includes +I, -U, +U, -D)DataStream&lt;Row&gt; changelogStream = tEnv.toChangelogStream(resultTable);</pre><div class="diagram">DataStream ──fromDataStream()──&rarr; Table ──SQL/Table API──&rarr; Table^ || |+────────── toDataStream() / toChangelogStream() ───────────+</div><div class="real"><strong>Real-world:</strong> The DataStream bridge is essential when you need to combine Table API SQL transformations with low-level ProcessFunction logic (e.g., complex event detection after SQL enrichment).</div>`},
{m:10,t:"FLIP-27 Source Architecture",c:`<h1>M10: Connectors &amp; Data Formats</h1><h2>FLIP-27 Source Architecture</h2><p>Flink 2.2 uses the FLIP-27 Source API for all connectors. It separates <strong>split discovery</strong> from <strong>data reading</strong>.</p><div class="diagram">+-------------------------------+| JobManager || +---------------------+ || | SplitEnumerator | | Discovers &amp; assigns splits| | (runs on JM) | || +----------+----------+ |+--------------|---------------+| assigns splits+--------------v---------------+| TaskManagers || +----------+ +----------+ || |SourceReader| |SourceReader| | Reads data from splits| |(TM slot) | |(TM slot) | || +----------+ +----------+ |+------------------------------+</div><h3>Source Interface (Type Parameters)</h3><table><tr><th>Parameter</th><th>Role</th><th>Example</th></tr><tr><td>T</td><td>Record type produced</td><td>String, RowData</td></tr><tr><td>SplitT</td><td>Unit of work</td><td>KafkaPartitionSplit, FileSourceSplit</td></tr><tr><td>EnumChkT</td><td>Enumerator checkpoint state</td><td>Collection&lt;SplitT&gt;</td></tr></table><h3>Key Responsibilities</h3><ul><li><strong>SplitEnumerator</strong> (JobManager) &mdash; discovers splits, assigns to readers, checkpoints state</li><li><strong>SourceReader</strong> (TaskManager) &mdash; reads data from assigned splits, checkpoints offsets</li><li><strong>SourceReaderBase</strong> &mdash; convenience base class handling split fetcher threads and record emitting</li></ul><div class="note"><strong>Key insight:</strong> FLIP-27 unifies batch and streaming sources. The same KafkaSource can run in streaming (unbounded) or batch (bounded) mode by setting <code>setBounded(OffsetsInitializer.latest())</code>.</div>`},
{m:10,t:"Sink API &amp; Two-Phase Commit",c:`<h1>Sink API &amp; Exactly-Once Semantics</h1><h3>Sink Interface</h3><pre>public interface Sink&lt;InputT&gt; extends Serializable {SinkWriter&lt;InputT&gt; createWriter(InitContext context);}
public interface SinkWriter&lt;InputT&gt; extends AutoCloseable {void write(InputT element, Context context);void flush(boolean endOfInput);}</pre><h3>Two-Phase Commit for Exactly-Once</h3><pre>public interface TwoPhaseCommittingSink&lt;InputT, CommT&gt; extends Sink&lt;InputT&gt; {PrecommittingSinkWriter&lt;InputT, CommT&gt; createWriter(InitContext ctx);Committer&lt;CommT&gt; createCommitter(CommitterInitContext ctx);SimpleVersionedSerializer&lt;CommT&gt; getCommittableSerializer();}</pre><div class="diagram">Writer: write(record) &rarr; write(record) &rarr; ... &rarr; [checkpoint barrier]|Phase 1: prepareCommit() |returns List&lt;CommT&gt; ────────────────────────────────+|[Checkpoint completes on all subtasks] ||Phase 2: Committer.commit(List&lt;CommT&gt;) |Finalizes the transaction v</div><table><tr><th>Guarantee</th><th>Mechanism</th><th>Requirement</th><th>Overhead</th></tr><tr><td>NONE</td><td>Fire-and-forget</td><td>None</td><td>Lowest</td></tr><tr><td>AT_LEAST_ONCE</td><td>Flush on checkpoint</td><td>None</td><td>Low</td></tr><tr><td>EXACTLY_ONCE</td><td>2PC / transactions</td><td>Transactional sink</td><td>Highest</td></tr></table><div class="warn"><strong>Caution:</strong> Exactly-once sinks hold transactions open across checkpoints. Set <code>transaction.timeout.ms</code> higher than the checkpoint interval to prevent premature timeouts.</div>`},
{m:10,t:"Kafka Connector &mdash; DataStream API",c:`<h1>Kafka Connector &mdash; DataStream API</h1><h3>KafkaSource Builder</h3><pre>KafkaSource&lt;String&gt; source = KafkaSource.&lt;String&gt;builder().setBootstrapServers("kafka:9092").setTopics("input-topic").setGroupId("my-consumer-group").setStartingOffsets(OffsetsInitializer.earliest()).setValueOnlyDeserializer(new SimpleStringSchema()).build();
DataStream&lt;String&gt; stream = env.fromSource(source,WatermarkStrategy.forBoundedOutOfOrderness(Duration.ofSeconds(5)),"Kafka Source");</pre><h3>Offset Initialization Options</h3><table><tr><th>Method</th><th>Description</th></tr><tr><td>OffsetsInitializer.earliest()</td><td>Start from earliest available offset</td></tr><tr><td>OffsetsInitializer.latest()</td><td>Start from latest offset</td></tr><tr><td>OffsetsInitializer.committedOffsets()</td><td>Start from last committed offset</td></tr><tr><td>OffsetsInitializer.timestamp(epochMs)</td><td>Start from timestamp</td></tr></table><h3>KafkaSink with Exactly-Once</h3><pre>KafkaSink&lt;String&gt; sink = KafkaSink.&lt;String&gt;builder().setBootstrapServers("kafka:9092").setRecordSerializer(KafkaRecordSerializationSchema.builder().setTopic("output-topic").setValueSerializationSchema(new SimpleStringSchema()).build()).setDeliveryGuarantee(DeliveryGuarantee.EXACTLY_ONCE).setTransactionalIdPrefix("flink-tx-").setProperty("transaction.timeout.ms", "600000").build();</pre><div class="tip"><strong>Tip:</strong> For bounded (batch) Kafka reads, chain <code>.setBounded(OffsetsInitializer.latest())</code> to stop at the latest offset &mdash; the same source works for both streaming and batch.</div>`},
{m:10,t:"Kafka SQL Connector &amp; Upsert-Kafka",c:`<h1>Kafka SQL Connector</h1><h3>Source Table with Metadata</h3><pre>CREATE TABLE kafka_orders (order_id BIGINT,user_id BIGINT,amount DECIMAL(10, 2),order_time TIMESTAMP(3),-- Kafka metadata columns\`topic\` STRING METADATA VIRTUAL,\`partition\` INT METADATA VIRTUAL,\`offset\` BIGINT METADATA VIRTUAL,\`timestamp\` TIMESTAMP_LTZ(3) METADATA,WATERMARK FOR order_time AS order_time - INTERVAL '5' SECOND) WITH ('connector' = 'kafka','topic' = 'orders','properties.bootstrap.servers' = 'kafka:9092','scan.startup.mode' = 'earliest-offset','format' = 'json');</pre><h3>Upsert-Kafka (Changelog Sink)</h3><pre>CREATE TABLE kafka_user_counts (user_id BIGINT,cnt BIGINT,PRIMARY KEY (user_id) NOT ENFORCED) WITH ('connector' = 'upsert-kafka','topic' = 'user-counts','properties.bootstrap.servers' = 'kafka:9092','key.format' = 'json','value.format' = 'json');</pre><h3>Kafka Metadata Columns</h3><table><tr><th>Key</th><th>SQL Type</th><th>Read</th><th>Write</th></tr><tr><td>topic</td><td>STRING</td><td>Yes</td><td>No</td></tr><tr><td>partition</td><td>INT</td><td>Yes</td><td>No</td></tr><tr><td>offset</td><td>BIGINT</td><td>Yes</td><td>No</td></tr><tr><td>timestamp</td><td>TIMESTAMP_LTZ(3)</td><td>Yes</td><td>Yes</td></tr><tr><td>headers</td><td>MAP&lt;STRING, BYTES&gt;</td><td>Yes</td><td>Yes</td></tr></table><div class="note"><strong>Key insight:</strong> Use <code>upsert-kafka</code> when your SQL query produces UPDATE/DELETE messages (e.g., aggregations). Standard <code>kafka</code> sink only supports append (INSERT) mode.</div>`},
{m:10,t:"JDBC Connector &mdash; Source, Sink &amp; Lookup",c:`<h1>JDBC/PostgreSQL Connector</h1><h3>JDBC Source with Lookup Cache</h3><pre>CREATE TABLE product_dim (product_id BIGINT,name STRING,category STRING,price DECIMAL(10, 2),PRIMARY KEY (product_id) NOT ENFORCED) WITH ('connector' = 'jdbc','url' = 'jdbc:postgresql://localhost:5432/mydb','table-name' = 'products','lookup.cache' = 'PARTIAL','lookup.partial-cache.max-rows' = '5000','lookup.partial-cache.expire-after-write' = '10 min','lookup.max-retries' = '3');</pre><h3>JDBC Sink with Upsert &amp; Batching</h3><pre>CREATE TABLE jdbc_order_stats (product_id BIGINT,order_count BIGINT,total_amount DECIMAL(12, 2),PRIMARY KEY (product_id) NOT ENFORCED) WITH ('connector' = 'jdbc','url' = 'jdbc:postgresql://localhost:5432/mydb','table-name' = 'order_stats','sink.buffer-flush.max-rows' = '500','sink.buffer-flush.interval' = '5 s','sink.max-retries' = '3');</pre><div class="diagram">Incoming records|[Buffer: max-rows=500, interval=5s]|Flush triggered when:- Buffer reaches 500 rows, OR- 5 seconds elapsed, OR- Checkpoint barrier arrives|JDBC batch INSERT/UPSERT</div><div class="tip"><strong>Tip:</strong> Tables with a PRIMARY KEY use <strong>upsert</strong> semantics (INSERT ... ON CONFLICT UPDATE). Tables without use <strong>append</strong> (INSERT only).</div>`},
{m:10,t:"Data Formats &mdash; JSON, Avro, Protobuf",c:`<h1>Data Formats</h1><h3>JSON Format</h3><pre>CREATE TABLE json_table (user_id BIGINT,name STRING,address ROW&lt;street STRING, city STRING, zip STRING&gt;,tags ARRAY&lt;STRING&gt;,metadata MAP&lt;STRING, STRING&gt;) WITH ('connector' = 'kafka', 'format' = 'json','json.fail-on-missing-field' = 'false','json.ignore-parse-errors' = 'true','json.timestamp-format.standard' = 'ISO-8601');</pre><h3>Avro with Confluent Schema Registry</h3><pre>CREATE TABLE avro_sr_events (...) WITH ('connector' = 'kafka','format' = 'avro-confluent','avro-confluent.url' = 'http://schema-registry:8081','avro-confluent.subject' = 'events-value');</pre><h3>Protobuf Format</h3><pre>CREATE TABLE proto_events (...) WITH ('connector' = 'kafka','format' = 'protobuf','protobuf.message-class-name' = 'com.example.proto.EventProto$Event');</pre><h3>Format Comparison</h3><table><tr><th>Format</th><th>Schema</th><th>Size</th><th>Speed</th><th>Human-readable</th></tr><tr><td>JSON</td><td>Self-describing</td><td>Large</td><td>Moderate</td><td>Yes</td></tr><tr><td>Avro</td><td>Schema Registry</td><td>Small</td><td>Fast</td><td>No</td></tr><tr><td>Protobuf</td><td>Compiled .proto</td><td>Smallest</td><td>Fastest</td><td>No</td></tr><tr><td>CSV</td><td>Positional</td><td>Medium</td><td>Fast</td><td>Yes</td></tr></table><div class="real"><strong>Real-world:</strong> Use JSON for development and prototyping. Use Avro + Schema Registry for production Kafka pipelines with evolving schemas. Use Protobuf when you already have a gRPC/Protobuf ecosystem.</div>`},
{m:10,t:"Exactly-Once JDBC Sink &amp; XA Transactions",c:`<h1>Exactly-Once JDBC Sink</h1><p>For end-to-end exactly-once delivery to databases, Flink supports XA transactions via <code>JdbcSink.exactlyOnceSink()</code>.</p><h3>DataStream API</h3><pre>// At-least-once JDBC sinkstream.addSink(JdbcSink.sink("INSERT INTO orders (order_id, amount) VALUES (?, ?)",(ps, order) -&gt; {ps.setLong(1, order.getOrderId());ps.setBigDecimal(2, order.getAmount());},JdbcExecutionOptions.builder().withBatchSize(500).withBatchIntervalMs(5000).withMaxRetries(3).build(),new JdbcConnectionOptions.JdbcConnectionOptionsBuilder().withUrl("jdbc:postgresql://localhost:5432/mydb").withDriverName("org.postgresql.Driver").withUsername("flink").withPassword("secret").build()));
// Exactly-once JDBC sink (XA transactions)stream.addSink(JdbcSink.exactlyOnceSink("INSERT INTO orders (order_id, amount) VALUES (?, ?)",(ps, order) -&gt; { ... },JdbcExecutionOptions.builder().withBatchSize(500).build(),JdbcExactlyOnceOptions.builder().withTransactionPerConnection(true).build(),() -&gt; {PGXADataSource xaDs = new PGXADataSource();xaDs.setUrl("jdbc:postgresql://localhost:5432/mydb");return xaDs;}));</pre><div class="warn"><strong>Caution:</strong> XA exactly-once sinks require a database that supports XA transactions (e.g., PostgreSQL, MySQL with XA). SQLite and some managed databases do not support XA. Also, XA transactions hold database locks longer, which may impact other workloads.</div>`},
{m:10,t:"FileSystem Connector &amp; CDC Formats",c:`<h1>FileSystem Connector &amp; CDC</h1><h3>FileSystem Sink (Data Lake)</h3><pre>CREATE TABLE fs_output (user_id BIGINT,amount DECIMAL(10, 2),event_time TIMESTAMP(3),dt STRING,hr STRING) PARTITIONED BY (dt, hr) WITH ('connector' = 'filesystem','path' = 's3://my-bucket/output/','format' = 'parquet','sink.partition-commit.trigger' = 'process-time','sink.partition-commit.delay' = '1 h','sink.partition-commit.policy.kind' = 'success-file','sink.rolling-policy.file-size' = '128MB','sink.rolling-policy.rollover-interval' = '15 min');</pre><h3>CDC Formats &mdash; Debezium &amp; Canal</h3><pre>-- Read CDC events from DebeziumCREATE TABLE cdc_orders (order_id BIGINT,status STRING,amount DECIMAL(10,2),PRIMARY KEY (order_id) NOT ENFORCED) WITH ('connector' = 'kafka','topic' = 'dbserver1.inventory.orders','format' = 'debezium-json','debezium-json.schema-include' = 'true');
-- Read CDC events from Canal (MySQL)CREATE TABLE canal_orders (...) WITH ('connector' = 'kafka','format' = 'canal-json');</pre><div class="diagram">MySQL &rarr; Debezium &rarr; Kafka (debezium-json) &rarr; Flink Table (changelog)| |+-- captures INSERT/UPDATE/DELETE as changelog &rarr;&rarr;&rarr;&rarr;+</div><div class="note"><strong>Key insight:</strong> CDC formats like <code>debezium-json</code> and <code>canal-json</code> automatically map database change events to Flink's changelog semantics (+I, -U, +U, -D), enabling real-time materialized views from database tables.</div>`},
{m:10,t:"Connector Architecture Summary",c:`<h1>Connector Architecture Summary</h1><div class="diagram">+-----------------+| User SQL/API |+--------+--------+|+--------v--------+| Table Planner |+--------+--------+|+----------------+----------------+| |+---------v---------+ +-----------v---------+| DynamicTableSource| | DynamicTableSink || (ScanTableSource | | (getChangelogMode() || or LookupTable- | | getSinkRuntime- || Source) | | Provider()) |+---------+----------+ +-----------+---------+| |+---------v---------+ +-----------v---------+| FLIP-27 Source | | Sink / 2PC Sink || SplitEnumerator | | SinkWriter / || SourceReader | | Committer |+--------------------+ +---------------------+</div><h3>Choosing the Right Connector</h3><table><tr><th>Use Case</th><th>Connector</th><th>Format</th></tr><tr><td>Event streaming</td><td>kafka</td><td>json, avro, protobuf</td></tr><tr><td>Changelog / CDC sink</td><td>upsert-kafka</td><td>json, avro</td></tr><tr><td>Database lookup/sink</td><td>jdbc</td><td>N/A (SQL)</td></tr><tr><td>Data lake ingestion</td><td>filesystem</td><td>parquet, orc, avro</td></tr><tr><td>Database CDC</td><td>kafka + debezium-json</td><td>debezium-json, canal-json</td></tr></table><div class="tip"><strong>Tip:</strong> When building a new connector, implement <code>DynamicTableSource</code>/<code>DynamicTableSink</code> for SQL compatibility, backed by a FLIP-27 Source or Sink2 API implementation for the DataStream layer.</div>`},
{m:11,t:"Deployment Modes",c:`<h1>M11: Deployment, HA &amp; Operations</h1><h2>Deployment Modes</h2><p>Flink 2.2 supports three deployment modes that differ in <strong>who manages the cluster lifecycle</strong> and <strong>where main() runs</strong>.</p><h3>Application Mode (Recommended for Production)</h3><pre>./bin/flink run-application \\--target kubernetes-application \\-Dkubernetes.cluster-id=my-app \\-Dkubernetes.container.image.ref=my-registry/flink:2.2 \\-Dkubernetes.namespace=flink-prod \\local:///opt/flink/usrlib/my-app.jar</pre><h3>Mode Comparison</h3><table><tr><th>Aspect</th><th>Application Mode</th><th>Session Mode</th><th>Per-Job (Deprecated)</th></tr><tr><td>main() execution</td><td>On the cluster</td><td>On the client</td><td>On the client</td></tr><tr><td>Cluster lifecycle</td><td>Per application</td><td>Long-running</td><td>Per job</td></tr><tr><td>Resource isolation</td><td>Full</td><td>Shared</td><td>Full</td></tr><tr><td>Submission latency</td><td>Higher (cluster start)</td><td>Low</td><td>Higher</td></tr><tr><td>Platforms</td><td>K8s, YARN, Standalone</td><td>K8s, YARN, Standalone</td><td>YARN only</td></tr></table><div class="note"><strong>Key insight:</strong> Application Mode is the recommended production deployment. The main() method runs on the cluster, so there is no dependency on the submitting client after job submission. The cluster shuts down automatically when the job finishes.</div>`},
{m:11,t:"Kubernetes Native Deployment",c:`<h1>Kubernetes Native Deployment</h1><div class="diagram">+-----------------------------------------------------+| Kubernetes Cluster || || +------------------+ +------------------+ || | JobManager Pod | | TaskManager Pod 1| || | +-------------+ | | +------------+ | || | | Dispatcher | | | | Task Slot 1| | || | | ResourceMgr | |&lt;--+ | Task Slot 2| | || | | JobMaster | | | +------------+ | || | +-------------+ | +------------------+ || +------------------+ || | +------------------+ || +------------- | TaskManager Pod 2| || | +------------+ | || | | Task Slot 1| | || | | Task Slot 2| | || | +------------+ | || +------------------+ || || ConfigMaps (HA) Services (REST, RPC) |+-----------------------------------------------------+</div><h3>Application Mode on Kubernetes</h3><pre>./bin/flink run-application \\--target kubernetes-application \\-Dkubernetes.cluster-id=my-etl-pipeline \\-Dkubernetes.container.image.ref=my-registry/flink-app:2.2.0 \\-Dkubernetes.namespace=flink-production \\-Dkubernetes.jobmanager.cpu.amount=2.0 \\-Dkubernetes.taskmanager.cpu.amount=4.0 \\-Djobmanager.memory.process.size=2048m \\-Dtaskmanager.memory.process.size=4096m \\-Dtaskmanager.numberOfTaskSlots=4 \\-Dkubernetes.rest-service.exposed.type=LoadBalancer \\local:///opt/flink/usrlib/my-etl-pipeline.jar</pre><h3>Pod Templates for Advanced Customization</h3><p>Use pod templates for init containers, sidecars, and custom volumes:</p><pre>-Dkubernetes.pod-template-file=pod-template.yaml</pre><div class="tip"><strong>Tip:</strong> Use <code>kubernetes.jobmanager.service-account</code> with a dedicated service account that has RBAC permissions for pods, configmaps, and services in the target namespace.</div>`},
{m:11,t:"High Availability Architecture",c:`<h1>High Availability</h1><p>Without HA, the JobManager is a <strong>single point of failure</strong>. Flink HA uses leader election and persistent metadata storage to eliminate this.</p><div class="diagram">+-----------------------------------------------------+| HighAvailabilityServices || || +-------------------+ +-------------------------+ || | LeaderElection | | CheckpointRecoveryFactory| || | (ResourceMgr, | | (CompletedCheckpoint- | || | Dispatcher, | | Store, CheckpointID- | || | JobMaster, REST) | | Counter) | || +-------------------+ +-------------------------+ || || +-------------------+ +-------------------------+ || | BlobStore | | JobResultStore | || | (JARs, large | | (finished job results) | || | objects) | | | || +-------------------+ +-------------------------+ || || +-------------------+ +-------------------------+ || | ExecutionPlan- | | LeaderRetrievalService | || | Store (job graphs)| | (discovers leaders) | || +-------------------+ +-------------------------+ |+-----------------------------------------------------+</div><h3>Leader Election Flow</h3><ol><li>Candidates register as <code>LeaderContender</code></li><li><code>LeaderElectionDriver</code> uses ZK or K8s to perform election</li><li>Winner receives <code>grantLeadership(UUID leaderSessionId)</code></li><li>Winner writes <code>LeaderInformation</code> to the store</li><li><code>LeaderRetrievalService</code> on other components discovers the new leader</li></ol><div class="note"><strong>Key insight:</strong> Flink's HA does not replicate in-flight data. It persists metadata (checkpoint pointers, job graphs) to durable storage. On failover, a new leader restarts the job from the last successful checkpoint.</div>`},
{m:11,t:"ZooKeeper &amp; Kubernetes HA Configuration",c:`<h1>HA Configuration</h1><h3>ZooKeeper HA</h3><pre># config.yamlhigh-availability.type: zookeeperhigh-availability.zookeeper.quorum: zk1:2181,zk2:2181,zk3:2181high-availability.zookeeper.path.root: /flinkhigh-availability.storageDir: hdfs:///flink/ha/high-availability.cluster-id: my-cluster</pre><table><tr><th>Config Key</th><th>Default</th><th>Description</th></tr><tr><td>high-availability.type</td><td>NONE</td><td>zookeeper or kubernetes</td></tr><tr><td>high-availability.zookeeper.quorum</td><td>(none)</td><td>ZK connection string</td></tr><tr><td>high-availability.storageDir</td><td>(none)</td><td>HDFS/S3 path for HA metadata</td></tr><tr><td>high-availability.zookeeper.client.session-timeout</td><td>60000</td><td>ZK session timeout (ms)</td></tr></table><h3>Kubernetes HA</h3><pre># config.yamlhigh-availability.type: kuberneteshigh-availability.storageDir: s3://my-bucket/flink/ha/kubernetes.cluster-id: my-flink-clusterkubernetes.namespace: flink-production</pre><p>Kubernetes HA uses <strong>ConfigMaps</strong> for leader election and metadata storage, removing the ZooKeeper dependency entirely.</p><ul><li><strong>ZooKeeper</strong> &mdash; Uses ephemeral sequential ZNodes; lowest sequence number becomes leader</li><li><strong>Kubernetes</strong> &mdash; Uses ConfigMap-based locks with annotations</li></ul><div class="real"><strong>Real-world:</strong> For new Kubernetes-native deployments, prefer Kubernetes HA to eliminate the ZooKeeper operational burden. Reserve ZooKeeper HA for YARN or hybrid deployments.</div>`},
{m:11,t:"Metrics System &amp; Monitoring",c:`<h1>Metrics System</h1><h3>Metric Types</h3><table><tr><th>Type</th><th>Description</th><th>Key Methods</th></tr><tr><td>Counter</td><td>Count that increases/decreases</td><td>inc(), dec(), getCount()</td></tr><tr><td>Gauge&lt;T&gt;</td><td>Single value at a point in time</td><td>getValue()</td></tr><tr><td>Meter</td><td>Throughput (events/sec)</td><td>markEvent(), getRate()</td></tr><tr><td>Histogram</td><td>Distribution of values</td><td>update(long), getStatistics()</td></tr></table><h3>Registering Custom Metrics</h3><pre>public class MyProcessFunction extends KeyedProcessFunction&lt;...&gt; {private transient Counter processedEvents;private transient Meter throughput;
@Overridepublic void open(OpenContext ctx) {MetricGroup mg = getRuntimeContext().getMetricGroup();processedEvents = mg.addGroup("my_app").counter("processedEvents");throughput = mg.addGroup("my_app").meter("throughput", new MeterView(60));}
@Overridepublic void processElement(...) {processedEvents.inc();throughput.markEvent();}}</pre><h3>Key Operational Metrics</h3><table><tr><th>Metric</th><th>Scope</th><th>What It Tells You</th></tr><tr><td>busyTimeMsPerSecond</td><td>Task</td><td>Processing load</td></tr><tr><td>backPressuredTimeMsPerSecond</td><td>Task</td><td>Downstream bottleneck</td></tr><tr><td>lastCheckpointDuration</td><td>Job</td><td>Checkpoint health</td></tr><tr><td>currentInputWatermark</td><td>Operator</td><td>Event-time progress</td></tr><tr><td>numRecordsInPerSecond</td><td>Operator</td><td>Ingestion throughput</td></tr></table><div class="tip"><strong>Tip:</strong> Use Prometheus + Grafana for Kubernetes deployments. Annotate pods with <code>prometheus.io/scrape: true</code> and <code>prometheus.io/port: 9249</code>.</div>`},
{m:11,t:"TaskManager Memory Model",c:`<h1>TaskManager Memory Model</h1><div class="diagram">+-----------------------------------------------+| Total Process Memory || +-----------------------------------------+ || | Total Flink Memory | || | +-----------------------------------+ | || | | Framework Heap (128 MB) | | || | +-----------------------------------+ | || | | Task Heap Memory | | || | | (user code, state backends) | | || | +-----------------------------------+ | || | | Managed Memory (0.4 x Flink) | | || | | RocksDB, batch sort, caching | | || | +-----------------------------------+ | || | | Framework Off-Heap (128 MB) | | || | +-----------------------------------+ | || | | Task Off-Heap (0 default) | | || | +-----------------------------------+ | || | | Network Memory (0.1 x Flink) | | || | | min: 64 MB, max: 1 GB | | || | +-----------------------------------+ | || +-----------------------------------------+ || +-----------------------------------------+ || | JVM Metaspace (256 MB) | || | JVM Overhead (0.1 x Total) | || | min: 192 MB, max: 1 GB | || +-----------------------------------------+ |+-----------------------------------------------+</div><h3>Key Configuration</h3><table><tr><th>Config Key</th><th>Default</th><th>Purpose</th></tr><tr><td>taskmanager.memory.process.size</td><td>(none)</td><td>Total process memory including JVM</td></tr><tr><td>taskmanager.memory.managed.fraction</td><td>0.4</td><td>Fraction for RocksDB / batch ops</td></tr><tr><td>taskmanager.memory.network.fraction</td><td>0.1</td><td>Fraction for network buffers</td></tr><tr><td>taskmanager.memory.task.heap.size</td><td>(derived)</td><td>Heap for user code</td></tr><tr><td>taskmanager.memory.framework.heap.size</td><td>128mb</td><td>Flink framework heap</td></tr><tr><td>taskmanager.memory.jvm-metaspace.size</td><td>256mb</td><td>Class metadata</td></tr></table><div class="warn"><strong>Caution:</strong> When using RocksDB state backend, managed memory is critical &mdash; it is used for RocksDB's block cache and write buffers. Insufficient managed memory leads to excessive disk I/O and poor checkpoint performance.</div>`},
{m:11,t:"Metric Reporters &amp; Production Monitoring",c:`<h1>Metric Reporters</h1><h3>Available Reporters</h3><table><tr><th>Reporter</th><th>Module</th><th>Best For</th></tr><tr><td>Prometheus</td><td>flink-metrics-prometheus</td><td>Kubernetes / cloud-native</td></tr><tr><td>JMX</td><td>flink-metrics-jmx</td><td>Java ecosystem tooling</td></tr><tr><td>Datadog</td><td>flink-metrics-datadog</td><td>Datadog users</td></tr><tr><td>StatsD</td><td>flink-metrics-statsd</td><td>StatsD infrastructure</td></tr><tr><td>OpenTelemetry</td><td>flink-metrics-otel</td><td>OTel-based observability</td></tr></table><h3>Prometheus Configuration</h3><pre># config.yamlmetrics.reporter.prom.factory.class: \\org.apache.flink.metrics.prometheus.PrometheusReporterFactorymetrics.reporter.prom.port: 9249
# Kubernetes pod annotations for scraping:kubernetes.jobmanager.annotations: \\prometheus.io/scrape:true,prometheus.io/port:9249kubernetes.taskmanager.annotations: \\prometheus.io/scrape:true,prometheus.io/port:9249</pre><h3>Multiple Reporters</h3><pre>metrics.reporters: jmx,prommetrics.reporter.jmx.factory.class: \\org.apache.flink.metrics.jmx.JMXReporterFactorymetrics.reporter.jmx.port: 8789metrics.reporter.prom.factory.class: \\org.apache.flink.metrics.prometheus.PrometheusReporterFactorymetrics.reporter.prom.port: 9249</pre><h3>Key Checkpoint Metrics to Alert On</h3><table><tr><th>Metric</th><th>Alert Condition</th><th>Action</th></tr><tr><td>lastCheckpointDuration</td><td>&gt; 2x normal</td><td>Check state size, I/O</td></tr><tr><td>numberOfFailedCheckpoints</td><td>Increasing</td><td>Investigate timeouts</td></tr><tr><td>backPressuredTimeMsPerSecond</td><td>&gt; 500</td><td>Find bottleneck operator</td></tr></table><div class="real"><strong>Real-world:</strong> Set up Grafana dashboards with panels for checkpoint duration trend, backpressure heatmap across subtasks, and watermark lag per source partition. These three views catch 90% of production issues.</div>`},
{m:11,t:"Network Buffers &amp; Backpressure Tuning",c:`<h1>Network Buffers &amp; Backpressure</h1><h3>Network Buffer Configuration</h3><pre>taskmanager.memory.network.fraction: 0.1taskmanager.memory.network.min: 64mbtaskmanager.memory.network.max: 1gbtaskmanager.network.memory.buffers-per-channel: 2taskmanager.network.memory.floating-buffers-per-gate: 8taskmanager.memory.segment-size: 32kb</pre><h3>Credit-Based Flow Control</h3><div class="diagram">Upstream Task Downstream Task+------------+ +------------+| Output | credits=N | Input || Buffers |&lt;------------------| Buffers || | | || | data buffers | || |------------------&gt;| || | (up to N) | |+------------+ +------------+
When downstream is slow &rarr; stops granting credits&rarr; upstream stops sending &rarr; backpressure propagates to source</div><h3>Diagnosing Backpressure</h3><table><tr><th>Metric</th><th>High Value</th><th>Interpretation</th></tr><tr><td>busyTimeMsPerSecond</td><td>&gt; 800</td><td>Task is processing-bound (the bottleneck)</td></tr><tr><td>backPressuredTimeMsPerSecond</td><td>&gt; 500</td><td>Task is blocked by slow downstream</td></tr><tr><td>idleTimeMsPerSecond</td><td>&gt; 500</td><td>Task waiting for input (upstream is slow)</td></tr></table><h3>Remedies</h3><table><tr><th>Root Cause</th><th>Solution</th></tr><tr><td>Slow operator</td><td>Increase parallelism, optimize logic</td></tr><tr><td>Data skew</td><td>Use .rebalance() or redesign keys</td></tr><tr><td>Slow external call</td><td>Use AsyncDataStream</td></tr><tr><td>Checkpoint stalls</td><td>Enable unaligned checkpoints</td></tr></table><div class="tip"><strong>Tip:</strong> Find the bottleneck by locating the task with high <code>busyTimeMsPerSecond</code> AND low <code>backPressuredTimeMsPerSecond</code>. Everything upstream of it will show high backpressure.</div>`},
{m:12,t:"Operator UIDs &mdash; Foundation of Savepoint Compatibility",c:`<h1>M12: Production Best Practices</h1><h2>Operator UIDs</h2><p><strong>Always assign .uid() to every operator.</strong> This is the single most important production practice.</p><p>Flink uses operator UIDs to map state back to operators during savepoint restore. Without explicit UIDs, auto-generated hashes break on any topology change.</p><pre>DataStream&lt;Event&gt; events = env.fromSource(kafkaSource, watermarkStrategy, "kafka-source").uid("kafka-source-v1").name("Kafka Source");
DataStream&lt;EnrichedEvent&gt; enriched = events.keyBy(Event::getUserId).process(new EnrichmentFunction()).uid("enrichment-v1").name("Event Enrichment");
DataStream&lt;AggResult&gt; aggregated = enriched.keyBy(EnrichedEvent::getCategory).window(TumblingEventTimeWindows.of(Time.minutes(5))).aggregate(new MyAggregateFunction()).uid("5min-window-agg-v1").name("5-Minute Aggregation");
aggregated.sinkTo(kafkaSink).uid("kafka-sink-v1").name("Kafka Sink");</pre><h3>UID Best Practices</h3><ul><li>Use descriptive, versioned names: <code>"order-enrichment-v2"</code></li><li>Never change a UID after deployment (it is the state identity)</li><li>UIDs must be unique within a job graph</li><li>Document UIDs in a version-controlled registry</li><li>Create a new UID only when state schema is incompatible</li></ul><div class="warn"><strong>Caution:</strong> Without explicit UIDs, adding or removing any operator changes all auto-generated hashes, and you lose ALL state on savepoint restore. This is the #1 cause of state loss in production.</div>`},
{m:12,t:"Parallelism &amp; Max Parallelism Planning",c:`<h1>Parallelism Planning</h1><h3>Task Slots and Operator Chaining</h3><div class="diagram">TaskManager (4 slots)+----------+----------+----------+----------+| Slot 0 | Slot 1 | Slot 2 | Slot 3 || | | | || source | source | source | source || map | map | map | map || keyBy | keyBy | keyBy | keyBy || window | window | window | window || sink | sink | sink | sink |+----------+----------+----------+----------+
Total slots needed = max(operator parallelism)TaskManagers needed = ceil(total_slots / slots_per_tm)</div><h3>Max Parallelism and Key Groups</h3><p>Max parallelism determines the number of <strong>key groups</strong> &mdash; the unit of state redistribution. <strong>Once set, it cannot be changed without losing state.</strong></p><pre>env.setMaxParallelism(512); // Set once, never change</pre><h3>Sizing Guidelines</h3><table><tr><th>Scenario</th><th>Recommended Max Parallelism</th></tr><tr><td>Small jobs (parallelism 1-8)</td><td>128</td></tr><tr><td>Medium jobs (parallelism 8-64)</td><td>256 or 512</td></tr><tr><td>Large jobs (parallelism 64-256)</td><td>512 or 1024</td></tr><tr><td>Very large (256+)</td><td>2048 or 4096</td></tr></table><ul><li>Set to a <strong>power of 2</strong> for even key group distribution</li><li>Set to at least <strong>2x</strong> your expected max parallelism</li><li>Default is 128 &mdash; explicitly set it for production</li></ul><div class="warn"><strong>Caution:</strong> Too-high max parallelism increases checkpoint metadata overhead. Never set max parallelism equal to parallelism &mdash; leave room to scale up.</div>`},
{m:12,t:"State Size Management &amp; TTL",c:`<h1>State Size Management</h1><h3>State TTL (Time-To-Live)</h3><pre>StateTtlConfig ttlConfig = StateTtlConfig.newBuilder(Duration.ofHours(24)).setUpdateType(StateTtlConfig.UpdateType.OnCreateAndWrite).setStateVisibility(StateTtlConfig.StateVisibility.NeverReturnExpired).cleanupFullSnapshot().cleanupInRocksdbCompactFilter(1000).cleanupIncrementally(10, true).build();
