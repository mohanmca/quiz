ValueStateDescriptor&lt;UserProfile&gt; descriptor =new ValueStateDescriptor&lt;&gt;("user-profile", UserProfile.class);descriptor.enableTimeToLive(ttlConfig);</pre><h3>TTL Cleanup Strategies</h3><table><tr><th>Strategy</th><th>When</th><th>Best For</th></tr><tr><td>cleanupFullSnapshot()</td><td>During full checkpoint</td><td>Small state</td></tr><tr><td>cleanupIncrementally()</td><td>On each state access</td><td>Heap state backend</td></tr><tr><td>cleanupInRocksdbCompactFilter()</td><td>During RocksDB compaction</td><td>RocksDB backend</td></tr></table><h3>Explicit Cleanup with Timers</h3><pre>@Overridepublic void processElement(Event event, Context ctx, Collector&lt;Result&gt; out) {// Update state...// Register cleanup timer (24 hours from now)Long existing = cleanupTimer.value();if (existing != null) ctx.timerService().deleteProcessingTimeTimer(existing);long newTimer = ctx.timerService().currentProcessingTime()+ Duration.ofHours(24).toMillis();ctx.timerService().registerProcessingTimeTimer(newTimer);cleanupTimer.update(newTimer);}
@Overridepublic void onTimer(long ts, OnTimerContext ctx, Collector&lt;Result&gt; out) {state.clear();cleanupTimer.clear();}</pre><div class="note"><strong>Key insight:</strong> For RocksDB, always combine State TTL with <code>cleanupInRocksdbCompactFilter()</code>. Without it, expired entries remain on disk until a full compaction, which may never happen for cold keys.</div>`},
{m:12,t:"Checkpoint Tuning",c:`<h1>Checkpoint Tuning</h1><pre>env.enableCheckpointing(60_000); // Every 60 seconds
CheckpointConfig config = env.getCheckpointConfig();config.setCheckpointingMode(CheckpointingMode.EXACTLY_ONCE);config.setCheckpointTimeout(600_000); // 10 min timeoutconfig.setMinPauseBetweenCheckpoints(30_000); // 30s min pauseconfig.setMaxConcurrentCheckpoints(1);config.enableUnalignedCheckpoints();config.setExternalizedCheckpointRetention(CheckpointConfig.ExternalizedCheckpointRetention.RETAIN_ON_CANCELLATION);config.setTolerableCheckpointFailureNumber(3);</pre><h3>Tuning Guide</h3><table><tr><th>Parameter</th><th>Guidance</th></tr><tr><td>Interval</td><td>Start at 60s. Decrease for low-latency recovery (10-30s). Increase for large state (120-300s).</td></tr><tr><td>Timeout</td><td>At least 2-3x expected checkpoint duration.</td></tr><tr><td>Min Pause</td><td>Set to at least 50% of interval to prevent checkpoint storms.</td></tr><tr><td>Unaligned</td><td>Enable when backpressure causes checkpoint timeouts.</td></tr><tr><td>Tolerable Failures</td><td>Set to 3-10 for transient issues. Zero = any failure kills the job.</td></tr></table><h3>Aligned vs Unaligned Checkpoints</h3><div class="diagram">Aligned (slow under backpressure):barrier waits &rarr; [data][data][barrier][data][data]
Unaligned (fast under backpressure):barrier overtakes &rarr; [data][barrier][data][data][data]in-flight data persisted as part of checkpoint</div><ul><li>Unaligned: larger checkpoint size but faster completion under backpressure</li><li>Cannot be used with AT_LEAST_ONCE mode</li><li>May increase restore time due to replaying in-flight data</li></ul><div class="tip"><strong>Tip:</strong> Always set <code>RETAIN_ON_CANCELLATION</code> in production. This preserves checkpoints when a job is cancelled, allowing manual recovery if savepoints were not taken.</div>`},
{m:12,t:"Common Anti-Patterns",c:`<h1>Common Anti-Patterns</h1><h3>1. Missing Operator UIDs</h3><pre>// BAD: No UIDs &mdash; state lost on topology changessource.map(new MyMapper()).keyBy(e -&gt; e.key).process(new MyProcessor()).sinkTo(sink);
// GOOD: Every operator has a stable UIDsource.uid("source-v1").map(new MyMapper()).uid("mapper-v1").keyBy(e -&gt; e.key).process(new MyProcessor()).uid("processor-v1").sinkTo(sink).uid("sink-v1");</pre><h3>2. Mutable or Array Keys</h3><pre>// BAD: Arrays use reference equalitystream.keyBy(event -&gt; event.getTags()); // String[] &mdash; broken!
// GOOD: Immutable value typesstream.keyBy(event -&gt; String.join(",", event.getTags()));stream.keyBy(Event::getUserId); // String, Long</pre><h3>3. Unbounded State Growth</h3><pre>// BAD: MapState grows foreverMapState&lt;String, List&lt;Event&gt;&gt; userEvents; // Never cleaned!
// GOOD: Use State TTLdescriptor.enableTimeToLive(ttlConfig);</pre><h3>4. Too-Small Checkpoint Intervals</h3><pre># BAD: 1-second checkpoints with large stateexecution.checkpointing.interval: 1s
# GOOD: Appropriate intervalexecution.checkpointing.interval: 60sexecution.checkpointing.min-pause: 30s</pre><h3>5. Ignoring Idle Sources</h3><pre>// GOOD: Mark idle partitionsWatermarkStrategy.&lt;Event&gt;forBoundedOutOfOrderness(Duration.ofSeconds(5)).withIdleness(Duration.ofMinutes(1));</pre><h3>6. Blocking I/O in Operators</h3><pre>// BAD: Synchronous HTTP call blocks entire subtask// GOOD: Use AsyncDataStream for non-blocking I/O</pre><div class="real"><strong>Real-world:</strong> Run a pre-deployment checklist: UIDs on all operators, State TTL configured, idle source handling, checkpoint interval appropriate for state size, no blocking I/O in hot paths.</div>`},
{m:12,t:"ETL Patterns with ProcessFunction",c:`<h1>ETL Patterns with ProcessFunction</h1><h3>Deduplication</h3><pre>public class DeduplicationFunctionextends KeyedProcessFunction&lt;String, Event, Event&gt; {
private ValueState&lt;Boolean&gt; seen;
@Override public void open(OpenContext ctx) {StateTtlConfig ttl = StateTtlConfig.newBuilder(Duration.ofHours(1)).setUpdateType(StateTtlConfig.UpdateType.OnCreateAndWrite).build();ValueStateDescriptor&lt;Boolean&gt; desc =new ValueStateDescriptor&lt;&gt;("seen", Boolean.class);desc.enableTimeToLive(ttl);seen = getRuntimeContext().getState(desc);}
@Override public void processElement(Event event, Context ctx, Collector&lt;Event&gt; out) throws Exception {if (seen.value() == null) {seen.update(true);out.collect(event); // First occurrence}// Duplicate &mdash; silently drop}}</pre><h3>Session Detection with Timers</h3><pre>@Override public void processElement(ClickEvent click, Context ctx,Collector&lt;UserSession&gt; out) throws Exception {UserSession session = sessionState.value();Long existingTimer = timerState.value();if (existingTimer != null)ctx.timerService().deleteEventTimeTimer(existingTimer);if (session == null)session = new UserSession(click.getUserId(), click.getTimestamp());session.addClick(click);sessionState.update(session);long timerTime = click.getTimestamp() + SESSION_GAP;ctx.timerService().registerEventTimeTimer(timerTime);timerState.update(timerTime);}
@Override public void onTimer(long ts, OnTimerContext ctx,Collector&lt;UserSession&gt; out) throws Exception {UserSession session = sessionState.value();if (session != null) { session.setEndTime(ts); out.collect(session); }sessionState.clear(); timerState.clear();}</pre><div class="note"><strong>Key insight:</strong> Timer-based patterns (session detection, inactivity alerts) are the backbone of event-driven architectures in Flink. Timers are checkpointed, so they survive failures and restores.</div>`},
{m:12,t:"Connected Streams &amp; Broadcast State Patterns",c:`<h1>Connected Streams &amp; Broadcast State</h1><h3>Connected Streams: Dynamic Rule Evaluation</h3><pre>DataStream&lt;Alert&gt; alerts = transactions.keyBy(Transaction::getAccountId).connect(rules.keyBy(Rule::getAccountId)).process(new DynamicRuleFunction()).uid("rule-evaluation-v1");
public class DynamicRuleFunctionextends KeyedCoProcessFunction&lt;String, Transaction, Rule, Alert&gt; {private ValueState&lt;Rule&gt; ruleState;private ListState&lt;Transaction&gt; bufferedTxns;
@Override public void processElement1(Transaction txn, ...) {Rule rule = ruleState.value();if (rule != null &amp;&amp; rule.matches(txn))out.collect(new Alert(txn.getAccountId(), rule.getName(), txn));else bufferedTxns.add(txn); // Buffer until rule arrives}@Override public void processElement2(Rule rule, ...) {ruleState.update(rule);for (Transaction txn : bufferedTxns.get())if (rule.matches(txn)) out.collect(new Alert(...));bufferedTxns.clear();}}</pre><h3>Broadcast State: Reference Data</h3><pre>BroadcastStream&lt;CurrencyRate&gt; broadcastRates = rates.broadcast(ratesDescriptor);DataStream&lt;ConvertedOrder&gt; converted = orders.connect(broadcastRates).process(new CurrencyConversionFunction(ratesDescriptor)).uid("currency-conversion-v1");</pre><ul><li><strong>Connected streams</strong> &mdash; both streams keyed; use when rules are per-key</li><li><strong>Broadcast state</strong> &mdash; reference data replicated to all subtasks; use when every subtask needs the same data</li></ul><div class="tip"><strong>Tip:</strong> Buffer events when the control/rule stream has not yet delivered its initial state. Without buffering, early events are silently dropped or processed with stale defaults.</div>`},
{m:12,t:"Side Outputs &amp; Async I/O Patterns",c:`<h1>Side Outputs &amp; Async I/O</h1><h3>Dead-Letter Queue with Side Outputs</h3><pre>public class RobustProcessFunctionextends ProcessFunction&lt;RawEvent, ProcessedEvent&gt; {
public static final OutputTag&lt;RawEvent&gt; DEAD_LETTER =new OutputTag&lt;&gt;("dead-letter", TypeInformation.of(RawEvent.class));
@Override public void processElement(RawEvent raw, Context ctx,Collector&lt;ProcessedEvent&gt; out) {try {out.collect(parse(raw));} catch (ParseException e) {raw.setErrorMessage(e.getMessage());ctx.output(DEAD_LETTER, raw); // Route to DLQ}}}
// Wire the side output to a separate sinkDataStream&lt;RawEvent&gt; deadLetters =mainStream.getSideOutput(RobustProcessFunction.DEAD_LETTER);deadLetters.sinkTo(deadLetterKafkaSink).uid("dead-letter-sink-v1");</pre><h3>Async I/O for External Lookups</h3><pre>public class AsyncDbLookup extends RichAsyncFunction&lt;Event, EnrichedEvent&gt; {private transient AsyncDatabaseClient client;
@Override public void asyncInvoke(Event event,ResultFuture&lt;EnrichedEvent&gt; resultFuture) {client.getAsync("SELECT * FROM users WHERE id=?", event.getUserId()).thenAccept(profile -&gt; resultFuture.complete(Collections.singletonList(new EnrichedEvent(event, profile)))).exceptionally(t -&gt; {resultFuture.complete(Collections.singletonList(new EnrichedEvent(event, null)));return null;});}}
// Usage: ordered guarantees output order matches inputAsyncDataStream.orderedWait(events, new AsyncDbLookup(),30, TimeUnit.SECONDS, 100); // timeout=30s, capacity=100</pre><div class="real"><strong>Real-world:</strong> Every production pipeline should implement a dead-letter queue. Without it, a single malformed record can crash your entire job or silently corrupt downstream aggregations.</div>`},
{m:12,t:"Production Deployment Checklist",c:`<h1>Production Deployment Checklist</h1><h3>Pre-Deployment</h3><ul><li><strong>Operator UIDs</strong> &mdash; Every operator has a stable .uid()</li><li><strong>Max Parallelism</strong> &mdash; Explicitly set to a power of 2, at least 2x expected parallelism</li><li><strong>State TTL</strong> &mdash; Configured on all keyed state to prevent unbounded growth</li><li><strong>Idle Source Handling</strong> &mdash; withIdleness() configured on watermark strategy</li><li><strong>Checkpoint Config</strong> &mdash; Interval, timeout, min-pause, tolerable failures all tuned</li><li><strong>Incremental Checkpoints</strong> &mdash; Enabled with RocksDB for large state</li><li><strong>RETAIN_ON_CANCELLATION</strong> &mdash; Checkpoints preserved on job cancel</li></ul><h3>Runtime Monitoring</h3><ul><li><strong>Metrics</strong> &mdash; Prometheus/Grafana dashboards for checkpoint duration, backpressure, watermark lag</li><li><strong>Alerts</strong> &mdash; Checkpoint failures, backpressure spikes, consumer lag</li><li><strong>Dead-letter queues</strong> &mdash; Monitor DLQ volume for data quality issues</li></ul><h3>Upgrade Strategy</h3><ol><li>Take a savepoint: <code>flink savepoint &lt;jobId&gt; s3://bucket/savepoints/</code></li><li>Stop the job with savepoint: <code>flink stop --savepointPath s3://... &lt;jobId&gt;</code></li><li>Deploy new version from the savepoint: <code>flink run -s s3://...savepoint-xxx ...</code></li><li>Verify metrics are healthy post-restart</li></ol><div class="diagram">v1 running &rarr; savepoint &rarr; stop v1 &rarr; deploy v2 from savepoint &rarr; v2 running| |state persisted state restoredto durable storage from savepoint</div><div class="note"><strong>Key insight:</strong> Treat Flink job upgrades like database migrations. Plan the state schema evolution, test savepoint compatibility, and always verify that the new version can restore from the old version's savepoints before deploying to production.</div>`}

let cur = 0;let printMode = false;
function render() {const s = SLIDES[cur];document.getElementById('slide').innerHTML = s.c;document.getElementById('module-label').textContent = MODULE_NAMES[s.m];document.getElementById('slide-counter').textContent = `${cur + 1} / ${SLIDES.length}`;document.getElementById('pct').textContent = Math.round(((cur + 1) / SLIDES.length) * 100) + '%';document.getElementById('progress-bar').style.width = ((cur + 1) / SLIDES.length * 100) + '%';updateTOC();try { localStorage.setItem('flink22-pos', cur); } catch(e){}}
function go(d) {cur = Math.max(0, Math.min(SLIDES.length - 1, cur + d));render();window.scrollTo(0, 0);}
function goTo(i) {cur = i;render();toggleTOC();window.scrollTo(0, 0);}
function toggleTOC() {document.getElementById('toc').classList.toggle('open');document.getElementById('toc-overlay').style.display =document.getElementById('toc').classList.contains('open') ? 'block' : 'none';}
function togglePrint() {printMode = !printMode;if (printMode) {document.body.classList.add('print-all');const container = document.getElementById('print-container');let html = '';let lastModule = -1;SLIDES.forEach((s, i) => {if (s.m !== lastModule) {html += `<div class="slide-module-header"><h2>${MODULE_NAMES[s.m]}</h2></div>`;lastModule = s.m;}html += `<div class="slide-page">${s.c}</div>`;});container.innerHTML = html;container.style.display = 'block';} else {document.body.classList.remove('print-all');document.getElementById('print-container').style.display = 'none';}}
function buildTOC() {const body = document.getElementById('toc-body');let html = '';MODULE_NAMES.forEach((name, mi) => {const modSlides = SLIDES.map((s, i) => ({...s, idx: i})).filter(s => s.m === mi);html += `<div class="toc-module">`;html += `<div class="toc-module-title" data-m="${mi}" onclick="toggleModule(${mi})">${name}</div>`;html += `<div class="toc-slides" id="toc-m${mi}">`;modSlides.forEach(s => {html += `<div class="toc-slide" data-i="${s.idx}" onclick="goTo(${s.idx})">${s.t}</div>`;});html += `</div></div>`;});body.innerHTML = html;}
function toggleModule(mi) {const el = document.getElementById('toc-m' + mi);el.classList.toggle('open');}
function updateTOC() {document.querySelectorAll('.toc-slide').forEach(el => {el.classList.toggle('active', parseInt(el.dataset.i) === cur);});document.querySelectorAll('.toc-module-title').forEach(el => {el.classList.toggle('active', parseInt(el.dataset.m) === SLIDES[cur].m);});const curMod = document.getElementById('toc-m' + SLIDES[cur].m);if (curMod) curMod.classList.add('open');}
document.addEventListener('keydown', e => {if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;switch(e.key) {case 'ArrowRight': case ' ': e.preventDefault(); go(1); break;case 'ArrowLeft': e.preventDefault(); go(-1); break;case 'Home': e.preventDefault(); cur = 0; render(); break;case 'End': e.preventDefault(); cur = SLIDES.length - 1; render(); break;case 't': case 'T': toggleTOC(); break;case 'p': case 'P': togglePrint(); break;}});
try { const p = localStorage.getItem('flink22-pos'); if (p) cur = Math.min(parseInt(p), SLIDES.length-1); } catch(e){}buildTOC();render();</script></body></html>
