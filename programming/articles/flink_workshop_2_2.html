ze:.82rem}.slide-page pre code{background:none;padding:0}.slide-page table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}.slide-page th{background:#f1f5f9;text-align:left;padding:6px 8px;border:1px solid #e2e8f0;font-weight:600}.slide-page td{padding:6px 8px;border:1px solid #e2e8f0}.slide-page .diagram{font-size:.75rem;padding:10px}.slide-page .note,.slide-page .tip,.slide-page .warn,.slide-page .real{font-size:.85rem;padding:8px 12px;margin:8px 0}.slide-module-header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;padding:16px 24px;border-radius:10px;margin:20px 0 10px;page-break-before:always}.slide-module-header h2{color:#fff;margin:0;font-size:1.3rem}</style></head><body><div id="progress-bar"></div><div id="app"><div id="header"><div class="left" id="module-label">M0: Orientation</div><div class="center" id="slide-counter">1 / 121</div><div class="right"><button onclick="toggleTOC()" title="Table of Contents (T)">TOC</button><button onclick="togglePrint()" title="Print View (P)">Print</button><span id="pct">0%</span></div></div><div id="slide"></div><div id="nav"><button class="prev" onclick="go(-1)">&larr; Prev</button><button class="next" onclick="go(1)">Next &rarr;</button></div></div><div id="toc-overlay" onclick="toggleTOC()"></div><div id="toc"><h2>Table of Contents</h2><div id="toc-body"></div></div><div id="print-container"></div>
<script>const MODULE_NAMES = ["M0: Orientation & The Flink 2.2 Mental Model","M1: Flink Architecture Deep Dive","M2: DataStream API — V1 & V2","M3: Stateful Stream Processing","M4: Timely Stream Processing — Event Time & Watermarks","M5: Windowing Deep Dive","M6: Checkpointing Mechanism & Chandy-Lamport Algorithm","M7: Savepoints, Snapshot Lifecycle & Fault Recovery","M8: State Backends & Checkpoint Storage","M9: Table API & SQL","M10: Connectors & Data Formats","M11: Deployment, High Availability & Operations","M12: Production Best Practices & Patterns"];
const SLIDES = [{m:0,t:"What is Apache Flink 2.2",c:`<h1>What is Apache Flink 2.2</h1><p>Apache Flink is a <strong>distributed stream-processing framework</strong> that treats every data pipeline &mdash; bounded or unbounded &mdash; as a stream.</p><h3>Flink 2.2 Highlights</h3><ul><li>Java 17 target runtime (minimum: Java 11)</li><li>DataStream V2 API (experimental) alongside the mature V1 API</li><li>New <strong>ForSt</strong> state backend (community-maintained RocksDB fork)</li><li>Unified batch &amp; streaming under a single runtime</li><li>Table API / SQL as a first-class citizen</li></ul><div class="note"><strong>Key insight:</strong> Unlike micro-batch systems (e.g. Spark Structured Streaming), Flink processes records <strong>one at a time</strong> with true event-time semantics and exactly-once state consistency.</div>`},
{m:0,t:"Streams First: Batch as a Special Case",c:`<h1>Streams First: Batch as a Special Case</h1><p>Flink's fundamental abstraction is the <strong>stream</strong>. Batch is a <em>special case</em> &mdash; a bounded stream.</p><div class="diagram">Unbounded stream (no end) Bounded stream (finite)──────────────────────&rarr; ──────────┤e1 e2 e3 e4 e5 ... e1 e2 e3 END(STREAMING mode) (BATCH mode)</div><pre>// flink-core-api: org.apache.flink.api.common.RuntimeExecutionModepublic enum RuntimeExecutionMode {STREAMING, // All tasks deployed up front, checkpoints enabledBATCH, // Tasks scheduled gradually, blocking shufflesAUTOMATIC // Flink decides based on source boundedness}</pre><table><tr><th>Aspect</th><th>STREAMING</th><th>BATCH</th></tr><tr><td>Task scheduling</td><td>All tasks deployed before start</td><td>Gradual, region-by-region</td></tr><tr><td>Shuffle</td><td>Pipelined (network buffers)</td><td>Blocking (spill to disk)</td></tr><tr><td>Checkpointing</td><td>Enabled</td><td>Disabled (replay for fault tolerance)</td></tr><tr><td>Watermarks</td><td>Progressive, may have late data</td><td>"Perfect" &mdash; no late data</td></tr></table>`},
{m:0,t:"The Four Pillars of Flink",c:`<h1>The Four Pillars of Flink</h1><h2>1. Continuous Processing</h2><p>Operators run in a long-lived loop. No "trigger interval" or micro-batch boundary.</p><h2>2. Event Time</h2><p>Events carry timestamps. Flink uses <strong>watermarks</strong> (monotonically non-decreasing progress markers) to track event-time across distributed partitions.</p><h2>3. Stateful Computation</h2><p>Operators maintain <strong>keyed state</strong> (partitioned by key) and <strong>operator state</strong> (per instance). State types: <code>ValueState</code>, <code>ListState</code>, <code>MapState</code>, <code>ReducingState</code>, <code>AggregatingState</code>.</p><h2>4. Distributed Snapshots</h2><p>Asynchronous barrier snapshots (Chandy-Lamport variant) create consistent checkpoints of the entire distributed state.</p><div class="diagram">Source &rarr; [barrier n] &rarr; Operator A &rarr; [barrier n] &rarr; Sink|snapshot stateto durable store</div>`},
{m:0,t:"State Backends in Flink 2.2",c:`<h1>State Backends in Flink 2.2</h1><p>State is managed by a pluggable <strong>state backend</strong>. Flink 2.2 ships three:</p><table><tr><th>Backend</th><th>Location</th><th>Use Case</th></tr><tr><td><code>HashMapStateBackend</code></td><td>JVM heap</td><td>Small state, development</td></tr><tr><td><code>EmbeddedRocksDBStateBackend</code></td><td>On-disk (RocksDB)</td><td>Legacy large state</td></tr><tr><td><code>ForStStateBackend</code></td><td>On-disk (ForSt)</td><td><strong>Recommended</strong> for large state in 2.2</td></tr></table><h3>ForSt &mdash; The New Default</h3><ul><li>Community-maintained fork of RocksDB optimized for Flink</li><li>Async I/O for state access (designed for DataStream V2)</li><li>Better integration with Flink's managed memory</li><li>File-merging snapshot manager for faster checkpoints</li></ul><pre>// Enable ForSt state backendenv.setStateBackend(new ForStStateBackend());</pre><div class="tip"><strong>Tip:</strong> For production workloads with state larger than a few GB, always prefer ForSt over the heap-based backend.</div>`},
{m:0,t:"Application Anatomy: Sources, Operators, Sinks",c:`<h1>Application Anatomy: Sources, Operators, Sinks</h1><p>Every Flink application is a <strong>directed acyclic graph (DAG)</strong> of operators:</p><div class="diagram">+----------+ +------------+ +------------+ +-------+| Source | &rarr; | Operator | &rarr; | Operator | &rarr; | Sink || (Kafka) | | (map) | | (window) | | (JDBC)|+----------+ +------------+ +------------+ +-------+</div><h3>Source</h3><p>Produces records. V1 sources implement <code>Source</code> (FLIP-27). V2 placeholder: <code>org.apache.flink.api.connector.dsv2.Source</code>.</p><h3>Operators</h3><p>Transform records: <code>map</code>, <code>flatMap</code>, <code>filter</code>, <code>keyBy</code>, <code>window</code>, <code>join</code>, <code>process</code>, etc.</p><h3>Sink</h3><p>Writes results to external systems. V2 placeholder: <code>org.apache.flink.api.connector.dsv2.Sink</code>.</p><div class="note"><strong>Key insight:</strong> The same Flink program can process both bounded and unbounded streams. <code>RuntimeExecutionMode.AUTOMATIC</code> inspects source boundedness at submission time.</div>`},
{m:0,t:"Flink Glossary: Core Concepts",c:`<h1>Flink Glossary: Core Concepts</h1><table><tr><th>Term</th><th>Definition</th></tr><tr><td><strong>Job</strong></td><td>A submitted Flink program, represented by a <code>JobGraph</code></td></tr><tr><td><strong>JobGraph</strong></td><td>Logical execution plan: <code>JobVertex</code> instances + edges + config</td></tr><tr><td><strong>ExecutionGraph</strong></td><td>Physical plan: expands each JobVertex into parallel ExecutionVertex/Execution instances</td></tr><tr><td><strong>Operator</strong></td><td>Single unit of computation (e.g. a MapFunction)</td></tr><tr><td><strong>Task</strong></td><td>A running unit on a TaskManager; may contain chained operators</td></tr><tr><td><strong>Subtask</strong></td><td>One parallel instance of an operator (e.g. map[0], map[1], ...)</td></tr></table><h3>Operator Chaining</h3><div class="diagram">Before chaining: After chaining:+------+ +-----+ +------+ +----------------------+|Source | &rarr; | Map | &rarr; |Filter| |Source &rarr; Map &rarr; Filter | (one Task)+------+ +-----+ +------+ +----------------------+</div><p>Adjacent operators with the same parallelism and forward partitioning are fused into a single Task to avoid serialization overhead.</p>`},
{m:0,t:"DataStream V1 vs V2 vs Table API",c:`<h1>DataStream V1 vs V2 vs Table API</h1><table><tr><th>Criterion</th><th>DataStream V1</th><th>DataStream V2</th><th>Table / SQL</th></tr><tr><td>Maturity</td><td>Stable</td><td>Experimental</td><td>Stable</td></tr><tr><td>Custom event-time</td><td>Full</td><td>Planned</td><td>Limited</td></tr><tr><td>Complex stateful logic</td><td>ProcessFunction</td><td>StateDeclarations</td><td>UDFs</td></tr><tr><td>Schema evolution</td><td>Manual</td><td>Planned</td><td>Built-in</td></tr><tr><td>SQL compatibility</td><td>No</td><td>No</td><td>Yes</td></tr><tr><td>Async state access</td><td>No</td><td>Yes (v2 state)</td><td>Planned</td></tr></table><div class="tip"><strong>Tip:</strong> Use <strong>V1</strong> for production jobs needing full control over event-time, windows, and process functions. Use <strong>Table/SQL</strong> for declarative analytics. Experiment with <strong>V2</strong> for next-gen architecture.</div>`},
{m:0,t:"What's New in Flink 2.2",c:`<h1>What's New in Flink 2.2</h1><h3>Java 17 Target</h3><p>Sealed classes, records, improved GC (ZGC/Shenandoah).</p><h3>DataStream V2 API</h3><ul><li><code>StateFuture&lt;T&gt;</code> &mdash; non-blocking state reads</li><li><code>StateDeclaration</code> &mdash; declarative state registration</li><li>New process-function-centric model</li></ul><h3>Generalized Watermarks</h3><ul><li><code>Watermark</code> (interface) &rarr; <code>LongWatermark</code>, <code>BoolWatermark</code></li><li><code>WatermarkDeclaration</code> + <code>WatermarkCombinationPolicy</code></li></ul><h3>ForSt State Backend</h3><p>Async I/O, managed memory integration, file-merging snapshots.</p><h3>Other Notable Changes</h3><ul><li>File-merging checkpoints (<code>FileMergingSnapshotManager</code>)</li><li>Blocklist mechanism for misbehaving TaskManagers</li><li>Speculative execution for batch jobs</li><li>Declarative resource management (<code>DeclarativeSlotPoolFactory</code>)</li></ul>`},
{m:0,t:"V1 API Quick Example",c:`<h1>V1 API Quick Example</h1><pre>StreamExecutionEnvironment env =StreamExecutionEnvironment.getExecutionEnvironment();
DataStream&lt;String&gt; stream = env.fromSource(kafkaSource,WatermarkStrategy.forBoundedOutOfOrderness(Duration.ofSeconds(5)),"kafka");
stream.keyBy(event -&gt; event.getUserId()).window(TumblingEventTimeWindows.of(Time.minutes(1))).reduce((a, b) -&gt; merge(a, b)).sinkTo(jdbcSink);
env.execute("my-job");</pre><div class="note"><strong>Key insight:</strong> The V1 API is operator-centric: you chain <code>map()</code>, <code>filter()</code>, <code>keyBy()</code>, <code>window()</code>, and <code>process()</code> calls on a <code>DataStream</code>. Execution is lazy until <code>env.execute()</code>.</div>`},
{m:0,t:"Key Source Packages Reference",c:`<h1>Key Source Packages Reference</h1><table><tr><th>Concept</th><th>Package</th></tr><tr><td>Core API types</td><td><code>org.apache.flink.api.common</code> (flink-core-api)</td></tr><tr><td>State interfaces (V1)</td><td><code>org.apache.flink.api.common.state</code></td></tr><tr><td>State interfaces (V2)</td><td><code>org.apache.flink.api.common.state.v2</code></td></tr><tr><td>Watermarks</td><td><code>org.apache.flink.api.common.watermark</code></td></tr><tr><td>DSv2 connectors</td><td><code>org.apache.flink.api.connector.dsv2</code></td></tr><tr><td>StreamGraph</td><td><code>org.apache.flink.streaming.api.graph</code></td></tr><tr><td>JobGraph</td><td><code>org.apache.flink.runtime.jobgraph</code></td></tr><tr><td>ExecutionGraph</td><td><code>org.apache.flink.runtime.executiongraph</code></td></tr><tr><td>Dispatcher</td><td><code>org.apache.flink.runtime.dispatcher</code></td></tr><tr><td>JobMaster</td><td><code>org.apache.flink.runtime.jobmaster</code></td></tr><tr><td>ResourceManager</td><td><code>org.apache.flink.runtime.resourcemanager</code></td></tr><tr><td>TaskExecutor</td><td><code>org.apache.flink.runtime.taskexecutor</code></td></tr><tr><td>ForSt backend</td><td><code>org.apache.flink.state.forst</code></td></tr></table>`},
{m:1,t:"JobManager Architecture Overview",c:`<h1>JobManager Architecture Overview</h1><p>The Flink <strong>JobManager</strong> is a composition of three major components running in a single JVM (<code>ClusterEntrypoint</code>):</p><div class="diagram">+----------------------------------------------------------+| ClusterEntrypoint JVM || || +--------------+ +------------+ +-----------------+ || | Dispatcher | | Resource | | JobMaster(s) | || | | | Manager | | (one per job) | || +------+-------+ +-----+------+ +--------+--------+ || | | | || +------+----------------+-------------------+--------+ || | RPC Service (Pekko/Akka) | || +----------------------------------------------------+ || || +----------------------------------------------------+ || | HighAvailabilityServices (ZooKeeper / K8s) | || +----------------------------------------------------+ || +----------------------------------------------------+ || | BlobServer (large artifact storage) | || +----------------------------------------------------+ |+----------------------------------------------------------+</div><p>Components are assembled by a <code>DispatcherResourceManagerComponentFactory</code>.</p>`},
{m:1,t:"Dispatcher, ResourceManager & JobMaster",c:`<h1>Dispatcher, ResourceManager &amp; JobMaster</h1><h3>Dispatcher</h3><p>Extends <code>FencedRpcEndpoint&lt;DispatcherId&gt;</code>. Receives job submissions, creates <code>JobManagerRunner</code> instances, persists job results, triggers checkpoints/savepoints.</p><h3>ResourceManager</h3><p>Extends <code>FencedRpcEndpoint&lt;ResourceManagerId&gt;</code>. Manages TaskManager registration, slot management via <code>SlotManager</code>, heartbeat monitoring, and worker provisioning.</p><p>Implementations: <code>StandaloneResourceManager</code>, <code>YarnResourceManager</code>, <code>KubernetesResourceManager</code>.</p><h3>JobMaster</h3><p>Extends <code>FencedRpcEndpoint&lt;JobMasterId&gt;</code>. Manages execution of a <strong>single job</strong>: scheduling via <code>SchedulerNG</code>, slot pool, checkpoint coordination, failure handling.</p><div class="note"><strong>Key insight:</strong> All communication uses Flink's RPC framework with <code>*Gateway</code> interfaces defining the remote API contract (e.g. <code>DispatcherGateway</code>, <code>ResourceManagerGateway</code>, <code>JobMasterGateway</code>).</div>`},
{m:1,t:"TaskManagers & Task Slots",c:`<h1>TaskManagers &amp; Task Slots</h1><p>A <code>TaskExecutor</code> (TaskManager) is a worker process that executes tasks in <strong>task slots</strong>.</p><div class="diagram">TaskManager (16 GB heap, 8 CPU cores, 4 slots)+------------------------------------------------------+| +------------+ +------------+ +------------+ +------------+| | Slot 0 | | Slot 1 | | Slot 2 | | Slot 3 || | 4 GB mem | | 4 GB mem | | 4 GB mem | | 4 GB mem || | (managed) | | (managed) | | (managed) | | (managed) || | +------+ | | +------+ | | +------+ | | +------+ || | | Task | | | | Task | | | | Task | | | | Task | || | +------+ | | +------+ | | +------+ | | +------+ || +------------+ +------------+ +------------+ +------------+| CPU cores are shared across all slots (not isolated) |+------------------------------------------------------+</div><div class="warn"><strong>Caution:</strong> Slots isolate <strong>managed memory</strong> (off-heap) but <strong>share CPU threads</strong>. A CPU-intensive operator in one slot can starve others on the same TaskManager.</div>`},
{m:1,t:"Slot Sharing & Co-Location",c:`<h1>Slot Sharing &amp; Co-Location</h1><p><strong>Slot sharing</strong> allows subtasks from different operators to share the same slot, dramatically reducing resource requirements.</p><div class="diagram">Without slot sharing (8 slots): With slot sharing (4 slots):+-------+ +-------+ +-------+ +------------------+ +------------------+|Src [0]| |Src [1]| |Src [2]| |Src[0] &rarr; Map[0] | |Src[1] &rarr; Map[1] |+-------+ +-------+ +-------+ | &rarr; Sink[0] | | &rarr; Sink[1] |+-------+ +-------+ +-------+ +------------------+ +------------------+|Map [0]| |Map [1]| |Map [2]| +------------------+ +------------------++-------+ +-------+ +-------+ |Src[2] &rarr; Map[2] | |Src[3] &rarr; Map[3] || &rarr; Sink[2] | | &rarr; Sink[3] |+------------------+ +------------------+</div><p><strong>Result:</strong> slots needed = <code>max(parallelism)</code> across operators, not the sum.</p><p><strong>Co-location constraints</strong> (<code>CoLocationGroup</code>) go further: they force specific subtask indices onto the exact same TaskManager (required for iteration feedback edges).</p>`},
{m:1,t:"Parallelism & Key Groups",c:`<h1>Parallelism &amp; Key Groups</h1><p>Each operator has a <strong>parallelism</strong> and a <strong>maxParallelism</strong> that determines the number of <strong>key groups</strong>.</p><pre>keyGroup = MathUtils.murmurHash(key.hashCode()) % maxParallelism</pre><p>Key groups are distributed as contiguous ranges across subtasks:</p><div class="diagram">maxParallelism = 12, parallelism = 3
Subtask 0: KeyGroupRange [0, 3] (key groups 0,1,2,3)Subtask 1: KeyGroupRange [4, 7] (key groups 4,5,6,7)Subtask 2: KeyGroupRange [8, 11] (key groups 8,9,10,11)</div><h3>Why Key Groups Matter</h3><p>When you <strong>rescale</strong>, Flink moves whole key groups &mdash; no re-keying of individual entries.</p><div class="warn"><strong>Caution:</strong> <code>maxParallelism</code> is set once and <strong>cannot be changed</strong> after the first checkpoint. Plan for future scaling. Default: 128.</div>`},
{m:1,t:"Application Mode vs Session Mode",c:`<h1>Application Mode vs Session Mode</h1><table><tr><th>Aspect</th><th>Session Mode</th><th>Application Mode</th></tr><tr><td>Cluster lifecycle</td><td>Long-lived</td><td>Per-application</td></tr><tr><td><code>main()</code> runs on</td><td>Client</td><td>JobManager</td></tr><tr><td>Resource isolation</td><td>Shared</td><td>Full</td></tr><tr><td>Job submission speed</td><td>Fast</td><td>Slower (new cluster)</td></tr><tr><td>Recommended for</td><td>Development, testing</td><td><strong>Production</strong></td></tr></table><div class="diagram">Session Mode: Application Mode:+---------------------------+ +---------------------------+| Long-running cluster | | Dedicated cluster per app || Dispatcher &larr; Job A | | User main() runs here || &larr; Job B | | Dispatcher &rarr; JobMaster || JM(A) JM(B) | | (single job) || TM-1 TM-2 TM-3 | | TM-1 TM-2 |+---------------------------+ | auto-terminates on finish |+---------------------------+</div><div class="real"><strong>Real-world:</strong> Application mode is recommended for production. It provides full isolation, no classpath conflicts, and auto-termination.</div>`},
{m:1,t:"Graph Pipeline: From Code to Execution",c:`<h1>Graph Pipeline: From Code to Execution</h1><div class="diagram">User Code (DataStream / Table API)|vStage 1: StreamGraph(one StreamNode per user operator, preserves all metadata)| StreamingJobGraphGenerator.createJobGraph()vStage 2: JobGraph(operators chained into JobVertex, shipped to JobManager)| DefaultExecutionGraphBuilder.buildGraph()vStage 3: ExecutionGraph(JobVertex &rarr; ExecutionJobVertex &rarr; ExecutionVertex[] &rarr; Execution)| Scheduler deploys ExecutionsvStage 4: Physical Execution(Tasks running on TaskExecutors via TaskDeploymentDescriptor)</div><div class="note"><strong>Key insight:</strong> Operator chaining happens at Stage 2. Adjacent operators with the same parallelism and forward partitioning are fused into a single <code>JobVertex</code>, avoiding serialization overhead.</div>`},
{m:1,t:"Resource Allocation Flow",c:`<h1>Resource Allocation Flow</h1><div class="diagram">+----------+ 1. request slots +----------------+| JobMaster| ----------------&rarr; | ResourceManager|| | | || | | 2. allocate || | | worker || | +-------+--------+| | || | 3. new TaskManager| | starts &amp; registers| | || | +-------v--------+| | 4. offer slots | TaskExecutor || | &larr;---------------- | || | +----------------+| 5. deploy tasks+----------+</div><p>Flink 2.2 uses <strong>declarative resource management</strong>: the <code>SlotPoolService</code> declares <code>ResourceRequirements</code> (how many slots needed) rather than requesting individual slots.</p><h3>Heartbeat-Based Failure Detection</h3><p>If a heartbeat times out, failover procedures begin: TM removal, task failures, slot releases, or re-registration with new leader.</p>`},
{m:1,t:"Deployment: Standalone, YARN & Kubernetes",c:`<h1>Deployment: Standalone, YARN &amp; Kubernetes</h1><table><tr><th>Aspect</th><th>Standalone</th><th>YARN</th><th>Kubernetes</th></tr><tr><td>Worker scaling</td><td>Manual</td><td>Dynamic (containers)</td><td>Dynamic (pods)</td></tr><tr><td>HA mechanism</td><td>ZooKeeper + FS</td><td>ZooKeeper + HDFS</td><td>K8s ConfigMaps</td></tr><tr><td>Resource isolation</td><td>Process-level</td><td>Container-level</td><td>Pod-level</td></tr><tr><td>ResourceManager</td><td><code>StandaloneRM</code></td><td><code>YarnRM</code></td><td><code>KubernetesRM</code></td></tr><tr><td>Production ready</td><td>Limited</td><td>Yes</td><td><strong>Recommended</strong></td></tr></table><div class="real"><strong>Real-world:</strong> Kubernetes is the recommended deployment target for Flink 2.2. It provides native HA via ConfigMaps (no ZooKeeper needed), auto-scaling via pod creation/deletion, and native integration with K8s services and secrets.</div>`},
{m:1,t:"Architecture Key Class Reference",c:`<h1>Architecture Key Class Reference</h1><h3>JobManager Side</h3><table><tr><th>Class</th><th>Role</th></tr><tr><td><code>ClusterEntrypoint</code></td><td>JVM entry point, bootstraps all JM components</td></tr><tr><td><code>Dispatcher</code></td><td>Receives jobs, manages JobManagerRunners</td></tr><tr><td><code>ResourceManager</code></td><td>Manages workers and slots</td></tr><tr><td><code>SlotManager</code></td><td>Matches slot requests to available slots</td></tr><tr><td><code>JobMaster</code></td><td>Manages execution of a single job</td></tr><tr><td><code>SchedulerNG</code></td><td>Scheduling engine</td></tr></table><h3>TaskManager Side</h3><table><tr><th>Class</th><th>Role</th></tr><tr><td><code>TaskManagerRunner</code></td><td>JVM entry point for TM</td></tr><tr><td><code>TaskExecutor</code></td><td>RPC endpoint, manages slots and tasks</td></tr><tr><td><code>TaskSlotTable</code></td><td>Manages task slot lifecycle</td></tr><tr><td><code>Task</code></td><td>Single running task (thread)</td></tr></table><h3>Graph Pipeline</h3><table><tr><th>Class</th><th>Role</th></tr><tr><td><code>StreamGraph</code></td><td>User-level DAG</td></tr><tr><td><code>StreamingJobGraphGenerator</code></td><td>StreamGraph &rarr; JobGraph (chaining)</td></tr><tr><td><code>JobGraph</code> / <code>JobVertex</code></td><td>Transport-level DAG</td></tr><tr><td><code>ExecutionGraph</code></td><td>Runtime-level DAG</td></tr></table>`},
{m:2,t:"What is a DataStream",c:`<h1>What is a DataStream</h1><p>A <code>DataStream&lt;T&gt;</code> is the fundamental abstraction for a continuous, potentially unbounded collection of typed records flowing through a distributed pipeline.</p><h3>Key Properties</h3><ul><li><strong>Typed</strong>: every stream carries records of a single type <code>T</code></li><li><strong>Partitioned</strong>: records are distributed across parallel subtasks</li><li><strong>Ordered within partition</strong>: order maintained per partition, not globally</li><li><strong>Lazy evaluation</strong>: nothing executes until <code>env.execute()</code></li></ul><div class="diagram">+-----------+ +-----------+ +-----------+| Source | &rarr; | Map | &rarr; | Sink || (par=2) | | (par=4) | | (par=2) |+-----------+ +-----------+ +-----------+
Each box is an operator with configurable parallelism.Arrows represent data exchange (network or local-forward).</div>`},
{m:2,t:"V1 Core Transformations",c:`<h1>V1 Core Transformations</h1><h3>map &mdash; One-to-one</h3><pre>DataStream&lt;Integer&gt; lengths = input.map(s -&gt; s.length());// "hello" &rarr; 5</pre><h3>flatMap &mdash; One-to-zero-or-more</h3><pre>DataStream&lt;String&gt; words = input.flatMap((String line, Collector&lt;String&gt; out) -&gt; {for (String word : line.split(" ")) {out.collect(word);}});// "hello world" &rarr; "hello", "world"</pre><h3>filter &mdash; Predicate-based selection</h3><pre>DataStream&lt;String&gt; nonEmpty = input.filter(s -&gt; !s.isEmpty());</pre><h3>keyBy &mdash; Logical partitioning by key</h3><pre>KeyedStream&lt;Event, String&gt; keyed = events.keyBy(e -&gt; e.getUserId());</pre><div class="note"><strong>Key insight:</strong> <code>keyBy</code> hashes the key and guarantees all records with the same key go to the same subtask, enabling keyed state access.</div>`},
{m:2,t:"KeyedStream, Aggregations & Physical Partitioning",c:`<h1>KeyedStream, Aggregations &amp; Physical Partitioning</h1><h3>Built-in Aggregations</h3><pre>KeyedStream&lt;Tuple2&lt;String, Long&gt;, String&gt; keyed = tuples.keyBy(t -&gt; t.f0);DataStream&lt;Tuple2&lt;String, Long&gt;&gt; summed = keyed.sum(1);DataStream&lt;Tuple2&lt;String, Long&gt;&gt; maxed = keyed.max(1);DataStream&lt;Tuple2&lt;String, Long&gt;&gt; reduced = keyed.reduce((a, b) -&gt; Tuple2.of(a.f0, a.f1 + b.f1));</pre><h3>Physical Partitioning</h3><table><tr><th>Method</th><th>Behavior</th><th>Use Case</th></tr><tr><td><code>shuffle()</code></td><td>Random uniform redistribution</td><td>Load balancing</td></tr><tr><td><code>rebalance()</code></td><td>Round-robin to all downstream</td><td>Even distribution</td></tr><tr><td><code>rescale()</code></td><td>Round-robin within local group</td><td>Efficient local redistribution</td></tr><tr><td><code>broadcast()</code></td><td>Every record to all subtasks</td><td>Small lookup tables</td></tr></table><div class="tip"><strong>Tip:</strong> <code>rebalance()</code> creates N&times;M channels (all-to-all). <code>rescale()</code> creates only local connections &mdash; more efficient for co-located operators.</div>`},
{m:2,t:"Connected Streams & CoProcessFunction",c:`<h1>Connected Streams &amp; CoProcessFunction</h1><p><code>ConnectedStreams</code> merges two streams of <em>potentially different types</em> into a single operator with shared state.</p><pre>DataStream&lt;ControlEvent&gt; controlStream = ...;DataStream&lt;DataEvent&gt; dataStream = ...;
ConnectedStreams&lt;ControlEvent, DataEvent&gt; connected =controlStream.connect(dataStream);
DataStream&lt;EnrichedEvent&gt; result = connected.process(new CoProcessFunction&lt;ControlEvent, DataEvent, EnrichedEvent&gt;() {private ValueState&lt;ControlEvent&gt; latestControl;
public void open(OpenContext ctx) {latestControl = getRuntimeContext().getState(new ValueStateDescriptor&lt;&gt;("control",ControlEvent.class));}
public void processElement1(ControlEvent ctrl, ...) {latestControl.update(ctrl);}
public void processElement2(DataEvent data, ...) {ControlEvent ctrl = latestControl.value();if (ctrl != null)out.collect(new EnrichedEvent(data, ctrl));}});</pre><div class="warn"><strong>Caution:</strong> When using <code>connect()</code> on keyed streams, both must be keyed by the <strong>same key type</strong>.</div>`},
{m:2,t:"ProcessFunction & Timers",c:`<h1>ProcessFunction &amp; Timers</h1><p><code>KeyedProcessFunction</code> is the lowest-level V1 transformation. Provides access to the current key, timestamp, timers, and side outputs.</p><pre>public abstract class KeyedProcessFunction&lt;K, I, O&gt; {public abstract void processElement(I value, Context ctx, Collector&lt;O&gt; out);
public void onTimer(long timestamp, OnTimerContext ctx, Collector&lt;O&gt; out) {}}</pre><h3>Timer Registration</h3><pre>// Processing-time timerctx.timerService().registerProcessingTimeTimer(ctx.timerService().currentProcessingTime() + 60_000L);
// Event-time timerctx.timerService().registerEventTimeTimer(ctx.timestamp() + Duration.ofMinutes(5).toMillis());</pre><h3>Side Outputs</h3><pre>OutputTag&lt;String&gt; lateTag = new OutputTag&lt;String&gt;("late-data") {};ctx.output(lateTag, "late: " + value);DataStream&lt;String&gt; lateData = mainStream.getSideOutput(lateTag);</pre>`},
{m:2,t:"Async I/O for External Enrichment",c:`<h1>Async I/O for External Enrichment</h1><p>For enriching streams with external data (databases, REST APIs), use <code>AsyncDataStream</code> to avoid blocking the processing thread.</p><pre>public class AsyncDatabaseLookupimplements AsyncFunction&lt;String, Tuple2&lt;String, String&gt;&gt; {
public void asyncInvoke(String key,ResultFuture&lt;Tuple2&lt;String, String&gt;&gt; resultFuture) {CompletableFuture&lt;String&gt; dbResult = client.asyncGet(key);dbResult.thenAccept(value -&gt;resultFuture.complete(Collections.singleton(Tuple2.of(key, value))));}}
DataStream&lt;...&gt; enriched = AsyncDataStream.unorderedWait(input, new AsyncDatabaseLookup(),30, TimeUnit.SECONDS, // timeout100); // max concurrent requests</pre><table><tr><th>Mode</th><th>Guarantees</th><th>Throughput</th></tr><tr><td><code>orderedWait()</code></td><td>Preserves input order</td><td>Lower</td></tr><tr><td><code>unorderedWait()</code></td><td>First-completed order</td><td>Higher</td></tr></table>`},
{m:2,t:"DataStream V2 API: Stream Types",c:`<h1>DataStream V2 API: Stream Types</h1><p>Flink 2.2 introduces the <strong>DataStream V2 API</strong> (<code>@Experimental</code>) with four explicit stream types:</p><div class="diagram">+---------------------------+| DataStream (marker) |+---------------------------+| | | |+---------+ +--------+ +--------+ +-----------+|NonKeyed | |Keyed | |Global | |Broadcast ||Partition| |Partition| |Stream | |Stream ||Stream&lt;T&gt;| |Stream | |&lt;T&gt; | |&lt;T&gt; || | |&lt;K,T&gt; | | | | |+---------+ +--------+ +--------+ +-----------+| random | |hash-K | |single | |replicate || partition| |partns | |par=1 | |to all |+---------+ +--------+ +--------+ +-----------+</div><p>Partitioning semantics are <strong>explicit in the type system</strong> &mdash; no implicit state about how data is distributed.</p><h3>V2 Entry Point</h3><pre>ExecutionEnvironment env = ExecutionEnvironment.getInstance();NonKeyedPartitionStream&lt;String&gt; source =env.fromSource(mySource, "my-source");// ... transformations via process() ...env.execute("My V2 Job");</pre>`},
{m:2,t:"V2 Process Functions",c:`<h1>V2 Process Functions</h1><p>The V2 API unifies all user logic into <strong>process functions</strong>. No separate <code>map</code>, <code>filter</code>, <code>flatMap</code>.</p><div class="diagram">ProcessFunction (base)|+----+------------------+---------------------------+| | |OneInputStream TwoInputNonBroadcast TwoInputBroadcastProcessFunction StreamProcessFunction StreamProcessFunction&lt;IN, OUT&gt; &lt;IN1, IN2, OUT&gt; &lt;IN1, IN2, OUT&gt;</div><pre>public interface OneInputStreamProcessFunction&lt;IN, OUT&gt;extends ProcessFunction {
void processRecord(IN record, Collector&lt;OUT&gt; output,PartitionedContext&lt;OUT&gt; ctx);
default void onProcessingTimer(long timestamp,Collector&lt;OUT&gt; output, PartitionedContext&lt;OUT&gt; ctx) {}
default void endInput(NonPartitionedContext&lt;OUT&gt; ctx) {}}</pre><div class="note"><strong>Key insight:</strong> V2 is <strong>process-function-centric</strong>. Every transformation goes through <code>process()</code>. State must be declared upfront via <code>usesStates()</code>.</div>`},
{m:2,t:"V1 vs V2 Word Count Comparison",c:`<h1>V1 vs V2 Word Count Comparison</h1><h3>V1</h3><pre>env.fromElements("hello world", "hello flink").flatMap((line, out) -&gt; {for (String w : line.split(" "))out.collect(Tuple2.of(w, 1));}).keyBy(t -&gt; t.f0).sum(1).print();</pre><h3>V2</h3><pre>// State declared upfront as static finalstatic final ValueStateDeclaration&lt;Integer&gt; COUNT =StateDeclarations.valueState("count", TypeDescriptors.INT);
public Set&lt;StateDeclaration&gt; usesStates() {return Set.of(COUNT);}
public void processRecord(Tuple2&lt;String,Integer&gt; record,Collector&lt;...&gt; output, PartitionedContext&lt;...&gt; ctx) {ValueState&lt;Integer&gt; count =ctx.getStateManager().getState(COUNT);int n = (count.value() == null ? 0 : count.value()) + record.f1;count.update(n);output.collect(Tuple2.of(record.f0, n));}</pre><div class="tip"><strong>Tip:</strong> V2 trades brevity for explicitness. State is declared upfront, making it inspectable before execution.</div>`},
{m:2,t:"V1 vs V2 API Comparison Matrix",c:`<h1>V1 vs V2 API Comparison Matrix</h1><table><tr><th>Aspect</th><th>V1 API</th><th>V2 API</th></tr><tr><td>Module</td><td><code>flink-streaming-java</code></td><td><code>flink-datastream-api</code></td></tr><tr><td>Entry Point</td><td><code>StreamExecutionEnvironment</code></td><td><code>ExecutionEnvironment</code></td></tr><tr><td>Stream Types</td><td><code>DataStream</code>, <code>KeyedStream</code></td><td>4 explicit types (NonKeyed, Keyed, Global, Broadcast)</td></tr><tr><td>Transformations</td><td><code>map()</code>, <code>filter()</code>, <code>process()</code></td><td><code>process()</code> only (unified)</td></tr><tr><td>Two-Input</td><td><code>connect()</code> + CoProcessFunction</td><td><code>connectAndProcess()</code></td></tr><tr><td>State Access</td><td><code>RuntimeContext.getState(desc)</code></td><td><code>StateManager.getState(decl)</code></td></tr><tr><td>State Declaration</td><td>Implicit (in <code>open()</code>)</td><td>Explicit (<code>usesStates()</code>)</td></tr><tr><td>Async State</td><td>Not supported</td><td><code>StateFuture&lt;T&gt;</code>, <code>asyncValue()</code></td></tr><tr><td>Maturity</td><td><code>@Public</code></td><td><code>@Experimental</code></td></tr></table>`},
{m:3,t:"Why State Matters",c:`<h1>Why State Matters in Stream Processing</h1><p>Stream processing without state is just a fancy <code>forEach</code>. The moment you need to remember <em>anything</em> across records, you need state.</p><div class="diagram">Stateless: Stateful:record &rarr; transform &rarr; output record &rarr; transform &rarr; output(independent) | ^v |+-------+| State | checkpointed,+-------+ redistributable</div><p>Flink provides <strong>managed state</strong> that is:</p><ul><li><strong>Checkpointed</strong>: automatically snapshotted to durable storage</li><li><strong>Restored on failure</strong>: exactly-once guarantees via checkpoint/restore</li><li><strong>Redistributable</strong>: repartitioned when parallelism changes</li><li><strong>Backend-pluggable</strong>: HashMapStateBackend (heap) or ForSt/RocksDB (disk)</li></ul><div class="note"><strong>Key insight:</strong> Without managed state, you'd need an external database for every stateful operation, destroying throughput and exactly-once guarantees.</div>`},
{m:3,t:"Keyed State Types",c:`<h1>Keyed State Types</h1><p>Keyed state is partitioned by key and scoped to the current key of each record.</p><table><tr><th>State Type</th><th>Read</th><th>Write</th><th>Best For</th></tr><tr><td><code>ValueState&lt;T&gt;</code></td><td><code>T</code></td><td><code>update(T)</code></td><td>Single value per key (counters, timestamps)</td></tr><tr><td><code>ListState&lt;T&gt;</code></td><td><code>Iterable&lt;T&gt;</code></td><td><code>add(T)</code></td><td>Buffering events (sessions, patterns)</td></tr><tr><td><code>MapState&lt;UK,UV&gt;</code></td><td><code>UV get(UK)</code></td><td><code>put(UK,UV)</code></td><td>Per-key lookup tables</td></tr><tr><td><code>ReducingState&lt;T&gt;</code></td><td><code>T</code></td><td><code>add(T)</code></td><td>Same-type aggregation (sum, min, max)</td></tr><tr><td><code>AggregatingState&lt;IN,OUT&gt;</code></td><td><code>OUT</code></td><td><code>add(IN)</code></td><td>Cross-type aggregation (averages, histograms)</td></tr></table><div class="tip"><strong>Tip:</strong> Prefer <code>MapState&lt;UK,UV&gt;</code> over <code>ValueState&lt;Map&lt;UK,UV&gt;&gt;</code>. With RocksDB/ForSt, individual entries can be read without deserializing the entire map.</div>`},
{m:3,t:"State Descriptors & Registration (V1)",c:`<h1>State Descriptors &amp; Registration (V1)</h1><p>In V1, state is registered by creating a <code>StateDescriptor</code> and passing it to <code>RuntimeContext</code> during <code>open()</code>:</p><pre>public class MyFunctionextends KeyedProcessFunction&lt;String, Event, Result&gt; {
private ValueState&lt;Long&gt; count;private ListState&lt;Event&gt; buffer;private MapState&lt;String, Double&gt; features;
@Overridepublic void open(OpenContext ctx) throws Exception {count = getRuntimeContext().getState(new ValueStateDescriptor&lt;&gt;("count", Long.class));buffer = getRuntimeContext().getListState(new ListStateDescriptor&lt;&gt;("buffer", Event.class));features = getRuntimeContext().getMapState(new MapStateDescriptor&lt;&gt;("features",String.class, Double.class));}
@Overridepublic void processElement(Event e, Context ctx,Collector&lt;Result&gt; out) throws Exception {Long c = count.value();count.update(c == null ? 1L : c + 1);}}</pre>`},
{m:3,t:"State TTL (Time-To-Live)",c:`<h1>State TTL (Time-To-Live)</h1><p>State TTL automatically expires stale entries, preventing unbounded growth.</p><pre>StateTtlConfig ttlConfig = StateTtlConfig.newBuilder(Duration.ofHours(1)).setUpdateType(StateTtlConfig.UpdateType.OnCreateAndWrite).setStateVisibility(StateTtlConfig.StateVisibility.NeverReturnExpired).build();
ValueStateDescriptor&lt;Long&gt; desc =new ValueStateDescriptor&lt;&gt;("myState", Long.class);desc.enableTimeToLive(ttlConfig);</pre><h3>Update Types</h3><table><tr><th>UpdateType</th><th>TTL Refreshed When</th></tr><tr><td><code>OnCreateAndWrite</code></td><td>On initial creation and every write/update</td></tr><tr><td><code>OnReadAndWrite</code></td><td>On every read AND write (most aggressive)</td></tr></table><h3>Cleanup Strategies</h3><ul><li><strong>Incremental cleanup</strong> (heap): checks entries on each record access</li><li><strong>RocksDB compaction filter</strong>: removes expired entries during compaction</li><li><strong>Full snapshot cleanup</strong>: during checkpoints (expensive, avoid in production)</li></ul><div class="warn"><strong>Caution:</strong> TTL expiration is <em>lazy</em> by default. Expired entries may linger until cleanup runs.</div>`},
{m:3,t:"Operator State & Broadcast State",c:`<h1>Operator State &amp; Broadcast State</h1><h3>Operator State (Non-Keyed)</h3><p>Scoped to a parallel operator instance, not a key. Implement <code>CheckpointedFunction</code>:</p><pre>public interface CheckpointedFunction {void snapshotState(FunctionSnapshotContext ctx);void initializeState(FunctionInitializationContext ctx);}</pre><p>Redistribution modes:</p><table><tr><th>Method</th><th>Behavior</th></tr><tr><td><code>getListState()</code></td><td>Even-split: list is distributed evenly across new subtasks</td></tr><tr><td><code>getUnionListState()</code></td><td>Union: every subtask gets the full list</td></tr></table><h3>Broadcast State Pattern</h3><div class="diagram">Rules Stream &rarr; broadcast() --+| +---------------------++&rarr; | BroadcastProcessFn || | rules in MapState | &rarr; OutputData Stream (keyed) -----------+ | data against rules |+---------------------+</div><div class="warn"><strong>Caution:</strong> The non-broadcast side has <strong>read-only</strong> access to broadcast state. Only the broadcast side can write, preventing cross-instance inconsistencies.</div>`},
{m:3,t:"V2 State Declarations",c:`<h1>V2 State Declarations</h1><p>The V2 API introduces <strong>upfront declaration</strong> instead of runtime registration:</p><pre>public interface ProcessFunction extends Function {default Set&lt;StateDeclaration&gt; usesStates() {return Collections.emptySet();}}</pre><h3>Factory Methods</h3><pre>ValueStateDeclaration&lt;Long&gt; count =StateDeclarations.valueState("count", TypeDescriptors.LONG);
ListStateDeclaration&lt;String&gt; buffer =StateDeclarations.listState("buffer", TypeDescriptors.STRING);
MapStateDeclaration&lt;String, Double&gt; features =StateDeclarations.mapState("features",TypeDescriptors.STRING, TypeDescriptors.DOUBLE);
// Broadcast state via builderBroadcastStateDeclaration&lt;String, Rule&gt; rules =StateDeclarations.mapStateBuilder("rules",TypeDescriptors.STRING, ruleTypeDesc).buildBroadcast();</pre><div class="note"><strong>Key insight:</strong> Upfront declaration enables the framework to validate state access before execution, pre-create handles, and plan state migrations.</div>`},
{m:3,t:"V2 Async State Access",c:`<h1>V2 Async State Access</h1><p>V2 state interfaces add <strong>asynchronous methods</strong> alongside synchronous ones:</p><pre>// org.apache.flink.api.common.state.v2.ValueState&lt;T&gt;public interface ValueState&lt;T&gt; extends State {// Sync (blocking):T value();void update(T value);
// Async (non-blocking):StateFuture&lt;T&gt; asyncValue();StateFuture&lt;Void&gt; asyncUpdate(T value);}</pre><div class="diagram">Sync path: Async path:+----------+ +-------------+| value() | --block--&rarr; result | asyncValue()| &rarr; StateFuture&lt;T&gt;+----------+ +-------------+ |v.thenAccept(val -&gt; ...)</div><p>The async API enables Flink to <strong>overlap state access with processing</strong>, particularly beneficial with ForSt/RocksDB where state access involves disk I/O.</p><div class="real"><strong>Real-world:</strong> For high-throughput pipelines with large state on disk, async state access can significantly reduce per-record latency by hiding I/O wait time.</div>`},
{m:3,t:"Key Groups: State Redistribution",c:`<h1>Key Groups: The Unit of State Redistribution</h1><p>Key groups are the <em>atomic unit</em> of keyed state redistribution. Flink moves <strong>whole key groups</strong>, never individual keys.</p><pre>keyGroup = hash(key) % maxParallelism</pre><div class="diagram">maxParallelism = 128
With parallelism=4:Subtask-0: KeyGroupRange [0, 31] (32 key groups)Subtask-1: KeyGroupRange [32, 63] (32 key groups)Subtask-2: KeyGroupRange [64, 95] (32 key groups)Subtask-3: KeyGroupRange [96, 127] (32 key groups)
Rescale to parallelism=3:Subtask-0: KeyGroupRange [0, 42] (43 key groups)Subtask-1: KeyGroupRange [43, 84] (42 key groups)Subtask-2: KeyGroupRange [85, 127] (43 key groups)</div><h3>Rules</h3><ul><li><code>maxParallelism</code> is set once &mdash; <strong>cannot change</strong> after first checkpoint</li><li>Default: 128. Range: 1&ndash;32768</li><li>For even distribution, use powers of 2</li></ul>`},
{m:3,t:"State Schema Evolution",c:`<h1>State Schema Evolution</h1><p>When your state class changes between versions, Flink handles schema mismatch via <code>TypeSerializerSnapshot</code>:</p><pre>TypeSerializerSchemaCompatibility&lt;T&gt; result =oldSnapshot.resolveSchemaCompatibility(newSnapshot);
result.isCompatibleAsIs(); // No migrationresult.isCompatibleAfterMigration(); // Full state migrationresult.isIncompatible(); // Job fails</pre><h3>Safe Schema Changes</h3><table><tr><th>Change Type</th><th>Compatibility</th></tr><tr><td>Add nullable field to POJO</td><td>Compatible after migration</td></tr><tr><td>Remove field from POJO</td><td>Compatible after migration</td></tr><tr><td>Change field type</td><td>Usually incompatible</td></tr><tr><td>Rename field</td><td>Incompatible</td></tr><tr><td>Add enum value at end</td><td>Compatible as-is</td></tr><tr><td>Avro: add field with default</td><td>Compatible after migration</td></tr></table><div class="tip"><strong>Tip:</strong> For production state with schema evolution needs, prefer <strong>Avro or Protobuf</strong> with their built-in evolution rules over Java POJOs with Flink's POJO serializer.</div>`},
{m:3,t:"State Management Best Practices",c:`<h1>State Management Best Practices</h1><ol><li><strong>Always set State TTL</strong> to prevent unbounded growth:<pre>StateTtlConfig.newBuilder(Duration.ofDays(7)).updateTtlOnCreateAndWrite().setStateVisibility(NeverReturnExpired).build();</pre></li><li><strong>Prefer MapState over ValueState&lt;Map&gt;</strong> &mdash; individual entries are managed by the backend</li><li><strong>Set maxParallelism upfront</strong> &mdash; cannot change after first checkpoint</li><li><strong>Use descriptive state names</strong> &mdash; they appear in metrics and inspection tools</li><li><strong>Be careful with ListState</strong> &mdash; it grows unboundedly without TTL or cleanup</li><li><strong>Avoid large objects in ValueState</strong> &mdash; store references, keep data external</li><li><strong>V2: Declare ALL state in usesStates()</strong> &mdash; missing declarations cause runtime errors</li><li><strong>Test schema migration before deployment</strong> &mdash; take savepoint, restore with new version</li></ol><h3>Key Metrics to Watch</h3><table><tr><th>Metric</th><th>What It Tells You</th></tr><tr><td><code>rocksdb.estimate-num-keys</code></td><td>Approximate state entries</td></tr><tr><td><code>rocksdb.estimate-live-data-size</code></td><td>State size on disk</td></tr><tr><td><code>checkpointDuration</code></td><td>Grows with state size</td></tr></table>`},
{m:4,t:"Processing Time vs Event Time",c:`<h1>Processing Time vs Event Time</h1><div class="diagram">Event Time Ingestion Time Processing Time+------------------+ +------------------+ +------------------+| Timestamp lives | | Assigned at | | Wall clock of || INSIDE the event | | source intake | | the operator |+------------------+ +------------------+ +------------------+| | |v v vDeterministic, Per-run Non-deterministic,replayable deterministic not replayable</div><table><tr><th>Property</th><th>Event Time</th><th>Ingestion Time</th><th>Processing Time</th></tr><tr><td>Timestamp source</td><td>Embedded in event</td><td>Assigned at source</td><td>Operator wall clock</td></tr><tr><td>Determinism</td><td>Fully deterministic</td><td>Per-run deterministic</td><td>Non-deterministic</td></tr><tr><td>Replayability</td><td>Yes</td><td>No</td><td>No</td></tr><tr><td>Latency</td><td>Higher (waits for watermarks)</td><td>Medium</td><td>Lowest</td></tr></table><div class="note"><strong>Key insight:</strong> Event time is the only mode that produces <strong>correct, reproducible results</strong> when reprocessing historical data. Flink 2.2 defaults to event-time semantics.</div>`},
{m:4,t:"What is a Watermark?",c:`<h1>What is a Watermark?</h1><p><strong>Watermark(t)</strong> is an assertion that the stream is now complete through timestamp <em>t</em>. No more elements with a timestamp <code>&lt;= t</code> will arrive.</p><div class="diagram">Events: e1 e3 e2 e5 e4 e7 e6 e8Time: 10 30 20 50 40 70 60 80
With watermarks inserted periodically:
--[e1]--[e3]--[e2]--W(19)--[e5]--[e4]--W(39)--[e7]--[e6]--W(59)--&rarr;^ ^ ^W(19) means: W(39) means: W(59) means:"No more events "No more events "No more eventswith ts &lt;= 19" with ts &lt;= 39" with ts &lt;= 59"</div><h3>Watermark Properties</h3><ol><li><strong>Monotonically non-decreasing</strong>: can only advance forward, never backward</li><li><strong>Heuristic</strong>: in practice, often estimates &mdash; late data can still arrive</li><li><strong>Per-partition</strong>: each parallel source subtask generates its own watermarks</li><li><strong>Special values</strong>: <code>Long.MIN_VALUE</code> = beginning of time; <code>Long.MAX_VALUE</code> = end of stream</li></ol>`},
{m:4,t:"WatermarkStrategy Interface",c:`<h1>WatermarkStrategy Interface</h1><p><code>WatermarkStrategy&lt;T&gt;</code> is the central entry point for configuring watermark generation. It creates both a <code>WatermarkGenerator</code> and a <code>TimestampAssigner</code>.</p><pre>public interface WatermarkStrategy&lt;T&gt;extends TimestampAssignerSupplier&lt;T&gt;,WatermarkGeneratorSupplier&lt;T&gt; {
WatermarkGenerator&lt;T&gt; createWatermarkGenerator(Context ctx);
default TimestampAssigner&lt;T&gt; createTimestampAssigner(Context ctx) {return new RecordTimestampAssigner&lt;&gt;();}
// Builder methodsdefault WatermarkStrategy&lt;T&gt; withTimestampAssigner(...) {}default WatermarkStrategy&lt;T&gt; withIdleness(Duration) {}default WatermarkStrategy&lt;T&gt; withWatermarkAlignment(...) {}
// Factory methodsstatic &lt;T&gt; WatermarkStrategy&lt;T&gt; forMonotonousTimestamps() {}static &lt;T&gt; WatermarkStrategy&lt;T&gt; forBoundedOutOfOrderness(Duration) {}static &lt;T&gt; WatermarkStrategy&lt;T&gt; noWatermarks() {}}</pre><h3>Usage</h3><pre>DataStream&lt;SensorReading&gt; stream = env.fromSource(kafkaSource,WatermarkStrategy.&lt;SensorReading&gt;forBoundedOutOfOrderness(Duration.ofSeconds(5)).withTimestampAssigner((event, ts) -&gt; event.getEventTime()).withIdleness(Duration.ofMinutes(1)),"kafka-source");</pre>`},
{m:4,t:"Built-in Watermark Strategies",c:`<h1>Built-in Watermark Strategies</h1><h3>forMonotonousTimestamps()</h3><p>Use when events arrive <strong>in order</strong> per partition. Equivalent to bounded-out-of-orderness with bound = 0.</p><p>Formula: <code>W(t) = maxTimestamp - 1</code></p><h3>forBoundedOutOfOrderness(Duration)</h3><p>The <strong>most commonly used</strong> strategy. Accounts for events arriving up to the specified duration late.</p><p>Formula: <code>W(t) = maxSeenTimestamp - maxOutOfOrderness - 1</code></p><pre>// Example with maxOutOfOrderness = 5 seconds:// Events: [ts=10] [ts=20] [ts=15] [ts=25] [ts=18]// maxTs: 10 20 20 25 25//// Periodic emit: W = 25 - 5000 - 1 = 19999ms// Event ts=18 (18000ms) is safe; ts=15 (15000ms) is safe</pre><h3>Strategy Selection</h3><div class="diagram">Is your data ordered?/ \\YES NO| |forMonotonousTimestamps() Do you know the max delay?/ \\YES NO| |forBoundedOutOfOrderness(D) Custom WatermarkGenerator</div>`},
{m:4,t:"Custom WatermarkGenerator",c:`<h1>Custom WatermarkGenerator</h1><pre>public interface WatermarkGenerator&lt;T&gt; {// Called for every eventvoid onEvent(T event, long eventTimestamp, WatermarkOutput output);
// Called periodically (default: every 200ms)void onPeriodicEmit(WatermarkOutput output);}</pre><h3>Periodic Generator Example</h3><pre>public class AdaptiveWatermarkGeneratorimplements WatermarkGenerator&lt;SensorReading&gt; {private long maxTimestamp = Long.MIN_VALUE;
public void onEvent(SensorReading event, long eventTs,WatermarkOutput output) {maxTimestamp = Math.max(maxTimestamp, eventTs);}
public void onPeriodicEmit(WatermarkOutput output) {output.emitWatermark(new Watermark(maxTimestamp - 5000 - 1));}}</pre><h3>Punctuated Generator</h3><pre>// Emits watermarks based on special marker eventspublic void onEvent(ControlEvent event, long eventTs,WatermarkOutput output) {if (event.isWatermarkMarker()) {output.emitWatermark(new Watermark(event.getTimestamp()));}}</pre><div class="tip"><strong>Tip:</strong> Set the periodic emit interval via <code>env.getConfig().setAutoWatermarkInterval(200)</code>. Setting to 0 disables periodic generation entirely.</div>`},
{m:4,t:"Watermark Propagation: The Min-of-Inputs Rule",c:`<h1>Watermark Propagation</h1><p>When an operator has multiple input channels, it computes its watermark as the <strong>minimum of all input watermarks</strong>.</p><div class="diagram">Source-1 (partition 0) &rarr; W(35) --\\\\Source-1 (partition 1) &rarr; W(42) ---+--&rarr; Operator: min(35, 42, 28) = W(28)/Source-2 (partition 0) &rarr; W(28) --/</div><h3>Multi-Stage Propagation</h3><div class="diagram">[Source-1] [Source-2] [Source-3]W(100) W(80) W(120)\\ | /v v v[ keyBy() / Shuffle ]\\ | /v v v[Op Instance 1] [Op Instance 2]min = W(80) min = W(80)\\ /v v[ Downstream Operator ]min = W(80)</div><div class="note"><strong>Key insight:</strong> The minimum rule is conservative &mdash; it guarantees no event with timestamp <code>&lt;= min watermark</code> will arrive from any input. If one channel stalls, the entire operator's watermark stalls.</div>`},
{m:4,t:"Handling Idle Sources",c:`<h1>Handling Idle Sources</h1><h3>The Problem</h3><p>If a Kafka topic has 100 partitions but only 30 have active data, the 70 idle partitions hold watermarks at <code>Long.MIN_VALUE</code>, <strong>stalling the entire pipeline</strong>.</p><div class="diagram">Partition 0: [e1, e2, e3, ...] W(1000) -- activePartition 1: [empty] W(-inf) -- STALLS everything!Partition 2: [e4, e5, ...] W(900) -- active
Operator watermark = min(1000, -inf, 900) = -inf (STUCK!)</div><h3>The Solution: withIdleness()</h3><pre>WatermarkStrategy.&lt;Event&gt;forBoundedOutOfOrderness(Duration.ofSeconds(5)).withTimestampAssigner((e, ts) -&gt; e.getTimestamp()).withIdleness(Duration.ofMinutes(1));</pre><div class="diagram">AFTER withIdleness(1 min):Partition 0: W(1000) Partition 1: [IDLE] Partition 2: W(900)Combined = min(1000, 900) = 900 &larr; Progressing!</div><p>Idle partitions are excluded from the minimum calculation. When data arrives again, the partition automatically becomes active.</p>`},
{m:4,t:"Watermark Alignment Across Sources",c:`<h1>Watermark Alignment Across Sources</h1><h3>The Problem</h3><p>When sources read at different speeds, a fast source gets far ahead in event time, causing excessive state buffering for joins/windows.</p><h3>The Solution</h3><pre>WatermarkStrategy&lt;Event&gt; strategy = WatermarkStrategy.&lt;Event&gt;forBoundedOutOfOrderness(Duration.ofSeconds(5)).withTimestampAssigner((e, ts) -&gt; e.getTimestamp()).withWatermarkAlignment("my-group", Duration.ofSeconds(30));</pre><div class="diagram">Alignment Coordinator (JobManager)|+-----------+-----------+| |Source-1 Source-2W(1000) W(500)| |drift = 1000 - 500 = 500 &gt; 300 (maxDrift)=&gt; PAUSE Source-1 until Source-2 catches up
Once Source-2 reaches W(700):drift = 1000 - 700 = 300 &lt;= 300=&gt; RESUME Source-1</div><table><tr><th>Parameter</th><th>Description</th><th>Typical Value</th></tr><tr><td><code>watermarkGroup</code></td><td>Logical group name</td><td><code>"my-group"</code></td></tr><tr><td><code>maxAllowedWatermarkDrift</code></td><td>Max drift before pausing</td><td>10&ndash;60 seconds</td></tr><tr><td><code>updateInterval</code></td><td>Report frequency to coordinator</td><td>1&ndash;5 seconds</td></tr></table>`},
{m:4,t:"Impact on Windows, Timers & Late Data",c:`<h1>Impact on Windows, Timers &amp; Late Data</h1><h3>Windows</h3><p>Event-time windows fire when the watermark passes the window's end timestamp:</p><pre>// From EventTimeTrigger.java:if (window.maxTimestamp() &lt;= ctx.getCurrentWatermark()) {return TriggerResult.FIRE;} else {ctx.registerEventTimeTimer(window.maxTimestamp());return TriggerResult.CONTINUE;}</pre><h3>Timers</h3><pre>// Fire when watermark &gt;= registered timectx.timerService().registerEventTimeTimer(eventTimestamp + 30_000L);</pre><h3>Late Data</h3><div class="diagram">Event ts=10:03:00 arrives, but current watermark = 10:05:00=&gt; This event is LATE for window [10:00, 10:05)
Options:1. Drop it (default)2. Route to side output: .sideOutputLateData(lateTag)3. Re-fire window: .allowedLateness(Duration.ofMinutes(1))</div><pre>OutputTag&lt;Event&gt; lateTag = new OutputTag&lt;Event&gt;("late") {};stream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).allowedLateness(Duration.ofMinutes(1)).sideOutputLateData(lateTag).process(new MyWindowFunction());DataStream&lt;Event&gt; lateStream = result.getSideOutput(lateTag);</pre>`},
{m:4,t:"Common Watermark Pitfalls",c:`<h1>Common Watermark Pitfalls</h1><h3>1. Timestamps in Wrong Unit</h3><pre>// BUG: epoch seconds instead of milliseconds.withTimestampAssigner((e, ts) -&gt; e.getEpochSeconds())// Flink interprets as January 1970!
// FIX:.withTimestampAssigner((e, ts) -&gt; e.getEpochSeconds() * 1000L)</pre><h3>2. Idle Partitions Without withIdleness()</h3><p>100 Kafka partitions, only 30 active &rarr; watermark stuck at <code>Long.MIN_VALUE</code>. Always add <code>.withIdleness(Duration.ofMinutes(1))</code>.</p><h3>3. Out-of-Orderness Too Small</h3><pre>// maxOutOfOrderness = 1 second, actual skew = 30 seconds// Result: ~95% of out-of-order events dropped as "late"!// Fix: Measure actual data skew (P99) and add safety margin</pre><h3>4. Watermark Alignment Missing for Multi-Source Joins</h3><p>Fast source buffers gigabytes of state while slow source catches up &rarr; OOM risk. Add <code>.withWatermarkAlignment("group", Duration.ofSeconds(30))</code>.</p><h3>5. Mixing Processing Time in Watermark Generation</h3><pre>// WRONG:output.emitWatermark(new Watermark(System.currentTimeMillis()));// RIGHT:output.emitWatermark(new Watermark(maxTimestamp - outOfOrderness - 1));</pre><div class="warn"><strong>Caution:</strong> When debugging stalled watermarks, check the Flink Web UI "Current Watermark" metric per subtask. Look for subtasks stuck at <code>Long.MIN_VALUE</code>.</div>`},{m:5,t:"Why Windows Exist",c:`<h1>Windowing Deep Dive</h1><h2>Why Windows Exist in Unbounded Streams</h2><p>Unbounded streams have no natural end. Aggregations, joins, and pattern detection all require a finite scope. Windows slice the infinite stream into finite, manageable chunks.</p><div class="diagram">Unbounded Stream:... &mdash;[e1]&mdash;[e2]&mdash;[e3]&mdash;[e4]&mdash;[e5]&mdash;[e6]&mdash;[e7]&mdash;[e8]&mdash;[e9]&rarr; (forever)
With Windows:+----------+ +----------+ +----------+| Window 1 | | Window 2 | | Window 3 | ...| e1,e2,e3 | | e4,e5,e6 | | e7,e8,e9 || SUM = 60 | | SUM = 90 | | SUM = 75 |+----------+ +----------+ +----------+</div><h3>The Window Lifecycle</h3><ol><li><strong>ASSIGN</strong> &mdash; WindowAssigner determines which window(s) an element belongs to</li><li><strong>BUFFER</strong> &mdash; Element is added to the window&rsquo;s state</li><li><strong>TRIGGER</strong> &mdash; Trigger decides when the window function should execute</li><li><strong>COMPUTE</strong> &mdash; Window function processes all elements in the window</li><li><strong>EVICT</strong> &mdash; (Optional) Evictor removes elements before/after computation</li><li><strong>PURGE</strong> &mdash; Window state is cleaned up after allowed lateness expires</li></ol><div class="note"><strong>Key insight:</strong> <code>WindowAssigner.assignWindows()</code> returns a <em>Collection</em>, meaning a single element can belong to multiple windows &mdash; this is how sliding windows work.</div>`},
{m:5,t:"Tumbling & Sliding Windows",c:`<h1>Tumbling &amp; Sliding Windows</h1><h2>Tumbling Windows</h2><p>Non-overlapping, fixed-size windows that cover the entire time axis with no gaps. Each element belongs to exactly <strong>one</strong> window.</p><div class="diagram">Tumbling Windows (size = 5 min):
| Window1 | Window2 | Window3 | Window4 || [0,5) | [5,10) | [10,15) | [15,20) |+---------+---------+---------+---------+&rarr; time (min)0 5 10 15 20</div><pre>// 5-minute tumbling event-time windowstream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).reduce((a, b) -&gt; new Event(a.key, a.value + b.value));</pre><h2>Sliding Windows</h2><p>Overlapping windows of fixed size that advance by a fixed slide interval. Each element is assigned to <code>ceil(size / slide)</code> windows.</p><div class="diagram">Sliding Windows (size = 10 min, slide = 5 min):
|&lt;---- Window 1 ----&gt;|| |&lt;---- Window 2 ----&gt;|| | |&lt;---- Window 3 ----&gt;|+---------+---------+---------+---------+&rarr; time0 5 10 15 20</div><div class="warn"><strong>Caution:</strong> A 24-hour window with a 15-minute slide means each event is copied into <strong>96 windows</strong>. This is a 96x state amplification factor. Avoid large size-to-slide ratios.</div>`},
{m:5,t:"Session & Global Windows",c:`<h1>Session &amp; Global Windows</h1><h2>Session Windows</h2><p>Dynamic windows that group events by activity. A new window is created for each burst of activity, and windows are merged when the gap between events is smaller than the configured session gap.</p><div class="diagram">Session Windows (gap = 5 min):
Events: e1 e2 e3 e4 e5 e6 e7Time: 0 2 4 12 13 14 25
|&lt;- Session 1 -&gt;| |&lt;- Session 2 -&gt;| |&lt;- S3 -&gt;|| e1, e2, e3 | | e4, e5, e6 | | e7 || [0, 9) | | [12, 19) | | [25,30)|</div><pre>// Static gap session windowstream.keyBy(Event::getUserId).window(EventTimeSessionWindows.withGap(Duration.ofMinutes(10))).process(new SessionAnalysis());
// Dynamic gap: different timeout per event typestream.keyBy(Event::getUserId).window(DynamicEventTimeSessionWindows.withDynamicGap((event) -&gt; event.isPremiumUser()? Duration.ofMinutes(30).toMillis(): Duration.ofMinutes(5).toMillis())).process(new SessionAnalysis());</pre><h2>Global Windows</h2><p>A single window per key containing all elements. <strong>Never fires by default</strong> &mdash; you must provide a custom trigger.</p><pre>stream.keyBy(Event::getKey).window(GlobalWindows.create()).trigger(CountTrigger.of(100)).process(new BatchProcessor());</pre><div class="note"><strong>Key insight:</strong> Session windows use <code>MergingWindowAssigner</code>. When a new event arrives, its initial window may overlap with existing windows, triggering a cascade of merges.</div>`},
{m:5,t:"Window Functions: Reduce, Aggregate, Process",c:`<h1>Window Functions</h1><h2>ReduceFunction (Incremental, O(1) State)</h2><p>Pre-aggregates elements as they arrive. Only stores a single accumulated value per window.</p><pre>stream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).reduce((a, b) -&gt; new Event(a.key, a.value + b.value));</pre><h2>AggregateFunction (Incremental, Flexible Types)</h2><p>Supports different input, accumulator, and output types. Still O(1) state per window.</p><pre>// AggregateFunction&lt;IN, ACC, OUT&gt;public interface AggregateFunction&lt;IN, ACC, OUT&gt; {ACC createAccumulator();ACC add(IN value, ACC accumulator);OUT getResult(ACC accumulator);ACC merge(ACC a, ACC b); // Required for session windows}</pre><h2>ProcessWindowFunction (Full Window, O(n) State)</h2><p>Has access to all elements and window metadata, but must buffer all elements in state.</p><pre>stream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).process(new ProcessWindowFunction&lt;Event, Result, String, TimeWindow&gt;() {public void process(String key, Context ctx,Iterable&lt;Event&gt; elements, Collector&lt;Result&gt; out) {TimeWindow window = ctx.window();// Access all elements + window start/end}});</pre><div class="tip"><strong>Tip:</strong> Prefer <code>ReduceFunction</code> or <code>AggregateFunction</code> over <code>ProcessWindowFunction</code> whenever possible. O(1) vs O(n) state makes a massive difference at scale.</div>`},
{m:5,t:"Combining Incremental + Full Window Functions",c:`<h1>The Best of Both Worlds</h1><h2>Aggregate + ProcessWindowFunction</h2><p>Use an <code>AggregateFunction</code> for incremental pre-aggregation, then pass the result to a <code>ProcessWindowFunction</code> for window metadata access.</p><pre>stream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).aggregate(new AverageAggregate(), // O(1) statenew ProcessWindowFunction&lt;Double, WindowedAverage, String, TimeWindow&gt;() {public void process(String key, Context ctx,Iterable&lt;Double&gt; averages, Collector&lt;WindowedAverage&gt; out) {Double avg = averages.iterator().next(); // single element!TimeWindow w = ctx.window();out.collect(new WindowedAverage(key, w.getStart(), w.getEnd(), avg));}});</pre><div class="diagram">How it works internally:
Events arrive: [e1] [e2] [e3] [e4] [e5]| | | | |v v v v vAggregateFunction.add() called incrementallyAccumulator: (sum=150, count=5) &larr; O(1) state|| (window fires)vAggregateFunction.getResult() &rarr; 30.0|vProcessWindowFunction.process()receives: Iterable&lt;Double&gt; = [30.0] &larr; single element!has access to: window start, end, key, side outputs</div><div class="note"><strong>Key insight:</strong> This pattern gives O(1) state during accumulation (from AggregateFunction) plus window metadata at output time (from ProcessWindowFunction). Always prefer this over a raw ProcessWindowFunction.</div>`},
{m:5,t:"Triggers & TriggerResult",c:`<h1>Triggers</h1><h2>Trigger API</h2><p>Triggers determine when a window is ready to be processed. Each <code>WindowAssigner</code> provides a default trigger, but you can override it.</p><pre>public abstract class Trigger&lt;T, W extends Window&gt; {TriggerResult onElement(T element, long timestamp, W window, TriggerContext ctx);TriggerResult onProcessingTime(long time, W window, TriggerContext ctx);TriggerResult onEventTime(long time, W window, TriggerContext ctx);void onMerge(W window, OnMergeContext ctx);void clear(W window, TriggerContext ctx);}</pre><h2>TriggerResult Values</h2><table><tr><th>Value</th><th>Behavior</th></tr><tr><td><code>CONTINUE</code></td><td>Do nothing, keep accumulating</td></tr><tr><td><code>FIRE</code></td><td>Fire the window function, keep window contents</td></tr><tr><td><code>PURGE</code></td><td>Discard window contents without firing</td></tr><tr><td><code>FIRE_AND_PURGE</code></td><td>Fire the window function, then discard contents</td></tr></table><h2>Built-in Triggers</h2><ul><li><strong>EventTimeTrigger</strong> &mdash; fires once when watermark passes <code>window.maxTimestamp()</code> (default for event-time windows)</li><li><strong>ProcessingTimeTrigger</strong> &mdash; fires when wall-clock time passes window end</li><li><strong>CountTrigger</strong> &mdash; fires when element count reaches a threshold</li><li><strong>ContinuousEventTimeTrigger</strong> &mdash; fires periodically for early/partial results from long windows</li><li><strong>PurgingTrigger</strong> &mdash; wraps another trigger and adds automatic purging after each fire</li></ul><pre>// 1-hour window, but emit partial results every 1 minutestream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofHours(1))).trigger(ContinuousEventTimeTrigger.of(Duration.ofMinutes(1))).process(new HourlyAggregation());</pre>`},
{m:5,t:"Allowed Lateness & Side Output for Late Data",c:`<h1>Late Data Handling</h1><h2>Default Behavior</h2><p>By default, a window is purged immediately after the watermark passes <code>window.maxTimestamp()</code>. Any later element is silently dropped.</p><h2>Allowed Lateness</h2><p>Configures how long to keep window state after the watermark passes, allowing the window to re-fire with updated results.</p><div class="diagram">Window [10:00, 10:05):maxTimestamp = 10:04:59.999
|--- Window [10:00,10:05) ---|| |-- allowed lateness (1 min) --|10:00 10:05 10:06^ ^FIRE PURGE (state deleted)(first result)</div><h2>Side Output for Late Data</h2><pre>OutputTag&lt;Event&gt; lateTag = new OutputTag&lt;Event&gt;("late-events") {};
SingleOutputStreamOperator&lt;Result&gt; mainResult = stream.keyBy(Event::getKey).window(TumblingEventTimeWindows.of(Duration.ofMinutes(5))).allowedLateness(Duration.ofMinutes(1)).sideOutputLateData(lateTag).reduce(sumReducer);
// Retrieve and handle the late data streamDataStream&lt;Event&gt; lateEvents = mainResult.getSideOutput(lateTag);lateEvents.sinkTo(deadLetterSink); // Option 1: dead-letter queue</pre><div class="real"><strong>Real-world:</strong> In production, always configure allowed lateness and a side output for late data. Silently dropping events makes debugging nearly impossible. Send late events to a dead-letter topic for investigation.</div>`},
{m:5,t:"Window Joins: Join, Interval Join, CoGroup",c:`<h1>Window Joins</h1><h2>Window Join (Inner Join)</h2><p>Joins elements from two streams that fall into the same time window. Produces the Cartesian product on matching keys within each window.</p><pre>orders.join(shipments).where(Order::getOrderId).equalTo(Shipment::getOrderId).window(TumblingEventTimeWindows.of(Duration.ofMinutes(10))).apply((order, shipment) -&gt; new EnrichedOrder(order, shipment));</pre><h2>Interval Join</h2><p>Joins elements from two keyed streams where timestamps fall within a relative interval. No windows &mdash; works element by element.</p><pre>orders.keyBy(Order::getOrderId).intervalJoin(shipments.keyBy(Shipment::getOrderId)).between(Duration.ofMinutes(-5), Duration.ofMinutes(30)).process((order, shipment, ctx, out) -&gt;out.collect(new EnrichedOrder(order, shipment)));</pre><div class="diagram">Interval Join (between -5 min and +30 min):
For each order at time t:Match with shipments in [t - 5min, t + 30min]
Order (t=100):|&lt;--- -5min ---|--- order ---|--- +30min ---&gt;|95 100 130</div><h2>CoGroup (Outer Join Support)</h2><p>Like a window join but provides access to all elements from both sides, including unmatched elements &mdash; enabling LEFT, RIGHT, or FULL OUTER joins.</p><div class="tip"><strong>Tip:</strong> Use <code>intervalJoin</code> when the two streams have different event rates. It avoids buffering entire windows and instead uses per-element time ranges.</div>`},
{m:5,t:"V2 Window API (Flink 2.2)",c:`<h1>NEW: V2 Window API</h1><h2>WindowStrategy &mdash; Unified Entry Point</h2><p>Flink 2.2 introduces a new windowing model under <code>flink-datastream-api</code> (marked <code>@Experimental</code>) with a cleaner, more unified abstraction.</p><table><tr><th>V1 API</th><th>V2 API</th></tr><tr><td><code>TumblingEventTimeWindows.of(5min)</code></td><td><code>WindowStrategy.tumbling(5min)</code></td></tr><tr><td><code>SlidingEventTimeWindows.of(1h, 5min)</code></td><td><code>WindowStrategy.sliding(1h, 5min)</code></td></tr><tr><td><code>EventTimeSessionWindows.withGap(10min)</code></td><td><code>WindowStrategy.session(10min)</code></td></tr><tr><td><code>TumblingProcessingTimeWindows.of(5min)</code></td><td><code>WindowStrategy.tumbling(5min, PROCESSING_TIME)</code></td></tr><tr><td><code>GlobalWindows.create()</code></td><td><code>WindowStrategy.global()</code></td></tr></table><h2>OneInputWindowStreamProcessFunction</h2><pre>keyedStream.window(WindowStrategy.tumbling(Duration.ofMinutes(5),WindowStrategy.EVENT_TIME,Duration.ofMinutes(1))) // allowed lateness built-in.process(new OneInputWindowStreamProcessFunction&lt;Event, Result&gt;() {public void onTrigger(Collector&lt;Result&gt; output,PartitionedContext&lt;Result&gt; ctx,OneInputWindowContext&lt;Event&gt; windowCtx) {// process windowCtx.getAllRecords()}public void onLateRecord(Event record, Collector&lt;Result&gt; output,PartitionedContext&lt;Result&gt; ctx) {output.collect(Result.lateCorrection(record));}});</pre><div class="note"><strong>Key insight:</strong> The V2 lifecycle has explicit callbacks: <code>onRecord</code> &rarr; <code>onTrigger</code> &rarr; <code>onClear</code> &rarr; <code>onLateRecord</code>. This separates concerns more cleanly than the V1 approach of allowed lateness + side outputs.</div>`},
{m:5,t:"Windowing Performance Considerations",c:`<h1>Performance Considerations</h1><h2>State Size per Window Type</h2><table><tr><th>Window Type</th><th>State Complexity</th><th>Notes</th></tr><tr><td>Tumbling</td><td>O(n) per window, 1 active window/key</td><td>Constant memory per key over time</td></tr><tr><td>Sliding</td><td>O(n &times; k) per key, k = size/slide</td><td>24h/15min = 96x amplification!</td></tr><tr><td>Session</td><td>O(n) per session, variable count</td><td>Merge operations touch all state</td></tr><tr><td>Global</td><td>O(n) total per key, grows unboundedly</td><td>Must use PurgingTrigger</td></tr><tr><td>Count</td><td>O(windowSize) per key</td><td>Bounded by window size parameter</td></tr></table><h2>Critical Rules</h2><ul><li><strong>Prefer incremental aggregation</strong> (Reduce/Aggregate) over ProcessWindowFunction &mdash; O(1) vs O(n) state</li><li><strong>Avoid evictors</strong> &mdash; they disable incremental aggregation and force O(n) buffering</li><li><strong>Watch the size/slide ratio</strong> &mdash; sliding windows duplicate each element into <code>ceil(size/slide)</code> windows</li><li><strong>Use the combined pattern</strong> (Aggregate + ProcessWindowFunction) when you need both efficiency and metadata</li><li><strong>Session window merging</strong> has overhead &mdash; ensure the <code>merge()</code> method in your AggregateFunction is implemented correctly</li></ul><div class="warn"><strong>Caution:</strong> A 24-hour sliding window with a 1-minute slide creates <strong>1440 copies</strong> of each element in state. This will almost certainly cause your job to OOM. Use a process function with manual state management instead.</div>`},
{m:6,t:"The Problem: Consistent Snapshots",c:`<h1>Checkpointing Mechanism</h1><h2>The Problem: Consistent Snapshots in a Distributed System</h2><p>A streaming application is a DAG of operators distributed across many machines. Each operator maintains local state. Data flows continuously. The question is: <strong>how do you take a globally consistent snapshot without stopping the pipeline?</strong></p><p>A naive approach &mdash; &ldquo;everyone snapshot at the same wall-clock time&rdquo; &mdash; fails because:</p><ol><li>Clocks are never perfectly synchronized across machines</li><li>Messages are in flight between operators at any instant</li><li>Pausing the entire pipeline destroys throughput</li></ol><p>We need a protocol that captures a <strong>consistent cut</strong> &mdash; a snapshot where, if operator B&rsquo;s state reflects having processed a record from A, then A&rsquo;s snapshot also reflects having sent that record.</p><div class="diagram">Inconsistent Cut: Consistent Cut:
A: [sent m1, m2] A: [sent m1, m2]B: [received m1, m2, m3] &larr; !! B: [received m1, m2] &larr; OKm3 was never sent by A everything accounted for</div>`},
{m:6,t:"Chandy-Lamport Algorithm",c:`<h1>Chandy-Lamport Algorithm</h1><h2>The Foundational Algorithm (1985)</h2><p>Leslie Lamport and K. Mani Chandy published the algorithm that uses <strong>marker messages</strong> injected into communication channels to create consistent distributed snapshots.</p><h3>Algorithm Steps</h3><ol><li><strong>Initiator</strong> records its own local state and sends a MARKER on every outgoing channel</li><li>When process P receives a MARKER on channel C:<ul><li>If P has not yet recorded state &rarr; record state, mark channel C as EMPTY, send MARKER on all outgoing channels, start recording on other channels</li><li>If P already recorded state &rarr; stop recording on channel C; recorded messages = channel state</li></ul></li><li>Snapshot is <strong>COMPLETE</strong> when all processes have recorded their state and all channel states are captured</li></ol><div class="diagram">MARKERChannel: &mdash;m1&mdash;m2&mdash;&#x2551;&mdash;m3&mdash;m4&mdash;&rarr;|before | aftersnapshot | snapshot</div><div class="note"><strong>Key insight:</strong> The markers <em>cut</em> the message stream on each channel into &ldquo;before snapshot&rdquo; and &ldquo;after snapshot.&rdquo; This partitioning ensures global consistency without global coordination or clock synchronization.</div>`},
{m:6,t:"Flink's Distributed Snapshots: Barriers & Architecture",c:`<h1>How Flink Implements Distributed Snapshots</h1><p>Flink adapts Chandy-Lamport for directed acyclic dataflow graphs with these key adaptations:</p><ul><li><strong>Markers = Checkpoint Barriers</strong> &mdash; special events injected into the data stream</li><li><strong>Channel state</strong> captured by buffering or including in-flight data</li><li><strong>CheckpointCoordinator</strong> on the JobManager acts as the initiator</li><li><strong>Sources</strong> are the first to receive the trigger</li></ul><div class="diagram">+--------------------------------------------------------------------+| JobManager || +--------------------------------------------------------------+ || | CheckpointCoordinator | || | Trigger Timer | PendingCheckpoint Map | CompletedCPStore | || +--------------------------------------------------------------+ |+-------------------+---------------------------+--------------------+| triggerCheckpoint() | acknowledgeCheckpoint()v ^+--------------------------------------------------------------------+| TaskManagers || Source &mdash;barrier&rarr; Map &mdash;barrier&rarr; KeyedAgg &mdash;barrier&rarr; Sink || | | | | || +--snapshot--+ +--snapshot--+ +--snapshot--+ | || v v v v || Checkpoint Storage (HDFS / S3 / Local FS) |+--------------------------------------------------------------------+</div><table><tr><th>Concern</th><th>Class</th><th>Package</th></tr><tr><td>Orchestration</td><td><code>CheckpointCoordinator</code></td><td><code>o.a.f.runtime.checkpoint</code></td></tr><tr><td>In-flight tracking</td><td><code>PendingCheckpoint</code></td><td><code>o.a.f.runtime.checkpoint</code></td></tr><tr><td>Completed snapshot</td><td><code>CompletedCheckpoint</code></td><td><code>o.a.f.runtime.checkpoint</code></td></tr><tr><td>Storage abstraction</td><td><code>CheckpointStorage</code></td><td><code>o.a.f.runtime.state</code></td></tr></table>`},
{m:6,t:"Aligned Checkpoints: Barrier Alignment",c:`<h1>Aligned Checkpoints</h1><h2>Multi-Input Barrier Alignment</h2><p>When an operator with multiple inputs receives a barrier on one input but not yet on others, it blocks the fast channel and buffers arriving records until all barriers arrive.</p><div class="diagram">Step 1: Barrier arrives on Input-1Input-1: &mdash;&#x2551;B42&#x2551; (blocked, records buffered)Input-2: &mdash;data&mdash;data&mdash; (still processing)
Step 2: Barrier arrives on Input-2Input-1: &mdash;&#x2551;B42&#x2551; [buf: r3, r4, r5] (blocked records released)Input-2: &mdash;&#x2551;B42&#x2551;
Step 3: Snapshot state, emit barrier, release buffered recordsOutput: &mdash;&#x2551;B42&#x2551;&mdash;r3&mdash;r4&mdash;r5&mdash;&rarr;</div><h2>AlignmentType Enum</h2><pre>public enum AlignmentType {AT_LEAST_ONCE, // No alignment, barriers pass through immediatelyALIGNED, // Full barrier alignment (exactly-once)UNALIGNED, // In-flight data included in snapshotFORCED_ALIGNED // Forced aligned even when unaligned is configured}</pre><h2>Trade-offs</h2><table><tr><th>Aspect</th><th>Impact</th></tr><tr><td>Backpressure</td><td>Blocking fast channels causes upstream backpressure</td></tr><tr><td>Checkpoint duration</td><td>Proportional to skew between input channels</td></tr><tr><td>State size</td><td>Only operator state, no in-flight data</td></tr><tr><td>Semantics</td><td>Exactly-once guaranteed</td></tr></table>`},
{m:6,t:"Unaligned Checkpoints",c:`<h1>Unaligned Checkpoints</h1><h2>Motivation</h2><p>Under significant backpressure, aligned checkpoints can take very long or time out because the slow channel delays barrier arrival. Unaligned checkpoints solve this.</p><h2>How It Works: First-Barrier-Wins</h2><div class="diagram">Step 1: First barrier arrives on Input-1Input-1: &mdash;&#x2551;B42&#x2551;&mdash;&rarr; (barrier passes through immediately)Input-2: &mdash;r7&mdash;r8&mdash;r9&mdash; (still no barrier)
Step 2: Operator snapshots state PLUS all in-flight data- Operator state: snapshotted- Input buffers on Input-2 (r7, r8, r9): included in snapshot- Output buffers already sent: included in snapshot
