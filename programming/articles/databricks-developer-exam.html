oalesce", "question": "Which statement about coalesce() and repartition() is CORRECT?", "options": ["coalesce(n) can only decrease partitions and avoids a full shuffle; repartition(n) can increase or decrease and always shuffles", "coalesce(n) can increase or decrease partitions; repartition(n) can only increase", "Both always trigger a full shuffle", "Both can increase or decrease partitions without shuffling"], "answer": 0, "explanation": "coalesce(n) merges partitions locally (no shuffle) but can only decrease the count. repartition(n) always performs a full shuffle to create exactly n partitions. Use coalesce when reducing partitions (e.g., before writing fewer files) and repartition when increasing or when even distribution matters."}, {"id": "s4_q14", "objective": "Data skew identification", "question": "In the Spark UI Tasks tab for a stage, which metric pattern indicates data skew?", "options": ["Large gap between median and max values for 'Input Size' or 'Shuffle Read Size' across tasks", "All tasks having similar duration", "High GC time on all executors equally", "Low shuffle write across all tasks"], "answer": 0, "explanation": "Data skew manifests as a few tasks processing much more data than others. In the Tasks tab, look for: median Shuffle Read ~1 MB but max ~10 GB, or median duration 2 seconds but max 20 minutes. The summary row at the top shows min/25th/50th/75th/max — a large 75th-to-max gap confirms skew."}, {"id": "s4_q15", "objective": "Troubleshooting", "question": "A Spark application runs a query with 5 stages. Stage 3 takes 95% of the total time. Which Spark UI page should the developer examine first?", "options": ["The Stage 3 detail page — examine task metrics (duration, input/output, shuffle, GC time, spill) and the DAG visualization to understand the bottleneck", "The Executors page for memory utilization", "The Environment page for configuration", "The Storage page for cached data"], "answer": 0, "explanation": "When one stage dominates runtime, drill into that stage's detail page. Check: (1) task duration distribution for skew, (2) shuffle read/write sizes, (3) spill metrics for memory pressure, (4) GC time for heap issues, (5) the DAG to understand what operations are in that stage. This targeted investigation finds the root cause efficiently."}, {"id": "s4_q16", "objective": "Partition tuning", "question": "A developer processes a 100 GB dataset with spark.sql.shuffle.partitions=200 (default). Each shuffle partition is ~500 MB. Tasks show heavy spill. What is the recommended fix?", "options": ["Increase spark.sql.shuffle.partitions to 2000 — smaller partitions (~50 MB each) reduce per-task memory pressure and spill", "Decrease spark.sql.shuffle.partitions to 50", "Increase executor memory to 128 GB", "Switch to MEMORY_ONLY_SER storage level"], "answer": 0, "explanation": "500 MB partitions are too large — they force each task to hold ~500 MB in memory for shuffles/aggregations, causing spill. Increasing to 2000 partitions creates ~50 MB partitions that fit comfortably in task execution memory. Target partition size: 50-200 MB. Alternatively, enable AQE which auto-coalesces."}, {"id": "s4_q17", "objective": "AQE features", "question": "With AQE enabled, spark.sql.shuffle.partitions is set to 2000 but the actual data after shuffle is only 100 MB total. What does AQE do?", "options": ["Automatically coalesces the 2000 partitions into a smaller number based on the actual data size (e.g., ~5 partitions of 20 MB each)", "Keeps all 2000 partitions regardless of data size", "Throws a warning about over-partitioning", "Disables itself because the data is too small"], "answer": 0, "explanation": "AQE's dynamic partition coalescing examines the actual data size at each shuffle boundary and merges adjacent small partitions into larger ones (target size controlled by spark.sql.adaptive.advisoryPartitionSizeInBytes, default 64 MB). This eliminates the small-partition overhead without requiring manual tuning of shuffle.partitions."}, {"id": "s4_q18", "objective": "Monitoring", "question": "Which Spark configuration enables detailed per-stage metrics in the Spark History Server after the application completes?", "options": ["spark.eventLog.enabled=true and spark.eventLog.dir=/path/to/logs — the event log captures all stage, task, and executor metrics", "spark.ui.enabled=true", "spark.logConf=true", "spark.metrics.conf=metrics.properties"], "answer": 0, "explanation": "The Spark History Server reads event logs. spark.eventLog.enabled=true writes comprehensive event data (stages, tasks, SQL plans, executor metrics) to the configured directory. spark.ui.enabled controls the live UI during execution. spark.logConf logs configuration at startup. spark.metrics.conf is for external metrics sinks."}, {"id": "s4_q19", "objective": "Tuning", "question": "A join between two large DataFrames produces correct results but is slow. The Spark UI shows both sides are shuffled (SortMergeJoin). Both DataFrames are used in multiple joins on the same key. What optimization should the developer apply?", "options": ["Repartition both DataFrames by the join key and persist them — subsequent joins reuse the partitioning without re-shuffling", "Convert to BroadcastHashJoin by broadcasting both sides", "Use cross join for better parallelism", "Increase the number of executors"], "answer": 0, "explanation": "When DataFrames are joined multiple times on the same key, pre-repartitioning by that key and persisting eliminates repeated shuffles. Each subsequent join finds data already co-partitioned and skips the shuffle stage. This is especially effective in star-schema or iterative workloads."}, {"id": "s4_q20", "objective": "Debugging", "question": "A developer's Spark job hangs indefinitely with no tasks running. The Spark UI Jobs page shows one active job but the Stages page shows 0 active stages. What is the most likely cause?", "options": ["A driver-side operation is blocking — likely a large collect(), toPandas(), or driver-side I/O that's taking too long or has hung", "All executors have crashed", "The shuffle service is down", "The cluster manager has rejected the application"], "answer": 0, "explanation": "If there's an active job but no active stages, the driver is blocked before submitting stages. This typically happens when driver-side code (collect(), toPandas(), or Python processing between actions) is blocking. If executors had crashed, previous stages would show as failed, not 0 active stages."}, {"id": "s4_q21", "objective": "Troubleshooting spill", "question": "The Spark UI shows 'Spill (Memory): 50 GB' and 'Spill (Disk): 50 GB' for a sort operation. Which parameter directly reduces spill?", "options": ["Increase spark.sql.shuffle.partitions to reduce per-partition data size below execution memory", "Increase spark.executor.memoryOverhead", "Decrease spark.memory.storageFraction to 0", "Set spark.shuffle.spill=false"], "answer": 0, "explanation": "Spill occurs when per-task data exceeds execution memory. Increasing partition count reduces data per partition, fitting more operations in memory. memoryOverhead is for non-heap memory. storageFraction=0 would help slightly but risks cache eviction. spark.shuffle.spill=false was removed in Spark 1.6 — spill is always enabled."}, {"id": "s4_q22", "objective": "Cluster underutilization", "question": "The Spark UI Executors tab shows 50 executors allocated but the Summary row shows only 10 active tasks. What should the developer investigate?", "options": ["Whether the current stage has only 10 partitions — if so, only 10 task slots can be used regardless of executor count", "Whether the driver has enough memory", "Whether the network bandwidth is saturated", "Whether the shuffle service is enabled"], "answer": 0, "explanation": "Active tasks = min(partitions in current stage, total task slots). If a stage has only 10 partitions, only 10 tasks run regardless of having 50 executors. The fix is to repartition the input to have more partitions (at least equal to total cores across all executors)."}, {"id": "s4_q23", "objective": "Broadcast threshold", "question": "The default value of spark.sql.autoBroadcastJoinThreshold is 10 MB. A developer has a 15 MB lookup table. What should they do to enable auto-broadcast?", "options": ["Set spark.sql.autoBroadcastJoinThreshold=20971520 (20 MB) to include the 15 MB table, or use the explicit broadcast() hint", "Disable AQE to allow auto-broadcast", "Set spark.sql.autoBroadcastJoinThreshold=-1", "Repartition the lookup table to make it smaller"], "answer": 0, "explanation": "Increase the threshold above the table size, or use broadcast(df) explicitly. Setting to -1 disables auto-broadcast entirely. AQE and auto-broadcast are independent features. Repartitioning changes partition count but not total data size. The threshold compares against the total estimated table size, not partition size."}]}, {"id": 5, "name": "Structured Streaming", "questions": [{"id": "s5_q1", "objective": "Programming model", "question": "How does Structured Streaming conceptually model a data stream?", "options": ["As an unbounded table where new data is appended as new rows and queries produce incrementally updated results", "As a sequence of individual records processed one at a time", "As a fixed-size buffer that is processed and flushed periodically", "As a distributed queue of messages"], "answer": 0, "explanation": "Structured Streaming treats live data as an unbounded input table. New data arriving is like new rows being appended. The query runs incrementally: for each trigger, Spark processes only the new rows and updates the result table. This model makes batch-to-streaming migration straightforward."}, {"id": "s5_q2", "objective": "Micro-batch processing", "question": "What is the default trigger interval for a Structured Streaming query?", "options": ["As fast as possible — Spark starts the next micro-batch immediately after the previous one completes", "Every 1 second", "Every 5 seconds", "Every 1 minute"], "answer": 0, "explanation": "The default trigger is 'processingTime=0' (as fast as possible). Spark starts a new micro-batch as soon as the previous one finishes. To set a fixed interval, use trigger(processingTime='10 seconds'). For exactly-once with lower latency, Trigger.AvailableNow() processes all available data in multiple batches then stops."}, {"id": "s5_q3", "objective": "Output modes", "question": "A streaming query aggregates events with groupBy('category').count(). Which output modes are supported?", "options": ["Complete and Update — Append mode is NOT supported for aggregations without watermark because result rows can change", "Only Append mode", "Only Complete mode", "All three modes: Append, Complete, and Update"], "answer": 0, "explanation": "Aggregations without watermarks produce results that can change as new data arrives, making Append mode invalid (appended rows cannot be retracted). Complete mode outputs the entire result table each trigger. Update mode outputs only changed rows. With a watermark, Append becomes valid after the watermark passes."}, {"id": "s5_q4", "objective": "Output sinks", "question": "Which code correctly writes a streaming DataFrame to the console for debugging?", "options": ["query = df.writeStream.format('console').outputMode('append').start()", "query = df.write.format('console').save()", "query = df.writeStream.console().start()", "query = df.show()"], "answer": 0, "explanation": "Streaming writes use writeStream (not write) with format('console') for debug output. outputMode specifies how results are written. start() begins the streaming query and returns a StreamingQuery handle. write.format() is for batch. show() is for batch DataFrames. console() doesn't exist as a method."}, {"id": "s5_q5", "objective": "Watermarks", "question": "A developer sets:\n\ndf.withWatermark('event_time', '10 minutes').groupBy(window('event_time', '1 hour')).count()\n\nWhat is the effect of the 10-minute watermark?", "options": ["Events arriving more than 10 minutes late (after the max event_time - 10 minutes threshold) are dropped from the aggregation, and Spark can clean up state for windows that are finalized", "All events older than 10 minutes are always dropped", "The query processes data in 10-minute batches", "Spark waits 10 minutes before processing any data"], "answer": 0, "explanation": "The watermark tracks: max event_time seen so far minus the threshold (10 minutes). Events with event_time older than this watermark are considered too late and dropped. Once the watermark passes a window's end + threshold, that window's state is finalized and cleaned up, preventing unbounded state growth."}, {"id": "s5_q6", "objective": "Fault tolerance", "question": "A Structured Streaming query fails mid-batch. When restarted from the same checkpoint directory, what happens?", "options": ["Spark replays the failed micro-batch from the exact offsets recorded in the checkpoint, ensuring exactly-once processing", "Spark skips the failed batch and starts from the next one", "Spark reprocesses all data from the beginning of the stream", "The checkpoint is corrupted and must be deleted"], "answer": 0, "explanation": "The checkpoint stores committed offsets and state. On restart, Spark reads the last committed offset and replays the failed batch from there. Combined with idempotent sinks, this provides exactly-once semantics. The checkpoint is designed for exactly this recovery scenario — it's not corrupted by a mid-batch failure."}, {"id": "s5_q7", "objective": "Streaming deduplication", "question": "Which code correctly deduplicates a stream by 'event_id' allowing events up to 5 minutes late?", "options": ["df.withWatermark('event_time', '5 minutes').dropDuplicates(['event_id'])", "df.dropDuplicates(['event_id']).withWatermark('event_time', '5 minutes')", "df.distinct()", "df.groupBy('event_id').count().filter(col('count') == 1)"], "answer": 0, "explanation": "Watermark must be applied BEFORE dropDuplicates so Spark knows when to expire dedup state. Without watermark, dedup state grows forever. The order matters: withWatermark first, then dropDuplicates. distinct() is not supported in streaming. groupBy().count() gives counts, not deduplication."}, {"id": "s5_q8", "objective": "Window operations", "question": "Which code computes a 1-hour tumbling window count on a streaming DataFrame?", "options": ["df.groupBy(window('event_time', '1 hour')).count()", "df.groupBy('event_time').window('1 hour').count()", "df.window('event_time', '1 hour').groupBy().count()", "df.groupBy(tumbling_window('event_time', '1 hour')).count()"], "answer": 0, "explanation": "window(timeColumn, windowDuration) in a groupBy creates fixed-interval (tumbling) windows. Each window is non-overlapping and exactly 1 hour long. For sliding windows, add a slide duration: window('event_time', '1 hour', '15 minutes'). The window function must be used inside groupBy(), not as a standalone method."}, {"id": "s5_q9", "objective": "Exactly-once semantics", "question": "Which combination of components enables end-to-end exactly-once processing in Structured Streaming?", "options": ["Replayable source (e.g., Kafka with offsets) + checkpointing + idempotent sink", "Only checkpointing is needed", "Only an idempotent sink is needed", "Exactly-once is impossible in distributed streaming"], "answer": 0, "explanation": "End-to-end exactly-once requires: (1) a replayable source that can replay data from specific offsets (Kafka, file source), (2) checkpointing to track progress and state, and (3) an idempotent sink that handles reprocessed data without duplicates. All three components work together for the guarantee."}, {"id": "s5_q10", "objective": "Streaming DataFrame operations", "question": "Which operations are NOT supported on streaming DataFrames?", "options": ["Multiple streaming aggregations (chaining two groupBy().agg() operations), sort without watermark, and direct limit()", "select() and filter()", "withColumn() and drop()", "join with a static DataFrame"], "answer": 0, "explanation": "Streaming DataFrames don't support: chained aggregations, global sort (without watermark + complete mode), limit(), count() as an action, distinct() without watermark, and show(). Basic column operations (select, filter, withColumn, drop) and joins with static DataFrames are fully supported."}, {"id": "s5_q11", "objective": "Output sinks", "question": "A developer needs to write streaming results to a PostgreSQL database. Which sink should they use?", "options": ["foreachBatch — it provides a batch DataFrame per micro-batch that can be written using standard batch JDBC APIs", "format('jdbc') — the JDBC sink works directly with streaming", "format('postgres') — native PostgreSQL sink", "foreach — process each row individually"], "answer": 0, "explanation": "There is no built-in JDBC streaming sink. foreachBatch(func) passes each micro-batch as a regular DataFrame to a custom function where you can use the standard df.write.jdbc() API. foreach processes row-by-row (less efficient). foreachBatch is the recommended approach for custom sinks."}, {"id": "s5_q12", "objective": "Checkpointing", "question": "What happens if a developer changes the query logic (e.g., adds a new aggregation column) and restarts from an existing checkpoint?", "options": ["The query may fail with an incompatible state schema error — checkpoints encode the operator state schema and changing the query can make it incompatible", "The query automatically adapts to the new logic", "The checkpoint is ignored and processing starts fresh", "Only the new column is computed; existing aggregations continue from state"], "answer": 0, "explanation": "Checkpoints store operator state with a specific schema. Changing the query plan (adding columns, changing aggregations, reordering operations) can make the saved state incompatible with the new plan. In such cases, you typically need to start from a fresh checkpoint, which means reprocessing historical data."}, {"id": "s5_q13", "objective": "Streaming triggers", "question": "A developer sets trigger(availableNow=True) on a streaming query. What does this do?", "options": ["Processes all currently available data in multiple micro-batches, then stops the query — useful for batch-like processing of streaming sources", "Processes one micro-batch immediately and stops", "Runs continuously like the default trigger", "Waits until new data arrives, processes it, then stops"], "answer": 0, "explanation": "Trigger.AvailableNow (Spark 3.3+) processes all available data from the source, potentially in multiple micro-batches for parallelism, then gracefully stops. It's ideal for periodic batch jobs that read from streaming sources (like Kafka) using the checkpoint for exactly-once guarantees."}, {"id": "s5_q14", "objective": "State management", "question": "A Structured Streaming query with groupBy aggregation runs for 30 days. The developer notices query performance degrading. Which is the most likely cause?", "options": ["Unbounded state growth — without a watermark, Spark maintains state for every group key ever seen, consuming increasing memory", "The Kafka topic is running out of retention", "Executor disks are filling up with checkpoint data", "The JVM needs a restart after 30 days"], "answer": 0, "explanation": "Without watermarks, aggregation state grows monotonically as new group keys appear. After 30 days, the state store may contain millions of keys, causing longer checkpoint times and increased memory usage. Adding a watermark allows Spark to expire old state and bound memory usage."}, {"id": "s5_q15", "objective": "Kafka source", "question": "Which code reads from a Kafka topic in a streaming query?", "options": ["spark.readStream.format('kafka').option('kafka.bootstrap.servers','host:9092').option('subscribe','events').load()", "spark.readStream.kafka('host:9092', 'events')", "spark.read.format('kafka').option('topic','events').load()", "spark.readStream.format('kafkaSource').option('brokers','host:9092').load()"], "answer": 0, "explanation": "The Kafka source uses format('kafka') with options for bootstrap.servers and subscribe (topic name). readStream creates a streaming DataFrame. The loaded DataFrame has columns: key, value, topic, partition, offset, timestamp. The value column contains the message payload as bytes."}, {"id": "s5_q16", "objective": "Streaming joins", "question": "Which type of streaming join is supported WITHOUT requiring a watermark?", "options": ["Stream-static join — joining a streaming DataFrame with a static (batch) DataFrame requires no watermark", "Stream-stream inner join — both sides need watermarks", "Stream-stream outer join — requires watermarks", "All streaming joins require watermarks"], "answer": 0, "explanation": "Stream-static joins don't need watermarks because the static side doesn't change — Spark can join each micro-batch with the full static DataFrame. Stream-stream joins require watermarks to bound state: the watermark tells Spark when it's safe to discard unmatched rows from each side."}, {"id": "s5_q17", "objective": "Structured Streaming", "question": "A developer needs to update a dashboard every 30 seconds with the latest aggregation results. Which output mode and trigger should they use?", "options": ["outputMode('update') with trigger(processingTime='30 seconds') — update mode writes only changed rows, reducing I/O", "outputMode('complete') with trigger(processingTime='30 seconds')", "outputMode('append') with trigger(processingTime='30 seconds')", "outputMode('update') with trigger(once=True)"], "answer": 0, "explanation": "Update mode outputs only rows that changed in the last trigger, which is efficient for dashboard updates. Complete mode rewrites all results every trigger (wasteful for large result sets). Append mode doesn't support aggregations without watermark. The 30-second processing time trigger matches the dashboard refresh requirement."}, {"id": "s5_q18", "objective": "Streaming query management", "question": "How does a developer gracefully stop a running streaming query?", "options": ["query.stop() — signals the query to finish the current micro-batch and then stop cleanly", "query.kill() — immediately terminates the query", "spark.stop() — stops all queries and the session", "query.interrupt() — pauses the query"], "answer": 0, "explanation": "query.stop() gracefully stops the streaming query after completing the current micro-batch. This ensures the checkpoint is properly committed for clean restart. spark.stop() also works but terminates everything. There is no kill() or interrupt() method on StreamingQuery."}, {"id": "s5_q19", "objective": "Streaming monitoring", "question": "Which API provides programmatic access to streaming query progress metrics?", "options": ["query.lastProgress — returns a dict with input rate, processing rate, batch duration, state metrics, and watermark information", "query.status() — returns a status string", "query.metrics — returns a Prometheus-format metrics string", "spark.streams.getMetrics() — returns all stream metrics"], "answer": 0, "explanation": "query.lastProgress returns a detailed JSON-like dict containing: inputRowsPerSecond, processedRowsPerSecond, batchDuration, stateOperator metrics (numRowsTotal, numRowsUpdated), and watermark value. query.status provides high-level state (isActive, isTriggerActive). For continuous monitoring, use query.recentProgress for an array of recent progress reports."}, {"id": "s5_q20", "objective": "Sliding windows", "question": "Which code creates a 1-hour sliding window with a 15-minute slide interval for counting events?", "options": ["df.groupBy(window('event_time', '1 hour', '15 minutes')).count()", "df.groupBy(window('event_time', '1 hour')).slide('15 minutes').count()", "df.groupBy(sliding_window('event_time', '1 hour', '15 minutes')).count()", "df.groupBy(window('event_time', '15 minutes', '1 hour')).count()"], "answer": 0, "explanation": "window(timeColumn, windowDuration, slideDuration) creates overlapping windows. '1 hour' is the window size and '15 minutes' is the slide interval. Each event falls into multiple windows (4 windows in this case). Note the parameter order: duration first, then slide. Reversing them creates a 15-minute window sliding every hour."}, {"id": "s5_q21", "objective": "Rate source", "question": "Which built-in streaming source generates rows at a configurable rate for testing purposes?", "options": ["format('rate') — generates rows with 'timestamp' and 'value' columns at a specified rowsPerSecond", "format('test')", "format('mock')", "format('generator')"], "answer": 0, "explanation": "The rate source (format('rate')) generates timestamp and incrementing value columns at a configurable rowsPerSecond. It's useful for testing streaming queries without external dependencies. Example: spark.readStream.format('rate').option('rowsPerSecond', 100).load(). The 'test', 'mock', and 'generator' sources don't exist."}, {"id": "s5_q22", "objective": "Streaming state", "question": "In a streaming aggregation with watermark, what happens to events that arrive after the watermark has passed their window?", "options": ["They are dropped (not included in any aggregation) — the watermark defines the cutoff for acceptable late data", "They are buffered until the next window opens", "They are added to the most recent window instead", "They cause the query to fail with a late data exception"], "answer": 0, "explanation": "Once the watermark advances past a window's end time + watermark threshold, that window's state is finalized and cleaned up. Any events arriving after this point with timestamps in the expired window are silently dropped. This is the tradeoff: watermarks bound state size but drop extremely late data."}]}, {"id": 6, "name": "Spark Connect and Deployment", "questions": [{"id": "s6_q1", "objective": "Spark Connect features", "question": "What protocol does Spark Connect use for communication between the client and server?", "options": ["gRPC — a high-performance RPC framework that serializes logical plans using Protocol Buffers", "REST API over HTTP", "Java RMI (Remote Method Invocation)", "Custom TCP socket protocol"], "answer": 0, "explanation": "Spark Connect uses gRPC with Protocol Buffers for client-server communication. The client sends logical plans (not data) to the server over gRPC, and the server returns results. This enables thin clients in any language that supports gRPC, with minimal client-side dependencies."}, {"id": "s6_q2", "objective": "Deployment modes", "question": "In cluster mode, where does the driver process run?", "options": ["On one of the cluster's worker nodes — the cluster manager launches the driver inside the cluster", "On the client machine that submitted the application", "On a dedicated driver node outside the cluster", "On all worker nodes simultaneously"], "answer": 0, "explanation": "In cluster mode, spark-submit sends the application to the cluster manager, which launches the driver on a worker node inside the cluster. This is useful for long-running applications where the client machine doesn't need to stay connected. In client mode, the driver runs on the submitting machine."}, {"id": "s6_q3", "objective": "Local mode", "question": "What is local mode in Spark primarily used for?", "options": ["Development and testing — everything runs in a single JVM on the local machine with simulated parallelism via threads", "Production deployments on a single powerful server", "Running Spark on mobile devices", "Connecting to a remote cluster from a local machine"], "answer": 0, "explanation": "Local mode (master='local[N]') runs the driver and executor in a single JVM process with N threads simulating parallelism. It requires no cluster setup and is ideal for development, testing, and debugging. It's not suitable for production because it's limited to one machine's resources."}, {"id": "s6_q4", "objective": "Spark Connect architecture", "question": "What is the main benefit of Spark Connect's decoupled architecture?", "options": ["Client applications don't need Spark dependencies — they can be lightweight programs that send plans over the network", "It makes Spark faster by avoiding JVM overhead", "It allows running multiple Spark versions simultaneously on the same cluster", "It eliminates the need for a cluster manager"], "answer": 0, "explanation": "Spark Connect decouples the client from the Spark runtime. Clients send logical plans (not code) over gRPC, so they don't need Spark JARs, Hadoop dependencies, or JVM. This enables thin Python/Java/Scala clients, better IDE support, and independent client/server upgrades."}, {"id": "s6_q5", "objective": "Client mode", "question": "A data scientist submits a Spark application in client mode from their laptop. The application runs a 6-hour ETL pipeline. What happens if they close their laptop lid?", "options": ["The application fails because the driver running on the laptop loses connectivity to the executors", "The application continues running because executors are independent", "The cluster manager migrates the driver to a worker node", "The application pauses and resumes when the laptop reconnects"], "answer": 0, "explanation": "In client mode, the driver runs on the laptop. Closing the lid disrupts the network, causing executors to lose contact with the driver. Without heartbeats, executors are terminated by the cluster manager. For long-running jobs, use cluster mode where the driver runs inside the cluster independently of the client machine."}, {"id": "s6_q6", "objective": "Spark Connect", "question": "Which PySpark code connects to a remote Spark Connect server?", "options": ["spark = SparkSession.builder.remote('sc://hostname:15002').getOrCreate()", "spark = SparkSession.builder.master('spark://hostname:7077').getOrCreate()", "spark = SparkConnect('hostname:15002')", "spark = SparkSession.builder.config('spark.connect.url', 'hostname:15002').getOrCreate()"], "answer": 0, "explanation": "Spark Connect uses the .remote('sc://host:port') method on SparkSession.builder. The default port is 15002. The 'sc://' scheme indicates Spark Connect protocol. master('spark://...') connects to a Standalone cluster master (not Spark Connect). The remote() method creates a thin client session."}, {"id": "s6_q7", "objective": "Deployment", "question": "Which cluster manager is NOT natively supported by Apache Spark?", "options": ["Apache Ambari — it's a cluster management/monitoring tool, not a resource manager for Spark", "Apache YARN", "Kubernetes", "Standalone cluster manager"], "answer": 0, "explanation": "Spark natively supports three cluster managers: Standalone (built-in), Apache YARN, and Kubernetes. Mesos was supported historically but deprecated. Apache Ambari is a cluster management and monitoring platform for Hadoop, not a resource manager that Spark can use for executor allocation."}, {"id": "s6_q8", "objective": "Deployment modes", "question": "In which deployment mode do executors run as threads in the same JVM as the driver?", "options": ["Local mode — master('local[N]') runs everything in one JVM process", "Client mode — driver and executors share a JVM on the client", "Cluster mode — all processes run in one JVM on a worker", "Standalone mode — always uses a single JVM"], "answer": 0, "explanation": "Only in local mode do the driver and executor threads share a single JVM. In client and cluster modes, executors always run in separate JVM processes on worker nodes, communicating with the driver over the network. Standalone is a cluster manager type, not a deployment mode."}, {"id": "s6_q9", "objective": "Spark Connect limitations", "question": "Which operation is NOT supported through Spark Connect in Spark 3.5?", "options": ["Accessing SparkContext directly (sc) for low-level RDD operations — Spark Connect only exposes the DataFrame/SQL API", "Running SQL queries", "Reading and writing DataFrames", "Using Structured Streaming"], "answer": 0, "explanation": "Spark Connect exposes the DataFrame/SparkSession API over gRPC. The low-level SparkContext and RDD API are not available through Spark Connect because they require direct JVM access. SQL, DataFrame operations, and Structured Streaming are supported."}, {"id": "s6_q10", "objective": "Deployment", "question": "A developer submits: spark-submit --master yarn --deploy-mode cluster app.py. Where is the application's stdout visible?", "options": ["In the YARN application logs — accessible via yarn logs -applicationId <appId> or the YARN ResourceManager UI", "On the terminal that ran spark-submit", "In /tmp/spark-logs on the submitting machine", "In the Spark History Server only"], "answer": 0, "explanation": "In YARN cluster mode, the driver runs in a YARN container on a cluster node. Its stdout/stderr are captured by YARN's log aggregation. Use 'yarn logs -applicationId <id>' to retrieve them after completion. The submitting terminal only shows the submission confirmation, not application output."}, {"id": "s6_q11", "objective": "Spark Connect", "question": "How does Spark Connect handle Python UDFs?", "options": ["UDFs are serialized and sent to the server where they execute in a Python worker process on the executor", "UDFs execute on the client machine and results are sent to the server", "UDFs are not supported through Spark Connect", "UDFs are automatically converted to Spark SQL expressions"], "answer": 0, "explanation": "Spark Connect serializes Python UDFs and sends them to the server alongside the query plan. The server executes them in Python worker processes on executors, just like standard PySpark. The client never processes data directly — all computation happens server-side."}, {"id": "s6_q12", "objective": "Client vs Cluster", "question": "Which deployment mode is recommended for interactive notebooks (e.g., Jupyter)?", "options": ["Client mode — the driver runs locally, enabling direct interaction with the SparkSession and immediate display of results", "Cluster mode — better resource management", "Local mode — notebooks should never connect to clusters", "Spark Connect remote mode — always use Spark Connect for notebooks"], "answer": 0, "explanation": "Client mode is standard for interactive notebooks because the driver runs in the notebook kernel, allowing direct interaction. Cluster mode would run the driver on a remote node, making interactive use difficult. Spark Connect is also viable for notebooks (thin client) but client mode is the traditional and widely-supported approach."}, {"id": "s6_q13", "objective": "Spark Connect", "question": "What happens if the Spark Connect server restarts while a client session is active?", "options": ["The client session becomes invalid — the client must create a new SparkSession and any in-progress queries are lost", "The client automatically reconnects and resumes", "The server restores the session from a checkpoint", "Nothing — client and server are fully stateless"], "answer": 0, "explanation": "Spark Connect sessions have server-side state (temporary views, cached DataFrames, configurations). If the server restarts, this state is lost and the client must create a new session. In-progress queries fail. Future versions may add session persistence, but currently server restart requires client reconnection."}, {"id": "s6_q14", "objective": "Deployment", "question": "A developer uses spark-submit with --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.7. What does this do?", "options": ["Downloads the Kafka connector JAR and its dependencies from Maven Central and adds them to the classpath for both driver and executors", "Installs Kafka on the cluster", "Configures Spark to use Kafka as its cluster manager", "Creates a Kafka topic named spark-sql"], "answer": 0, "explanation": "The --packages flag tells spark-submit to download the specified Maven coordinates (group:artifact:version) and their transitive dependencies. The JARs are distributed to all executors. This is how you add external connectors (Kafka, JDBC drivers, Delta Lake) to your Spark application without manual JAR management."}, {"id": "s6_q15", "objective": "Resource configuration", "question": "Which configuration controls how much off-heap memory (for VM overhead, interned strings, native libraries) is allocated per executor in YARN?", "options": ["spark.executor.memoryOverhead — defaults to max(384MB, 0.10 * spark.executor.memory)", "spark.executor.memory", "spark.yarn.executor.memoryLimit", "spark.executor.offHeap.size"], "answer": 0, "explanation": "spark.executor.memoryOverhead allocates additional memory beyond the JVM heap for native overhead, internal metadata, and PySpark worker memory. The total YARN container size = spark.executor.memory + memoryOverhead. If executors are OOMKilled by YARN but the JVM heap isn't full, increase this setting."}]}, {"id": 7, "name": "Pandas API on Spark", "questions": [{"id": "s7_q1", "objective": "Advantages of Pandas API on Spark", "question": "What is the primary advantage of Pandas API on Spark over native pandas?", "options": ["Pandas-like syntax that runs distributed across a Spark cluster, scaling beyond single-machine memory", "Faster execution on a single machine than native pandas", "More built-in functions than native pandas", "Built-in visualization capabilities"], "answer": 0, "explanation": "Pandas API on Spark (formerly Koalas) lets data scientists use familiar pandas syntax while leveraging Spark's distributed engine. This scales workloads beyond what fits in one machine's memory. On a single machine, native pandas is often faster due to lower overhead. The API coverage is a subset of pandas, not a superset."}, {"id": "s7_q2", "objective": "Pandas UDF", "question": "Which Pandas UDF type takes a pd.Series as input and returns a pd.Series of the same length?", "options": ["Scalar Pandas UDF (Series to Series) — processes batches of rows vectorized, returning one output per input row", "Grouped Map Pandas UDF", "Grouped Aggregate Pandas UDF", "Iterator Pandas UDF"], "answer": 0, "explanation": "Scalar Pandas UDFs (decorated with @pandas_udf returning Series) operate on batches of rows as pd.Series. Each input Series maps to an output Series of the same length. They're vectorized — much faster than row-at-a-time Python UDFs because they process batches using pandas/NumPy operations."}, {"id": "s7_q3", "objective": "Pandas UDF creation", "question": "Which code correctly defines a scalar Pandas UDF that doubles a numeric column?", "options": ["@pandas_udf('double')\ndef double_it(s: pd.Series) -> pd.Series:\n    return s * 2\ndf.withColumn('doubled', double_it(col('value')))", "@udf('double')\ndef double_it(x):\n    return x * 2\ndf.withColumn('doubled', double_it(col('value')))", "def double_it(s):\n    return s * 2\ndf['doubled'] = df['value'].apply(double_it)", "@pandas_udf('double')\ndef double_it(s: pd.Series) -> float:\n    return s.sum()"], "answer": 0, "explanation": "A scalar Pandas UDF uses @pandas_udf decorator, takes pd.Series input and returns pd.Series output. 'double' specifies the return data type. Option B is a regular UDF (row-at-a-time, slower). Option C uses pandas apply (not distributed). Option D returns a float (that's a grouped aggregate, not scalar)."}, {"id": "s7_q4", "objective": "Conversion", "question": "Which is the recommended way to convert a PySpark DataFrame to a Pandas API on Spark DataFrame in Spark 3.5?", "options": ["ps_df = df.pandas_api()", "ps_df = df.to_pandas_on_spark()", "ps_df = ps.DataFrame(df)", "ps_df = ps.from_spark(df)"], "answer": 0, "explanation": "In Spark 3.4+, df.pandas_api() is the recommended method. to_pandas_on_spark() was the older name (deprecated). ps.DataFrame(df) and ps.from_spark(df) are not valid constructors. Note: pandas_api() returns a DataFrame-like object that executes operations via Spark, not a local pandas DataFrame."}, {"id": "s7_q5", "objective": "Pandas UDF", "question": "Why are Pandas UDFs significantly faster than standard Python UDFs?", "options": ["Pandas UDFs use Apache Arrow for zero-copy data transfer between JVM and Python, and process data in vectorized batches using NumPy/pandas operations", "Pandas UDFs run on the driver instead of executors, avoiding network overhead", "Pandas UDFs are compiled to JVM bytecode", "Pandas UDFs bypass the Python GIL"], "answer": 0, "explanation": "Pandas UDFs leverage Apache Arrow for efficient columnar data transfer between the JVM and Python (near zero-copy). They process entire column batches using vectorized pandas/NumPy operations. Standard Python UDFs serialize/deserialize each row individually and process one row at a time — orders of magnitude slower."}, {"id": "s7_q6", "objective": "Grouped Map", "question": "Which Pandas UDF type applies a function to each group of a grouped DataFrame and returns a transformed DataFrame per group?", "options": ["Grouped Map — @pandas_udf with PandasUDFType.GROUPED_MAP, or the newer applyInPandas() API", "Scalar — Series to Series", "Grouped Aggregate — Series to scalar", "Map Iterator — iterator of Series to iterator of Series"], "answer": 0, "explanation": "Grouped Map UDFs (via applyInPandas()) receive a pandas DataFrame for each group and return a pandas DataFrame. This enables complex per-group transformations that are hard to express with built-in functions: e.g., per-group normalization, custom rolling calculations, or applying scikit-learn models per group."}, {"id": "s7_q7", "objective": "Pandas on Spark limitations", "question": "Which operation behaves differently in Pandas API on Spark compared to native pandas?", "options": ["Operations requiring a global sort or global index (like iloc[n]) — because data is distributed across partitions and has no inherent global order", "Basic column selection (df['col'])", "Filtering rows (df[df['col'] > 0])", "Adding new columns (df['new'] = expr)"], "answer": 0, "explanation": "Pandas API on Spark distributes data across partitions without a global order. Operations like iloc (positional indexing), global sort stability, and operations depending on row order may behave differently or be expensive. Column selection, filtering, and column creation work as expected because they're partition-local operations."}, {"id": "s7_q8", "objective": "Pandas UDF performance", "question": "A developer's Pandas UDF processes images stored as binary columns. Each image is ~10 MB. The UDF runs slowly. What is the likely bottleneck?", "options": ["Arrow serialization overhead for large binary values — each batch transfers potentially gigabytes of binary data between JVM and Python", "The UDF function itself is slow", "The executor doesn't have enough cores", "The images need to be in JPEG format, not PNG"], "answer": 0, "explanation": "Apache Arrow transfer between JVM and Python can become a bottleneck for large binary values. With 10 MB images in batches of 10,000, each batch transfers ~100 GB through Arrow. Solutions: reduce batch size (spark.sql.execution.arrow.maxRecordsPerBatch), store image paths instead of data, or use foreachPartition for better control."}, {"id": "s7_q9", "objective": "Conversion", "question": "What happens when you call df.toPandas() on a 50 GB PySpark DataFrame with a driver that has 8 GB memory?", "options": ["The driver runs out of memory (OOM) because toPandas() collects ALL data to the driver as a single pandas DataFrame", "Spark automatically samples 8 GB of data", "The data is streamed to pandas incrementally", "Spark writes to a temporary file and pandas reads from it"], "answer": 0, "explanation": "toPandas() collects the entire DataFrame to the driver's memory as a local pandas DataFrame. For 50 GB of data with 8 GB driver memory, this causes an OutOfMemoryError. Use Pandas API on Spark (df.pandas_api()) instead to keep data distributed, or sample/filter before calling toPandas()."}, {"id": "s7_q10", "objective": "Pandas on Spark", "question": "Which code correctly computes a rolling 7-day average on a Pandas API on Spark DataFrame?", "options": ["psdf.groupby('category').rolling(7).mean() — but this may trigger a shuffle since data must be sorted within groups", "psdf.rolling(7).mean()", "psdf.apply(lambda x: x.rolling(7).mean())", "psdf.transform('rolling_mean', window=7)"], "answer": 0, "explanation": "Rolling operations in Pandas API on Spark work similarly to pandas but execute on Spark. When combined with groupby, data is shuffled to co-locate groups. The rolling window operates on the sorted group data. Performance may be lower than native pandas for small datasets due to distributed overhead, but scales for large data."}, {"id": "s7_q11", "objective": "Pandas UDF types", "question": "A developer needs to compute a custom aggregate (e.g., weighted average) per group. Which Pandas UDF type should they use?", "options": ["Grouped Aggregate Pandas UDF — takes one or more pd.Series and returns a scalar value per group", "Scalar Pandas UDF — Series to Series", "Grouped Map Pandas UDF — DataFrame to DataFrame", "Standard Python UDF"], "answer": 0, "explanation": "Grouped Aggregate UDFs (via @pandas_udf with a scalar return type, used with groupBy().agg()) compute a single value per group from one or more Series inputs. Scalar UDFs are row-to-row. Grouped Map returns a DataFrame per group (not a scalar). Grouped Aggregate is perfect for custom aggregations."}, {"id": "s7_q12", "objective": "Arrow optimization", "question": "Which Spark configuration enables Arrow-based optimization for toPandas() and createDataFrame(pandas_df)?", "options": ["spark.sql.execution.arrow.pyspark.enabled=true", "spark.arrow.enabled=true", "spark.pyspark.arrow=true", "spark.sql.arrow.enabled=true"], "answer": 0, "explanation": "spark.sql.execution.arrow.pyspark.enabled=true (default true since Spark 3.0) enables Apache Arrow for toPandas() and createDataFrame() conversions. Arrow provides zero-copy columnar transfer between JVM and Python, dramatically faster than the default pickle-based serialization, especially for large DataFrames."}, {"id": "s7_q13", "objective": "Pandas API on Spark", "question": "A developer writes: import pyspark.pandas as ps; psdf = ps.read_csv('/data/large.csv'). How does this differ from spark.read.csv()?", "options": ["ps.read_csv returns a Pandas-on-Spark DataFrame with pandas-like API; spark.read.csv returns a PySpark DataFrame with PySpark API — both execute distributed on Spark", "ps.read_csv loads data into local memory; spark.read.csv distributes it", "ps.read_csv is faster than spark.read.csv", "ps.read_csv only works with small files"], "answer": 0, "explanation": "Both read data distributed across the Spark cluster. The difference is the API surface: ps.read_csv returns a pandas-on-Spark DataFrame (pandas-like methods: .head(), .describe(), iloc), while spark.read.csv returns a PySpark DataFrame (Spark methods: .select(), .filter(), .show()). Under the hood, both use Spark's execution engine."}, {"id": "s7_q14", "objective": "Pandas UDF", "question": "Which code correctly uses applyInPandas to normalize each group's 'value' column to zero mean?", "options": ["def normalize(pdf):\n    pdf['value'] = (pdf['value'] - pdf['value'].mean()) / pdf['value'].std()\n    return pdf\ndf.groupby('group').applyInPandas(normalize, schema=df.schema)", "df.groupby('group').apply(lambda x: (x - x.mean()) / x.std())", "df.groupby('group').transform(normalize)", "df.groupby('group').agg(normalize)"], "answer": 0, "explanation": "applyInPandas() takes a function that receives a pandas DataFrame per group and returns a pandas DataFrame. The schema parameter specifies the output schema. This is the Spark 3.x replacement for the older GROUPED_MAP Pandas UDF. The function has full access to pandas operations within each group."}, {"id": "s7_q15", "objective": "Best practices", "question": "When should a developer prefer native PySpark DataFrame API over Pandas API on Spark?", "options": ["For ETL pipelines and production workloads — PySpark API is more optimized, has better Catalyst integration, and offers more predictable performance", "Never — Pandas API on Spark is always better", "For small datasets only", "For streaming workloads only"], "answer": 0, "explanation": "PySpark's DataFrame API is purpose-built for distributed computation with deep Catalyst optimizer integration. Pandas API on Spark adds overhead for API translation and may not leverage all Spark optimizations. Use PySpark for production ETL, and Pandas API on Spark for exploratory data analysis or migrating pandas code."}]}]};

<script>
(function(){
// ===== LOAD QUIZ DATA =====
let EXAM;
try { EXAM = EXAM_DATA; } catch(e) { EXAM = null; }

// ===== FLATTEN QUESTIONS =====
const ALL_Q = [];
const SECTION_MAP = {};
if(EXAM && EXAM.sections) {
  EXAM.sections.forEach(s => {
    SECTION_MAP[s.id] = {name:s.name, startIdx:ALL_Q.length, count:s.questions.length};
    s.questions.forEach(q => {
      ALL_Q.push({...q, sectionId:s.id, sectionName:s.name});
    });
  });
}

// ===== STATE =====
const STORE_KEY = 'spark_cert_exam_v2';
const LEGACY_ATTEMPT_SEED = 'legacy-deterministic';
let cur = 0;
let answers = {};       // {globalIdx: {chosen:N, correct:N, map:[original option indexes]}}
let flags = {};         // {globalIdx: true}
let attemptSeed = createAttemptSeed();
let questionSeeds = {}; // {globalIdx: seed} used to reshuffle retry questions
let timerLeft = 90*60;  // seconds
let timerInterval = null;
let examFinished = false;

// ===== OPTION SHUFFLING =====
function createAttemptSeed(){
  try{
    const buf = new Uint32Array(2);
    window.crypto.getRandomValues(buf);
    return Date.now().toString(36)+'-'+buf[0].toString(36)+'-'+buf[1].toString(36);
  }catch(e){
    return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2);
  }
}

function hashSeed(s){
  let h = 2166136261;
  for(let i=0;i<s.length;i++){
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function seededRandom(seed){
  let a = hashSeed(seed) || 0x9e3779b9;
  return function(){
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function legacyShuffleOpts(opts, seed){
  function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
  const indices = opts.map((_,i)=>i);
  let m = indices.length, s = hashStr(seed);
  while(m > 1){
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % m;
    m--;
    [indices[m], indices[j]] = [indices[j], indices[m]];
  }
  return {shuffled: indices.map(i => opts[i]), indices};
}

function shuffleOpts(opts, seed, legacy){
  if(legacy)return legacyShuffleOpts(opts, seed);
  const indices = opts.map((_,i)=>i);
  const rand = seededRandom(seed);
  for(let i=indices.length-1;i>0;i--){
    const j = Math.floor(rand() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return {shuffled: indices.map(i => opts[i]), indices};
}

function answerIndex(q){
  if(Number.isInteger(q.answer))return q.answer;
  const idx = q.options.indexOf(q.answer);
  return idx >= 0 ? idx : 0;
}

function isValidMap(map, size){
  return Array.isArray(map) && map.length === size && new Set(map).size === size && map.every(i => Number.isInteger(i) && i >= 0 && i < size);
}

function buildShuffle(q, indices){
  const correctOriginalIdx = answerIndex(q);
  return {
    options: indices.map(i => q.options[i]),
    correctIdx: indices.indexOf(correctOriginalIdx),
    map: indices
  };
}

function getShuffled(q, globalIdx){
  const baseKey = q.id || ('q'+globalIdx);
  const seed = questionSeeds[globalIdx] || attemptSeed;
  const legacy = seed === LEGACY_ATTEMPT_SEED;
  const key = legacy ? baseKey : seed+':'+baseKey;
  const result = shuffleOpts(q.options, key, legacy);
  return buildShuffle(q, result.indices);
}

function getSavedShuffled(q, globalIdx){
  const answered = answers[globalIdx];
  if(answered && isValidMap(answered.map, q.options.length)){
    return buildShuffle(q, answered.map);
  }
  return getShuffled(q, globalIdx);
}

// ===== PERSISTENCE =====
function save(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify({cur,answers,flags,attemptSeed,questionSeeds,timerLeft,examFinished,ts:Date.now()}));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE_KEY));
    if(d){
      cur=Number.isInteger(d.cur)?d.cur:0;
      answers=d.answers||{};
      flags=d.flags||{};
      questionSeeds=d.questionSeeds||{};
      attemptSeed=d.attemptSeed || (Object.keys(answers).length ? LEGACY_ATTEMPT_SEED : createAttemptSeed());
      timerLeft=Number.isFinite(d.timerLeft)?d.timerLeft:90*60;
      examFinished=!!d.examFinished;
    }
  }catch(e){}
}

// ===== TIMER =====
function startTimer(){
  if(examFinished)return;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(timerLeft<=0){clearInterval(timerInterval);examFinished=true;showResults();return;}
    timerLeft--;
    updateTimerDisplay();
    if(timerLeft%30===0)save();
  },1000);
}
function updateTimerDisplay(){
  const m=Math.floor(timerLeft/60);
  const s=timerLeft%60;
  const el=document.getElementById('timer');
  el.textContent=m+':'+(s<10?'0':'')+s;
  el.className=timerLeft<300?(timerLeft<60?'danger':'warn'):'';
}

// ===== RENDER =====
function render(){
  if(!ALL_Q.length){document.getElementById('question-card').innerHTML='<h2>No questions loaded.</h2>';return;}
  const q=ALL_Q[cur];
  const answered=answers[cur];
  const sh=answered?getSavedShuffled(q,cur):getShuffled(q,cur);
  const letters=['A','B','C','D'];

  let html='';
  html+=`<div class="section-badge">Section ${q.sectionId}: ${q.sectionName}</div>`;
  html+=`<div class="q-number">Question ${cur+1} of ${ALL_Q.length}</div>`;
  if(q.objective) html+=`<div class="objective">Objective: ${esc(q.objective)}</div>`;

  // Question text — handle newlines
  const qtext = esc(q.question).replace(/\n/g,'<br>');
  html+=`<div class="q-text">${qtext}</div>`;
  if(q.code) html+=`<pre>${esc(q.code)}</pre>`;

  html+='<div class="options">';
  sh.options.forEach((opt,i)=>{
    let cls='opt';
    if(answered){
      cls+=' disabled';
      if(i===sh.correctIdx) cls+=' correct';
      else if(i===answered.chosen) cls+=' wrong';
    }
    const optHtml = esc(opt).replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code>$1</code>');
    html+=`<div class="${cls}" onclick="answer(${cur},${i},${sh.correctIdx})" data-idx="${i}">`;
    html+=`<span class="opt-letter">${letters[i]}</span>`;
    html+=`<span class="opt-text">${optHtml}</span>`;
    html+=`</div>`;
  });
  html+='</div>';

  // Feedback
  if(answered){
    const isCorrect=answered.chosen===sh.correctIdx;
    html+=`<div class="feedback show ${isCorrect?'pass':'fail'}">`;
    html+=isCorrect?'<strong>Correct!</strong> ':'<strong>Incorrect.</strong> ';
    html+=esc(q.explanation);
    html+='</div>';
  }

  document.getElementById('question-card').innerHTML=html;
  document.getElementById('results').className='';
  document.getElementById('question-card').style.display='block';

  // Update header
  document.getElementById('section-label').textContent=`S${q.sectionId}: ${q.sectionName}`;
  document.getElementById('q-counter').textContent=`${cur+1} / ${ALL_Q.length}`;
  const answeredCount=Object.keys(answers).length;
  document.getElementById('pct').textContent=Math.round(answeredCount/ALL_Q.length*100)+'%';

  // Progress bar
  document.getElementById('progress-bar').style.width=(answeredCount/ALL_Q.length*100)+'%';

  // Flag button
  const fb=document.getElementById('flag-btn');
  fb.className=flags[cur]?'flag-btn flagged':'flag-btn';
  fb.textContent=flags[cur]?'Flagged (F)':'Flag (F)';

  buildNav();
  save();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shortText(s, max){
  const text=String(s||'').replace(/\s+/g,' ').trim();
  return text.length>max?text.slice(0,max-3)+'...':text;
}

// ===== ANSWER =====
window.answer=function(idx,chosen,correctIdx){
  if(answers[idx])return;
  const sh=getShuffled(ALL_Q[idx],idx);
  const correct=Number.isInteger(correctIdx)?correctIdx:sh.correctIdx;
  answers[idx]={chosen,correct,map:sh.map};
  save();
  render();
  // Auto-advance
  const delay=chosen===correct?1200:3000;
  setTimeout(()=>{if(cur===idx&&cur<ALL_Q.length-1){cur++;render();}},delay);
};

// ===== NAVIGATION =====
window.go=function(dir){
  const n=cur+dir;
  if(n>=0&&n<ALL_Q.length){cur=n;render();}
};
window.toggleFlag=function(){
  flags[cur]=!flags[cur];
  if(!flags[cur])delete flags[cur];
  save();render();
};

// ===== NAVIGATOR =====
window.toggleNav=function(){
  document.getElementById('navigator').classList.toggle('open');
  document.getElementById('nav-overlay').classList.toggle('show');
};
function buildNav(){
  let html='';
  if(EXAM&&EXAM.sections){
    let gi=0;
    EXAM.sections.forEach(s=>{
      const isCurrentSection=SECTION_MAP[s.id] && cur>=SECTION_MAP[s.id].startIdx && cur<SECTION_MAP[s.id].startIdx+SECTION_MAP[s.id].count;
      html+=`<div class="toc-section">`;
      html+=`<div class="toc-section-title ${isCurrentSection?'active':''}" data-section="${s.id}" onclick="toggleNavSection(${s.id})">S${s.id}: ${esc(s.name)} (${s.questions.length})</div>`;
      html+=`<div class="toc-questions ${isCurrentSection?'open':''}" id="nav-sec-${s.id}">`;
      s.questions.forEach((q,qi)=>{
        let cls='toc-question';
        if(gi===cur)cls+=' current';
        if(answers[gi]){
          const sh=getSavedShuffled(ALL_Q[gi],gi);
          cls+=answers[gi].chosen===sh.correctIdx?' answered-correct':' answered-wrong';
        }
        if(flags[gi])cls+=' flagged';
        const gIdx=gi;
        const label=shortText(q.objective || q.question, 82);
        html+=`<div class="${cls}" onclick="jumpTo(${gIdx})">`;
        html+=`<span class="toc-qnum">Q${gi+1}</span><span class="toc-qtext">${esc(label)}</span>`;
        html+=`</div>`;
        gi++;
      });
      html+='</div></div>';
    });
  }
  document.getElementById('nav-body').innerHTML=html;
}
window.toggleNavSection=function(sectionId){
  const el=document.getElementById('nav-sec-'+sectionId);
  if(el)el.classList.toggle('open');
};
window.jumpTo=function(idx){
  cur=idx;render();
  document.getElementById('navigator').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('show');
};

// ===== RESULTS =====
window.showResults=function(){
  if(timerInterval)clearInterval(timerInterval);
  examFinished=true;
  save();

  const totalAnswered=Object.keys(answers).length;
  let totalCorrect=0;
  const sectionScores={};
  const wrongItems=[];

  // Initialize
  if(EXAM&&EXAM.sections){
    EXAM.sections.forEach(s=>{sectionScores[s.id]={name:s.name,correct:0,total:s.questions.length};});
  }

  ALL_Q.forEach((q,gi)=>{
    if(!answers[gi])return;
    const sh=getSavedShuffled(q,gi);
    const isCorrect=answers[gi].chosen===sh.correctIdx;
    if(isCorrect){
      totalCorrect++;
      if(sectionScores[q.sectionId])sectionScores[q.sectionId].correct++;
    }else{
      const letters=['A','B','C','D'];
      wrongItems.push({
        num:gi+1,
        section:q.sectionName,
        question:q.question.substring(0,120)+'...',
        yourAnswer:sh.options[answers[gi].chosen],
        correctAnswer:sh.options[sh.correctIdx],
        explanation:q.explanation
      });
    }
  });

  const pct=ALL_Q.length?Math.round(totalCorrect/ALL_Q.length*100):0;
  const passed=pct>=70;

  let html=`<h2>Exam Results</h2>`;
  html+=`<div class="score-badge ${passed?'pass':'fail'}">${totalCorrect}/${ALL_Q.length} (${pct}%)</div>`;
  html+=`<p style="font-size:1.2rem;margin:8px 0;font-weight:600;color:${passed?'#166534':'#991b1b'}">${passed?'PASSED':'NOT PASSED'} (70% required)</p>`;
  html+=`<p style="color:#64748b;margin-bottom:16px">Answered: ${totalAnswered}/${ALL_Q.length} | Correct: ${totalCorrect} | Wrong: ${totalAnswered-totalCorrect} | Unanswered: ${ALL_Q.length-totalAnswered}</p>`;

  // Section breakdown
  html+=`<table class="section-scores"><thead><tr><th>Section</th><th>Score</th><th>%</th><th>Progress</th></tr></thead><tbody>`;
  Object.values(sectionScores).forEach(ss=>{
    const sp=ss.total?Math.round(ss.correct/ss.total*100):0;
    const color=sp>=70?'#22c55e':sp>=50?'#eab308':'#ef4444';
    html+=`<tr><td>${ss.name}</td><td>${ss.correct}/${ss.total}</td><td>${sp}%</td><td><div class="score-bar"><div class="fill" style="width:${sp}%;background:${color}"></div></div></td></tr>`;
  });
  html+=`</tbody></table>`;

  // Wrong answers review
  if(wrongItems.length){
    html+=`<div class="wrong-list"><h3 style="margin-bottom:12px">Incorrect Answers (${wrongItems.length})</h3>`;
    wrongItems.forEach(w=>{
      html+=`<div class="wrong-item">`;
      html+=`<div class="wi-q">Q${w.num}: ${esc(w.question)}</div>`;
      html+=`<div class="wi-your">Your answer: ${esc(w.yourAnswer)}</div>`;
      html+=`<div class="wi-correct">Correct: ${esc(w.correctAnswer)}</div>`;
      html+=`<div class="wi-explain">${esc(w.explanation)}</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  html+=`<button class="retry-btn" onclick="retryWrong()">Retry Incorrect (${wrongItems.length})</button>`;
  html+=` <button class="retry-btn" onclick="resetExam()" style="background:#64748b">Reset Exam</button>`;

  document.getElementById('results').innerHTML=html;
  document.getElementById('results').className='show';
  document.getElementById('question-card').style.display='none';
};

window.retryWrong=function(){
  // Find first wrong answer and reset all wrong answers
  let firstWrong=-1;
  ALL_Q.forEach((q,gi)=>{
    if(answers[gi]){
      const sh=getSavedShuffled(q,gi);
      if(answers[gi].chosen!==sh.correctIdx){
        delete answers[gi];
        questionSeeds[gi]=createAttemptSeed();
        if(firstWrong<0)firstWrong=gi;
      }
    }
  });
  if(firstWrong>=0){cur=firstWrong;examFinished=false;timerLeft=45*60;startTimer();render();}
  else{alert('No incorrect answers to retry!');}
};

window.resetExam=function(){
  if(!confirm('Reset all answers and start over?'))return;
  if(timerInterval)clearInterval(timerInterval);
  answers={};flags={};questionSeeds={};attemptSeed=createAttemptSeed();cur=0;timerLeft=90*60;examFinished=false;
  save();startTimer();render();
};

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const key=e.key.toLowerCase();
  if(key==='arrowright'||key==='n'||(key===' '&&!e.shiftKey)){e.preventDefault();go(1);}
  else if(key==='arrowleft'||key==='p'||(key===' '&&e.shiftKey)){e.preventDefault();go(-1);}
  else if(key==='1'&&!answers[cur])answer(cur,0,getShuffled(ALL_Q[cur],cur).correctIdx);
  else if(key==='2'&&!answers[cur])answer(cur,1,getShuffled(ALL_Q[cur],cur).correctIdx);
  else if(key==='3'&&!answers[cur])answer(cur,2,getShuffled(ALL_Q[cur],cur).correctIdx);
  else if(key==='4'&&!answers[cur])answer(cur,3,getShuffled(ALL_Q[cur],cur).correctIdx);
  else if(key==='f')toggleFlag();
  else if(key==='t')toggleNav();
  else if(key==='r'&&e.shiftKey)showResults();
  else if(key==='home'){cur=0;render();}
  else if(key==='end'){cur=ALL_Q.length-1;render();}
  else if(key==='escape'){document.getElementById('navigator').classList.remove('open');document.getElementById('nav-overlay').classList.remove('show');}
});

// ===== INIT =====
load();
if(!examFinished)startTimer();
updateTimerDisplay();
render();

})();
</script>
</body>
</html>
