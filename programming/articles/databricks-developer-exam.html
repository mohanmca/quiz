<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databricks Certified Associate Developer for Apache Spark — Practice Exam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6}
code,pre,.code{font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace}
#progress-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,#2563eb,#7c3aed);z-index:1000;transition:width .3s}
#app{max-width:900px;margin:0 auto;padding:20px 16px 100px}
#header{position:sticky;top:6px;background:#fff;border-radius:12px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:100;margin-bottom:16px;flex-wrap:wrap;gap:8px}
#header .left{font-weight:600;color:#2563eb;font-size:.9rem;min-width:200px}
#header .center{font-size:.85rem;color:#64748b}
#header .right{display:flex;align-items:center;gap:10px}
#header .right button{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:.8rem;transition:all .15s}
#header .right button:hover{background:#e2e8f0}
#timer{font-weight:700;font-size:.95rem;color:#1a1a2e;min-width:70px;text-align:center}
#timer.warn{color:#ea580c}
#timer.danger{color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#pct{font-weight:600;font-size:.85rem;color:#7c3aed}
#question-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:36px 40px;min-height:400px}
#question-card .section-badge{display:inline-block;background:#eff6ff;color:#2563eb;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px}
#question-card .q-number{font-size:.85rem;color:#64748b;margin-bottom:4px}
#question-card .objective{font-size:.8rem;color:#7c3aed;font-style:italic;margin-bottom:12px;padding:6px 12px;background:#faf5ff;border-left:3px solid #7c3aed;border-radius:0 6px 6px 0}
#question-card .q-text{font-size:1.05rem;font-weight:500;margin-bottom:8px;line-height:1.5}
#question-card pre{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:14px 18px;margin:10px 0 16px;overflow-x:auto;font-size:.85rem;white-space:pre;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.opt{display:flex;align-items:flex-start;gap:12px;border:2px solid #e2e8f0;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .15s;user-select:none}
.opt:hover:not(.disabled){border-color:#2563eb;background:#f8faff}
.opt .opt-letter{font-weight:700;color:#64748b;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f1f5f9;font-size:.8rem;flex-shrink:0}
.opt .opt-text{flex:1;font-size:.95rem;line-height:1.5}
.opt .opt-text code{background:#f1f5f9;padding:1px 5px;border-radius:3px;font-size:.85rem}
.opt.correct{border-color:#22c55e;background:#f0fdf4}
.opt.correct .opt-letter{background:#22c55e;color:#fff}
.opt.wrong{border-color:#ef4444;background:#fef2f2}
.opt.wrong .opt-letter{background:#ef4444;color:#fff}
.opt.disabled{cursor:default;opacity:.75;pointer-events:none}
.opt.disabled:not(.correct):not(.wrong){opacity:.55}
.feedback{margin-top:16px;padding:14px 18px;border-radius:8px;font-size:.9rem;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.pass{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.feedback.fail{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
#nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:12px 20px;display:flex;justify-content:center;gap:12px;z-index:100}
#nav button{padding:10px 24px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
#nav .prev{background:#f1f5f9;color:#475569}
#nav .prev:hover{background:#e2e8f0}
#nav .next{background:#2563eb;color:#fff}
#nav .next:hover{background:#1d4ed8}
#nav .flag-btn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
#nav .flag-btn.flagged{background:#fbbf24;color:#78350f}
#nav .submit-btn{background:#7c3aed;color:#fff}
#nav .submit-btn:hover{background:#6d28d9}
#navigator{position:fixed;top:0;left:-380px;width:360px;height:100%;background:#fff;z-index:301;transition:left .3s;overflow-y:auto;box-shadow:4px 0 20px rgba(0,0,0,.15);padding:20px}
#navigator.open{left:0}
#nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:none}
#nav-overlay.show{display:block}
#navigator h2{font-size:1.1rem;margin-bottom:16px;color:#1a1a2e}
.toc-section{margin:8px 0}
.toc-section-title{font-weight:600;font-size:.9rem;color:#2563eb;cursor:pointer;padding:8px 10px;border-radius:6px;transition:background .15s}
.toc-section-title:hover,.toc-section-title.active{background:#eff6ff}
.toc-questions{display:none;margin:2px 0 10px 6px}
.toc-questions.open{display:block}
.toc-question{display:flex;align-items:flex-start;gap:8px;font-size:.82rem;padding:6px 8px;border-radius:6px;cursor:pointer;color:#475569;transition:all .15s}
.toc-question:hover{background:#f1f5f9;color:#1e293b}
.toc-question.answered-correct{background:#f0fdf4;color:#166534}
.toc-question.answered-wrong{background:#fef2f2;color:#991b1b}
.toc-question.flagged .toc-qnum::after{content:"";display:inline-block;width:6px;height:6px;background:#eab308;border-radius:50%;margin-left:4px;vertical-align:middle}
.toc-question.current{background:#2563eb;color:#fff}
.toc-qnum{font-weight:700;min-width:32px;flex-shrink:0}
.toc-qtext{overflow:hidden;text-overflow:ellipsis}
.nav-section{margin-bottom:12px}
.nav-section h3{font-size:.85rem;color:#2563eb;font-weight:600;margin-bottom:6px;padding:4px 0}
.nav-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.nav-cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;transition:all .1s}
.nav-cell:hover{background:#eff6ff}
.nav-cell.current{border-color:#2563eb;background:#2563eb;color:#fff}
.nav-cell.answered-correct{background:#dcfce7;border-color:#86efac;color:#166534}
.nav-cell.answered-wrong{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.nav-cell.flagged::after{content:"";position:absolute;top:1px;right:1px;width:6px;height:6px;background:#eab308;border-radius:50%}
.nav-cell{position:relative}
#results{display:none}
#results.show{display:block}
#results h2{font-size:1.4rem;margin-bottom:16px}
.score-badge{display:inline-block;font-size:2.5rem;font-weight:800;padding:16px 32px;border-radius:16px;margin:16px 0}
.score-badge.pass{background:#dcfce7;color:#166534}
.score-badge.fail{background:#fee2e2;color:#991b1b}
.section-scores{width:100%;border-collapse:collapse;margin:20px 0}
.section-scores th,.section-scores td{padding:10px 14px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:.9rem}
.section-scores th{background:#f8fafc;font-weight:600;color:#475569}
.section-scores tr:hover{background:#f8fafc}
.score-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden;min-width:100px}
.score-bar .fill{height:100%;border-radius:4px;transition:width .5s}
.wrong-list{margin-top:24px}
.wrong-item{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px 18px;margin-bottom:10px}
.wrong-item .wi-q{font-weight:600;margin-bottom:4px;font-size:.9rem}
.wrong-item .wi-your{color:#991b1b;font-size:.85rem}
.wrong-item .wi-correct{color:#166534;font-size:.85rem}
.wrong-item .wi-explain{color:#475569;font-size:.85rem;margin-top:4px}
.retry-btn{display:inline-block;background:#2563eb;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px}
.retry-btn:hover{background:#1d4ed8}
@media(max-width:768px){#question-card{padding:20px 18px}#header{padding:8px 12px}#header .left{min-width:auto;font-size:.8rem}.opt{padding:10px 14px}}
@media print{#header,#nav,#progress-bar,#navigator,#nav-overlay{display:none}#question-card{box-shadow:none}}
.kbd{display:inline-block;background:#f1f5f9;border:1px solid #d1d5db;border-radius:4px;padding:1px 6px;font-size:.75rem;font-family:monospace;color:#374151}
</style>

<script>

const EXAM_DATA = {"title": "Databricks Certified Associate Developer for Apache Spark — Practice Exam", "version": "2.0", "timeLimit": 90, "passThreshold": 0.7, "totalQuestions": 154, "source": "Generated from spark-llms-full-v2.txt and spark-llms-certification-v2.txt, aligned to official Databricks exam guide Oct 2025", "sections": [{"id": 1, "name": "Apache Spark Architecture and Components", "questions": [{"id": "s1_q1", "objective": "Identify the role of core components", "question": "In a Spark cluster, which component is responsible for negotiating resources from the cluster manager and scheduling tasks on executors?", "options": ["Driver", "Worker Node", "Executor", "HDFS NameNode"], "answer": 0, "explanation": "The Driver runs the SparkContext which requests resources from the cluster manager (YARN/K8s/Standalone) and schedules tasks on executors. Worker nodes host executors, and executors run the actual tasks."}, {"id": "s1_q2", "objective": "Describe execution hierarchy", "question": "A developer calls df.groupBy('dept').count().show(). How many Spark jobs are triggered?", "options": ["One job — show() is the single action that triggers execution", "Two jobs — groupBy triggers one and show triggers another", "Three jobs — one for groupBy, one for count, one for show", "Zero — this only builds a logical plan"], "answer": 0, "explanation": "Only actions trigger jobs. show() is the only action here. groupBy() and count() are transformations that build the logical plan lazily. The single show() call triggers one job that executes the entire plan."}, {"id": "s1_q3", "objective": "Configure Spark partitioning", "question": "A DataFrame has 1000 partitions but the cluster has only 20 cores. What is the most likely performance impact?", "options": ["Excessive task scheduling overhead — each core must serially process ~50 small tasks", "Executor OOM errors from too many partitions in memory", "The job fails because partition count cannot exceed core count", "No impact — Spark automatically coalesces to match cores"], "answer": 0, "explanation": "With 1000 partitions and 20 cores, each core processes ~50 tasks sequentially. If partitions are small, the scheduling overhead per task dominates actual computation time. Spark does not auto-coalesce. Consider coalesce(20) or coalesce(40) to reduce overhead."}, {"id": "s1_q4", "objective": "Describe execution patterns", "question": "Which of the following operations is a Spark transformation (not an action)?\n\nA. df.collect()\nB. df.count()\nC. df.filter(col('age') > 30)\nD. df.write.parquet('/out')", "code": "df.filter(col('age') > 30)", "options": ["filter() — it returns a new DataFrame without triggering execution", "collect() — it returns data to the driver", "count() — it computes a numeric result", "write.parquet() — it saves data to disk"], "answer": 0, "explanation": "filter() is a narrow transformation that returns a new DataFrame lazily. collect(), count(), and write are all actions that trigger job execution. Transformations build the DAG; actions execute it."}, {"id": "s1_q5", "objective": "Describe architecture including caching", "question": "A developer caches a DataFrame with df.cache(). After calling df.count() to materialize the cache, they run df.filter(...).count(). Does the filter operation benefit from the cache?", "options": ["Yes — Spark reads the cached data and applies the filter on top of it", "No — filter creates a new DataFrame that is not cached", "Yes — but only if the filter is on a partition column", "No — cache() only helps when the exact same DataFrame reference is used with no additional transformations"], "answer": 0, "explanation": "cache() stores the materialized DataFrame in memory. Subsequent operations that derive from df (like df.filter(...)) will read from the cached data instead of recomputing from source. The filter is applied on top of the cached partitions, which is faster than re-reading from disk."}, {"id": "s1_q6", "objective": "Storage levels and garbage collection", "question": "Which storage level serializes data in memory using Java serialization and stores overflow on disk?", "options": ["MEMORY_AND_DISK_SER", "MEMORY_ONLY", "MEMORY_AND_DISK", "DISK_ONLY"], "answer": 0, "explanation": "MEMORY_AND_DISK_SER stores serialized (compact) representations in memory and spills to disk when memory is full. MEMORY_ONLY stores deserialized objects (faster access, more memory). MEMORY_AND_DISK stores deserialized in memory with disk spill. DISK_ONLY skips memory entirely."}, {"id": "s1_q7", "objective": "Explain execution hierarchy", "question": "In Spark, what determines the boundary between two stages within a single job?", "options": ["A shuffle dependency (wide transformation) between RDDs/DataFrames", "The number of partitions exceeding executor count", "A change in the data schema between operations", "An explicit call to repartition()"], "answer": 0, "explanation": "Stage boundaries occur at shuffle dependencies (wide transformations) like groupBy, join, or repartition. Within a stage, all operations are narrow (map, filter) and can be pipelined. repartition() does create a stage boundary, but the general rule is any wide/shuffle dependency."}, {"id": "s1_q8", "objective": "SparkSession lifecycle", "question": "What happens when a developer calls spark.stop() in a PySpark application?", "options": ["The SparkContext is shut down, all executors are terminated, and all cached data is lost", "Only the current SparkSession is closed but executors remain for other sessions", "Cached data is persisted to disk automatically before shutdown", "The application pauses and can be resumed with spark.start()"], "answer": 0, "explanation": "spark.stop() terminates the underlying SparkContext, which in turn shuts down all executors and their JVMs. All cached DataFrames, broadcast variables, and accumulators are destroyed. There is no spark.start() — you must create a new SparkSession."}, {"id": "s1_q9", "objective": "Advantages and challenges of Spark", "question": "Which is a key advantage of Apache Spark over traditional MapReduce?", "options": ["In-memory computation that avoids writing intermediate results to disk between stages", "Built-in ACID transaction support for all data formats", "Automatic schema evolution for all file types", "Native support for real-time message queuing"], "answer": 0, "explanation": "Spark's primary advantage is in-memory computation — intermediate results between stages can be kept in memory rather than written to HDFS like MapReduce. This dramatically reduces I/O and speeds up iterative algorithms. Spark does not natively provide ACID (Delta Lake does), schema evolution (format-dependent), or message queuing."}, {"id": "s1_q10", "objective": "Identify Spark modules", "question": "Which of the following is NOT a built-in Apache Spark module?", "options": ["Spark Kafka — Kafka is an external connector, not a built-in module", "Spark SQL — for structured data processing", "MLlib — for machine learning", "Structured Streaming — for stream processing"], "answer": 0, "explanation": "The core Spark modules are: Spark Core, Spark SQL, Structured Streaming, MLlib, and Pandas API on Spark. Kafka integration is provided via external connectors (spark-sql-kafka) that must be added as dependencies. It is not a built-in module."}, {"id": "s1_q11", "objective": "Configure partitioning", "question": "A developer sets spark.sql.shuffle.partitions=200 and runs a groupBy aggregation on a DataFrame with 50 input partitions. How many partitions will the result DataFrame have?", "options": ["200 — shuffle.partitions controls the output partition count for shuffle operations", "50 — it matches the input partition count", "1 — aggregations always produce a single partition", "It depends on the number of distinct group keys"], "answer": 0, "explanation": "spark.sql.shuffle.partitions (default 200) determines the number of partitions after a shuffle operation like groupBy. Regardless of input partitions (50), the shuffle output will have 200 partitions. This can be tuned — too many creates scheduling overhead, too few creates large partitions."}, {"id": "s1_q12", "objective": "Lazy evaluation", "question": "A developer writes:\n\ndf2 = df.filter(col('status') == 'active')\ndf3 = df2.select('id', 'name')\ndf4 = df3.withColumn('upper_name', upper(col('name')))\n\nAt this point, how much data has Spark processed?", "options": ["None — all three operations are transformations and no action has been called yet", "Only the filter has been applied because it reduces data volume", "All three operations have been computed in pipeline fashion", "The filter and select have been applied but withColumn is deferred"], "answer": 0, "explanation": "Spark uses lazy evaluation. filter(), select(), and withColumn() are all transformations that only build a logical plan. No data is read or processed until an action (like count(), show(), collect(), or write) is called. The entire pipeline executes as one optimized plan when triggered."}, {"id": "s1_q13", "objective": "Fault tolerance", "question": "How does Spark achieve fault tolerance for RDD/DataFrame computations?", "options": ["Through lineage — Spark records the transformations used to build each partition and can recompute lost partitions from source data", "By replicating every partition to three nodes like HDFS", "By writing checkpoint files after every transformation", "By maintaining a transaction log of all operations"], "answer": 0, "explanation": "Spark's fault tolerance is based on lineage (DAG of transformations). If a partition is lost due to executor failure, Spark recomputes it by replaying the transformations from the source data or last checkpoint. This avoids the overhead of replication while ensuring recoverability."}, {"id": "s1_q14", "objective": "Core components", "question": "An executor has 4 cores and 8 GB memory. spark.task.cpus is set to 1. How many concurrent tasks can this executor run?", "options": ["4 tasks — one per core with spark.task.cpus=1", "8 tasks — one per GB of memory", "1 task — executors run tasks serially", "It depends on the number of partitions"], "answer": 0, "explanation": "Each executor can run (cores / spark.task.cpus) concurrent tasks. With 4 cores and spark.task.cpus=1, the executor has 4 task slots. Each task processes one partition. If spark.task.cpus were 2 (for GPU or memory-intensive tasks), only 2 tasks could run concurrently."}, {"id": "s1_q15", "objective": "Caching", "question": "What is the difference between df.cache() and df.persist(StorageLevel.MEMORY_AND_DISK)?", "options": ["cache() is a shorthand for persist(StorageLevel.MEMORY_ONLY) — it does NOT spill to disk", "They are identical — both use MEMORY_AND_DISK", "cache() stores data serialized while persist() stores deserialized", "cache() only caches the schema while persist() caches the data"], "answer": 0, "explanation": "df.cache() is equivalent to df.persist(StorageLevel.MEMORY_ONLY). It stores deserialized Java objects in memory only. If memory is insufficient, some partitions won't be cached and will be recomputed on access. persist(MEMORY_AND_DISK) spills to disk when memory is full, which is safer for large DataFrames."}, {"id": "s1_q16", "objective": "Execution hierarchy", "question": "A Spark application has 3 actions: df1.count(), df2.show(), df3.write.parquet(...). How many jobs are created?", "options": ["3 jobs — each action triggers a separate job", "1 job — all actions within one application run as one job", "2 jobs — count and show share a job, write is separate", "It depends on the size of the DataFrames"], "answer": 0, "explanation": "Each action triggers exactly one job. Three separate actions create three separate jobs. Jobs are the unit of work triggered by an action. Within each job, Spark creates stages (at shuffle boundaries) and tasks (one per partition per stage)."}, {"id": "s1_q17", "objective": "Partitioning and shuffles", "question": "Which operation does NOT trigger a shuffle?", "options": ["df.filter(col('age') > 25) — filter is a narrow transformation that operates partition-locally", "df.groupBy('dept').count() — groupBy requires shuffling data by key", "df.join(df2, 'id') — join requires co-locating matching keys", "df.repartition(100) — repartition always shuffles all data"], "answer": 0, "explanation": "filter() is a narrow transformation — it applies a predicate to each row independently within the same partition. No data movement between partitions is needed. groupBy, join, and repartition all require data redistribution across partitions (shuffle)."}, {"id": "s1_q18", "objective": "Garbage collection", "question": "A Spark executor shows frequent long GC pauses in the Spark UI Executors tab. Which approach most directly addresses this?", "options": ["Reduce the fraction of memory used for caching by lowering spark.memory.storageFraction, or unpersist unneeded DataFrames", "Increase spark.sql.shuffle.partitions to spread data across more tasks", "Switch from client mode to cluster mode", "Increase the number of executor cores"], "answer": 0, "explanation": "Long GC pauses indicate the JVM heap is nearly full, usually from cached data or large objects. Reducing cache pressure (unpersist, lower storageFraction, or switch to serialized storage) frees heap space. More shuffle partitions or cores don't directly address heap pressure."}, {"id": "s1_q19", "objective": "DataFrame and Dataset concepts", "question": "In PySpark, what is the relationship between a DataFrame and a Dataset?", "options": ["In PySpark, DataFrame is the primary API — Dataset[Row] is the underlying type, but the typed Dataset API is only available in Scala/Java", "DataFrame and Dataset are completely separate APIs with no relationship", "Dataset is deprecated in favor of DataFrame in all languages", "DataFrame is for batch and Dataset is for streaming"], "answer": 0, "explanation": "In Spark's Scala API, DataFrame is an alias for Dataset[Row]. The typed Dataset API (Dataset[T]) provides compile-time type safety in Scala/Java. In PySpark, only the DataFrame (Dataset[Row]) API is available because Python is dynamically typed. Both batch and streaming use DataFrames in PySpark."}, {"id": "s1_q20", "objective": "Actions vs transformations", "question": "Which of the following returns a value to the driver program (i.e., is an action)?", "options": ["df.first() — returns the first Row object to the driver", "df.select('name') — returns a new DataFrame", "df.withColumnRenamed('a', 'b') — returns a new DataFrame", "df.limit(10) — returns a new DataFrame with at most 10 rows"], "answer": 0, "explanation": "first() is an action that retrieves the first row and returns it as a Row object to the driver. select(), withColumnRenamed(), and limit() are all transformations that return new DataFrames lazily without triggering execution."}, {"id": "s1_q21", "objective": "Spark modules", "question": "Which Spark module provides the pandas-like API that runs computations distributed across a Spark cluster?", "options": ["Pandas API on Spark (formerly Koalas)", "Spark SQL", "PySpark Core", "MLlib"], "answer": 0, "explanation": "Pandas API on Spark (integrated into PySpark since Spark 3.2, formerly the separate Koalas project) provides pandas-compatible DataFrame and Series APIs that execute on Spark's distributed engine. It allows data scientists to use familiar pandas syntax at scale."}, {"id": "s1_q22", "objective": "Memory architecture", "question": "In Spark's unified memory management, what are the two main regions that share the executor's JVM heap?", "options": ["Execution memory (shuffles, joins, sorts, aggregations) and Storage memory (caching, broadcast variables)", "Driver memory and Executor memory", "On-heap memory and Off-heap memory", "Task memory and System memory"], "answer": 0, "explanation": "Spark's unified memory manager divides executor heap into Execution memory (for shuffles, joins, sorts, aggregations) and Storage memory (for caching and broadcasts). They share a common pool controlled by spark.memory.fraction (default 0.6) and can borrow from each other when one region is underutilized."}, {"id": "s1_q23", "objective": "Partitioning", "question": "What is the default number of partitions when reading a local file in Spark?", "options": ["It depends on the file size and spark.sql.files.maxPartitionBytes (default 128 MB) — Spark splits the file into partitions of approximately this size", "Always 1 partition per file", "Always 200 partitions", "Equal to the number of executor cores"], "answer": 0, "explanation": "For file-based sources, Spark creates partitions based on spark.sql.files.maxPartitionBytes (default 128 MB). A 1 GB file produces ~8 partitions. For small files, spark.sql.files.openCostInBytes is added to prevent too many tiny partitions. The number of cores or shuffle.partitions does not affect read partitioning."}]}, {"id": 2, "name": "Using Spark SQL", "questions": [{"id": "s2_q1", "objective": "Read from and write to DataFrames using Spark SQL", "question": "Which code correctly reads a CSV file with headers, infers the schema, and handles multiline fields?", "options": ["spark.read.format('csv').option('header','true').option('inferSchema','true').option('multiLine','true').load('/data/file.csv')", "spark.read.csv('/data/file.csv', header='true', schema='infer', multiline='true')", "spark.sql(\"LOAD CSV '/data/file.csv' WITH HEADER INFER SCHEMA\")", "spark.read.text('/data/file.csv').option('header','true')"], "answer": 0, "explanation": "The correct approach uses format('csv') with options for header, inferSchema, and multiLine. Option B has incorrect parameter names (schema='infer' is not valid). Option C is not valid Spark SQL syntax. Option D reads as plain text, not CSV."}, {"id": "s2_q2", "objective": "Execute SQL on files directly", "question": "A developer wants to query a JSON file directly in SQL without creating a DataFrame first. Which syntax works?", "options": ["spark.sql(\"SELECT name, age FROM json.`/data/people.json` WHERE age > 30\")", "spark.sql(\"SELECT * FROM '/data/people.json' FORMAT json\")", "spark.sql(\"LOAD JSON '/data/people.json' AS SELECT name, age\")", "spark.sql(\"SELECT * FROM json('/data/people.json')\")"], "answer": 0, "explanation": "Spark SQL supports querying files directly using format.`path` syntax with backtick-quoted paths. This works for json, parquet, csv, orc, and other formats. The path must be enclosed in backticks, not regular quotes."}, {"id": "s2_q3", "objective": "Save modes", "question": "A developer writes df.write.mode('ignore').parquet('/output'). The path /output already contains data. What happens?", "options": ["Spark silently does nothing — the existing data at /output is left unchanged", "Spark throws an AnalysisException because data already exists", "Spark overwrites the existing data", "Spark appends new data alongside existing data"], "answer": 0, "explanation": "The 'ignore' save mode silently skips the write operation if the target path already contains data. No error is raised and no data is modified. This is useful for idempotent pipelines where you only want to write if the output doesn't exist yet."}, {"id": "s2_q4", "objective": "Register DataFrames as temporary views", "question": "What is the difference between createOrReplaceTempView() and createOrReplaceGlobalTempView()?", "options": ["Temp views are session-scoped; global temp views are visible across all sessions in the same application via the global_temp database", "Temp views persist after spark.stop(); global temp views don't", "They are identical in behavior", "Global temp views can be accessed from other Spark applications on the same cluster"], "answer": 0, "explanation": "createOrReplaceTempView() creates a view visible only in the current SparkSession. createOrReplaceGlobalTempView() creates a view in the global_temp database, accessible by all sessions in the same application (e.g., spark.sql('SELECT * FROM global_temp.my_view')). Neither survives spark.stop()."}, {"id": "s2_q5", "objective": "Partitioning by column on write", "question": "A developer writes:\n\ndf.write.mode('overwrite').partitionBy('country','year').parquet('/output')\n\nWhat is the resulting directory structure?", "options": ["/output/country=US/year=2024/part-00000.parquet (Hive-style partition directories)", "/output/US/2024/part-00000.parquet (plain nested directories)", "/output/part-00000-country-US-year-2024.parquet (encoded in filename)", "/output/country_year=US_2024/part-00000.parquet (combined partition)"], "answer": 0, "explanation": "partitionBy creates Hive-style partition directories with column=value naming. Multiple partition columns create nested directories. This enables partition pruning on read — Spark only reads directories matching filter predicates, skipping irrelevant partitions entirely."}, {"id": "s2_q6", "objective": "Read from JDBC sources", "question": "Which code reads a table from PostgreSQL via JDBC with predicate pushdown?", "options": ["spark.read.format('jdbc').option('url','jdbc:postgresql://host/db').option('dbtable','users').option('user','admin').option('password','pass').load()", "spark.read.jdbc('postgresql://host/db', 'users')", "spark.sql(\"SELECT * FROM jdbc.postgresql.users\")", "spark.read.format('postgres').option('table','users').load()"], "answer": 0, "explanation": "JDBC reads use format('jdbc') with url, dbtable, user, and password options. Spark pushes filter predicates down to the database for efficiency. For parallelism, add numPartitions, partitionColumn, lowerBound, and upperBound options. The other formats are not valid Spark data source names."}, {"id": "s2_q7", "objective": "Save to persistent tables", "question": "Which code saves a DataFrame as a managed Hive table with bucketing for optimized joins?", "options": ["df.write.bucketBy(16,'user_id').sortBy('user_id').saveAsTable('user_events')", "df.write.partitionBy('user_id').saveAsTable('user_events')", "df.write.mode('overwrite').save('/warehouse/user_events')", "df.write.format('hive').table('user_events')"], "answer": 0, "explanation": "bucketBy(n, col) distributes data into n buckets based on the hash of the specified column, and sortBy orders within each bucket. This optimizes joins on user_id because matching buckets can be joined without a shuffle. partitionBy creates directory-level partitions (different purpose). saveAsTable creates a managed Hive table."}, {"id": "s2_q8", "objective": "Query files directly", "question": "Which file format can NOT be queried directly using the spark.sql(\"SELECT * FROM format.`path`\") syntax?", "options": ["XLSX — Excel files require a third-party connector and cannot be queried with built-in file format syntax", "Parquet — built-in format", "JSON — built-in format", "CSV — built-in format"], "answer": 0, "explanation": "The format.`path` syntax works with Spark's built-in data sources: parquet, json, csv, orc, text, and avro (with the spark-avro package). Excel (XLSX) requires a third-party library like spark-excel and cannot be queried with this built-in syntax."}, {"id": "s2_q9", "objective": "Save modes", "question": "Which save mode is the default when no mode is explicitly specified in df.write.parquet('/path')?", "options": ["'errorifexists' (or 'error') — throws an exception if data already exists at the path", "'overwrite' — replaces existing data", "'append' — adds to existing data", "'ignore' — silently skips if data exists"], "answer": 0, "explanation": "The default save mode is 'errorifexists' (also written as 'error'). If the output path already contains data, Spark throws an AnalysisException. This prevents accidental data overwrites. You must explicitly set mode('overwrite'), mode('append'), or mode('ignore') to change this behavior."}, {"id": "s2_q10", "objective": "Temporary views and SQL", "question": "A developer registers a DataFrame as a temp view and queries it:\n\ndf.createOrReplaceTempView('sales')\nresult = spark.sql('SELECT region, SUM(amount) as total FROM sales GROUP BY region HAVING total > 10000')\n\nWhat type is the 'result' variable?", "options": ["A PySpark DataFrame — spark.sql() always returns a DataFrame", "A list of Row objects", "A pandas DataFrame", "A Python dictionary"], "answer": 0, "explanation": "spark.sql() always returns a PySpark DataFrame, regardless of the query. The result is lazy — the query is not executed until an action (like show(), collect(), or write) is called on the returned DataFrame. You can chain further DataFrame operations on it."}, {"id": "s2_q11", "objective": "Read with schema", "question": "A developer reads a CSV with an explicit schema instead of inferSchema=True. What is the benefit?", "options": ["Avoids a second pass over the data — inferSchema requires reading the file twice (once to infer types, once to parse), while explicit schema reads once", "Explicit schema is slower but more accurate", "No benefit — both approaches read the file the same number of times", "Explicit schema only works with Parquet, not CSV"], "answer": 0, "explanation": "When inferSchema=True, Spark makes an extra pass over the CSV to determine column types, doubling the read time. With an explicit StructType schema, Spark reads the file once and casts values according to the provided types. This is significantly faster for large CSV files."}, {"id": "s2_q12", "objective": "Write with overwrite and partitioning", "question": "A developer runs:\n\ndf.write.mode('overwrite').partitionBy('date').parquet('/output')\n\nThe /output directory already has partitions for dates 2024-01-01 through 2024-01-31. The new df only contains data for 2024-01-15. What happens?", "options": ["ALL existing partitions (01-01 through 01-31) are deleted and only 01-15 is written — mode('overwrite') replaces the entire output path", "Only the 2024-01-15 partition is overwritten; other dates are preserved", "Spark appends data for 2024-01-15 alongside the existing partition", "Spark throws an error because partitions already exist"], "answer": 0, "explanation": "mode('overwrite') with partitionBy still deletes the ENTIRE output directory before writing. To overwrite only specific partitions, use spark.conf.set('spark.sql.sources.partitionOverwriteMode', 'dynamic') which replaces only the partitions present in the new DataFrame."}, {"id": "s2_q13", "objective": "Sort on write", "question": "Which code writes a DataFrame sorted by timestamp within each partition?", "options": ["df.write.partitionBy('date').sortBy('timestamp').parquet('/out') — sortBy orders rows within each partition file", "df.orderBy('timestamp').write.partitionBy('date').parquet('/out')", "df.write.partitionBy('date').orderBy('timestamp').parquet('/out')", "df.sortWithinPartitions('timestamp').write.partitionBy('date').parquet('/out')"], "answer": 0, "explanation": "sortBy() on the DataFrameWriter sorts data within each output partition/bucket. This is different from orderBy() on the DataFrame which sorts globally (adding a shuffle). sortWithinPartitions() on a DataFrame also sorts within partitions but is applied before the write, not during."}, {"id": "s2_q14", "objective": "ORC files", "question": "What is the primary advantage of ORC file format over CSV for Spark SQL queries?", "options": ["Columnar storage with predicate pushdown and column pruning — Spark reads only the columns and row groups matching the query", "ORC files are human-readable while CSV files are not", "ORC supports more data types than CSV", "ORC files are always smaller than CSV files regardless of data"], "answer": 0, "explanation": "ORC (Optimized Row Columnar) stores data in columnar format with built-in statistics (min/max per stripe). Spark leverages predicate pushdown (skip stripes based on filters) and column pruning (read only selected columns). CSV must be read row-by-row and all columns are always read."}, {"id": "s2_q15", "objective": "Delta files", "question": "Which feature does Delta format provide that Parquet alone does not?", "options": ["ACID transactions with a transaction log that tracks all changes to the table", "Columnar storage format", "Schema enforcement on write", "Predicate pushdown based on file statistics"], "answer": 0, "explanation": "Delta Lake adds a transaction log (_delta_log) on top of Parquet files, enabling ACID transactions, time travel, schema evolution, and concurrent read/write safety. Plain Parquet provides columnar storage and predicate pushdown but lacks transactional guarantees and change tracking."}, {"id": "s2_q16", "objective": "Temp views", "question": "A developer creates two SparkSessions:\n\nspark1 = SparkSession.builder.getOrCreate()\nspark2 = spark1.newSession()\nspark1.sql('CREATE TEMP VIEW t AS SELECT 1 as id')\n\nCan spark2 query the view t?", "options": ["No — temp views are scoped to the session that created them; spark2 cannot see spark1's temp views", "Yes — temp views are shared across all sessions in the same application", "Yes — but only if spark2 explicitly imports the view", "No — newSession() creates a completely separate SparkContext"], "answer": 0, "explanation": "Temp views created with createOrReplaceTempView (or CREATE TEMP VIEW) are local to the creating SparkSession. newSession() creates a session with its own SQL catalog. To share views across sessions, use createOrReplaceGlobalTempView and query via global_temp database."}, {"id": "s2_q17", "objective": "Read from files", "question": "A developer reads Parquet files from a directory:\n\ndf = spark.read.parquet('/data/events/')\n\nThe directory contains files written with different schemas (some files have an extra column 'source'). What happens?", "options": ["Spark merges schemas by default for Parquet — all columns from all files appear; rows without 'source' get NULL", "Spark throws an error because schemas don't match", "Spark uses the schema of the first file and ignores extra columns", "Spark reads only the common columns across all files"], "answer": 0, "explanation": "For Parquet, Spark can merge schemas from multiple files (controlled by spark.sql.parquet.mergeSchema, default false; but enabled per-read with option('mergeSchema','true')). When enabled, columns present in some files but not others are filled with NULL. The default behavior actually uses the schema from the summary file or first file."}, {"id": "s2_q18", "objective": "Write modes", "question": "A streaming pipeline writes micro-batches to a Parquet table using foreachBatch. Each batch should replace the corresponding partition. Which combination is correct?", "options": ["Set spark.sql.sources.partitionOverwriteMode='dynamic' and use mode('overwrite').partitionBy(col) in the batch write", "Use mode('append') and manually delete old partitions before each batch", "Use mode('overwrite') without partitionBy — let Spark handle it", "Use mode('ignore') so duplicate batches are skipped"], "answer": 0, "explanation": "Dynamic partition overwrite mode only replaces partitions present in the current DataFrame, leaving other partitions intact. This is essential for streaming pipelines that process data for specific time periods — you want to overwrite just those partitions without destroying historical data."}, {"id": "s2_q19", "objective": "SQL queries on files", "question": "Which SQL query reads a text file and returns each line as a row?", "options": ["spark.sql(\"SELECT * FROM text.`/data/logs.txt`\")", "spark.sql(\"SELECT * FROM file.'/data/logs.txt'\")", "spark.sql(\"LOAD TEXT '/data/logs.txt'\")", "spark.sql(\"READ '/data/logs.txt' AS TEXT\")"], "answer": 0, "explanation": "The text format reads each line of a text file as a single string column named 'value'. The format.`path` syntax with backtick-quoted paths works for text just like parquet, json, etc. This is useful for reading log files or unstructured text data."}, {"id": "s2_q20", "objective": "Persistent tables", "question": "What is the difference between a managed table and an external table in Spark SQL?", "options": ["Dropping a managed table deletes both metadata and data files; dropping an external table deletes only the metadata", "Managed tables are faster because data is stored in Spark's memory", "External tables cannot be queried with SQL", "Managed tables support only Parquet format"], "answer": 0, "explanation": "Managed tables store data in the Spark warehouse directory; dropping them removes everything. External tables point to user-specified locations; dropping them removes only the catalog entry, leaving the data files intact. This distinction is critical for data governance — use external tables when data is shared across systems."}, {"id": "s2_q21", "objective": "Read with schema", "question": "A developer defines a schema with StructField('amount', IntegerType(), False). A CSV row has amount='abc'. What happens?", "options": ["The value is set to null (for permissive mode, the default) — non-parseable values become null even if nullable=False in the schema", "Spark throws an exception and fails the job", "The value is stored as the string 'abc'", "The row is silently dropped"], "answer": 0, "explanation": "In PERMISSIVE mode (default), unparseable values are set to null. The nullable=False in StructType is metadata for schema documentation but doesn't enforce non-null constraints during reads. Use mode('FAILFAST') to throw exceptions on parse errors, or mode('DROPMALFORMED') to drop bad rows."}, {"id": "s2_q22", "objective": "SQL functions", "question": "Which Spark SQL function returns the current timestamp at the start of query evaluation (same value for all rows)?", "options": ["current_timestamp() — evaluated once at query planning time, same value for every row", "now() — evaluated per row", "timestamp() — creates a new timestamp per row", "systimestamp() — returns system clock per task"], "answer": 0, "explanation": "current_timestamp() is evaluated once at the start of query planning and returns the same value for all rows in the query. This is a deterministic function within a single query. now() is an alias for current_timestamp() in some SQL dialects. There is no timestamp() or systimestamp() in Spark SQL."}]}, {"id": 3, "name": "DataFrame/DataSet API Development", "questions": [{"id": "s3_q1", "objective": "Manipulate columns", "question": "Which code adds a new column 'revenue' computed as price * quantity?", "options": ["df.withColumn('revenue', col('price') * col('quantity'))", "df.addColumn('revenue', col('price') * col('quantity'))", "df.select('*', ('price' * 'quantity').alias('revenue'))", "df.mutate(revenue=col('price') * col('quantity'))"], "answer": 0, "explanation": "withColumn(name, expression) adds a new column or replaces an existing one. col('price') * col('quantity') creates a Column expression for element-wise multiplication. addColumn() and mutate() don't exist on PySpark DataFrames."}, {"id": "s3_q2", "objective": "Exploding arrays", "question": "A DataFrame has a column 'tags' of type Array[String]. Which code creates a new row for each tag while keeping other columns?", "options": ["df.select('*', explode('tags').alias('tag'))", "df.select('*', flatten('tags').alias('tag'))", "df.withColumn('tag', split('tags', ','))", "df.select('*', array_distinct('tags').alias('tag'))"], "answer": 0, "explanation": "explode() creates one row per array element, duplicating the other columns. flatten() combines nested arrays into one (doesn't create rows). split() splits a string into an array (input is already an array). array_distinct() removes duplicates within the array (doesn't create rows)."}, {"id": "s3_q3", "objective": "Filters", "question": "Which code correctly filters rows where the 'email' column is not null AND the 'age' column is greater than 18?", "options": ["df.filter((col('email').isNotNull()) & (col('age') > 18))", "df.filter(col('email').isNotNull() and col('age') > 18)", "df.where('email IS NOT NULL AND age > 18') — and this is ALSO correct but option A is the canonical PySpark Column API approach", "df.filter(col('email') != None & col('age') > 18)"], "answer": 0, "explanation": "In PySpark, use & (bitwise AND) for combining Column conditions, with parentheses for correct precedence. Python's 'and' keyword doesn't work with Column objects (raises ValueError). The SQL string in where() also works, but the Column API with & is the standard approach."}, {"id": "s3_q4", "objective": "Deduplication", "question": "Which code removes duplicates based only on the 'email' column, keeping the first occurrence?", "options": ["df.dropDuplicates(['email'])", "df.distinct(['email'])", "df.unique('email')", "df.groupBy('email').first()"], "answer": 0, "explanation": "dropDuplicates(subset) removes duplicate rows based on the specified column(s), keeping one arbitrary row per duplicate group. distinct() doesn't accept column arguments — it deduplicates on all columns. unique() doesn't exist. groupBy().first() would work but is less efficient and has different API semantics."}, {"id": "s3_q5", "objective": "Aggregate operations", "question": "Which code computes both the mean and standard deviation of the 'salary' column grouped by 'department'?", "options": ["df.groupBy('department').agg(avg('salary').alias('avg_sal'), stddev('salary').alias('std_sal'))", "df.groupBy('department').mean('salary').stddev('salary')", "df.groupBy('department').summary('mean', 'stddev')", "df.groupBy('department').agg({'salary': 'mean', 'salary': 'stddev'})"], "answer": 0, "explanation": "agg() accepts multiple aggregate expressions. avg() and stddev() from pyspark.sql.functions compute the mean and standard deviation. Option B chains incorrectly (mean returns a DataFrame, not a GroupedData). Option D has duplicate dict keys. agg() with named expressions is the correct multi-aggregation pattern."}, {"id": "s3_q6", "objective": "Date operations", "question": "Which code extracts the year and month from a timestamp column 'created_at'?", "options": ["df.select(year('created_at').alias('yr'), month('created_at').alias('mo'))", "df.select(extract('year', 'created_at'), extract('month', 'created_at'))", "df.select(col('created_at').year(), col('created_at').month())", "df.select(date_part('created_at', 'year'), date_part('created_at', 'month'))"], "answer": 0, "explanation": "year() and month() from pyspark.sql.functions extract date components from a date or timestamp column. They return integer columns. The Column object doesn't have .year() or .month() methods directly. extract() and date_part() are SQL functions, not Python API functions."}, {"id": "s3_q7", "objective": "Joins", "question": "Which join type returns all rows from both DataFrames, filling NULL where there is no match on either side?", "options": ["df1.join(df2, 'id', 'full') — full outer join returns all rows from both sides", "df1.join(df2, 'id', 'left') — only keeps all rows from left", "df1.join(df2, 'id', 'inner') — only keeps matching rows", "df1.join(df2, 'id', 'cross') — produces Cartesian product"], "answer": 0, "explanation": "A full outer join (also written as 'outer' or 'full_outer') returns all rows from both DataFrames. Rows with matching keys are joined; non-matching rows from either side have NULLs for the other side's columns. This preserves all data from both sources."}, {"id": "s3_q8", "objective": "Broadcast joins", "question": "When should a developer use broadcast(df_small) in a join?", "options": ["When one DataFrame is small enough to fit in each executor's memory — this avoids shuffling the large DataFrame", "When both DataFrames are large and need to be distributed evenly", "When the join key has high cardinality", "When you want to reduce the number of output partitions"], "answer": 0, "explanation": "Broadcast joins send a copy of the small DataFrame to every executor, allowing each partition of the large DataFrame to join locally without a shuffle. The small DataFrame must fit in executor memory. The auto-broadcast threshold is spark.sql.autoBroadcastJoinThreshold (default 10MB)."}, {"id": "s3_q9", "objective": "Schema operations", "question": "Which code prints the DataFrame schema as a tree and returns None?", "options": ["df.printSchema()", "df.schema()", "df.dtypes()", "df.describe()"], "answer": 0, "explanation": "printSchema() prints the schema tree (column names, types, nullability) to stdout and returns None. df.schema returns a StructType object (no parentheses needed for the property). df.dtypes returns a list of (name, type) tuples. df.describe() computes summary statistics."}, {"id": "s3_q10", "objective": "Sorting", "question": "Which code sorts a DataFrame by 'salary' descending, then by 'name' ascending?", "options": ["df.orderBy(col('salary').desc(), col('name').asc())", "df.sort('salary', 'name', ascending=[False, True])", "Both A and B are correct — orderBy and sort are aliases and both syntaxes work", "df.sortBy(desc('salary'), asc('name'))"], "answer": 2, "explanation": "orderBy() and sort() are aliases in PySpark. Both col('salary').desc() syntax and the ascending=[False, True] parameter syntax are valid. sortBy() does not exist as a DataFrame method (it's on DataFrameWriter). Both A and B produce the same result."}, {"id": "s3_q11", "objective": "Collect and convert", "question": "Which code correctly converts a DataFrame to a list of Python dictionaries?", "options": ["[row.asDict() for row in df.collect()]", "df.toPandas().to_dict('records')", "Both A and B produce a list of dictionaries, but A avoids the pandas dependency", "df.toList()"], "answer": 2, "explanation": "Both approaches work: collect() returns a list of Row objects, and asDict() converts each Row to a dict. toPandas().to_dict('records') also works but requires pandas and collects all data to the driver. toList() doesn't exist on DataFrames. Both are valid but option A is lighter-weight."}, {"id": "s3_q12", "objective": "UDFs", "question": "A developer defines a Python UDF:\n\n@udf(returnType=StringType())\ndef clean_name(name):\n    return name.strip().title()\n\ndf.withColumn('clean', clean_name(col('name')))\n\nWhat is the performance concern?", "options": ["Python UDFs serialize data from JVM to Python and back for each row, causing significant overhead compared to built-in functions", "Python UDFs cannot be used with withColumn", "Python UDFs don't work on string columns", "There is no performance concern — Python UDFs are optimized by Catalyst"], "answer": 0, "explanation": "Python UDFs require serializing each row from the JVM to a Python process and back (via Arrow or pickle). This serialization overhead is significant compared to built-in functions that execute in the JVM. For this case, use the built-in trim() and initcap() functions instead for much better performance."}, {"id": "s3_q13", "objective": "Broadcast variables", "question": "A developer needs to look up country codes from a 500 KB dictionary in every task. Which approach is most efficient?", "options": ["Create a broadcast variable: bc = spark.sparkContext.broadcast(country_dict), then use bc.value in a UDF", "Pass the dictionary directly in the UDF closure — Spark serializes it with each task", "Create an RDD from the dictionary and join it", "Store the dictionary in HDFS and read it in each task"], "answer": 0, "explanation": "Broadcast variables are sent once per executor (not per task) and cached in memory. With a closure, the dict would be serialized with every task, causing redundant network transfers. For a 500 KB lookup table, broadcasting is ideal — it's sent once and shared across all tasks on an executor."}, {"id": "s3_q14", "objective": "Accumulators", "question": "A developer creates an accumulator to count malformed records:\n\nbad_count = spark.sparkContext.accumulator(0)\n\ndef parse(row):\n    try:\n        return process(row)\n    except:\n        bad_count.add(1)\n        return None\n\nWhere can bad_count be reliably read?", "options": ["Only on the driver — accumulators are write-only on executors and readable only on the driver", "On any executor after the job completes", "Inside the UDF itself after adding to it", "Accumulators can be read anywhere in the application"], "answer": 0, "explanation": "Accumulators follow a write-only model on executors: tasks can add() to them but cannot read the current value. Only the driver can read the accumulated value after an action completes. Note: if tasks are retried due to failures, the accumulator may count more than expected (use inside actions only for exact counts)."}, {"id": "s3_q15", "objective": "Union operations", "question": "df1 has columns ['id','name','age'] and df2 has columns ['id','age','name'] (different order). What does df1.union(df2) produce?", "options": ["A DataFrame where df2's 'age' values appear in the 'name' column and vice versa — union matches by position, not name", "A correctly merged DataFrame matching columns by name", "An error because column order differs", "A DataFrame with 6 columns (duplicates from both)"], "answer": 0, "explanation": "union() combines DataFrames by column position, not by name. If column order differs, values are misaligned. Use unionByName() instead to match columns by name regardless of order. This is a common bug — always use unionByName() when schemas might have different column ordering."}, {"id": "s3_q16", "objective": "Rename columns", "question": "Which code renames the column 'old_name' to 'new_name'?", "options": ["df.withColumnRenamed('old_name', 'new_name')", "df.rename(columns={'old_name': 'new_name'})", "df.withColumn('new_name', col('old_name'))", "Both A and C work, but A is preferred because C also keeps the old column unless explicitly dropped"], "answer": 3, "explanation": "withColumnRenamed('old', 'new') renames in place. withColumn('new', col('old')) adds a new column with the old values but keeps the old column too — you'd need to chain .drop('old_name'). rename() is a pandas method, not PySpark. Option A is the clean, preferred approach."}, {"id": "s3_q17", "objective": "Date operations", "question": "Which code converts a Unix timestamp (seconds since epoch) stored as a LongType column to a date string 'yyyy-MM-dd'?", "options": ["df.withColumn('date_str', from_unixtime(col('ts'), 'yyyy-MM-dd'))", "df.withColumn('date_str', to_date(col('ts'), 'yyyy-MM-dd'))", "df.withColumn('date_str', date_format(col('ts'), 'yyyy-MM-dd'))", "df.withColumn('date_str', cast(col('ts'), 'date'))"], "answer": 0, "explanation": "from_unixtime() converts a Unix timestamp (Long) to a formatted string. to_date() expects a string or timestamp input, not a long. date_format() converts a date/timestamp to a string but can't convert a raw long. cast to date would lose time information and doesn't accept a long directly."}, {"id": "s3_q18", "objective": "Cross join", "question": "What does df1.crossJoin(df2) produce when df1 has 100 rows and df2 has 50 rows?", "options": ["5000 rows — every row in df1 paired with every row in df2 (Cartesian product)", "100 rows — df1 rows with df2 columns appended", "150 rows — union of both DataFrames", "50 rows — matching rows only"], "answer": 0, "explanation": "crossJoin() produces the Cartesian product: every row from df1 is combined with every row from df2, yielding 100 × 50 = 5000 rows. This is computationally expensive and should be used carefully. Spark requires spark.sql.crossJoin.enabled=true (default true since Spark 3.x) or an explicit crossJoin() call."}, {"id": "s3_q19", "objective": "Multi-key join", "question": "Which code joins two DataFrames on multiple columns (both 'dept_id' and 'region')?", "options": ["df1.join(df2, ['dept_id', 'region'], 'inner')", "df1.join(df2, col('dept_id') & col('region'), 'inner')", "df1.join(df2, 'dept_id', 'region', 'inner')", "df1.join(df2, on=['dept_id', 'region'], how='inner')"], "answer": 0, "explanation": "Passing a list of column names joins on all specified columns. When using a list, the join columns must exist in both DataFrames with the same name. Option D with keyword arguments also works. Option B uses & incorrectly (that's boolean AND for conditions, not multi-column join). Option C has too many positional arguments."}, {"id": "s3_q20", "objective": "Write with schema", "question": "A developer writes a DataFrame to Parquet and later reads it back. The original DataFrame had a column 'amount' as DecimalType(10,2). What type will 'amount' have when read back?", "options": ["DecimalType(10,2) — Parquet preserves the exact schema including precision and scale", "DoubleType — Parquet converts all decimals to doubles", "StringType — Parquet stores decimals as strings", "LongType — Parquet truncates decimal values"], "answer": 0, "explanation": "Parquet is a self-describing format that preserves the exact schema including data types, precision, and scale. When you write DecimalType(10,2) to Parquet and read it back, you get DecimalType(10,2) exactly. This is one of Parquet's advantages over CSV, which loses type information."}, {"id": "s3_q21", "objective": "Handling missing data", "question": "Which code fills NULL values in the 'salary' column with the mean salary?", "options": ["mean_val = df.select(avg('salary')).first()[0]; df.fillna({'salary': mean_val})", "df.fillna('mean', subset=['salary'])", "df.na.replace(None, avg('salary'), 'salary')", "df.withColumn('salary', coalesce(col('salary'), mean(col('salary'))))"], "answer": 0, "explanation": "You must compute the mean first as a scalar value, then pass it to fillna(). fillna() accepts a dict mapping column names to replacement values. Option B passes the string 'mean' literally. Option C's syntax is incorrect. Option D uses mean() which is an aggregate and can't be used row-by-row in withColumn without a window."}, {"id": "s3_q22", "objective": "Split columns", "question": "Which code splits a 'full_name' column containing 'First Last' into separate 'first_name' and 'last_name' columns?", "options": ["df.withColumn('first_name', split(col('full_name'), ' ')[0]).withColumn('last_name', split(col('full_name'), ' ')[1])", "df.select(split('full_name', ' ').alias('first_name', 'last_name'))", "df.withColumn('names', explode(split(col('full_name'), ' ')))", "df.select(substring_index('full_name', ' ', 1).alias('first_name'), substring_index('full_name', ' ', -1).alias('last_name'))"], "answer": 0, "explanation": "split(col, pattern) returns an ArrayType column. Array indexing with [0] and [1] extracts individual elements. This creates two separate columns from the split result. explode would create new rows (not columns). substring_index exists in MySQL but not PySpark."}, {"id": "s3_q23", "objective": "Stateful UDFs", "question": "In Structured Streaming, when should a developer use stateful processing with flatMapGroupsWithState instead of a simple UDF?", "options": ["When the computation requires maintaining state across micro-batches — e.g., sessionization, running averages, or detecting patterns over time", "When the UDF is too slow and needs optimization", "When the input data has nested schema types", "When the output needs to be written to multiple sinks"], "answer": 0, "explanation": "flatMapGroupsWithState (and applyInPandasWithState) enables custom stateful processing where you maintain and update state across micro-batches per group key. Simple UDFs are stateless — they process each row independently. Stateful operators are needed for sessionization, anomaly detection over time, or maintaining running aggregates."}, {"id": "s3_q24", "objective": "Aggregation", "question": "What does df.summary() return?", "options": ["A DataFrame with statistics (count, mean, stddev, min, 25%, 50%, 75%, max) for all numeric and string columns", "A single row with the sum of all numeric columns", "The schema of the DataFrame as a string", "A dictionary of column names to their data types"], "answer": 0, "explanation": "summary() computes descriptive statistics including count, mean, standard deviation, min, max, and percentiles (25%, 50%, 75%) for numeric columns, and count, min, max for string columns. It returns a DataFrame with one row per statistic. It's more comprehensive than describe() which shows fewer percentiles."}, {"id": "s3_q25", "objective": "approx_count_distinct", "question": "A developer uses approx_count_distinct('user_id', rsd=0.05) on 1 billion rows. What does rsd=0.05 control?", "options": ["The maximum allowed relative standard deviation (5%) — the estimate will be within ~5% of the true count with high probability", "The number of hash functions used in the algorithm", "The sample rate — only 5% of rows are counted", "The number of partitions used for the computation"], "answer": 0, "explanation": "rsd (relative standard deviation) controls the accuracy-performance tradeoff of the HyperLogLog algorithm. rsd=0.05 means the result has an expected error of ~5%. Lower rsd gives higher accuracy but uses more memory. This is much faster than exact countDistinct() for large datasets where approximate counts are acceptable."}, {"id": "s3_q26", "objective": "Drop columns", "question": "Which code drops multiple columns from a DataFrame?", "options": ["df.drop('col1', 'col2', 'col3')", "df.drop(['col1', 'col2', 'col3'])", "df.drop(columns=['col1', 'col2', 'col3'])", "df.select(*[c for c in df.columns if c not in ('col1','col2','col3')])"], "answer": 0, "explanation": "drop() accepts multiple column names as separate string arguments. It does NOT accept a list (that would be a single argument of type list). Option D works as a workaround using select, but drop('col1', 'col2', 'col3') is the idiomatic approach. In newer PySpark versions, drop also accepts Column objects."}, {"id": "s3_q27", "objective": "Iteration", "question": "A developer needs to process each row of a small DataFrame (100 rows) on the driver. Which approach is correct?", "options": ["for row in df.collect(): process(row['name'], row['age'])", "for row in df: process(row)", "df.foreach(lambda row: process(row))", "df.apply(process, axis=1)"], "answer": 0, "explanation": "collect() returns a list of Row objects to the driver, which can be iterated in Python. DataFrames are not directly iterable in PySpark. foreach() runs on executors (not the driver) and returns None. apply() is a pandas method. For small DataFrames where driver processing is acceptable, collect() + iteration is standard."}, {"id": "s3_q28", "objective": "Window functions", "question": "Which code computes a running total of 'amount' partitioned by 'account_id' ordered by 'date'?", "options": ["from pyspark.sql.window import Window; w = Window.partitionBy('account_id').orderBy('date').rowsBetween(Window.unboundedPreceding, Window.currentRow); df.withColumn('running_total', sum('amount').over(w))", "df.groupBy('account_id').agg(sum('amount').alias('running_total'))", "df.withColumn('running_total', cumsum('amount'))", "df.orderBy('date').withColumn('running_total', sum('amount'))"], "answer": 0, "explanation": "Window functions with over() compute aggregates within a partition without collapsing rows. The window spec defines partitioning (by account_id), ordering (by date), and frame (unboundedPreceding to currentRow for running total). groupBy collapses rows. cumsum doesn't exist in PySpark. sum without over() is a global aggregate."}, {"id": "s3_q29", "objective": "Read with schema enforcement", "question": "A developer reads JSON data with an explicit schema. A JSON record has an extra field 'debug_info' not in the schema. What happens?", "options": ["The extra field is silently ignored — only columns defined in the schema are read", "Spark throws an error for schema mismatch", "The extra field is added to the DataFrame automatically", "Spark reads the field as a StringType column"], "answer": 0, "explanation": "When an explicit schema is provided, Spark reads only the columns defined in that schema. Extra fields in the source data are silently ignored. This is the intended behavior — it provides schema enforcement and prevents unexpected columns from appearing in the output DataFrame."}, {"id": "s3_q30", "objective": "Complex types", "question": "A DataFrame has a nested struct column: df.schema shows 'address: struct<street:string, city:string, zip:string>'. Which code extracts the 'city' field?", "options": ["df.select(col('address.city'))", "df.select(col('address').getField('city'))", "df.select(col('address')['city'])", "All three approaches correctly extract the 'city' field from the nested struct"], "answer": 3, "explanation": "PySpark supports multiple syntaxes for accessing struct fields: dot notation (col('address.city')), getField() method, and bracket notation. All three produce the same result — a column containing the city values extracted from the address struct."}, {"id": "s3_q31", "objective": "Type casting", "question": "Which code casts the 'price' column from StringType to DoubleType?", "options": ["df.withColumn('price', col('price').cast('double'))", "df.withColumn('price', double(col('price')))", "df.withColumn('price', col('price').astype('double'))", "df.withColumn('price', cast(col('price'), DoubleType()))"], "answer": 0, "explanation": "col.cast('double') or col.cast(DoubleType()) converts the column type. The cast method accepts either a string type name or a DataType object. double() is not a PySpark function. astype() is a pandas method. There is no standalone cast() function — it's a Column method."}, {"id": "s3_q32", "objective": "Pivot", "question": "Which code correctly pivots a DataFrame to create columns from distinct values of 'quarter' with sum of 'revenue'?", "options": ["df.groupBy('product').pivot('quarter').agg(sum('revenue'))", "df.pivot('quarter').groupBy('product').sum('revenue')", "df.groupBy('product').agg(pivot('quarter', sum('revenue')))", "df.reshape('product', 'quarter', 'revenue')"], "answer": 0, "explanation": "pivot() must be called on a GroupedData object (after groupBy). It takes the column whose distinct values become new column names. The subsequent agg() computes the value for each cell. The method chain is: groupBy → pivot → agg. pivot before groupBy is invalid. reshape doesn't exist."}, {"id": "s3_q33", "objective": "When expressions", "question": "Which code correctly implements a CASE WHEN logic to categorize salary?", "options": ["df.withColumn('band', when(col('salary') > 100000, 'high').when(col('salary') > 50000, 'mid').otherwise('low'))", "df.withColumn('band', case(col('salary') > 100000, 'high', col('salary') > 50000, 'mid', 'low'))", "df.withColumn('band', if_(col('salary') > 100000, 'high', 'low'))", "df.withColumn('band', switch(col('salary'), {100000: 'high', 50000: 'mid'}))"], "answer": 0, "explanation": "when().when().otherwise() chains implement SQL CASE WHEN logic. Each when() adds a condition-value pair, and otherwise() provides the default. case(), if_(), and switch() don't exist in PySpark. The when() function is imported from pyspark.sql.functions."}, {"id": "s3_q34", "objective": "Regex operations", "question": "Which code extracts email domains from a 'user@domain.com' format column?", "options": ["df.withColumn('domain', regexp_extract(col('email'), r'@(.+)$', 1))", "df.withColumn('domain', split(col('email'), '@')[1])", "Both A and B correctly extract the domain portion after the @ symbol", "df.withColumn('domain', substring_after(col('email'), '@'))"], "answer": 2, "explanation": "Both approaches work: regexp_extract with group 1 captures everything after @, and split('@')[1] takes the second element after splitting on @. substring_after doesn't exist in PySpark. For simple delimiters, split is cleaner; for complex patterns, regexp_extract is more flexible."}]}, {"id": 4, "name": "Troubleshooting and Tuning", "questions": [{"id": "s4_q1", "objective": "Partitioning strategies", "question": "A developer has a DataFrame with 10 partitions and needs 100 partitions for better parallelism. Which operation should they use?", "options": ["df.repartition(100) — it performs a full shuffle to create exactly 100 evenly-distributed partitions", "df.coalesce(100) — coalesce can increase or decrease partitions", "df.partitionBy(100)", "df.redistribute(100)"], "answer": 0, "explanation": "repartition(n) performs a full shuffle to create exactly n partitions with roughly even data distribution. coalesce() can only decrease partitions (it avoids a full shuffle by merging adjacent partitions). partitionBy is for writing. redistribute doesn't exist. Use repartition to increase parallelism."}, {"id": "s4_q2", "objective": "Data skew", "question": "A groupBy('customer_id').agg(...) operation has 200 tasks but one task takes 30 minutes while others take 30 seconds. Which is the most effective fix?", "options": ["Enable AQE skew join optimization: spark.sql.adaptive.enabled=true and spark.sql.adaptive.skewJoin.enabled=true", "Increase spark.sql.shuffle.partitions from 200 to 2000", "Add more executors to the cluster", "Decrease executor memory to force more frequent GC"], "answer": 0, "explanation": "This is classic data skew — one customer_id has vastly more data than others. AQE's skew handling automatically detects oversized partitions and splits them into smaller sub-partitions. Simply increasing partition count doesn't help if all data for one key goes to one partition. More executors don't help a single-partition bottleneck."}, {"id": "s4_q3", "objective": "Reducing shuffling", "question": "A developer joins a 500 GB DataFrame with a 5 MB lookup table. The Spark UI shows a SortMergeJoin with 200 GB of shuffle. How can they eliminate the shuffle?", "options": ["Use broadcast(df_small): df_large.join(broadcast(df_lookup), 'key') — broadcasts the 5 MB table to all executors", "Repartition both DataFrames to the same number of partitions", "Cache both DataFrames before joining", "Use df_large.join(df_lookup, 'key', 'left_semi')"], "answer": 0, "explanation": "A 5 MB table is a perfect candidate for broadcast join. Broadcasting sends the small table to every executor, allowing each partition of the large table to join locally without any shuffle. The default autoBroadcastJoinThreshold is 10 MB, so this should auto-broadcast — but explicit broadcast() guarantees it and makes intent clear."}, {"id": "s4_q4", "objective": "AQE", "question": "Which of the following is NOT a feature of Adaptive Query Execution (AQE)?", "options": ["Automatic caching of frequently accessed DataFrames — AQE does not manage caching", "Dynamic coalescing of shuffle partitions based on actual data sizes", "Converting sort-merge joins to broadcast joins when runtime data is small enough", "Optimizing skew joins by splitting large partitions"], "answer": 0, "explanation": "AQE (enabled by default since Spark 3.2) provides three main optimizations: (1) dynamically coalescing shuffle partitions, (2) converting sort-merge joins to broadcast joins at runtime, and (3) handling skew joins. It does NOT automatically cache DataFrames — caching is an explicit developer decision."}, {"id": "s4_q5", "objective": "Driver and executor logs", "question": "A Spark job fails with 'Container killed by YARN for exceeding memory limits' on an executor. Which log provides the most specific information about the memory issue?", "options": ["The executor's stderr log — it contains the JVM heap dump summary and the last operations before OOM", "The driver's stdout log", "The YARN ResourceManager log", "The Spark History Server event log"], "answer": 0, "explanation": "Executor stderr contains the JVM-level error details: heap dump path, allocation failure stack trace, and which operation was running when memory was exhausted. The driver log shows that the executor was lost, but the root cause details are in the executor's own logs."}, {"id": "s4_q6", "objective": "Performance tuning", "question": "A developer notices that their Spark job writes 10,000 small files (1 MB each) to a Parquet output directory. What is the problem and how should they fix it?", "options": ["Small file problem — too many partitions at write time. Use coalesce() or repartition() before write to reduce output files", "This is normal behavior and requires no fix", "The developer should use CSV instead of Parquet for small files", "Increase spark.sql.files.maxPartitionBytes to merge small files"], "answer": 0, "explanation": "10,000 small files create excessive overhead for downstream reads (file listing, opening file handles, metadata parsing). The fix is to reduce partitions before writing: df.coalesce(100).write.parquet('/out'). Alternatively, use repartition() for even distribution. maxPartitionBytes controls read-side partition sizing, not write-side."}, {"id": "s4_q7", "objective": "Spill to disk", "question": "The Spark UI Tasks tab shows 'Spill (Memory)' and 'Spill (Disk)' columns with large values for many tasks. What does this indicate?", "options": ["Tasks don't have enough execution memory for shuffle/sort/aggregation operations and are spilling intermediate data to disk, degrading performance", "The executor disk is full and data is being written to memory instead", "The driver is running out of memory", "Cached DataFrames are being evicted to disk"], "answer": 0, "explanation": "Spill occurs when a task's intermediate data (during shuffle, sort, or aggregation) exceeds available execution memory. Data is serialized and written to local disk, then read back when needed. This significantly degrades performance. Fixes: increase executor memory, reduce partition sizes, or optimize the query to reduce intermediate data."}, {"id": "s4_q8", "objective": "Cluster utilization", "question": "The Spark UI Executors tab shows 10 executors but the Stages tab shows a stage with only 5 tasks. What is the utilization problem?", "options": ["5 of 10 executors are idle — the stage has fewer tasks than executors. Repartition the input data to have at least as many partitions as total cores", "The cluster has too many executors for the workload", "5 executors have failed and need to be replaced", "The tasks are too large and should be split"], "answer": 0, "explanation": "With only 5 tasks and 10 executors, 5 executors sit idle during this stage. To fully utilize the cluster, ensure the number of partitions is at least equal to the total number of cores. Repartitioning the input or increasing spark.sql.shuffle.partitions can help utilize all available resources."}, {"id": "s4_q9", "objective": "Shuffle optimization", "question": "A developer runs a self-join: df.join(df, 'user_id'). The Spark UI shows the same data being shuffled twice (once for each side of the join). How can they optimize this?", "options": ["Repartition df by 'user_id' first and cache it: df = df.repartition('user_id').cache(); df.join(df, 'user_id') — data is shuffled once during repartition, then the join uses pre-partitioned data", "Use broadcast join for both sides", "Switch from join to crossJoin", "Set spark.sql.shuffle.partitions=1"], "answer": 0, "explanation": "By repartitioning and caching before the self-join, data is shuffled once during repartition. The subsequent join finds both sides already partitioned by the join key and skips the shuffle. This is especially effective for self-joins and multi-join scenarios on the same key."}, {"id": "s4_q10", "objective": "Logging", "question": "A developer adds print('Processing partition') inside a map() transformation. Where does this output appear?", "options": ["In the executor's stderr/stdout logs — code inside transformations runs on executors, not the driver", "In the driver's console output", "In the Spark UI's SQL tab", "In the application's main log file on the client machine"], "answer": 0, "explanation": "Transformations execute on executors. Any print() or logging statements inside map(), filter(), UDFs, etc. appear in the executor's stdout/stderr logs, accessible via the Spark UI Executors tab. Only code running outside transformations (driver-side) appears in the driver's console."}, {"id": "s4_q11", "objective": "OOM diagnosis", "question": "An executor throws java.lang.OutOfMemoryError: Java heap space during a groupBy().agg() operation. Which parameter should the developer increase first?", "options": ["spark.executor.memory — increases the JVM heap available for execution and storage", "spark.driver.memory — increases driver heap", "spark.executor.memoryOverhead — increases non-heap memory", "spark.memory.fraction — increases the fraction of heap used for Spark"], "answer": 0, "explanation": "Executor OOM during aggregation means the executor's JVM heap is insufficient for the execution memory needed by the groupBy shuffle/aggregation. Increasing spark.executor.memory gives more heap space. driver.memory only affects the driver. memoryOverhead is for non-heap (native) memory. memory.fraction could help but giving more total heap is the first step."}, {"id": "s4_q12", "objective": "Spark UI interpretation", "question": "In the Spark UI SQL tab, a developer sees a physical plan with 'BroadcastHashJoin' but expected 'SortMergeJoin'. What caused this?", "options": ["One side of the join was small enough that Spark (or AQE) automatically chose broadcast join for better performance", "The developer accidentally used the broadcast() hint", "Spark randomly chooses between join strategies", "BroadcastHashJoin is the only join strategy in Spark"], "answer": 0, "explanation": "Spark's optimizer chooses BroadcastHashJoin when one side is smaller than spark.sql.autoBroadcastJoinThreshold (default 10MB). AQE can also convert a planned SortMergeJoin to BroadcastHashJoin at runtime if actual data is small. This is usually beneficial — broadcast joins avoid expensive shuffles."}, {"id": "s4_q13", "objective": "Repartition vs c
